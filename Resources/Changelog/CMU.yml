- author: potatoed6
  changes:
  - message: 'Група PMC: ERT, евакуаційна команда, ударна команда. Що адміністратори захочуть їм наказати. Мають M41A/2, 1 M39B2, 1 NSG-23, 1 M42A, 1 SGO. Можливо, пізніше буде додано синта.'
    type: Add
  - message: 'Hazard Transportation: CL, 2 охоронці, 2 науковці. Вони мають випадковий шанс отримати або 66% наркотик speed demon чи токсин mindbreaker у великій кількості, узгоджено з EG, або 33% 2 яйця ксено/MMI з ванільним імплантером SS14, що гібає вас після смерті. Так, зло, але це WeYu, і потрібно когось гібнути для використання в MMI. Якщо на мапі немає лабораторії, вони мають 2 медичні намети.'
    type: Add
  - message: 'Підрозділ боротьби з порушеннями інтелектуальної власності: 1 юрист і 1 офіцер особистої охорони. Примітка: юрист може з''явитися як синт; про це є велике попередження в меню привидів. Синт працює під прикриттям, бо, схоже, це звична річ для високопоставлених офіцерів WeYu у фільмах.'
    type: Add
  id: 68
  time: '2026-04-04T15:50:08.0000000+00:00'
