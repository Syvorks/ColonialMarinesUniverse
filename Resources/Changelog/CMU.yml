  - message: 'Додано здібність Deploy Traps: швидке розміщення пасток, що знерухомлюють здобич і можуть ставитися просто під ноги, хоча легко знищуються пострілом або ближньою атакою. Додано SFX потрапляння в пастку. Deploy Traps також може посилюватися Insight і тоді посилює Acid Mine.'
