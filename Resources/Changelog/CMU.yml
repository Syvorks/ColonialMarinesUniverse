  - message: 'Додано здібність Deploy Traps: швидке розміщення пасток для знерухомлення здобичі, які можна ставити навіть прямо під ноги, але легко знищити пострілами або ближньою атакою. Додано звукові ефекти потрапляння в пастку. Deploy Traps також може посилюватися Insight і, у свою чергу, посилювати Acid Mine при такому використанні.'
    type: Add
  - message: 'Додано атаку Acid Mine: дистанційний підрив кислоти з короткою затримкою перед нанесенням шкоди. Завдає підвищеної шкоди спорудам, має VFX і SFX. Також зменшує перезарядку Deploy Traps, коли ви влучаєте по мобах.'
    type: Add
  - message: 'Додано атаку Acid Shotgun: близький кислотний залп із великою шкодою, яка додатково зростає, якщо жертва спіймана в пастку.'
    type: Add
  - message: 'Додано механіку Insight: влучання дробинами Acid Shotgun дає заряди Insight, які потенційно посилюють наступне використання Deploy Traps.'
    type: Add
  - message: 'Додано Adrenaline Surge: після отримання удару ви на короткий час отримуєте прискорення.'
    type: Add
