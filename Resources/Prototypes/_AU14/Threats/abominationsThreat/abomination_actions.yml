# Abstract base — all abomination actions parent this so they get the
# cooldown-sweep background visual (matches the xeno action chrome).
- type: entity
  abstract: true
  id: ActionAbominationBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    backgroundOn:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: template_active_big

# --- Spider ---

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationSpiderLeap
  name: "Стрибок"
  description: "Стрибніть на ціль і ненадовго збийте її з ніг."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 5
  - type: TargetAction
    range: 6
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationLeapActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationSpiderSpit
  name: "Кислотний плювок"
  description: "Виплюньте в ціль згусток кислоти."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: xeno_spit
    useDelay: 3
  - type: TargetAction
    range: 10
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationSpitActionEvent

# --- Grunt ---

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationGruntSlam
  name: "Удар"
  description: "Стрибніть у вибрану точку та гепніться вниз, збиваючи ворогів із ніг."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 8
  - type: TargetAction
    range: 6
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationLeapActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationGruntCharge
  name: "Таран"
  description: "Розженіться й рвоніть уперед, трощачи все на своєму шляху."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: ready_charge
    useDelay: 18
  - type: TargetAction
    range: 8
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationChargeActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationGruntSpit
  name: "Кислотний плювок"
  description: "Вихаркніть у ціль згусток їдкої кислоти."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: xeno_spit
    useDelay: 4
  - type: TargetAction
    range: 10
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationSpitActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationGruntAcidSpray
  name: "Кислотний розбризк"
  description: "Виблюйте конус їдкої кислоти в напрямку цілі."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: spray_acid
    useDelay: 22
  - type: TargetAction
    range: 7
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationAcidSprayActionEvent

# --- Skitter ---

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationPlantKudzu
  name: "Розростити кудзу"
  description: "Виблюйте під себе джерело кудзу, що швидко розростається."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: plant_weeds
    useDelay: 30
  - type: InstantAction
    event: !type:Content.Shared._AU14.Abominations.AbominationPlantKudzuActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationChooseStructure
  name: "Обрати структуру з плоті"
  description: "Оберіть, яку структуру з плоті ви створите дією «Виділити плоть»."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: place_resin
    useDelay: 1
  - type: InstantAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationConstructionChooseActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationSecreteStructure
  name: "Виділити плоть"
  description: "Створіть обрану структуру з плоті на вибраній плитці."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: secrete_resin
    useDelay: 10
  - type: TargetAction
    range: 1
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationConstructionSecreteActionEvent

# --- Mimic ---

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationAssimilate
  name: "Асимілювати"
  description: "Почніть асимілювати знерухомленого гуманоїда. Він теж стане міміком."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: headbite
    useDelay: 2
  - type: TargetAction
    range: 1.5
    checkCanAccess: true
    deselectOnMiss: false
  - type: EntityTargetAction
    event: !type:Content.Shared._AU14.Abominations.AbominationAssimilateActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationMimicTransform
  name: "Мімік"
  description: "На обмежений час набудьте форми однієї з ваших асимільованих жертв."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: place_resin
    # useDelay is just a debounce on the picker — the real 5-minute cooldown
    # is stamped onto this specific action entity in FinishRevert, so it's
    # per-mimic by construction.
    useDelay: 1
  - type: InstantAction
    event: !type:Content.Shared._AU14.Abominations.AbominationMimicTransformActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationMimicRevert
  name: "Скинути маскування"
  description: "Вирвіться зі своєї поточної форми та поверніться до бойової подоби."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: headbite
    useDelay: 1
  - type: InstantAction
    event: !type:Content.Shared._AU14.Abominations.AbominationMimicRevertActionEvent
