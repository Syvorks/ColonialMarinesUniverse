- type: entity
  id: KillAllGovforRule
  parent: BaseGameRule
  name: "Убити всіх ГОВФОР"
  description: "Загроза перемагає, коли всі ГОВФОР мертві (або коли вказаний відсоток мертвий)."
  components:
    - type: KillAllGovforRule
      percent: 80

- type: entity
  id: ThreatSurviveRule
  parent: BaseGameRule
  name: "Таймер виживання загрози"
  description: "Загроза перемагає, якщо виживає X хвилин після початку раунду."
  components:
    - type: ThreatSurviveRule
      minutes: 120 # Set this to the desired number of minutes

- type: entity
  id: KillAllColonistRule
  parent: BaseGameRule
  name: "Убити всіх колоністів"
  description: "Загроза перемагає, коли всі AUColonists мертві (або коли вказаний відсоток мертвий)."
  components:
    - type: KillAllColonistRule
      percent: 85

- type: entity
  id: KillAllApeRule
  parent: BaseGameRule
  name: "Убити всіх мавп"
  description: "Загроза перемагає, коли всі мавпи мертві (або коли вказаний відсоток мертвий)."
  components:
    - type: KillAllApeRule
      percent: 100

- type: entity
  id: KillAllTribeRule
  parent: BaseGameRule
  name: "Убити всіх племінників"
  description: "Загроза перемагає, коли всі племінники мертві (або коли вказаний відсоток мертвий)."
  components:
    - type: KillAllTribeRule
      percent: 100

- type: entity
  id: KillAllAbominationsRule
  parent: BaseGameRule
  name: "Вбити всіх потвор"
  description: "Загроза перемагає, коли всі потвори мертві (або коли мертвий вказаний відсоток). Рахує замаскованих міміків."
  components:
    - type: KillAllAbominationsRule
      percent: 100

- type: entity
  id: KillAllXenoRule
  parent: BaseGameRule
  name: "Убити всіх ксено / культистів"
  description: "Загроза перемагає, коли всі ксено та культисти мертві (або коли вказаний відсоток мертвий)."
  components:
    - type: KillAllXenoRule

- type: entity
  id: KillAllHumanRule
  parent: BaseGameRule
  name: "Убити всіх людей"
  description: "Загроза перемагає, коли всі гуманоїдні моби, окрім ксено, мертві (або коли вказаний відсоток мертвий)."
  components:
    - type: KillAllHumanRule
      percent: 85

- type: entity
  id: InsWinConditionsRule
  parent: BaseGameRule
  name: "Убити всіх ГОВФОР / killallclf відповідно"
  description: "Загроза перемагає, коли всі ГОВФОР мертві (або коли вказаний відсоток мертвий)."
  components:
  - type: KillAllGovforRule
    percent: 85
    arrest: true
    winMessage: The CLF have won by eliminating Government Forces!
  - type: KillAllClfRule
    percent: 80
    winMessage: CLF combatants neutralized! The insurgency has been wiped out.
