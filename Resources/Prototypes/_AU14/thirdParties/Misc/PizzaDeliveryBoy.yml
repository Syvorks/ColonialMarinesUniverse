- type: job
  parent: CMJobBase
  id: AU14JobCivilianDeliveryPizzaBoy
  name: "рознощик піци"
  description: "Ви кур’єр Pizza Galaxy, якого відправили з набором освіжних напоїв і вибором піци, щоб продавати їх усім, кого зможете зустріти."
  setPreference: true
  playTimeTracker: AU14JobCivilianDeliveryPizzaBoy
  ranks:
    RMCRankCivilian: []
  startingGear: AU14GearPizzaDeliveryBoy
  icon: "CMJobIconEmpty"
  requireAdminNotify: false
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-loner
  accessGroups:
  - Colonist
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillFireman: 1
        RMCSkillVehicles: 1
        RMCSkillDomestics: 1
        RMCSkillFirearms: 2
    - type: JobPrefix
      prefix: au14-job-prefix-civiliancolonist
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
  hidden: false

- type: entity
  parent: AU14BaseMobSpeciesOrganicMisc
  id: AU14JobPizzaDeliveryBoy
  name: "рознощик піци"
  components:
  - type: GhostTakeoverAvailable
  - type: GhostRoleApplySpecial
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: "рознощик піци"
    description: "Ви кур’єр Pizza Galaxy, якого відправили з набором освіжних напоїв і вибором піци, щоб продавати їх усім, кого зможете зустріти."
    reregister: false
    job: AU14JobCivilianDeliveryPizzaBoy
    raffle:
      settings: short
    rules: You are a Pizza Galaxy deliveryman sent with an assortment of refreshing beverages and a choice of pizza to sell to anyone you may encounter.

- type: partySpawn
  id: PizzaDeliveryBoySpawn
  leadersToSpawn:
    AU14JobPizzaDeliveryBoy: 1
  scalewithpop: false
  spawnTogether: true

- type: auThirdParty
  id: PizzaDeliveryBoyThirdParty
  partyspawn: PizzaDeliveryBoySpawn
  entrymethod: shuttle
  weight: 2
  minplayers: 0
  maxplayers: 400
  GhostsNeeded: 2
  roundstart: false

- type: startingGear
  id: AU14GearPizzaDeliveryBoy
  equipment:
    id: AU14IDCardCivilianPizzaDeliveryBoy
    jumpsuit: RMCJumpsuitPizzaGalaxy
    shoes: ClothingShoesColorRed
    head: RMCHeadCapPizzaGalaxy
    pocket1: RMCFlashlight
    pocket2: CMDrinkCanDrGibb
    back: AU14SlingSatchelBlueFilledPizza
