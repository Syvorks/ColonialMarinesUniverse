- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUColonyCommsConsole
  name: "консоль колоніального зв’язку"
  description: "Використовується для надсилання оголошень на всі колоніальні інтеркоми в радіусі дії."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.ColonyCommsConsoleUI.Key
  - type: UserInterface
    interfaces:
      enum.ColonyCommsConsoleUI.Key:
        type: ColonyCommsConsoleBui
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: ColonyCommsConsole

- type: entity
  id: AUColonyIntercom
  name: "колоніальний інтерком"
  description: "Громадський інтерком для оголошень по всій колонії."
  components:
  - type: IntrinsicRadioReceiver
  - type: Speech
  - type: ActiveRadio
    channels:
    - colonyalert
  - type: RadioSpeaker
    enabled: true
    channels:
    - colonyalert
  - type: Sprite
    noRot: false
    drawdepth: SmallObjects
    sprite: _RMC14/Structures/Wallmounts/intercom.rsi
    layers:
    - state: intercom-p
    - state: intercom
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      shader: unshaded
    - state: broadcasting
      map: ["enum.RadioDeviceVisualLayers.Broadcasting"]
      shader: unshaded
      visible: false
    - state: speaker
      map: ["enum.RadioDeviceVisualLayers.Speaker"]
      shader: unshaded
      visible: false
  - type: Transform
    noRot: false
    anchored: true

- type: entity
  id: colonysiren
  name: "колоніальна сирена"
  parent: BaseStructure
  description: "Видає гучну сирену при активації."
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags:
    - Anchorable
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Misc/Lights/trafficlights.rsi
    offset: 0.65,0.8
    layers:
    - state: trafficlight
    - state: trafficlight_on
      visible: false
      map: [ "light" ]
    drawdepth: Mobs
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        density: 50
        mask:
        - MachineMask
        layer:
        - WallLayer
  - type: ColonySiren

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUColonyATM
  name: "колоніальний банкомат"
  description: "Проведіть ID-карткою по машині, щоб зняти готівку з особистого рахунку."
  components:
  - type: Sprite
