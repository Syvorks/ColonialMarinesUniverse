- type: entity
  id: PlatoonSpawn
  parent: BaseGameRule
  components:
  - type: PlatoonSpawnRule

- type: entity
  id: AddGovfor
  parent: BaseGameRule
  components:
  - type: AddJobsRule
    addToShip: true
    shipFaction: govfor
    jobs:
      AU14JobGOVFORPlatCo: 1
      AU14JobGOVFORPlatoonCorpsman: 9
      AU14JobGOVFORDCC: 1
      AU14JobGOVFORPlatOp: 5
      AU14JobGOVFORDSPilot: 2
      AU14JobGOVFORRadioTelephoneOperator: 4
      AU14JobGOVFORSquadSergeant: 3
      AU14JobGOVFORSquadAutomaticRifleman: 3
      AU14JobGOVFORSquadCombatTech: 6
      AU14JobGOVFORSquadRifleman: 75
      AU14JobGOVFORAuxSupportSynth: 2
      AU14JobGOVFORadvisor: 1
      AU14JobGOVFORMilitaryDoctor: 3
      AU14JobGOVFORMilitaryPoliceMan: 2
      AU14JobGOVFORAuxTech: 1

- type: entity
  id: AddOpfor
  parent: BaseGameRule
  components:
  - type: AddJobsRule
    shipFaction: opfor
    addToShip: true
    jobs:
      AU14JobOpforPlatCo: 1
      AU14JobOpforPlatoonCorpsman: 9
      AU14JobOpforDCC: 1
      AU14JobOpforPlatOp: 5
      AU14JobOpforDSPilot: 2
      AU14JobOpforRadioTelephoneOperator: 3
      AU14JobOpforSquadSergeant: 3
      AU14JobOpforSquadAutomaticRifleman: 3
      AU14JobOPFORSquadCombatTech: 6
      AU14JobOpforSquadRifleman: 75
      AU14JobOPFORAuxSupportSynth: 2
      AU14JobOPFORadvisor: 1
      AU14JobOPFORMilitaryDoctor: 1

- type: entity
  id: AddClf
  parent: BaseGameRule
  components:
  - type: AddJobsRule
    jobs:
      AU14JobCLFCellLeader: 1
      AU14JobCLFPhysician: 1
      AU14JobCLFSurgeon: 1
      AU14JobCLFGuerilla: 3

- type: entity
  id: ColonyAntags
  parent: BaseGameRule
  name: "антаги колонії"
  description: "Випадково визначає, які антаги колонії будуть присутні в цьому раунді."
  components:
  - type: GameRule
  - type: ColonyAntagsRule


- type: entity
  id: AuVoteRule
  parent: BaseGameRule
  name: "антаги колонії"
  description: "Якщо ви хочете, щоб ваш режим автоматично завантажував планети та взводи"
  components:
  - type: AuVoteRule
  - type: Bioscan




- type: entity
  id: RemoveAllJobs
  parent: BaseGameRule
  name: "Прибрати всі роботи"
  description: "Прибирає всі роботи на головній станції планети перед початком раунду. За бажанням також прибирає роботи на корабельних станціях."
  components:
  - type: RemoveJobsRule



