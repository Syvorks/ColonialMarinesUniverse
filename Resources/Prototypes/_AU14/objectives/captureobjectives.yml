## stable garrison
- type: entity
  name: "Захопити вулицю"
  parent: AU14WallFlagUA
  id: captureuaflagobjective
  description: "Захопіть головну вулицю для своєї фракції."
  components:
    - type: AuObjective
      id: captureuaflagobj
      factioneutral: true
      applicableModes:
        - ForceOnForce
        - DistressSignal
      possiblefactions:
        - govfor
        - opfor
        - clf
      objectivelevel: 2
      custompoints: 5
