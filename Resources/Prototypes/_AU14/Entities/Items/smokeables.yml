- type: entity
  parent: RMCCigarettePackLuckySloths
  id: AU14CigaretteKoorlander
  name: "пачка Курландер"
  description: "Спершу ці сигарети масово видавали тераформувальним бригадам як просту необхідність без зайвих прикрас: вони легко запалювалися, рівномірно горіли й давали прямий, надійний дим. Плоский, пиловий смак і рівна тяга швидко зробили їх колоніальною класикою. Згодом Курландер наростила виробництво на фермерських світах фронтиру й уклала ексклюзивні торгові угоди з Колоніальною адміністрацією."
  components:
  - type: Sprite
    sprite: _AU14/Items/Smokes/koorlander.rsi

- type: entity
  parent: RMCCigarettePackLuckySloths
  id: AU14CigaretteLadyFingers
  name: "пачка Курландер «Леді Фінгерс»"
  description: "Сміливий маркетинговий експеримент корпорації Курландер: ці жорсткі нефільтровані ментолові сигарети продаються в пильно-рожевій упаковці, орієнтованій на жінок Колоній. Запах настільки різкий, що їх іноді використовують, щоб відганяти комах від польових наметів. Попри зусилля, їх рідко обирають, і вони переважно лежать недоторканими в автоматах, мовчки кидаючи виклик комусь спробувати. Чи справді вони комусь подобаються — інше питання."
  components:
  - type: Sprite
    sprite: _AU14/Items/Smokes/lady_fingers.rsi
