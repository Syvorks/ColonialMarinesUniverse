  name: "імперська пачка Баладжі"
  description: "Пачка «Баладжі Імперіалс». Скручені вручну сигарети з фільтром, вироблені в Імперії трьох світів родиною компаній Баладжі. Компанія досі сімейна після шести поколінь і відома сумішшю високоякісного синтетичного тютюну з мізерною кількістю справжнього листя. Дорогі, м’які й однаково улюблені офіцерами та контрабандистами."
