  description: "PSC-TM626 — це стандартне навантажувальне спорядження сил безпеки Продіджі. Ця конфігурація містить вмістку сумку з набором ін'єкторів і легких медичних припасів, поширена серед медиків. За чутками, це просто сумка W-Y TM625, але Продіджі це заперечує."
