- type: entity
  parent: CMBeltUtilityCombat
  id: AU14BeltUtilityCombatProdigyRU
  name: "бойова інструментальна обв'язка зразка L177 Продіджі"
  description: "Стандартна обв'язка Королівських морських командос Озброєних ремонтних груп Продіджі для Підрозділів реагування, що проводять ремонт у бойових зонах. Складається з модульного пояса з різними кліпсами та підсумками для інструментів, а також з кобури для пістолета. Вміщує сам пістолет і один магазин."
  components:
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,19,1 # 11 slots
    whitelist:
      tags:
      - Crowbar
      - Screwdriver
      - Wirecutter
      - Wrench
      - CableCoil
      - Multitool
      - Flashlight
      - Sidearm
      - CMMagazinePistol
      - RMCMagazineRevolver
      - PowerCell
      - CMFireExtinguisherPortable
      - RMCShellShotgun
      - RMCNailgunCompact
      - RMCNailgunTactical
      - RMCSynthResetKey
      #      - # TODO analyzer
      components:
      - Welder
      - PowerCell
      - TrayScanner
      - GasAnalyzer
      - LightReplacer
      - EntrenchingTool
  - type: Sprite
    sprite: _AU14/Clothing/RMC/belt/combat_utility.rsi
    layers:
    - state: icon
    - sprite: _RMC14/Objects/Weapons/Guns/gun_underlays.rsi
      state: m1984 # TODO RMC14 per-gun underlay
      offset: -0.3125, -0.09375
      map: [ "enum.CMHolsterLayers.Fill" ]
      visible: false
    - sprite: _AU14/Clothing/RMC/belt/combat_utility.rsi
      state: icon-front
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _AU14/Clothing/RMC/belt/combat_utility.rsi

