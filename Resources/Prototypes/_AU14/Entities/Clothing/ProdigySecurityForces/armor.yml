  #  walkModifier: .5
  #  sprintModifier: .5
  - type: SmartGunArmor
  #- type: CMArmor
  #  melee: 30 # CLOTHING_ARMOR_HIGH (melee)
  #  bullet: 40 # CLOTHING_ARMOR_ULTRAHIGH (bullets)
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor3.rsi
      Desert: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor3.rsi
      Snow: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor3.rsi
      Classic: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor3.rsi
      Urban: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor3.rsi

