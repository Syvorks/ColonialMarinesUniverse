- type: entity
  parent: CMArmorM4
  id: AU14ArmorProdigyXAS23
  name: "бойовий обладунок зразка PRU-XAS-23"
  description: "Міцніший за сталь, тихіший за шепіт, бойовий обладунок зразка PRU-XAS-23 забезпечує надійний захист у поєднанні з експериментальним вбудованим детектором руху. Команда розробників створила його за вихідні, а коштує він більше за станцію Ромул... напевно. Коли одягнений, до уніформи неможливо прикріпити аксесуари на кшталт розгрузки, оскільки кліпси зайняті датчиками руху, проте розширене сховище на самому обладунку це компенсує. Через свою громіздкість він потребує кліпсів на уніформі Підрозділу реагування Продіджі."
  components:
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier
    walkModifier: .725
    sprintModifier: .725
  - type: Corrodible
    isCorrodible: false
  - type: Sprite
    sprite: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor1.rsi
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,9,1 # 5 slots
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: au14-xas23-not-prodigy-ru-jumpsuit
    whitelist:
      tags:
      - ProdigyUniform
      - ProdigyUniformSynth
  - type: MotionDetector
    handToggleable: false
  - type: ToggleableMotionDetector
    slots:
    - OUTERCLOTHING
    batteryDrain: 0
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor1.rsi
      Desert: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor1.rsi
      Snow: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor1.rsi
      Classic: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor1.rsi
      Urban: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor1.rsi
  - type: RMCLoreExaminable
    content: au14-lore-examinable-armor-PRU-XAS-23-PBA-new

- type: entity
  parent: AU14ArmorProdigyXAS23
  id: AU14ArmorProdigyXAS23G
  name: "бойовий обладунок зразка PRU-XAS-23-G"
  description: "Міцніший за сталь, тихіший за шепіт, бойовий обладунок зразка PRU-XAS-23-G забезпечує надійний захист для смартганерів, відкидаючи вбудований детектор руху на користь обв'язки смартгана. Коли одягнений, до уніформи неможливо прикріпити аксесуари на кшталт розгрузки, оскільки кліпси зайняті обв'язкою смартгана, проте розширене сховище на самому обладунку це компенсує. Через свою громіздкість і посилене бронювання порівняно зі звичайною моделлю він потребує кліпсів на уніформі Підрозділу реагування Продіджі."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/ProdigySecurityForces/ArmedRepairTeam/PARTArmors/partarmor3.rsi
  - type: MotionDetector
    handToggleable: false
