- type: entity
  parent: RMCPouchMagazineLargePMC
  id: AU14PouchMagazineLargePARTDual
  name: "подвійний великий магазинний підсумок Продіджі"
  description: "Великий підсумок, розрахований на чотири великих магазини та 4 жмені дробових патронів. Підсумок розроблений для Озброєних ремонтних груп Продіджі та часто використовується їхніми інженерами й медиками для зберігання запасних магазинів і дробових патронів."
  suffix: PART
  components:
  - type: Storage
    grid:
    - 0,0,11,1 #8 slots
  - type: LimitedStorage
    limits:
    - popup: au14-storage-limit-max-mags-prodigy
      count: 4
      whitelist:
        tags:
        - CMMagazineRifle
        - AU14MagazineRifleM20A
        - CMMagazinePistol
        - CMMagazinePistolMK80
    - popup: au14-storage-limit-max-shells-prodigy
      count: 4
      whitelist:
        tags:
        - RMCHandful
        - Cartridge
        - CMMagazinePistol
        - RMCShellShotgun

