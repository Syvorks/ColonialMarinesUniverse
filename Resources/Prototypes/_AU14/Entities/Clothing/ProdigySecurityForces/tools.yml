- type: entity
  parent: BaseItem
  id: AU14ProdigyLaptop
  name: "система втручання у розширені системи Prodigy (PASTS)"
  description: "Захищений військовий ноутбук для дистанційного керування та програмування, виготовлений Prodigy Security Corp. Для зручнішого доступу його можна ставити на столи. Також працює як ноутбук для турелей!"
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/sentrycomp.rsi
    layers:
    - state: sentrycomp_cl
      map: ["enum.SentryLaptopVisualLayers.Base"]
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Devices/sentrycomp.rsi
  - type: Clickable
  - type: InteractionOutline
  - type: CollisionWake
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.15,0.25,0.15"
        density: 50
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SentryLaptopVisuals.State:
        enum.SentryLaptopVisualLayers.Base:
          Closed: { state: sentrycomp_cl }
          Open: { state: sentrycomp_op }
          Active: { state: sentrycomp_on }
    inHandsOnly: false
  - type: UseDelay
    delay: 0.5
  - type: RequiresSkill
    skills:
      RMCSkillEngineer: 2

- type: entity
  parent: BaseItem
  id: AU14ExtractionTeamBeacon
  name: "маяк евакуаційної групи Prodigy"
  description: "Одноразовий передавач для виклику евакуаційної групи Prodigy. Після активації стає марним. Що значить, це просто дорогий лазерний указник? (OOC-примітка: якщо він не спрацює, зверніться в ahelp і попросіть заспавнити ProdigyExtractionParty)"
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel_laser
  - type: Item
    size: Small
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.15,0.25,0.15"
        density: 50
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Appearance
  - type: SpawnThirdPartyTool
    party: ProdigyExtractionParty
    dropship: true
  - type: UseDelay
    delay: 0.5
