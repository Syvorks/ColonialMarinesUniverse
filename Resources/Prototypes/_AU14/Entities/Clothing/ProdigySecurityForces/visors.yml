- type: entity
  parent: RMCVisorNightVision
  id: AU14VisorNightVisionProdigy
  name: "оптика нічного бачення Prodigy"
  description: "Вставний візорний HUD для стандартного шолома Prodigy. Цей тип дає нічне бачення та є стандартним спорядженням у підрозділах із регулярним фінансуванням. Його можна вставити в зарядний пристрій, щоб зарядити внутрішню батарею."
  components:
  - type: Sprite
    state: nvg_sight
  - type: PowerCellDraw
    enabled: false
    drawRate: 10
  - type: Visor
    toggledSprite:
      sprite: _RMC14/Objects/Clothing/Head/Helmets/huds.rsi
      state: nvg_sight_right
    onIcon:
      sprite: _RMC14/Objects/Clothing/helmet_visors.rsi
      state: nvg_sight_down
  - type: NightVisionVisor
  - type: ToggleVisor
    ignoreRedundancy: true
  - type: ComponentToggler
    components:
    - type: PointLight
      enabled: true
      radius: 1.7
      softness: 1
      color: "#008000"