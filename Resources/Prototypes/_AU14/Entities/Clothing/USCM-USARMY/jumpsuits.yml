  suffix: AU14
  name: "костюм MOPP M3"
  description: "Костюми MOPP M3 спеціально спроєктовані й виготовлені для захисту носія від незахищеного контакту з будь-якими хімічними, біологічними, радіологічними або ядерними загрозами в польових умовах. Рекомендований строк служби костюма після контакту з токсичним середовищем становить двадцять чотири години, але залежно від тяжкості його може бути скорочено до восьми годин або менше."
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/Marine/cbrnsuit.rsi
  - type: CMArmor
    bullet: 10
    melee: 10
    bio: 100
    explosionArmor: 10


