- type: entity
  parent: RMCGogglesBallistic
  id: AU14GogglesM1A1PolarizedBallistic
  name: "поляризовані окуляри Вентракс"
  description: "На ринку продаються як цивільні окуляри; бренд досить неоднозначний, але, схоже, їх виготовляє Вентракс, дочірня компанія якоїсь іншої дочірньої компанії Ве-Ю. Типово. Напевно, вони призначалися для лиж, ви вже не дуже пам’ятаєте і вам байдуже. Дивно, але з них виходять пристойні бойові окуляри... принаймні кращі за M1A1 або, Боже збав, ті M60. Лейтенант каже, що кольорова лінза приведе вас до смерті від снайпера... але принаймні ви помрете зі стилем."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/Goggles/m1a1polarized.rsi
  - type: Clothing
    sprite: _AU14/Clothing/Goggles/m1a1polarized.rsi
  - type: HelmetAccessory
    rsi:
      sprite: _AU14/Clothing/Goggles/m1a1polarized.rsi
      state: helmet
    toggledRsi:
      sprite: _AU14/Clothing/Goggles/m1a1polarized.rsi
      state: helmet-down

