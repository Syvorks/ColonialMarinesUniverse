- type: entity
  parent: [ClothingMaskBase, BaseFoldable]
  id: AU14MaskUSASFPilotOxygen
  name: "киснева маска LAH-99 Аерокосмічних сил США"
  description: "Маска, прикріплена до шоломів LAH-99 Аерокосмічних сил США, щоб забезпечувати авіаекіпаж придатним для дихання киснем."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/USASFSecurityForces/USASFPilot/mask.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon
      map: ["foldedLayer"]
      visible: false
  - type: HideLayerClothing
    slots:
    - Hair
    - HeadTop
    - HeadSide
    - Snout
  - type: Clothing
    sprite: _AU14/Clothing/USASFSecurityForces/USASFPilot/mask.rsi
  - type: IdentityBlocker
    coverage: MOUTH
  - type: Item
    storedRotation: -90
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedEquippedPrefix: up
    foldedHeldPrefix: up
    foldedHideLayers:
    - HeadTop
    - HeadSide
    unfoldedHideLayers:
    - HeadTop
    - HeadSide
    - Snout

- type: entity
  parent: [CMBaseMask, CMUBaseGasMaskFilterSlot]
  id: AU14MOPPMask
  suffix: AU14
  name: "маска CBRN M3 MOPP"
  description: "Маска M3 MOPP має повний захисний капюшон, що надійно кріпиться до костюма MOPP. Маска відфільтровує шкідливі частинки в повітрі, дозволяючи носієві безпечно дихати в польових умовах. Залежно від небезпечності забрудненої зони фільтр маски в середньому прослужить 12 годин або менше."
  components:
  - type: IdentityBlocker
  - type: Sprite
    sprite: _AU14/Clothing/USCMC/Mask/cbrn.rsi
  - type: Clothing
    sprite: _AU14/Clothing/USCMC/Mask/cbrn.rsi
  - type: Item
    storedRotation: -90
  - type: HideLayerClothing
    slots:
    - HeadTop
    - HeadSide
    - Hair
    - Snout
