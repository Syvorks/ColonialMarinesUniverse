- type: entity
  parent: AU14BaseArmorVest
  id: AU14ArmorUSArmy
  suffix: Survivor
  name: "система персональної броні"
  description: "Система персональної броні є штатною бронею армії США, прийнятою замість броні серії M4 під час польових випробувань. Дивовижно незручна, але забезпечує значно кращий захист, ніж броня серій M3 або M4. За вчетверо більшу ціну."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/US_Army/Armor/armor.rsi
  - type: StorageFill
    contents:
    - id: RMCTacticalPrybar
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1
    blacklist:
      tags:
      - Pouch

- type: entity
  parent: AU14BaseArmor
  id: AU14ArmorUSArmyNormal
  name: "система персональної броні"
  description: "Система персональної броні є штатною бронею армії США, прийнятою замість броні серії M4 під час польових випробувань. Дивовижно незручна, але забезпечує значно кращий захист, ніж броня серій M3 або M4. За вчетверо більшу ціну."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/US_Army/Armor/armor.rsi

- type: entity
  parent: CMArmorM3VLSynth
  id: AU14ArmorUSArmySynth
  name: "система броні для синтетиків"
  description: "Це варіант системи персональної броні, значно модифікований для використання синтетиками армії США. Забезпечує легкий захист, максимальну мобільність і більше внутрішнього місця, ніж її відповідник ККМП США. Вартість цього предмета могла б спорядити ціле відділення морпіхів ККМП США, але ви варті цієї ціни."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/US_Army/Armor/synth.rsi
  - type: StorageFill
    contents:
    - id: RMCTacticalPrybar

