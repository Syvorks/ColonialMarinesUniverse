  - type: ClothingSpeedModifier # light armor speed
    walkModifier: .725
    sprintModifier: .725

- type: entity
  parent: AU14BaseArmor
  id: AU14ArmorCBRN
  name: "броня CBRN M3-M"
  description: "Хоч ця броня й не має вигляду броні зразка M3, яку носять на звичайній службі, вона все одно є її похідною. Її значно модифікували, щоб вона надягалася поверх костюма MOPP, прибравши додаткову підкладку та композитні шари Венлару, аби не обмежувати рухи носія. Однак через зменшення кількості композитних шарів персональний захист нижчий за бажаний, і скарги на це подають ще з 2165 року."
  suffix: AU14
  components:
  - type: CMArmor
    bullet: 20
    bio: 70
    explosionArmor: 15
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/cbrn.rsi
  - type: ClothingSpeedModifier # heavy armor speed
    walkModifier: .62
    sprintModifier: .62
