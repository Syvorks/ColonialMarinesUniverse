- type: entity
  parent: RMCSatchelMarineLogisticsBig
  id: AU14MolleBackpack
  name: "рюкзак MOLLE M2"
  description: "Тактичний рюкзак, вироблений однією з дочірніх компаній Альфатек. Дуже легкий рюкзак, що використовує стандартні системи кріплення MOLLE Об’єднаних Америк, які забезпечують легкий доступ і оптимальний розподіл ваги. Штатний важкий рюкзак для бійців армії США."
  components:
    - type: Sprite
      sprite: _AU14/Clothing/US_Army/Back/molle.rsi
    - type: ItemCamouflage
      camouflageVariations: {}

