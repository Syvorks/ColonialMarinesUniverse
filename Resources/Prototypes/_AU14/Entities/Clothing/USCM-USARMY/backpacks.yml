- type: entity
  parent: CMSatchel
  id: AU14BackpackRTOPackBlack
  name: "чорний портативний трансивер AN/PRC-55"
  description: "Портативний трансивер AN/PRC-55, також відомий як радіостанція AN/PRC 55, є ранцевим переносним бойовим мережевим радіотрансивером VHF FM, виробленим Армат Батлфілд Системз і призначеним для короткодистанційного двостороннього радіотелефонного голосового зв’язку."
  components:
    - type: Sprite
      sprite: _AU14/Clothing/RTOPack/blackrtopack.rsi
      layers:
        - state: icon
          map: ["base"]
    - type: Storage
      maxItemSize: Large
      grid:
        - 0,0,4,1
      blacklist:
        tags:
          - Backpack
    - type: CMStorageVisualizer
      storageClosed: null
      storageOpen: null
    - type: RotaryPhone
      category: Marine
    - type: RotaryPhoneBackpack
    - type: UserInterface
      interfaces:
        enum.RMCTelephoneUiKey.Key:
          type: RMCTelephoneBui
        enum.StorageUiKey.Key:
          type: StorageBoundUserInterface
    - type: ActivatableUIBlacklist
      blacklist:
        components:
          - Xeno
    - type: GenericVisualizer
      visuals:
        enum.RotaryPhoneLayers.Layer:
          base:
            Base: { state: icon }
            Ring: { state: ring }
            Ear: { state: ear }
    - type: Undisposable

