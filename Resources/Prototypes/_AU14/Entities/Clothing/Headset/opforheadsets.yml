 #section

- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyopfor
  name: "ключ шифрування ОПФОР"
  description: "Ключ шифрування для зв’язку на каналі ОПФОР."
  components:
  - type: EncryptionKey
  - type: Sprite
    state: we_ya_key

- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyopforcommand
  name: "командний ключ шифрування ОПФОР"
  description: "Ключ шифрування для зв’язку на всіх каналах ОПФОР."
  components:
  - type: EncryptionKey
    channels:
    - opfor
    - opforcommand
    - OpforCharlie
    - OpforBravo
    - OpforIntel
    - opforjtac
    defaultChannel: opfor
  - type: Sprite
    state: we_ya_key

- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyopforaux
  name: "ключ шифрування допоміжної підтримки ОПФОР"
  description: "Ключ шифрування для зв’язку на каналах допоміжної підтримки."
  components:
  - type: EncryptionKey
    channels:
    - opforcommand
    - OpforIntel
    defaultChannel: OpforIntel
  - type: Sprite
    state: we_ya_key

- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyopforJTAC
  name: "ключ шифрування JTAC"
  components:
  - type: EncryptionKey
    channels:
    - opforjtac
    defaultChannel: opforjtac

- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetSectionOpforAux
  name: "радіогарнітура допоміжної підтримки ОПФОР"
  description: "Використовується персоналом допоміжної підтримки для радіозв’язку."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyopforaux

- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetSectionOpfor
  name: "секційна радіогарнітура ОПФОР"
  description: "Використовується персоналом ОПФОР для радіозв’язку."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon

- type: entity
  parent: AU14HeadsetSectionOpfor
  id: AU14HeadsetSectionOpforFTL
  name: "радіогарнітура командира вогневої групи ОПФОР"
  description: "Використовується командирами вогневих груп ОПФОР для радіозв’язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon
      - AU14EncryptionKeyopforJTAC

- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetSectionLeaderopfor
  name: "командна радіогарнітура ОПФОР"
  description: "Використовується членами командування ОПФОР для радіозв’язку."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyopforcommand
      - AU14EncryptionKeyopfor
      - AU14EncryptionKeyopforBravo
      - AU14EncryptionKeyopforCharlie
      - AU14EncryptionKeyopforIntel
      - AU14EncryptionKeyopforjtac

- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyopforjtac
  name: "ключ шифрування ATC ОПФОР"
