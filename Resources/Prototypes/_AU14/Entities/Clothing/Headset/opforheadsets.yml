# ├──[ ENCRYPTIONKEYS ]──────────────────────────────────────────────┤
- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyOpfor
  name: "ключ шифрування ОПФОР"
  description: "Ключ шифрування для зв'язку на каналі ОПФОР, відповідний канал призначається автоматично."

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforBravo
  name: "ключ шифрування ОПФОР Браво"
  description: "Ключ шифрування для зв'язку на каналі ОПФОР Браво."
  components:
  - type: EncryptionKey
    channels:
    - radioOpforBravo
    defaultChannel: radioOpforBravo

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforCharlie
  name: "ключ шифрування ОПФОР Чарлі"
  description: "Ключ шифрування для зв'язку на каналі ОПФОР Чарлі."
  components:
  - type: EncryptionKey
    channels:
    - radioOpforCharlie
    defaultChannel: radioOpforCharlie

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforCommand
  name: "ключ шифрування командування ОПФОР"
  description: "Ключ шифрування для зв'язку на всіх доступних каналах ОПФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioOpforAlpha
    - radioOpforCharlie
    - radioOpforBravo
    - radioOpforCommand
    - radioOpforIntel
    - radioOpforJTAC
    - radioOpforMILP
    defaultChannel: radioOpforCommand

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforCommandOnly
  name: "ключ шифрування лише командування ОПФОР"
  description: "Ключ шифрування для зв'язку на каналах командування ОПФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioOpforCommand
    defaultChannel: radioOpforCommand

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforIntel
  name: "ключ шифрування розвідки ОПФОР"
  description: "Ключ шифрування для зв'язку на каналі розвідки ОПФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioOpforIntel
    defaultChannel: radioOpforIntel

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforJTAC
  name: "ключ шифрування ОПФОР УПР"
  description: "Ключ шифрування для зв'язку на каналі УПР ОПФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioOpforJTAC

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforMILP
  name: "ключ шифрування ВП ОПФОР"
  components:
  - type: EncryptionKey
    channels:
    - radioOpforMILP

# ├──[ HEADSETS ]────────────────────────────────────────────────────┤
- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetOpforMarine
  name: "секційна радіогарнітура ОПФОР"
  description: "Використовується персоналом ОПФОР для радіозв'язку."
  components:
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
    - SeniorEnlistedAdvisor
    - PrimaryLandingZone

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforCommand
  name: "радіогарнітура командування ОПФОР"
  description: "Використовується членами командування ОПФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommand
      - AU14EncryptionKeyOpforBravo
      - AU14EncryptionKeyOpforCharlie
      - AU14EncryptionKeyOpforIntel
      - AU14EncryptionKeyOpforJTAC
      - AU14EncryptionKeyOpforMILP

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforMarineSL
  name: "радіогарнітура командира секції ОПФОР"
  description: "Використовується командирами секцій ОПФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommandOnly
      - AU14EncryptionKeyOpforJTAC

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforMarineFTL
  name: "радіогарнітура командира бойової групи ОПФОР"
  description: "Використовується командирами бойових груп ОПФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforJTAC

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforAuxiliary
  name: "радіогарнітура допоміжної підтримки ОПФОР"
  description: "Використовується персоналом допоміжної підтримки ОПФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommandOnly
      - AU14EncryptionKeyOpforIntel

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforMarineMP
  name: "радіогарнітура ВП ОПФОР"
  description: "Використовується військовою поліцією ОПФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommand
#     - AU14EncryptionKeyOpforCommandOnly
      - AU14EncryptionKeyOpforMILP
