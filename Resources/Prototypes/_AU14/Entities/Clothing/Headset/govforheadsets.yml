- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetSectionMarine
  name: "радіогарнітура урядових сил"
  description: "Використовується персоналом урядових сил для радіозв’язку."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon

- type: entity
  parent: AU14HeadsetSectionMarine
  id: AU14HeadsetSectionMarineFTL
  name: "радіогарнітура командира вогневої групи урядових сил"
