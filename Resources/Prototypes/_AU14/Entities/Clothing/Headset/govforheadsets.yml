# ├──[ ENCRYPTIONKEYS ]──────────────────────────────────────────────┤
- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyGovfor # blank key, channel set by SquadSystem.cs
  name: "ключ шифрування ГОВФОР"
  description: "Ключ шифрування для зв'язку на каналі ГОВФОР, відповідний канал призначається автоматично."

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforBravo
  name: "ключ шифрування ГОВФОР Браво"
  description: "Ключ шифрування для зв'язку на каналі ГОВФОР Браво."
  components:
  - type: EncryptionKey
    channels:
    - radioGovforBravo
    defaultChannel: radioGovforBravo

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforCharlie
  name: "ключ шифрування ГОВФОР Чарлі"
  description: "Ключ шифрування для зв'язку на каналі ГОВФОР Чарлі."
  components:
  - type: EncryptionKey
    channels:
    - radioGovforCharlie
    defaultChannel: radioGovforCharlie

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforCommand
  name: "ключ шифрування командування ГОВФОР"
  description: "Ключ шифрування для зв'язку на всіх доступних каналах ГОВФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioGovforAlpha
    - radioGovforBravo
    - radioGovforCharlie
    - radioGovforCommand
    - radioGovforIntel
    - radioGovforJTAC
    - radioGovforMILP
    defaultChannel: radioGovforCommand

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforCommandOnly
  name: "ключ шифрування лише командування ГОВФОР"
  description: "Ключ шифрування для зв'язку на каналах командування ГОВФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioGovforCommand
    defaultChannel: radioGovforCommand

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforIntel
  name: "ключ шифрування розвідки ГОВФОР"
  description: "Ключ шифрування для зв'язку на каналі розвідки ГОВФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioGovforIntel
    defaultChannel: radioGovforIntel

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforJTAC
  name: "ключ шифрування ГОВФОР УПР"
  description: "Ключ шифрування для зв'язку на каналі УПР ГОВФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioGovforJTAC

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforMILP
  name: "ключ шифрування ВП ГОВФОР"
  description: "Ключ шифрування для зв'язку на каналі ВП ГОВФОР."
  components:
  - type: EncryptionKey
    channels:
    - radioGovforMILP

# ├──[ HEADSETS ]────────────────────────────────────────────────────┤
- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetGovforMarine
  name: "секційна радіогарнітура ГОВФОР"
  description: "Використовується персоналом ГОВФОР для радіозв'язку."
  components:
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
    - SeniorEnlistedAdvisor
    - PrimaryLandingZone

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforCommand
  name: "радіогарнітура командування ГОВФОР"
  description: "Використовується членами командування ГОВФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots: # give all usable keys for emergencies/promotions
      - AU14EncryptionKeyGovfor # empty key when taken out
      - AU14EncryptionKeyGovforCommand
      - AU14EncryptionKeyGovforBravo
      - AU14EncryptionKeyGovforCharlie
      - AU14EncryptionKeyGovforIntel
      - AU14EncryptionKeyGovforJTAC
      - AU14EncryptionKeyGovforMILP

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforMarineSL
  name: "радіогарнітура командира секції ГОВФОР"
  description: "Використовується командирами секцій ГОВФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforCommandOnly
      - AU14EncryptionKeyGovforJTAC

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforMarineFTL
  name: "радіогарнітура командира бойової групи ГОВФОР"
  description: "Використовується командирами бойових груп ГОВФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforJTAC

- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetGovforAuxiliary
  name: "гарнітура допоміжної підтримки ГОВФОР"
  description: "Використовується персоналом допоміжної підтримки ГОВФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforCommandOnly
      - AU14EncryptionKeyGovforIntel

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforMarineMP
  name: "радіогарнітура ВП ГОВФОР"
  description: "Використовується військовою поліцією ГОВФОР для радіозв'язку."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforCommand
#     - AU14EncryptionKeyGovforCommandOnly
      - AU14EncryptionKeyGovforMILP
