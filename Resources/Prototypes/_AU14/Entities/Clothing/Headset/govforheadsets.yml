- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyGOVFOR
  name: "ключ шифрування урядових сил"
  description: "Ключ шифрування для зв’язку на каналі урядових сил."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
  - type: EncryptionKey
  - type: Sprite
    state: we_ya_key

- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyGOVFORCommand
  name: "командний ключ шифрування урядових сил"
  description: "Ключ шифрування для зв’язку на всіх каналах урядових сил."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
  - type: EncryptionKey
    channels:
    - GovforCommand
    - GovforJTAC
    - GovforAlpha
    - GovforCharlie
    - GovforBravo
    - GovforIntel
    defaultChannel: GovforCommand
  - type: Sprite
    state: we_ya_key

- type: entity
  parent: CMEncryptionKey
  id: AU14EncryptionKeyGOVFORauxiliarysupport
  name: "ключ шифрування допоміжної підтримки урядових сил"
