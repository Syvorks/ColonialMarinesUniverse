# ├──[ ENCRYPTIONKEYS ]──────────────────────────────────────────────┤
- type: entity
  abstract: true
  parent: CMEncryptionKey
  id: AU14EncryptionKey
  components:
  - type: Sprite
    state: we_ya_key

- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyAdmin
  name: "ключ шифрування адміністрації колонії"
  description: "Ключ шифрування, що використовується для зв'язку на радіоканалах колонії та КБМ."
  components:
  - type: EncryptionKey
    channels:
    - Colony
    - radioCMB
    defaultChannel: Colony

- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyWEYU
  name: "колоніальний ключ шифрування Вейланд"
  description: "Ключ шифрування для зв’язку на радіоканалах колонії та Вейланд."
  components:
  - type: EncryptionKey
    channels:
    - Colony
    - radioWEYU
    defaultChannel: Colony

- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyCMB
  name: "ключ шифрування БКМ"
  suffix: Colony, CMB
  description: "Ключ шифрування, що використовується для зв'язку на радіоканалах колонії та КБМ."
  components:
  - type: EncryptionKey
    channels:
    - Colony
    - radioCMB
    defaultChannel: Colony

- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyCMBOnly
  name: "ключ шифрування БКМ"
  description: "Ключ шифрування, що використовується для зв'язку на радіоканалі КБМ."
  components:
  - type: EncryptionKey
    channels:
    - radioCMB
    defaultChannel: Colony

# ├─[ HEADSETS ]────────────────────────────────────────────────────┤
- type: entity
  parent: CMHeadset
  id: AU14HeadsetColonist
  abstract: true
  components:
  - type: GrantAreaInfo

- type: entity
  parent: RMCHeadsetLiaison
  id: AU14ColonyAdminHeadset
  name: "гарнітура адміністрації колонії"
  description: "Гарнітура, яку адміністрація колонії використовує для зв’язку."
  suffix: CMB, Colony
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyAdmin

- type: entity
  parent: RMCHeadsetLiaison
  id: AU14ColonyWeylandHeadset
  name: "гарнітура колонії Вейланд-Ютані"
  description: "Гарнітура, яку Вейланд-Ютані використовує для зв’язку."
  suffix: Colony, WEYU
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyWEYU

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14CMBHeadset
  name: "гарнітура БКМ"
  description: "Гарнітура, яку БКМ використовує для зв’язку."
  suffix: CMB, Colony
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyCMB

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14CMBHeadsetOnlyCMB
  name: "навушник БКМ"
  description: "Гарнітура, яку БКМ використовує для зв’язку."
  suffix: CMB
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyCMBOnly
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/headsets.rsi
    state: cmb_headset

- type: entity
  parent: AU14HeadsetColonist
  id: AU14HeadsetWorkingJoe
  name: "гарнітура Воркінг Джо"
  description: "Звичайна гарнітура, яку використовують Воркінг Джо."
  components:
  - type: Sprite
    state: generic_headset

