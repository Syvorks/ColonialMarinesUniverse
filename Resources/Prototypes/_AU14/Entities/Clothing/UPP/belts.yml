- type: entity
  parent: CMBeltMarine
  id: AU14BeltMarineUPP
  name: "розвантажувальний боєкомплектний пояс зразка Type 41"
  suffix: AU14
  description: "Розвантаження Type 41 є штатним розвантажувальним спорядженням війська УПП. Основна функція цього пояса — забезпечити легкий доступ до магазинів Type 71 під час операцій. Попри те, що підсумки розроблені для збройової системи Type 71, вони достатньо модульні, щоб умістити інші типи боєприпасів і спорядження."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/UPP/belt/ammo.rsi
  - type: Clothing
    sprite: _AU14/Clothing/UPP/belt/ammo.rsi
  - type: ItemCamouflage
    camouflageVariations: {}

- type: entity
  parent: CMBeltMarine
  id: AU14BeltMarineArmyUPP
  suffix: AU14
  name: "боєкомплектне розвантаження зразка 6B80"
  description: "6B80 — застаріле, але надійне боєкомплектне розвантаження, колись стандартне для армії УПП. Його модульний пояс утримує різні боєприпаси й досі використовується силами безпеки та резервами УПП завдяки міцній конструкції."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Belt/spp_brown.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Belt/spp_brown.rsi
  - type: ItemCamouflage
    camouflageVariations: {}

- type: entity
  parent: CMBeltBaseStorage
  id: AU14BeltUtilityGeneralUPP
  name: "універсальна підсумка Type 48-M"
  description: "Невелика легка підсумка, яку можна зачепити до U-подібної броні УПП для додаткового місця. Новішу модель 48-M, хоч вона й незручна, також можна закріпити на поясі."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/UPP/belt/general.rsi
  - type: Clothing
    slots:
    - suitStorage
    - belt
    sprite: _AU14/Clothing/UPP/belt/general.rsi
  - type: ItemCamouflage
    camouflageVariations: {}

- type: entity
  parent: CMBeltMedical
  id: AU14BeltMedicalUPP
  name: "медичне розвантаження зразка Type 41"
  description: "Type 41 є штатним розвантажувальним спорядженням війська УПП. Воно складається з модульного пояса з різними кліпсами. Ця версія є менш поширеною конфігурацією, призначеною для транспортування медичних припасів. \nКлацніть ПКМ по його спрайту й виберіть \"перемкнути режим пояса\", щоб діставати пігулки з пляшечок простим кліком по них."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/UPP/belt/medical.rsi
  - type: Clothing
    sprite: _AU14/Clothing/UPP/belt/medical.rsi

