      whitelist:
        tags:
        - CMMagazinePistol
        - RMCMagazineRevolver
        - RMCMagazineLMGQYJ72
  - type: CMHolster
    whitelist:
      tags:
      - Sidearm
  - type: Tag
    tags:
    - RMCSmartGunSidearmHolster
  - type: ItemCamouflage
    camouflageVariations: { }

