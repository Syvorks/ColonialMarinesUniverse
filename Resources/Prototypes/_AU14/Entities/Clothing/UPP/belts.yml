- type: entity
  parent: CMBeltMarine
  id: AU14BeltSmartGunOperatorPistolUPP
  suffix: AU14
  name: "розвантаження кулеметника для бокової зброї зразка Type 92"
  description: "Type 92 — експериментальне боєкомплектне розвантаження, яке видають кулеметникам УПП; воно поєднує кобуру для бокової зброї з коробчастими підсумками для обмеженого зберігання."
  components:
  - type: Sprite
    sprite: _AU14/Clothing/UPP/belt/machinegun_pistol.rsi
    layers:
    - state: icon
    - sprite: _RMC14/Objects/Weapons/Guns/gun_underlays.rsi
      state: m1984 # TODO RMC14 per-gun underlay
      offset: 0.15625, 0.0
      map: [ "enum.CMHolsterLayers.Fill" ]
      visible: false
    - sprite: _AU14/Clothing/UPP/belt/machinegun_pistol.rsi
      state: icon-front
    - state: half
      map: [ "openLayer" ]
    - state: full
      map: [ "closedLayer" ]
  - type: Clothing
    sprite: _AU14/Clothing/UPP/belt/machinegun_pistol.rsi
  - type: Storage   # Holds up to 4 drums/magazines and 1 sidearm
    maxItemSize: Normal
    grid:
    - 0,0,9,1 # 5 slots
    whitelist:
      tags:
      - Sidearm
      - CMMagazinePistol
      - RMCMagazineRevolver
      - RMCMagazineLMGQYJ72
      - Flare
  - type: FixedItemSizeStorage
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCMagazineLMGQYJ72
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-one-gun
      whitelist:
        tags:
        - Sidearm
    - popup: rmc-storage-limit-max-ammo
