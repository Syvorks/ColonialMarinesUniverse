# coats

- type: entity
  parent: RMCCoatSPP
  id: AU14CoatUPP
  name: "офіцерська куртка UL4"
  description: "Легка куртка, яку видають офіцерам війська УПП. Трохи захищає від вхідних пошкоджень, однак краще носити повноцінну броню."

- type: entity
  parent: RMCCoatSPPSenior
  id: AU14CoatUPPSenior
  name: "куртка старшого офіцера UL4"
  description: "Легка куртка, яку видають старшим офіцерам війська УПП. Виготовлена з високоякісних матеріалів, аж до нанесених на плечі й перед куртки звань та знаків розрізнення Капітана і його роти. Трохи захищає від вхідних пошкоджень, однак краще носити повноцінну броню."

- type: entity
  parent: RMCCoatSPPMP
  id: AU14CoatUPPMP
  name: "камуфльована куртка UL4"
  description: "Легка куртка, яку видають військам, коли від них не очікують участі в бою. Вона все ще вщерть усіяна кевларовими пластинами, хоча конструкція із синтетичної нитки знижує її ефективність."
