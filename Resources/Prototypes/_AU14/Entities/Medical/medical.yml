#new medicines
- type: reagent
  parent: [ CMReagentMedicine, Dexalin ]
  id: AU14Albuterol
  name: reagent-name-albuterol
  desc: reagent-desc-albuterol
  color: "#1f83a7"
  overdose: 35
  metabolisms:
    Medicine:
      metabolismRate: 0.04
      effects:
      - !type:EqualHealthChange
        damage:
        - Airloss: -4
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 30
        damage:
          groups:
            Toxin: 0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 50
        damage:
          groups:
            Brute: 1
            Toxin: 2

- type: reagent
  parent: [ CMReagentMedicine, DexalinPlus ]
  id: AU14Naloxone
  name: reagent-name-cmnaloxone
  desc: reagent-desc-cmnaloxone
  color: "#a3adbf"
  overdose: 200
  metabolisms:
    Medicine:
      metabolismRate: 0.02
      effects:
      - !type:RemoveDamage
        group: Toxin
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 15
        damage:
          groups:
            Toxin: 0.75
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 25
        damage:
          groups:
            Brute: 1.5
            Toxin: 3

#injectors
- type: entity
  parent: CMAutoInjector
  id: AU14NaloxoneAutoInjector
  name: "автоін’єктор налоксону"
  description: "Автоін’єктор, заряджений налоксоном, використовується для миттєвої протидії токсичним ушкодженням. Переважно застосовується для лікування передозувань. Не потребує жодної підготовки для використання."
  components:
  - type: Sprite
    sprite: _AU14/Items/naloxone_auto_injector.rsi
    layers:
    - state: autoinjector
    - state: autoinjector1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    sprite: null
  - type: Hypospray
    transferAmount: 3
    injectSound: /Audio/_RMC14/Medical/air_release.ogg
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 3
        reagents:
        - ReagentId: AU14Naloxone
          Quantity: 3
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
  - type: MedicallyUnskilledDoAfter
    min: 0
    doAfter: 0
  - type: IconLabel
    labelTextLocId: AU14-naloxone-medicine-container-label-text

