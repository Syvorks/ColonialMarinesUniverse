- type: entity
  parent: CMBaseHealingItem
  id: AU14Tourniquet
  name: "турнікет CAT"
  description: "Одноразовий турнікет, створений для самостійного накладання під вогнем. CAT використовує високоміцну липучку Velcro та закрутку, щоб перекрити артеріальну кровотечу на кінцівках. Ефективно, боляче й зовсім не делікатно. Надмірне використання може призвести до ушкодження нервів або ампутації. Утім, краще покалічений, ніж мертвий."
  components:
  - type: Tag
    tags:
    - Brutepack
  - type: Sprite
    sprite: Objects/Specific/Medical/medical.rsi
    state: tourniquet
  - type: Item
    sprite: Objects/Specific/Medical/medical.rsi
    inhandVisuals:
      left:
      - state: tourniquet-inhand-left
      right:
      - state: tourniquet-inhand-right
  - type: CMUTourniquetItem
    applyDelay: 1.5
    removeDelay: 1.0
    consumedOnApply: true
