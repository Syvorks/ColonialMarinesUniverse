#gauze

- type: entity
  parent: CMBaseHealingItem
  id: AU14HemostaticGauzePacket
  name: "пакет гемостатичної марлі"
  description: "Вакуумно запаяний пакет хімічно обробленої марлі, створеної для швидкої зупинки артеріальної кровотечі. Порошок пече як пекло, але працює. Одноразовий. Роздери пакунок, запхай у рану й сподівайся на краще."
  components:
  - type: Sprite
    sprite: _AU14/Items/quickclot.rsi
    state: quickclot
  - type: Item
    sprite: _AU14/Items/quickclot.rsi
    inhandVisuals:
      left:
      - state: qc_left
      right:
      - state: qc_right
  - type: SpawnItemsOnUse
    items:
    - id: AU14HemostaticGauzePacketTrash
    - id: AU14HemostaticGauze
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: CMBaseHealingItem
  id: AU14HemostaticGauzePacketTrash
  name: "використаний пакет гемостатичної марлі"
  description: "Вакуумно запаяний пакет хімічно обробленої марлі, створеної для швидкої зупинки артеріальної кровотечі. Порошок пече як пекло, але працює. Одноразовий. Цей уже сміття, його вже використали!"
  components:
  - type: Sprite
    sprite: _AU14/Items/quickclot.rsi
    state: qc_ripped
  - type: Item
    sprite: _AU14/Items/quickclot.rsi
    inhandVisuals:
      left:
      - state: qc_left
      right:
      - state: qc_right

- type: entity
  parent: CMBaseHealingItem
  id: AU14HemostaticGauze
  name: "гемостатична марля"
  description: "Смуга марлі, просочена порошкоподібним засобом для згортання крові. Щойно витягнеш її з пакета, час пішов, запхай її глибоко в рану та зупини кровотечу, поки не стало надто пізно."
  components:
  - type: Tag
    tags:
    - Brutepack
  - type: Sprite
    sprite: _AU14/Items/quickclot.rsi
    state: hemgauze
  - type: Item
    sprite: _AU14/Items/quickclot.rsi
    inhandVisuals:
      left:
      - state: hemgauze_left
      right:
      - state: hemgauze_right
  - type: WoundTreater
    wound: Brute
    treats: true
    group: Brute
    consumable: true
    canUseUnskilled: true
    skills:
      RMCSkillMedical: 2
    treatBeginSound:
      path: "/Audio/_RMC14/Medical/bandage.ogg"
    treatEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
    userPopup: au14-hs-user-popup
    targetPopup: au14-hs-target-popup
    othersPopup: au14-hs-others-popup
    noneSelfPopup: cm-gauze-none-self-popup
    noneOtherPopup: cm-gauze-none-other-popup
    noWoundsOnUserPopup: cm-wounds-already-treated-self-popup
    noWoundsOnTargetPopup: cm-wounds-already-treated-target-popup
  - type: MedicallyUnskilledDoAfter
    min: 1
    doAfter: 2.5
  - type: Stack
    stackType: CMGauze
    count: 6
  - type: StackPrice
    price: 6

