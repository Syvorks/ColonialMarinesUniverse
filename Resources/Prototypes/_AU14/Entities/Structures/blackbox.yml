- type: entity
  parent: BaseStructureDynamic
  id: AU14BlackBoxRecorder
  name: "колоніальний реєстратор чорного ящика"
  description: "Обов’язковий за вимогами МТК реєстратор даних, встановлений у всіх колоніях, зареєстрованих в ОА, УПП та ІТС. Спроєктований, щоб витримувати катастрофічні події, він безперервно записує критично важливі екологічні, структурні та операційні дані. У разі катастрофи він дозволяє слідчим відтворити послідовність подій і визначити першопричину відмови. Однак цей не червоний."
  components:
  - type: Anchorable
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Dynamic
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 1
  - type: Sprite
    sprite:  _AU14/Structures/blackbox.rsi
    state: blackbox
