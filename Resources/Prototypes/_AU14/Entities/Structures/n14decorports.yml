- type: entity
  id: Rails
  name: "залізниця"
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _AU14/N14content/rails64.rsi
    state: rails
    netsync: false
    drawdepth: FloorObjects
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Clickable

