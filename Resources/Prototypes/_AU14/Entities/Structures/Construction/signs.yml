- type: entity
  parent: BaseStructure
  id: DecorSignMinesProp
  name: "міни"
  suffix: Prop
  description: "небезпека мін і смерті..."
  components:
  - type: Sprite
    sprite: _AU14/N14content/world.rsi
    state: mine_sign
  - type: Construction
    graph: AU14SignGraph
    node: sign_mines

# ├──[ CONSTRUCTION MENU ]───────────────────────────────────────────┤
- type: construction
  parent: RMC
  name: "знак «Міни»"
  id: AU14ConstructionSignMines
  graph: AU14SignGraph
  startNode: start
  targetNode: sign_mines
  category: construction-category-cm-furniture
  description: "Знак, що попереджає про міни."
  objectType: Structure
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: construction
  parent: RMC
  name: "дорожній знак (порожній)"
  id: AU14ConstructionSignEmpty
  graph: AU14SignGraph
  startNode: start
  targetNode: sign_empty
  category: construction-category-cm-furniture
  description: "Порожній дорожній знак."
  objectType: Structure
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: construction
  parent: AU14ConstructionSignEmpty
  name: "дорожній знак (евакуаційний центр)"
  id: AU14ConstructionSignEvacCenter
  targetNode: sign_evaccenter
  description: "Вказує до евакуаційного центру."

- type: construction
  parent: AU14ConstructionSignEmpty
  name: "дорожній знак (попереду блокпост)"
  id: AU14ConstructionSignCheckpoint
  targetNode: sign_cpahead
  description: "Попереджає про блокпост попереду."

- type: construction
  parent: AU14ConstructionSignEmpty
  name: "дорожній знак (виконуйте накази армії)"
  id: AU14ConstructionSignFollowOrders
  targetNode: sign_armyorders
  description: "Нагадування виконувати накази армії."

- type: construction
  parent: AU14ConstructionSignEmpty
  name: "дорожній знак (налаштуйте частоту)"
  id: AU14ConstructionSignTuneFreq
  targetNode: sign_freqtune
  description: "Закликає людей налаштуватися на 91,7 AM."

- type: construction
  parent: AU14ConstructionSignEmpty
  name: "дорожній знак (зменшити швидкість)"
  id: AU14ConstructionSignSlowDown
  targetNode: sign_slowdown
  description: "Вказівка зменшити швидкість."

# ├──[ CONSTRUCTION GRAPH ]──────────────────────────────────────────┤
- type: constructionGraph
  parent: RMC
  id: AU14SignGraph
  start: start
  graph:
  - node: start
    actions:
    - !type:DeleteEntity {}
    edges:
    - to: sign_mines
      steps:
      - material: RMCWood
        amount: 2
        doAfter: 2
    - to: sign_evaccenter
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_cpahead
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_armyorders
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_freqtune
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_slowdown
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_empty
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
  - node: sign_mines
    entity: DecorSignMinesProp
    edges:
    - to: start
      steps:
      - tool: Screwing
        doAfter: 3
      completed:
        - !type:SpawnPrototype
          prototype: RMCPlankWood2
  - node: sign_evaccenter
    entity: AU14PropTrafficDirector1
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 3
      - tool: Prying
        doAfter: 4
      completed:
        - !type:SpawnPrototype
          prototype: CMSheetMetal1
  - node: sign_cpahead
    entity: AU14PropTrafficDirector2
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 3
      - tool: Prying
        doAfter: 4
      completed:
        - !type:SpawnPrototype
          prototype: CMSheetMetal1
  - node: sign_armyorders
    entity: AU14PropTrafficDirector3
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 3
      - tool: Prying
        doAfter: 4
      completed:
        - !type:SpawnPrototype
          prototype: CMSheetMetal1
  - node: sign_freqtune
    entity: AU14PropTrafficDirector4
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 3
      - tool: Prying
        doAfter: 4
      completed:
        - !type:SpawnPrototype
          prototype: CMSheetMetal1
  - node: sign_slowdown
    entity: AU14PropTrafficDirector5
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 3
      - tool: Prying
        doAfter: 4
      completed:
        - !type:SpawnPrototype
          prototype: CMSheetMetal1
  - node: sign_empty
    entity: AU14PropTrafficDirector6
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 3
      - tool: Prying
        doAfter: 4
      completed:
        - !type:SpawnPrototype
          prototype: CMSheetMetal1
