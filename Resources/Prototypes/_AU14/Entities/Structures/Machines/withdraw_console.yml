- type: entity
  abstract: true
  parent: RMCCommunicationsConsoleBase
  id: AU14WithdrawConsoleBase
  name: "консоль відходу"
  description: "Захищений командний термінал, що використовується для офіційного початку відходу фракції з операції."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: InteractionOutline
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false
  - type: ActivatableUI
    key: enum.WithdrawConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.WithdrawConsoleUiKey.Key:
        type: WithdrawConsoleBui

- type: entity
  parent: AU14WithdrawConsoleBase
  id: AU14WithdrawConsoleGovFor
  name: "консоль відходу (ҐовФор)"
  suffix: GovFor
  description: "Захищений командний термінал ҐовФор для початку офіційного відходу. Для розблокування потрібні дві авторизовані ID-картки."
  components:
  - type: WithdrawConsole
    faction: govfor

- type: entity
  parent: AU14WithdrawConsoleBase
  id: AU14WithdrawConsoleOpFor
  name: "консоль відходу (ОпФор)"
  suffix: OpFor
  description: "Захищений командний термінал ОпФор для початку офіційного відходу. Для розблокування потрібні дві авторизовані ID-картки."
  components:
  - type: WithdrawConsole
    faction: opfor

- type: entity
  parent: AU14WithdrawConsoleBase
  id: AU14WithdrawConsoleColony
  name: "консоль відходу (Колонія)"
  suffix: Colony
  description: "Захищений термінал адміністрації колонії для початку офіційного відходу. Для розблокування потрібна одна авторизована картка адміністратора колонії."
  components:
  - type: WithdrawConsole
    faction: colony
    requiredIdCount: 1
    useAccessCheck: true
  - type: AccessReader
    access: [ [ "AU14AccessColonyAdministrator" ] ]
