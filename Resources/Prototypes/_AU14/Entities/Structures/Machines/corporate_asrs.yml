# Corporate ASRS — a Weyland-Yutani controlled supply system separate from the colony ASRS.
# Uses faction: "corporate" so department consoles with asrsFaction: "corporate" route orders here.
# Orders placed through a corporate department console have sales tax applied (tax → colony budget).

# Corporate ASRS Console
- type: entity
  parent: CMASRSConsole
  id: AU14CorporateASRSConsole
  name: "консоль корпоративного постачання"
  description: "Термінал керування корпоративним постачанням Вейланд-Ютані. Замовлення, зроблені тут, підлягають поточній ставці податку з продажів."
  suffix: Corporate, ASRS
  components:
  - type: RequisitionsComputer
    faction: corporate
    categories:
    - name: Corporate Equipment
      entries:
      - cost: 500
        crate: RMCCrateElectricalMaintenance
      - cost: 800
        crate: RMCCrateMechanicalMaintenance
      - cost: 1000
        crate: RMCCrateHighCapacityPowerCell
      - cost: 600
        crate: RMCCrateFlashlights
    - name: Civilian Goods
      entries:
      - cost: 400
        crate: RMCCrateFoodMRE
      - cost: 600
        crate: RMCCrateReplacementLights
    - name: Security
      entries:
      - cost: 2000
        crate: RMCCrateInflatableBarriers
      - cost: 1500
        crate: RMCCrateEmptySandbags


# Corporate ASRS Elevator
- type: entity
  parent: CMCargoElevator
  id: AU14CorporateASRSElevator
  name: "ліфт корпоративного постачання"
  description: "Ліфт корпоративного постачання Вейланд-Ютані. Доставляє замовлення, зроблені через систему корпоративного постачання."
  suffix: Corporate, ASRS
  components:
  - type: RequisitionsElevator
    faction: corporate

