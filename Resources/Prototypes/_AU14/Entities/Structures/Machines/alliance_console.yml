- type: entity
  abstract: true
  parent: RMCCommunicationsConsoleBase
  id: AU14AllianceConsoleBase
  name: "консоль альянсу"
  description: "Захищений командний термінал для керування дипломатичними відносинами з фракціями третьої сторони. Дружні фракції не обстрілюватимуться вашими турелями."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: InteractionOutline
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false
  - type: ActivatableUI
    key: enum.AllianceConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.AllianceConsoleUiKey.Key:
        type: AllianceConsoleBui

- type: entity
  parent: AU14AllianceConsoleBase
  id: AU14AllianceConsoleGovfor
  name: "консоль альянсу (ҐовФор)"
  suffix: GovFor
  description: "Командний термінал ҐовФор для керування дипломатичними відносинами з фракціями третьої сторони."
  components:
  - type: AllianceConsole
    faction: govfor

- type: entity
  parent: AU14AllianceConsoleBase
  id: AU14AllianceConsoleOpfor
  name: "консоль альянсу (ОпФор)"
  suffix: OpFor
  description: "Командний термінал ОпФор для керування дипломатичними відносинами з фракціями третьої сторони."
  components:
  - type: AllianceConsole
    faction: opfor
