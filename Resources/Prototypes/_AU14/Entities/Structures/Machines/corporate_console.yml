
- type: entity
  id: AU14CorporateConsoleBase
  abstract: true
  parent: RMCCommunicationsConsoleBase
  name: "консоль корпоративних справ"
  description: "Термінал корпоративних справ Вейланд-Ютані для керування транзитними тарифами та операціями корпоративної підтримки."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: InteractionOutline
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false
  - type: ActivatableUI
    key: enum.CorporateConsoleUi.Key
  - type: CorporateConsole
  - type: UserInterface
    interfaces:
      enum.CorporateConsoleUi.Key:
        type: CorporateConsoleBui
      enum.CorporateConsoleThirdPartyUi.Key:
        type: CorporateConsoleThirdPartyBui
  - type: ItemSlots
    slots:
      CashSlot:
        whitelist:
          tags:
          - Currency
  - type: ContainerContainer
    containers:
      CashSlot: !type:ContainerSlot {}
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["AU14AccessCorporateWEYULiaison"], ["AU14AccessCorporateWEYU"]]

# Standard Corporate Console — for use in corporate offices
- type: entity
  id: AU14CorporateConsole
  parent: AU14CorporateConsoleBase
  name: "консоль корпоративних справ"
  description: "Термінал корпоративних справ Вейланд-Ютані. Встановлюйте ставки транзитних тарифів, керуйте корпоративними коштами та координуйте корпоративну сторонню підтримку. Усі зміни тарифів оголошуються по всій колонії."
  suffix: Corporate, WY
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: CorporateConsole
    callableParties:
      WYPMCParty: 7500
      WYHT: 6000
      IPIESynth: 3500
