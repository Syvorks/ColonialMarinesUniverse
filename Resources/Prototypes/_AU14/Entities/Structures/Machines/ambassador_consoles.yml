# Ambassador Consoles - Used by third parties for diplomatic functions
# These consoles allow factions to call in third party support

# Base Ambassador Console
- type: entity
  abstract: true
  parent: RMCCommunicationsConsoleBase
  id: AU14AmbassadorConsoleBase
  name: "консоль посла"
  description: "Консоль для дипломатичних функцій і стороннього зв’язку."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: InteractionOutline
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false
  - type: ActivatableUI
    key: enum.AmbassadorConsoleUi.Key
  - type: AmbassadorConsole
    budget: 500
    replenishAmount: 25
    replenishInterval: 60
  - type: UserInterface
    interfaces:
      enum.AmbassadorConsoleUi.Key:
        type: AmbassadorConsoleBui
      enum.AmbassadorThirdPartyUi.Key:
        type: AmbassadorThirdPartyBui
  - type: ItemSlots
    slots:
      CashSlot:
        whitelist:
          tags:
          - Currency
  - type: ContainerContainer
    containers:
      CashSlot: !type:ContainerSlot {}
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["AU14AccessColonyAmbassador"]]

# UPP Ambassador Console - Can call in GROM
- type: entity
  id: AU14AmbassadorConsoleUPP
  parent: AU14AmbassadorConsoleBase
  name: "дипломатична консоль УПП"
  description: "Дипломатична консоль Союзу прогресивних народів. Може запитувати підтримку спецпризначенців ГРОМ."
  suffix: UPP, GROM
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: AmbassadorConsole
    factionName: UPP
    budget: 500
    replenishAmount: 25
    replenishInterval: 60
    callableParties:
      UPPGROM: 7500
      UPPGROMAlt: 6000
      UPPGROMAlt2: 4500

