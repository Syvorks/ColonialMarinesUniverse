- type: entity
  parent: [ RMCBaseBreechloader, RMCBaseAttachableHolder ]
  name: "двоствольна двокаліберна гвинтівка «Дабл-Дьюс»"
  id: AU14WeaponRifleTwoBore
  description: "Кастомна двоствольна двокаліберна гвинтівка. Створена для полювання на найбільшу або найнебезпечнішу дичину. Вона важить сорок п’ять фунтів без спорядження, незаконна у трьох секторах і має надчутливий спуск. Піклуйтеся про неї, і вона подбає про вас та про все, на що ви її наведете."
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Civilian/twobore_rifle.rsi
  - type: Gun
    shotsPerBurst: 2
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mateba.ogg
  - type: ShootUseDelay
  - type: BreechLoaded
    openSound:
      path: /Audio/_RMC14/Weapons/Guns/Breech/pkd_open_chamber.ogg
    closeSound:
      path: /Audio/_RMC14/Weapons/Guns/Breech/pkd_close_chamber.ogg
    toggleDelay: 3
  - type: Clothing
    sprite: _AU14/Weapons/Guns/Civilian/twobore_rifle.rsi
  - type: BallisticAmmoProvider
    cycleable: true
    whitelist:
      tags:
      - AU14CartridgeRifleTwoBore
    proto: AU14CartridgeRifleTwoBore
    capacity: 2
  - type: GunRequiresWield
  - type: UseDelay
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    recoilWielded: 5
    recoilUnwielded: 5
    scatterWielded: 5
    scatterUnwielded: 14
    baseFireRate: 0.1
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.5
    accuracyMultiplierUnwielded: 0.5
  - type: AttachableHolder
    slots:
      rmc-aslot-stock:
        startingAttachable: AU14AttachmentTwoBoreStock
        whitelist:
          tags:
          - AU14AttachmentTwoBoreStock
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-stock: -.78, 0
  - type: Item
    size: Ginormous
  - type: Tag
    tags:
    - AU14WeaponRifleTwoBore

- type: entity
  parent: CMBaseCartridgeRifle
  id: AU14CartridgeRifleTwoBore
  name: "гвинтівковий набій (двокаліберний)"
  description: "Набій для двокаліберної гвинтівки. Поруч із ним .50 Cal здається горохострілом. Моліться, щоб у вас ніколи не влучили цією штукою."
  components:
  - type: Sprite
    sprite: _AU14/Items/cartridgetwobore.rsi
  - type: Tag
    tags:
    - Cartridge
    - AU14CartridgeRifleTwoBore
  - type: CartridgeAmmo
    proto: AU14BulletRifleTwoBore

- type: entity
  parent: BulletRifle10x24mm
  id: AU14BulletRifleTwoBore
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 250
  - type: CMArmorPiercing
    amount: 50
  - type: RMCStunOnHit
    stuns:
    - whitelist:
        components:
        - Marine
        - Xeno
        - VerySmallXeno
      maxRange: 32
      stunTime: 3
      slowTime: 15
      knockBackPowerMin: 1
      knockBackPowerMax: 5
      knockBackSpeed: 5
      forceKnockBack: true
      slowsEffectBigXenos: true
      dazeTime: 5

- type: Tag
  id: AU14WeaponRifleTwoBore

- type: Tag
  id: AU14BulletRifleTwoBore

- type: Tag
  id: AU14CartridgeRifleTwoBore
