- type: entity
  parent: RMCWeaponRevolverBase
  id: AU14WeaponRevolverM2019
  name: "авторевольвер M2019 «бластер»"
  description: "Револьвер, який спочатку видавали правоохоронцям на початку XXI століття. Найбільше він відомий завдяки нині вимерлим блейдранерам під час піку кризи реплікантів на початку 2000-х. Під набій .357, ця зброя давно застаріла, але досі популярна серед колекціонерів і фаддів. За десятиліття з’явилося багато репродукцій: одні вірні оригіналу, інші небезпечно дешеві. Хоча він рідкісний, його все ще інколи можна побачити в кобурі на окраїнних світах Об’єднаних Америк та Імперії Трьох Світів."
