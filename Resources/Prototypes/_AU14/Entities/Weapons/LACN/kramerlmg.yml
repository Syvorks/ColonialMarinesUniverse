- type: entity
  parent: AU14WeaponRifleKramerAR
  name: "легка зброя підтримки Крамер"
  id: AU14WeaponRifleKramerLSW
  description: "Також відома як Крамер або KAR, легка зброя підтримки Крамер є автоматичним варіантом підтримки відділення на базі стандартної штурмової гвинтівки Крамер. Вироблена Kramer Metallarbeiten GmbH, KAR широко використовується по всіх Об’єднаних Америках."
  components:
    - type: Sprite
      sprite: _AU14/Weapons/Guns/LACN/kramerLMG.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: _AU14/Weapons/Guns/LACN/kramerLMG.rsi
    - type: Gun
      selectedMode: FullAuto
      availableModes:
        - SemiAuto
        - FullAuto
    - type: RMCSelectiveFire
      baseFireModes:
        - SemiAuto
        - FullAuto
      recoilUnwielded: 5
      scatterWielded: 5
      baseFireRate: 4
      burstScatterMult: 2
      modifiers:
        Burst:
          fireDelay: 0.1665
          maxScatterModifier: 10
          useBurstScatterMult: true
          unwieldedScatterMultiplier: 2
          shotsToMaxScatter: 6
        FullAuto:
          fireDelay: 0
          maxScatterModifier: 26
          useBurstScatterMult: true
          unwieldedScatterMultiplier: 2
          shotsToMaxScatter: 4
    - type: RMCWeaponAccuracy
      accuracyMultiplier: 1.05
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
          ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_unload.ogg
          priority: 2
          whitelist:
            tags:
              - AU14WeaponRifleKramerMagazineLSWStandard
              - AU14WeaponRifleKramerMagazineLSWAP
          startingItem: AU14WeaponRifleKramerMagazineLSWStandard
    - type: GunDamageModifier
      multiplier: 1.05
    - type: AttachableHolder
      slots:
        rmc-aslot-underbarrel:
          startingAttachable: RMCAttachmentBipod
          whitelist:
            tags:
              - RMCAttachmentAngledGrip
              - RMCAttachmentVerticalGrip
              - RMCAttachmentFlashlightGrip
              - RMCAttachmentBipod
              - RMCAttachmentBurstFireAssembly
    - type: GunRequiresWield

