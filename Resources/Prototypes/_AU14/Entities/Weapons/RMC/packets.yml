- type: entity
  abstract: true
  parent: CMPacketBase
  id: AU14PacketBaseRMC
  suffix: RM
  name: "пакет"
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Throwable/RMC/packets.rsi
    state: general_packet

- type: entity
  parent: AU14PacketBaseRMC
  id: AU14PacketGrenadeHighExplosiveRMC
  name: "пакет гранат R2175/A HEDP"
  suffix: RM
  description: "Містить три гранати R2175/A HEDP. Поводьтеся обережно."
  components:
  - type: Sprite
    layers:
    - state: hedp_packet
      map: [ "closedLayer" ]
    - state: hedp_packet_e
      map: [ "openLayer", "emptyLayer" ]

- type: entity
  parent: AU14PacketGrenadeHighExplosiveRMC
  id: AU14PacketGrenadeHighExplosiveRMCFilled
  suffix: Filled, RM
  components:
  - type: StorageFill
    contents:
    - id: AU14GrenadeHighExplosiveRMC
      amount: 3

- type: entity
  parent: RMCBoxBase
  id: AU14BoxHEDPRMC
  suffix: RM
  name: "коробка гранат R2175/A HEDP"
  description: "Захищена коробка з 18 30mm гранатами R2175/A подвійного призначення з потужною вибухівкою. Фугасні, не зберігайте поруч із паливом для вогнеметів."
  components:
  - type: Sprite
    layers:
    - state: d_nade_placeholder
      map: [ "closedLayer" ]
    - state: model_r2175
    - state: rmchedp
    - state: d_nade_placeholder_e
      map: [ "openLayer", "emptyLayer" ]
  - type: Storage
    whitelist:
      tags:
      - RMCGrenadeHEDP
  - type: StorageFill
    contents:
    - id: AU14GrenadeHighExplosiveRMC
      amount: 18

