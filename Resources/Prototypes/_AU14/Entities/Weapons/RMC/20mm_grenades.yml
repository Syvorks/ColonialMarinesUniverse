#SHELLS
- type: entity
  abstract: true
  parent: BaseItem
  id: AU14BaseAirBurstGrenadeRMC
  name: "20mm граната повітряного підриву"
  components:
  - type: Appearance
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_frag
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - suitStorage
  - type: Destructible
    thresholds: []
  - type: IgnorePredictionHide
  - type: Ammo

- type: entity
  abstract: true
  id: AU14L103A1Tags
  components:
  - type: Tag
    tags:
    - Grenade
    - AU14LauncherCompatibleGrenadeRMC
    - AU14GrenadeL103A1

- type: entity
  parent:
  - CMGrenadeBase
  - AU14L103A1Tags
  id: AU1420MMGrenadeL103A1
  name: "20mm HE-граната L103A1"
  description: "20mm граната, що вибухає при ударі. Менш потужна за повнорозмірні гранати."
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_he
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: grenade_20mm_he_active }
          Unprimed: { state: grenade_20mm_he }
  - type: ExplodeOnTrigger
  - type: Explosive
    maxIntensity: 14
    intensitySlope: 4
    totalIntensity: 160
    canCreateVacuum: false
  - type: Ammo
  - type: CMExplosionEffect
  - type: CMVocalizeTrigger
  - type: RMCScorchEffect
  - type: Tag
    tags:
    - Grenade
    - AU14LauncherCompatibleGrenadeRMC
    - AU14GrenadeL103A1

- type: entity
  parent:
  - CMGrenadeBase
  - AU14L103A1Tags
  id: AU1420MMGrenadeL108A1
  name: "20mm HESH-граната L108A1"
  description: "Фугасна подвійного призначення. Невелика, але оманливо потужна вибухова граната, що поступово витісняє HE-гранати M15 разом із 30mm HEFA. Може заряджатися в гранатомети або кидатися вручну."
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_squash
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: grenade_20mm_squash_active }
          Unprimed: { state: grenade_20mm_squash }
  - type: ExplodeOnTrigger
  - type: Explosive
    maxIntensity: 28
    intensitySlope: 8
    totalIntensity: 200
    canCreateVacuum: false
  - type: Ammo
  - type: CMExplosionEffect
  - type: CMVocalizeTrigger
  - type: RMCScorchEffect
  - type: Tag
    tags:
    - Grenade
    - AU14LauncherCompatibleGrenadeRMC
    - AU14GrenadeL103A1

- type: entity
  parent:
  - CMGrenadeBase
  - AU14L103A1Tags
  id: AU1420MMGrenadeL101A2
  name: "20mm граната L101A2 з нервовим агентом"
  description: "20mm граната, що при ударі вибухає у велику хмару нервово-паралітичного газу."
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_gas
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: grenade_20mm_gas_active }
          Unprimed: { state: grenade_20mm_gas }
  - type: OnUseTimerTrigger
    delay: 2
  - type: SpawnOnTrigger
    proto: RMCSmokeNeurotoxin # Placeholder
  - type: SoundOnTrigger
    sound: /Audio/Effects/smoke.ogg
  - type: DeleteOnTrigger
  - type: Tag
    tags:
    - Grenade
    - AU14LauncherCompatibleGrenadeRMC
    - AU14GrenadeL103A1
  - type: Ammo

- type: entity
  parent: AU14BaseAirBurstGrenadeRMC
  id: AU1420MMGrenadeL104A1
  name: "20mm осколкова граната L104A1"
  description: "20mm граната, що при ударі вибухає уламками."
  components:
  - type: Tag
    tags:
    - Grenade
    - AU14LauncherCompatibleGrenadeRMC
    - AU14AirburstGrenadeRMC
    - AU14GrenadeL104A1
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: AU14AirBurstProjectileFragRMC

- type: entity
  parent: RMC40MMGrenadeM74AGMF
  id: AU1420MMGrenadeL103A1I
  name: "20mm запалювальна граната L103A1/I"
  description: "20mm граната, що при ударі вибухає палаючими уламками та калюжею запалювальної суміші."
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_incend
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: AU14AirBurstProjectileIncendiaryRMC
  - type: Tag
    tags:
    - Grenade
    - AU14LauncherCompatibleGrenadeRMC
    - AU14AirburstGrenadeRMC
    - AU14GrenadeL103A1I

- type: entity
  parent: AU1420MMGrenadeL104A1
  id: AU14HornetShellL104A1H
  name: "20mm голоцільова граната L104A1/H"
  description: "20mm граната, що при ударі вибухає уламками. Уламки цієї гранати обливають ціль хімічною сполукою, яка допомагає сенсорам захоплювати ціль."
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_holo
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: AU14AirBurstProjectileHornetRMC

# Projectiles

- type: entity
  abstract: true
  parent: RMCBaseBullet
  id: AU14BaseAirBurstProjectileRMC
  categories: [ HideSpawnMenu ]
  components:
  - type: TriggerOnFixedDistanceStop
    delay: 0
  - type: SpawnOnTrigger
    proto: CMExplosionEffectGrenade
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_frag_active
  - type: Projectile
    deleteOnCollide: false
    impactEffect: BulletImpactEffect
    maxFixedRange: 7
    damage:
      types:
        Piercing: 70
    soundHit:
      path: /Audio/Effects/gen_hit.ogg
  - type: ClusterLimitHits
    limit: 0
    ignoreFirstHit: true
  - type: CMExplosionEffect
    maxShrapnel: 0
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.45,0.15,0.15"
        mask:
        - ItemMask
        restitution: 1
  - type: IgnorePredictionHide

- type: entity
  parent: AU14BaseAirBurstProjectileRMC
  id: AU14AirBurstProjectileFragRMC
  name: "20mm граната L104A1"
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectileGrenade
    evenSpread: true
    minVelocity: 0.5
    maxVelocity: 1.5
    fillPrototype: AU14ShrapnelJaggedRMC
    rebounds: true
    capacity: 12
    spreadAngle: 40
  - type: ClusterLimitHits
    limit: 5

- type: entity
  parent: AU14BaseAirBurstProjectileRMC
  id: AU14AirBurstProjectileIncendiaryRMC
  name: "20mm граната L103A1/I"
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_incend_active
  - type: ProjectileGrenade
    evenSpread: true
    minVelocity: 0.5
    maxVelocity: 1.5
    fillPrototype: RMCShrapnelIncendiary
    rebounds: true
    capacity: 5
    spreadAngle: 40
  - type: DirectionalTileFireOnTrigger
    range: 3
    spawn: RMCTileFire

- type: entity
  parent: AU14BaseAirBurstProjectileRMC
  id: AU14AirBurstProjectileHornetRMC
  name: "20mm граната L104A1/H"
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Ammo/Explosives/RMC/grenade_launcher.rsi
    layers:
    - state: grenade_20mm_holo_active
  - type: ProjectileGrenade
    evenSpread: true
    minVelocity: 0.5
    maxVelocity: 1.5
    rebounds: true
    fillPrototype: RMCHornetRound
    capacity: 12
    spreadAngle: 25

- type: entity
  parent: RMCBaseAirburstRound
  id: AU14ShrapnelJaggedRMC
  name: "зубчастий уламок"
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/shotgun_projectiles.rsi
    layers:
    - state: buckshot
      shader: unshaded
  - type: Projectile
    impactEffect: BulletImpactEffect
    damage:
      types:
        Piercing: 25
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: CMArmorPiercing
    amount: 10
  - type: RMCStunOnHit
    stuns:
    - whitelist:
        minMobSize: VerySmallXeno
      maxRange: 10
      stunTime: 0
      slowTime: 0.8
  - type: RMCProjectileAccuracy
    accuracy: 100
    thresholds:
    - range: 7
      falloff: 33

- type: Tag
  id: AU14GrenadeL103A1

- type: Tag
  id: AU14GrenadeL103A1I

- type: Tag
  id: AU14GrenadeL104A1