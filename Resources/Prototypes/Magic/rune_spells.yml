- type: entity
  abstract: true
  parent: BaseAction
  id: BaseRuneAction
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: spell_default

- type: entity
  parent: BaseRuneAction
  id: ActionFlashRune
  name: "Руна спалаху"
  description: "Прикликає руну, що спалахує при використанні."
  components:
  - type: Action
    useDelay: 10
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: FlashRune

- type: entity
  parent: BaseRuneAction
  id: ActionExplosionRune
  name: "Вибухова руна"
  description: "Прикликає руну, що вибухає при використанні."
  components:
  - type: Action
    useDelay: 20
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: ExplosionRune

- type: entity
  parent: BaseRuneAction
  id: ActionIgniteRune
  name: "Руна підпалу"
  description: "Прикликає руну, що підпалює при використанні."
  components:
  - type: Action
    useDelay: 15
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: IgniteRune

- type: entity
  parent: BaseRuneAction
  id: ActionStunRune
  name: "Руна оглушення"
  description: "Прикликає руну, що оглушує при використанні."
  components:
  - type: Action
    useDelay: 10
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: StunRune
