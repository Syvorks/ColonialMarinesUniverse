- type: entity
  parent: BaseAction
  id: ActionItemRecall
  name: "Позначити предмет"
  description: "Позначає утримуваний предмет, щоб пізніше прикликати його до вашої руки."
  components:
  - type: Action
    useDelay: 10
    raiseOnAction: true
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/forcewall.ogg
      params:
        volume: -5
        pitch: 1.2
        maxDistance: 5
        variation: 0.2
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: item_recall
  - type: InstantAction
    event: !type:OnItemRecallActionEvent
  - type: ItemRecall
