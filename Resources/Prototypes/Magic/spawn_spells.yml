- type: entity
  parent: BaseAction
  id: ActionSpawnMagicarpSpell
  name: "Прикликати магікарпа"
  description: "Це закляття прикликає трьох магі-карпів на допомогу! Вони можуть повернутися проти користувача."
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: spell_default
  - type: TargetAction
    range: 4
  - type: WorldTargetAction
    event: !type:WorldSpawnSpellEvent
      prototypes:
      - id: MobCarpMagic
        amount: 3
      offset: 0, 1
  - type: SpeakOnAction
    sentence: action-speech-spell-summon-magicarp
