- type: entity
  parent: BaseAction
  id: ActionStartFishing
  name: "Кинути рибальську приманку"
  description: "Киньте приманку з вудки, щоб щось упіймати!"
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Objects/Specific/Fishing/fishing_lure.rsi
      state: icon
    sound:
      path: /Audio/_Goobstation/Items/Fishing/fishing_rod_cast.ogg
    useDelay: 2.5
  - type: TargetAction
    range: 15
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:ThrowFishingLureActionEvent

- type: entity
  parent: BaseAction
  id: ActionStopFishing
  name: "Змотати вудку"
  description: "Змотайте вудку, щоб підтягнути предмет, за який вона зачепилася, або припинити риболовлю."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Objects/Specific/Fishing/goon_rod.rsi
      state: icon
    sound:
      path: /Audio/_Goobstation/Items/Fishing/fishing_rod_reel.ogg
  - type: InstantAction
    event: !type:PullFishingLureActionEvent

