  components:
  - type: Action
    useDelay: 15
    icon: Interface/Actions/defile.png
  - type: InstantAction
    event: !type:RevenantDefileActionEvent

- type: entity
  parent: BaseAction
  id: ActionRevenantOverloadLights
  name: "Перевантажити лампи"
