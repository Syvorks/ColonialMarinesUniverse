- type: entity
  parent: BaseAction
  id: ActionRevenantShop
  name: "Магазин"
  description: "Відкриває крамницю здібностей."
  components:
  - type: Action
    icon: Interface/Actions/shop.png
  - type: InstantAction
    event: !type:RevenantShopActionEvent

- type: entity
  parent: BaseAction
  id: ActionRevenantDefile
