- type: entity
  parent: BaseMentalAction # allow reading laws when crit
  id: ActionViewLaws
  name: "Переглянути закони"
  description: "Ознайомтеся з законами, яких ви повинні дотримуватися."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_borg.rsi
      state: state-laws
    useDelay: 0.5
  - type: InstantAction
    event: !type:ToggleLawsScreenEvent

- type: entity
  parent: BaseAction
  id: ActionSelectBorgType
  name: "Обрати Тип Кіборга"
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_borg.rsi
      state: select-type
    useDelay: 0.5
  - type: InstantAction
    event: !type:BorgToggleSelectTypeEvent
