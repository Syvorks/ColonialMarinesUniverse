# base actions

# base prototype for all action entities
- type: entity
  abstract: true
  id: BaseAction
  components:
  - type: Action

# an action that is done all in le head and cant be prevented by any means
- type: entity
  abstract: true
  parent: BaseAction
  id: BaseMentalAction
  components:
  - type: Action
    checkCanInteract: false
    checkConsciousness: false

- type: entity
  abstract: true
  parent: BaseMentalAction
  id: BaseSuicideAction
  components:
  - type: ConfirmableAction
    popup: suicide-action-popup

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseImplantAction
  components:
  - type: InstantAction
    event: !type:ActivateImplantEvent

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseToggleAction
  components:
  - type: InstantAction
    event: !type:ToggleActionEvent

# actions

- type: entity
  parent: BaseAction
  id: ActionScream
  name: "Кричи!"
  description: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
  components:
  - type: Action
    useDelay: 20
    icon: Interface/Actions/scream.png
    checkCanInteract: false
  - type: InstantAction
    event: !type:ScreamActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionTurnUndead
  name: "Перетворитися на нежить"
  description: "Піддайтеся своїй інфекції і станьте зомбі."
  components:
  - type: Action
    icon: Interface/Actions/zombie-turn.png
  - type: InstantAction
    event: !type:ZombifySelfActionEvent

- type: entity
  parent: BaseToggleAction
  id: ActionToggleLight
  name: "Індикатор перемикання"
  description: "Увімкніть і вимкніть світло."
  components:
  - type: Action
    useDelay: 1
    icon: { sprite: Objects/Tools/flashlight.rsi, state: flashlight }
    iconOn: { sprite: Objects/Tools/flashlight.rsi, state: flashlight-on }
  - type: ActionBlockIfDevoured # RMC14

- type: entity
  parent: BaseAction
  id: ActionOpenStorageImplant
  name: "Переключити імплант-сховище"
  description: "Відкриває або закриває імплант-сховище, вбудоване під вашу шкіру"
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Clothing/Back/Backpacks/backpack.rsi
      state: icon
    useDelay: 1
  - type: InstantAction
    event: !type:OpenStorageImplantEvent

- type: entity
  parent: [BaseSuicideAction, BaseImplantAction]
  id: ActionActivateMicroBomb
  name: "Активувати Мікробому"
  description: "Активує вашу внутрішню мікробому, повністю знищуючи вас і ваше обладнання"
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Actions/Implants/implants.rsi
      state: explosive

- type: entity
  parent: [BaseSuicideAction, BaseImplantAction]
  id: ActionActivateDeathAcidifier
  name: "Активувати підсилювач смерті"
  description: "Активує ваш підкислювач смерті, повністю розплавляючи вас і ваше спорядження"
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: gib

- type: entity
  parent: BaseAction
  id: ActionActivateFreedomImplant
  name: "Вирвися на волю"
  description: "Активація імплантату свободи звільнить вас від будь-яких обмежень для рук"
  components:
  - type: LimitedCharges
    maxCharges: 3
  - type: Action
    checkCanInteract: false
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Actions/Implants/implants.rsi
      state: freedom
  - type: InstantAction
    event: !type:UseFreedomImplantEvent

- type: entity
  parent: BaseAction
  id: ActionOpenUplinkImplant
  name: "Open Uplink"
  description: "Відкриває синдикатський канал зв'язку, вбудований у вашу шкіру"
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Objects/Devices/communication.rsi
      state: old-radio
  - type: InstantAction
    event: !type:OpenUplinkImplantEvent

- type: entity
  parent: BaseImplantAction
  id: ActionActivateEmpImplant
  name: "Активувати EMP"
  description: "Запускає невеликий ЕМІ-імпульс навколо вас"
  components:
  - type: LimitedCharges
    maxCharges: 3
  - type: Action
    checkCanInteract: false
    useDelay: 5
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Objects/Weapons/Grenades/empgrenade.rsi
      state: icon

- type: entity
  parent: BaseAction
  id: ActionActivateScramImplant
  name: "КРИК!"
  description: "Випадково телепортує вас на велику відстань."
  components:
  - type: LimitedCharges
    maxCharges: 2
  - type: Action
    checkCanInteract: false
    useDelay: 5
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Structures/Specific/anomaly.rsi
      state: anom4
  - type: InstantAction
    event: !type:UseScramImplantEvent

- type: entity
  parent: BaseAction
  id: ActionActivateDnaScramblerImplant
  name: "Скремблювання ДНК"
  description: "Випадковим чином змінює ваше ім'я та зовнішність."
  components:
  - type: ConfirmableAction
    popup: dna-scrambler-action-popup
  - type: LimitedCharges
    maxCharges: 1
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Clothing/OuterClothing/Hardsuits/lingspacesuit.rsi
      state: icon
  - type: InstantAction
    event: !type:UseDnaScramblerImplantEvent

- type: entity
  parent: BaseAction
  id: ActionToggleSuitPiece
  name: "Перемикач костюмів"
  description: "Не забудьте спорядити важливі елементи свого костюма перед тим, як вирушати в бій."
  components:
  - type: Action
    itemIconStyle: BigItem
    useDelay: 1 # equip noise spam.
  - type: InstantAction
    event: !type:ToggleClothingEvent

- type: entity
  parent: BaseMentalAction
  id: ActionCombatModeToggle
  name: "[color=red]Бойовий режим[/color]"
  description: "Увійдіть в бойовий режим"
  components:
  - type: Action
    icon: Interface/Actions/harmOff.png
    iconOn: Interface/Actions/harm.png
    priority: -100
  - type: InstantAction
    event: !type:ToggleCombatActionEvent

- type: entity
  parent: ActionCombatModeToggle
  id: ActionCombatModeToggleOff
  components:
  - type: Action
    enabled: false
    autoPopulate: false

- type: entity
  parent: BaseAction
  id: ActionChangeVoiceMask
  name: "Назва набору"
  description: "Змініть ім'я, яке чують інші, на інше."
  components:
  - type: Action
    icon: { sprite: Interface/Actions/voice-mask.rsi, state: icon }
  - type: InstantAction
    event: !type:VoiceMaskSetNameEvent

- type: entity
  parent: BaseAction
  id: ActionVendingThrow
  name: "Пункт видачі"
  description: "Випадково роздайте предмет зі свого запасу."
  components:
  - type: Action
    useDelay: 30
  - type: InstantAction
    event: !type:VendingMachineSelfDispenseEvent

- type: entity
  parent: BaseToggleAction
  id: ActionToggleBlock
  name: "Блок"
  description: "Підніміть або опустіть щит."
  components:
  - type: Action
    icon: { sprite: Objects/Weapons/Melee/shields.rsi, state: teleriot-icon }
    iconOn: { sprite: Objects/Weapons/Melee/shields.rsi, state: teleriot-on }

- type: entity
  parent: BaseMentalAction
  id: ActionClearNetworkLinkOverlays
  name: "Очистити накладання мережевих з'єднань"
  description: "Чіткі накладання мережевих посилань."
  components:
  - type: Action
    clientExclusive: true
    temporary: true
    icon: { sprite: Objects/Tools/multitool.rsi, state: icon }
  - type: InstantAction
    event: !type:ClearAllOverlaysEvent

- type: entity
  parent: BaseAction
  id: ActionAnimalLayEgg
  name: "Несіть яйце"
  description: "Використовує голод, щоб відкласти яйце."
  components:
  - type: Action
    icon: { sprite: Objects/Consumable/Food/egg.rsi, state: icon }
    useDelay: 60
  - type: InstantAction
    event: !type:EggLayInstantActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionSleep
  name: "Спати"
  description: "Лягай спати."
  components:
  - type: Action
    icon: { sprite: Clothing/Head/Hats/pyjamasyndicatered.rsi, state: icon }
  - type: InstantAction
    event: !type:SleepActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionWake
  name: "Прокидайся"
  description: "Досить спати."
  components:
  - type: Action
    startDelay: true
    useDelay: 2
    icon: { sprite: Clothing/Head/Hats/pyjamasyndicatered.rsi, state: icon }
  - type: InstantAction
    event: !type:WakeActionEvent

- type: entity
  parent: BaseImplantAction
  id: ActionActivateHonkImplant
  name: "Гудок"
  description: "Активує ваш імплант, який видаватиме фірмовий звук клоуна."
  components:
  - type: Action
    icon: { sprite: Objects/Fun/bikehorn.rsi, state: icon }
    useDelay: 1

- type: entity
  parent: BaseAction
  id: ActionFireStarter
  name: "Підпалюй"
  description: "Підпалює ворогів у радіусі навколо вас."
  components:
  - type: Action
    priority: -1
    useDelay: 30
    icon: Interface/Actions/firestarter.png
  - type: InstantAction
    event: !type:FireStarterActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionToggleEyes
  name: "Відкрити/закрити очі"
  description: "Заплющте очі, щоб захистити очі, або розплющте, щоб насолодитися гарними вогнями."
  components:
  - type: Action
    icon: Interface/Actions/eyeopen.png
    iconOn: Interface/Actions/eyeclose.png
    useDelay: 1 # so u cant give yourself and observers eyestrain by rapidly spamming the action
  - type: InstantAction
    event: !type:ToggleEyesActionEvent

- type: entity
  parent: BaseToggleAction
  id: ActionToggleWagging
  name: "Виляння хвостом"
  description: "Почати або припинити виляти хвостом."
  components:
  - type: Action
    icon: { sprite: Mobs/Customization/reptilian_parts.rsi, state: tail_smooth_behind }
    iconOn: { sprite: Mobs/Customization/reptilian_parts.rsi, state: tail_smooth_behind }
    itemIconStyle: NoItem
    useDelay: 1 # emote spam
    checkCanInteract: false

- type: entity
  parent: BaseAction
  id: FakeMindShieldToggleAction
  name: "[color=green]Перемкнути Фальшивий Щит Розуму[/color]"
  description: "Увімкнути/вимкнути передачу імпланта Фальшивого Щита Розуму"
  components:
  - type: Action
    icon: { sprite: Interface/Actions/actions_fakemindshield.rsi, state: icon }
    iconOn: { sprite: Interface/Actions/actions_fakemindshield.rsi, state: icon-on }
    itemIconStyle: NoItem
    useDelay: 1
  - type: InstantAction
    event: !type:FakeMindShieldToggleEvent
  - type: Tag
    tags:
    - FakeMindShieldImplant

- type: entity
  parent: BaseToggleAction
  id: ActionToggleParamedicSiren
  name: "Перемкнути сирену парамедика"
  description: "Вмикає або вимикає сирену парамедика."
  components:
  - type: Action
    icon:
      sprite: Clothing/OuterClothing/Hardsuits/paramed.rsi
      state: icon-siren
    useDelay: 1
    itemIconStyle: BigAction

- type: entity
  parent: BaseAction
  id: ActionGravityJump
  name: "Стрибок"
  description: "Активуючи вдосконалену рушійну систему, ви просуваєтеся на невелику відстань у напрямку свого погляду."
  components:
  - type: Action
    useDelay: 8
    icon:
      sprite: Interface/Actions/jump.rsi
      state: icon
  - type: InstantAction
    event: !type:GravityJumpEvent {}

- type: entity
  parent: BaseToggleAction
  id: ActionToggleRootable
  name: "Вкорінення"
  description: "Почати або припинити бути прикріпленим до підлоги."
  components:
  - type: Action
    icon: Interface/Actions/rooting.png
    iconOn: Interface/Actions/rooting.png
    itemIconStyle: NoItem
    useDelay: 1

- type: entity
  id: ActionChameleonController
  name: "Керування одягом"
  description: "Швидко змініть весь свій одяг!"
  components:
  - type: Action
    priority: -20
    icon: { sprite: Actions/Implants/implants.rsi, state: chameleon }
    itemIconStyle: BigAction
  - type: InstantAction
    event: !type:ChameleonControllerOpenMenuEvent
