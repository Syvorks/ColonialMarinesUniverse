- type: entity
  parent: BaseItem
  id: CMUBaseGasMaskFilter
  abstract: true
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _CMU14/Items/gas_mask_filter.rsi
    layers:
    - state: icon
  - type: Tag
    tags:
    - CMUGasMaskFilter
  - type: GasMaskFilter
    neurotoxinResist: false
    neurotoxinDamageMultiplier: 10 #1 second
    baseIntegrity: 100

- type: entity
  parent: CMUBaseGasMaskFilter
  id: CMUGasMaskFilter
  name: "фільтр газової маски"
  description: "Маленька металева баночка, яка нібито містить активований вугільний фільтр, що запобігає вбиванню ваших легень неприємними частинками в повітрі."

- type: entity
  parent: CMUBaseGasMaskFilter
  id: CMUGasMaskFilterUPP
  name: "фільтр газової маски ШМБ/4"
  description: "Маленька металева баночка. Можливо, також фільтрує забруднювачі повітря. На боці є попереджувальна етикетка про азбест."
  components:
  - type: Sprite
    sprite: _CMU14/Items/gas_mask_filter.rsi
    layers:
    - state: upp

- type: entity
  parent: CMUBaseGasMaskFilter
  id: CMUGasMaskFilterHAZOPS
  name: "фільтр газової маски CBRN"
  description: "Маленька металева баночка, що містить великий шматок періодичної таблиці. Розрахована на середовища з хімічними, біологічними, радіологічними або ядерними небезпеками."
  components:
  - type: GasMaskFilter
    neurotoxinResist: true
    neurotoxinDamageMultiplier: 2.5 # 4 seconds
    baseIntegrity: 100
  - type: Sprite
    sprite: _CMU14/Items/gas_mask_filter.rsi
    layers:
    - state: fancy

- type: entity
  parent: CMUBaseGasMaskFilter
  id: CMUGasMaskFilterWY
  name: "фільтр газової маски WY X-16"
  description: "Маленька металева баночка. Ви не знаєте, що в ній. Вона може фільтрувати хімікати, які ще не були офіційно відкриті."
  components:
  - type: GasMaskFilter
    neurotoxinResist: true
    neurotoxinDamageMultiplier: 1.25 # 8 seconds
    baseIntegrity: 100
  - type: Sprite
    sprite: _CMU14/Items/gas_mask_filter.rsi
    layers:
    - state: wy