# ---- Limb reattachment -----------------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepAmputateLimb
  name: "Ампутувати кінцівку"
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMBoneSaw
    remove:
    - type: CMSkinRetracted
    - type: CMBleedersClamped
    - type: CMIncisionOpen
  - type: CMUSurgeryStepRemoveLimbEffect
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw
  - type: CMSurgeryStepEmoteEffect

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRemoveStump
  name: "Видалити некротичну куксу"
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMBoneSaw
    add:
    - type: CMUStumpRemoved
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepPrepReattachSocket
  name: "Підготувати гніздо для прикріплення"
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMHemostat
    add:
    - type: CMUReattachPrepped
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepReattachLimb
  name: "Прикріпити відірвану кінцівку"
  components:
  - type: CMSurgeryStep
    skill: 2
    add:
    - type: CMUReattachComplete
  - type: CMUSurgeryStepReattachLimbEffect
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepCloseReattach
  name: "Закритий розріз"
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMCautery
    remove:
    - type: CMSkinRetracted
    - type: CMBleedersClamped
    - type: CMIncisionOpen
    - type: CMUStumpRemoved
    - type: CMUReattachPrepped
    - type: CMUReattachComplete
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/cautery.rsi
    state: cautery
  - type: CMSurgeryStepEmoteEffect

