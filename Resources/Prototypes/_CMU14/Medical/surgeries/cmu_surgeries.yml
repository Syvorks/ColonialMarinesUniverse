# ---- Larva extraction (torso, bone-cavity flow) ----------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryAlienEmbryoRemoval
  name: "Видалення прибулецького ембріона"
  description: "Видалення прибулецького ембріона з тіла."
  components:
  - type: CMSurgery
    priority: -1
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMSurgeryStepCutLarvaRoots
    - CMSurgeryStepRemoveLarva
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision
  - type: CMSurgeryLarvaCondition
  - type: CMSurgeryPartCondition
    part: Torso

# ---- Limb reattachment (soft-tissue flow) ----------------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryRemoveLimb
  name: "Видалити кінцівку"
  components:
  - type: CMSurgery
    priority: 2
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepAmputateLimb

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryReattachLimb
  name: "Прикріпити кінцівку"
  components:
  - type: CMSurgery
    priority: 3
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepRemoveStump
    - CMUSurgeryStepPrepReattachSocket
    - CMUSurgeryStepReattachLimb
    - CMUSurgeryStepCloseReattach
