# ---- Access / closure primitives ------------------------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryOpenSoftTissue
  name: "Відкритий розріз"
  components:
  - type: CMSurgery
    steps:
    - CMSurgeryStepOpenIncisionScalpel
    - CMSurgeryStepClampBleeders
    - CMSurgeryStepRetractSkin

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryOpenBoneCavity
  name: "Відкрити кісткову порожнину"
  components:
  - type: CMSurgery
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMSurgeryStepSawBones
    - CMSurgeryStepPriseOpenBones

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCloseIncision
  name: "Закритий розріз"
  components:
  - type: CMSurgery
    priority: 1
    steps:
    - CMUSurgeryStepCloseIncision

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCloseBoneCavity
  name: "Закрити кісткову порожнину"
  components:
  - type: CMSurgery
    priority: 1
    steps:
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision

# ---- Bone setting ----------------------------------------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetSimpleFracture
  name: "Вправити простий перелом"
  components:
  - type: CMSurgery
    priority: 10
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepSetSimpleBone
    - CMUSurgeryStepApplyBoneGel
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetSimpleFractureCavity
  name: "Вправити простий перелом"
  components:
  - type: CMSurgery
    priority: 10
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMUSurgeryStepSetSimpleBone
    - CMUSurgeryStepApplyBoneGel
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetCompoundFracture
  name: "Вправити складний перелом"
  components:
  - type: CMSurgery
    priority: 8
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepRealignCompoundBone
    - CMUSurgeryStepApplyBoneGel
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetCompoundFractureCavity
  name: "Вправити складний перелом"
  components:
  - type: CMSurgery
    priority: 8
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMUSurgeryStepRealignCompoundBone
    - CMUSurgeryStepApplyBoneGel
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetComminutedFracture
  name: "Вправити роздроблений перелом"
  components:
  - type: CMSurgery
    priority: 7
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepRealignComminutedBone
    - CMUSurgeryStepApplyComminutedBoneGel
    - CMUSurgeryStepInsertBoneGraft
    - CMUSurgeryStepFinalizeGraftedBone
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Comminuted

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetComminutedFractureCavity
  name: "Вправити роздроблений перелом"
  components:
  - type: CMSurgery
    priority: 7
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMUSurgeryStepRealignComminutedBone
    - CMUSurgeryStepApplyComminutedBoneGel
    - CMUSurgeryStepInsertBoneGraft
    - CMUSurgeryStepFinalizeGraftedBone
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Comminuted

# ---- Internal-bleed clamp + close ------------------------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCauterizeInternalBleeding
  name: "Зупинити внутрішню кровотечу"
  components:
  - type: CMSurgery
    priority: 7
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepCauterizeBleed
    - CMUSurgeryStepCloseIncision

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCauterizeInternalBleedingCavity
  name: "Зупинити внутрішню кровотечу"
  components:
  - type: CMSurgery
    priority: 7
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMUSurgeryStepCauterizeBleed
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision

