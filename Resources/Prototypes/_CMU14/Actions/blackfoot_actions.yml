- type: entity
  id: ActionBlackfootEngineToggle
  name: "Перемкнути двигуни Блекфута"
  description: "Запустити або зупинити двигуни Блекфута."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootEngineToggleActionEvent
  - type: Action
    icon:
      sprite: _CMU14/Structures/Vehicles/Blackfoot/blackfoot_hud.rsi
      state: integrity
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootTakeoff
  name: "Зліт Блекфута"
  description: "Почати послідовність VTOL-зльоту."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootTakeoffActionEvent
  - type: Action
    icon:
      sprite: _CMU14/Structures/Vehicles/Blackfoot/blackfoot_hud.rsi
      state: fuel
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootLand
  name: "Посадка Блекфута"
  description: "Почати послідовність VTOL-посадки."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootLandActionEvent
  - type: Action
    icon:
      sprite: _CMU14/Structures/Vehicles/Blackfoot/blackfoot_hud.rsi
      state: targeting-reticle
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootFlightModeToggle
  name: "Перемкнути режим польоту Блекфута"
  description: "Перемкнутися між VTOL-зависанням і прямим польотом."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootFlightModeToggleActionEvent
  - type: Action
    icon:
      sprite: _CMU14/Structures/Vehicles/Blackfoot/blackfoot_hud.rsi
      state: battery
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootRearDoorToggle
  name: "Перемкнути задні двері Блекфута"
  description: "Відкрити або закрити задні двері Блекфута."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootRearDoorToggleActionEvent
  - type: Action
    icon:
      sprite: _CMU14/Structures/Vehicles/Blackfoot/interiors/blackfoot.rsi
      state: rear-door-open
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootStowToggle
  name: "Скласти Блекфут"
  description: "Скласти або розгорнути Блекфут, коли він на землі."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootStowToggleActionEvent
  - type: Action
    icon:
      sprite: _CMU14/Structures/Vehicles/Blackfoot/blackfoot_hardpoints.rsi
      state: engines
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootAscendZLevel
  name: "Підйом Блекфута"
  description: "Підняти Блекфут на один Z-рівень."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootAscendZLevelActionEvent
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _CMU14/ZLevels/Actions/misc.rsi
      state: up
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootDescendZLevel
  name: "Спуск Блекфута"
  description: "Опустити Блекфут на один Z-рівень."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootDescendZLevelActionEvent
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _CMU14/ZLevels/Actions/misc.rsi
      state: down
    itemIconStyle: BigItem

- type: entity
  id: ActionBlackfootDoorGunZModeToggle
  name: "Перемкнути Z-вогонь M866"
  description: "Перемкнути M866 між вогнем по поточному Z-рівню та вогнем на один рівень нижче."
  components:
  - type: InstantAction
    event: !type:Content.Shared._CMU14.Blackfoot.BlackfootDoorGunZModeToggleActionEvent
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _CMU14/ZLevels/Actions/misc.rsi
      state: down
    itemIconStyle: BigItem
