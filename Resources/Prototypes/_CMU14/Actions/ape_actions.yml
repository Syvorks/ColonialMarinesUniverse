- type: entity
  parent: ActionXenoBase
  id: ActionApeLeap
  name: "Стрибок"
  description: "Стрибніть до заданого місця і повалите першого ураженого ворога."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 3
  - type: TargetAction
    range: 15
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._CMU14.Ape.ApeLeapActionEvent
  - type: RMCDazeableAction

- type: entity
  parent: ActionXenoBase
  id: ActionApeDestroy
  name: "Знищити"
  description: "Через короткий час стрибніть до цільового місця, знищуючи структури і розчавлюючи ворогів у радіусі 3x3. Працює над барикадами та іншими низькими бар'єрами."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: charge
    useDelay: 60
  - type: TargetAction
    range: 7
    deselectOnMiss: false
  - type: WorldTargetAction
    event: !type:Content.Shared._CMU14.Ape.ApeDestroyActionEvent

- type: entity
  parent: ActionXenoBase
  id: ActionApeCharge
  name: "Заряд"
  description: "Зарядка для мавпи. Натисніть на плитку, щоб замахнутися і кинутися до неї, оглушуючи і завдаючи шкоди ураженим ворогам."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: ready_charge
    useDelay: 14
  - type: TargetAction
    range: 9
    checkCanAccess: false
  - type: WorldTargetAction
    # Use ape-specific charge event
    event: !type:Content.Shared._CMU14.Ape.ApeChargeActionEvent

- type: entity
  parent: ActionXenoFling
  id: ActionApeRam
  name: "Таран"
  description: "Таран для мавпи. Цільтесь у ворога, щоб таранити його, ціною невеликої кількості плазми."
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: fling
    useDelay: 10
  - type: EntityTargetAction
    # Use ape-specific ram event
    event: !type:Content.Shared._CMU14.Ape.ApeRamActionEvent
    toggleOutline: false
  # Ape ram does not consume plasma

- type: entity
  parent: ActionXenoBase
  id: ActionApeHeadbite
  name: "Укус Голови"
  description: "Укус голови для мавпи, що застосовує ефект укусу голови до непритомних цілей."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: headbite
    useDelay: 10
  - type: TargetAction
    range: 1.5
    checkCanAccess: false
    deselectOnMiss: false
  - type: EntityTargetAction
    event: !type:Content.Shared._CMU14.Ape.ApeXenoHeadbiteActionEvent
  - type: ActionBlockIfResting
  - type: XenoOffensiveAction

