- type: entity
  id: CMUActionZLevelUp
  name: "Рух вгору"
  description: "Піднятися на один Z-рівень"
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _CMU14/ZLevels/Actions/misc.rsi
      state: up
  - type: InstantAction
    event: !type:CMUZLevelActionUp

- type: entity
  id: CMUActionZLevelDown
  name: "Рух вниз"
  description: "Спуститися на один Z-рівень"
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _CMU14/ZLevels/Actions/misc.rsi
      state: down
  - type: InstantAction
    event: !type:CMUZLevelActionDown

- type: entity
  id: CMUActionToggleLookUp
  name: "Подивитися вгору"
  description: "Ви піднімаєте голову й дивитеся в небо."
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _CMU14/ZLevels/Actions/misc.rsi
      state: eye
  - type: InstantAction
    event: !type:CMUToggleZLevelLookUpAction
