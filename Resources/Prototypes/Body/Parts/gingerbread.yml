- type: entity
  id: PartGingerbread
  parent: [BaseItem, BasePart]
  name: "частина тіла з імбирного печива"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 3
      - ReagentId: Sugar
        Quantity: 10

- type: entity
  id: TorsoGingerbread
  name: "торс із імбирного печива"
  parent: [PartGingerbread, BaseTorso]
  components:
  - type: Sprite
    sprite: Mobs/Species/Gingerbread/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 10
      - ReagentId: Sugar
        Quantity: 20

