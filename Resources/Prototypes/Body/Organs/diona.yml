- type: entity
  id: BaseDionaOrgan
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Diona/organs.rsi
  - type: Organ
  - type: Food
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people

- type: entity
  id: OrganDionaBrain
  parent: [BaseDionaOrgan, OrganHumanBrain]
  name: "мозок"
  description: "Центральний вузол псевдоневрологічної активності діони, її коренеподібні вусики шукають своє колишнє тіло."
  components:
  - type: Item
    size: Small
    heldPrefix: brain
  - type: Sprite
    state: brain
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100
        canReact: False
      food:
        maxVol: 5
        reagents:
        - ReagentId: GreyMatter
          Quantity: 5

- type: entity
  id: OrganDionaEyes
  parent: BaseDionaOrgan
  name: "очі"
  description: "Я бачу тебе!"
  components:
  - type: Sprite
    layers:
      - state: eyeball-l
      - state: eyeball-r

- type: entity
  id: OrganDionaStomach
  parent: BaseDionaOrgan
  name: "шлунок"
  description: "Діонський еквівалент шлунка, від нього тхне спаржею та оцтом."
  components:
  - type: Sprite
    state: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    maxReagents: 6
    metabolizerTypes: [ Plant ]
    removeEmpty: true
    groups:
      - id: Food
      - id: Drink
      - id: Medicine
      - id: Poison
      - id: Narcotic
      - id: Alcohol
        rateModifier: 0.1
  - type: Item
    size: Small
    heldPrefix: stomach

- type: entity
  id: OrganDionaLungs
  parent: BaseDionaOrgan
  name: "легені"
  description: "Губчастий безлад слизьких листоподібних структур. Здатні дихати і вуглекислим газом, і киснем."
  components:
  - type: Sprite
    state: lungs
  - type: Item
    size: Small
    heldPrefix: lungs
  - type: Lung 
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Plant ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100
        canReact: False

# Organs that turn into nymphs on removal
- type: entity
  id: OrganDionaBrainNymph
  parent: OrganDionaBrain
  categories: [ HideSpawnMenu ]
  name: "мозок"
  description: "Джерело неймовірного, невичерпного інтелекту. Хонк."
  components:
  - type: Brain
  - type: Nymph # This will make the organs turn into a nymph when they're removed. 
    entityPrototype: OrganDionaNymphBrain
    transferMind: true

- type: entity
  id: OrganDionaStomachNymph
  parent: OrganDionaStomach
  categories: [ HideSpawnMenu ]
  name: "шлунок"
  description: "Бридко. Це важко перетравити."
  components:
  - type: Nymph
    entityPrototype: OrganDionaNymphStomach

- type: entity
  id: OrganDionaLungsNymph
  parent: OrganDionaLungs
  categories: [ HideSpawnMenu ]
  name: "легені"
  description: "Фільтрують кисень з атмосфери, після чого той надходить у кровотік і використовується як переносник електронів."
  components:
  - type: Nymph
    entityPrototype: OrganDionaNymphLungs

# Nymphs that the organs will turn into
- type: entity
  id: OrganDionaNymphBrain
  parent: MobDionaNymph
  categories: [ HideSpawnMenu ]
  name: "німфа діони"
  suffix: Brain
  description: "Містить мозок колись повністю сформованої діони. Якщо це вбити, діона загине назавжди. Монстр."
  components:
  - type: IsDeadIC
  - type: Body
    prototype: AnimalNymphBrain

- type: entity
  id: OrganDionaNymphStomach
  parent: MobDionaNymphAccent 
  categories: [ HideSpawnMenu ]
  name: "німфа діони"
  suffix: Stomach
  description: "Містить шлунок колись повністю сформованої діони. На смак від цього вона не краща."
  components:
  - type: IsDeadIC
  - type: Body
    prototype: AnimalNymphStomach

- type: entity
  id: OrganDionaNymphLungs
  parent: MobDionaNymphAccent
  categories: [ HideSpawnMenu ]
  name: "німфа діони"
  suffix: Lungs
  description: "Містить легені колись повністю сформованої діони. Захоплює дух."
  components:
  - type: IsDeadIC
  - type: Body
    prototype: AnimalNymphLungs
