- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseWizardObjective
  components:
  - type: Objective
    # required but not used
    difficulty: 1
    issuer: objective-issuer-swf
  - type: RoleRequirement
    roles:
    - WizardRole

- type: entity
  parent: [BaseWizardObjective, BaseSurviveObjective]
  id: WizardSurviveObjective
  name: "Виживай"
  description: "Федерація Космічних Чарівників хоче, щоб ви жили!"
  components:
  - type: Objective
    icon:
      sprite: Clothing/Head/Hats/wizardhat.rsi
      state: icon

- type: entity
  parent: [BaseWizardObjective, BaseFreeObjective]
  id: WizardDemonstrateObjective
  name: "Покажи себе"
  description: "Влаштуйте станції гарну демонстрацію своїх сил!"
  components:
  - type: Objective
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: fireball
