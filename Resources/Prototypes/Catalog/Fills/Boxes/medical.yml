
- type: entity
  name: "коробка для стерильних масок"
  parent: BoxCardboard
  id: BoxSterileMask
  description: "У цій коробці знаходяться стерильні медичні маски."
  components:
  - type: StorageFill
    contents:
      - id: ClothingMaskSterile
        amount: 4
  - type: Sprite
    layers:
      - state: box
      - state: sterile

- type: entity
  name: "коробка з латексними рукавичками"
  parent: BoxCardboard
