- type: entity
  name: "картонна коробка"
  parent: BoxBase
  id: BoxCardboard
  description: "Невеличка коробка для зберігання речей."
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,2,2
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,2,2
  - type: Sprite
    state: box
  - type: Tag
    tags:
    - BoxCardboard

- type: entity
  name: "коробка з мишоловками"
  parent: BoxCardboard
  id: BoxMousetrap
  description: "Ця коробка наповнена мишоловками. Намагайтеся не застрягти в ній рукою."
  components:
    - type: StorageFill
      contents:
        - id: Mousetrap
          amount: 4
    - type: Sprite
      layers:
        - state: box
        - state: mousetraps

- type: entity
  name: "коробка з лампочками"
  parent: BoxCardboard
  id: BoxLightbulb
  description: "Ця коробка зсередини має таку форму, щоб туди помістилися лише лампочки та трубки."
  components:
  - type: Sprite
    layers:
      - state: box
      - state: light
  - type: Storage
    grid:
    - 0,0,5,3
    whitelist:
      components:
      - LightBulb
  - type: StorageFill
    contents:
      - id: LightBulb
        amount: 12

- type: entity
  name: "коробка з лампами теплого світла"
