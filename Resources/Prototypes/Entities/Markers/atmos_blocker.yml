- type: entity
  name: "Фікс Атмосу: Вакуум"
  id: AtmosFixBlockerMarker
  description: "Вакуум, T20C"
  parent: MarkerBase
  components:
    - type: Sprite
      layers:
        - sprite: Markers/atmos.rsi # {
          state: base
          shader: unshaded
        - sprite: Markers/atmos.rsi
          shader: unshaded # }
          state: vacuum
    - type: AtmosFixMarker
      mode: 1

- type: entity
  name: "Фікс Атмосу: Маркер Кисню"
  id: AtmosFixOxygenMarker
  description: "Кисень @ тиск шахтного газу, T20C"
  parent: MarkerBase
  components:
    - type: Sprite
      layers:
        - sprite: Markers/atmos.rsi # {
          state: base
          shader: unshaded
        - sprite: Markers/atmos.rsi
          shader: unshaded # }
          state: oxygen
    - type: AtmosFixMarker
      mode: 2

- type: entity
  name: "Фікс Атмосу: Маркер Азоту"
