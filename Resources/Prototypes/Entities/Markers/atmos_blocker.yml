  description: "Азот @ тиск шахтного газу, T20C"
  parent: MarkerBase
  components:
    - type: Sprite
      layers:
        - sprite: Markers/atmos.rsi # {
          state: base
          shader: unshaded
        - sprite: Markers/atmos.rsi
          shader: unshaded # }
          state: nitrogen
    - type: AtmosFixMarker
      mode: 3

- type: entity
  name: "Фікс Атмосу: Маркер Плазми"
  id: AtmosFixPlasmaMarker
  description: "Плазма @ тиск шахтного газу, T20C"
  parent: MarkerBase
  components:
    - type: Sprite
      layers:
        - sprite: Markers/atmos.rsi # {
