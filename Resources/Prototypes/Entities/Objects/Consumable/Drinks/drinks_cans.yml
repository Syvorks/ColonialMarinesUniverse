  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: LemonLimeCranberry
          Quantity: 30
      grindable:
        reagents:
        - ReagentId: Aluminium
          Quantity: 4
        - ReagentId: Iron
          Quantity: 1
  - type: Sprite
    sprite: Objects/Consumable/Drinks/lemon-lime-cranberry.rsi
  - type: Item
    sprite: Objects/Consumable/Drinks/lemon-lime-cranberry.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.2
        density: 5
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/punch1.ogg
    embedOnThrow: True
  - type: ThrowingAngle
    angle: 0
  - type: LandAtCursor
  - type: Ammo
    muzzleFlash: null
  - type: Projectile
    deleteOnCollide: false
    onlyCollideWhenShot: true
    damage:
      types:
        Blunt: 1
        Cold: 2 # Refreshing

