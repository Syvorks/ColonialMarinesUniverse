  name: "фляга ГСБ"
  description: "Металева колба, придатна для працьовитих хот-догів."
  components:
  - type: Sprite
    sprite: Objects/Consumable/Drinks/hosflask.rsi

- type: entity
  parent: [FlaskBase, DrinkFlaskVisualsOpenable]
