- type: entity
  parent: [BaseBrandedLighter]
  id: HonkCoFlippo
  name: "Фліппо Honk Co"
  description: "Слизька запальничка-жарт виробництва Honk Co., захована всередині справжньої бананової шкірки."
  components:
  - type: Sprite
    sprite: Objects/Tools/Lighters/honkco.rsi
  - type: Item
    sprite: Objects/Tools/Lighters/honkco.rsi
  - type: ComponentToggler
    components:
    - type: Slippery
    - type: StepTrigger
      intersectRatio: 0.2
    - type: CollisionWake
      enabled: false
    - type: Physics
      bodyType: Dynamic
    - type: Fixtures
      fixtures:
        slips:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.4,-0.3,0.4,0.3"
          layer:
          - SlipLayer
          hard: false
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.4,-0.3,0.4,0.3"
          density: 10
          mask:
          - ItemMask
  - type: Welder #
    fuelConsumption: 0.1
    fuelLitCost: 1
    tankSafe: true
  - type: PointLight
    enabled: false
    netsync: false
    radius: 2
    color: yellow

