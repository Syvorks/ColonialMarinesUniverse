- type: entity
  name: "мішок для руди"
  id: OreBag
  parent: BaseStorageItem
  description: "Міцна сумка для утилізаторів і шахтарів для перенесення великої кількості руди. Прикріплена до поясу, притягує руду, що знаходиться поблизу."
  components:
  - type: MagnetPickup
  - type: Sprite
    sprite: Objects/Specific/Mining/ore_bag.rsi
    state: icon
  - type: Clothing
    sprite: Objects/Specific/Mining/ore_bag.rsi
    quickEquip: false
    slots:
    - belt
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,9,3
    quickInsert: true
    areaInsert: true
    whitelist:
      tags:
        - ArtifactFragment
        - Ore
  - type: Dumpable

- type: entity
  parent: OreBag
  id: BorgOreBag
  name: "вбудована сумка для руди"
  description: "Велика сумка для руди, вбудована в раму шахтарського кіборга."
  components:
    - type: Storage
      grid:
      - 0,0,9,5
