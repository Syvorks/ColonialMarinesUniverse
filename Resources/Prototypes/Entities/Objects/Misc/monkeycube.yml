- type: entity
  parent: BoxCardboard
  name: "коробка з кубиками мавпи"
  id: MonkeyCubeBox
  description: "Кубики-мавпочки бренду Drymate. Просто додайте води!"
  components:
  - type: StorageFill
    contents:
      - id: MonkeyCubeWrapped
        amount: 8
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box

- type: entity
  parent: BaseItem
  abstract: true
  suffix: Wrapped
  id: BaseWrappedCube
  components:
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    sound:
      path: /Audio/Effects/unwrap.ogg
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi

- type: entity
  parent: BaseWrappedCube
  name: "запакований мавпʼячий кубик"
  id: MonkeyCubeWrapped
  description: "Розгорніть його, щоб отримати кубик мавпочки."
  components:
  - type: SpawnItemsOnUse
    items:
    - id: MonkeyCube
  - type: Sprite
    state: wrapper
  - type: Tag
    tags:
    - MonkeyCube

- type: entity
  parent: MonkeyCubeBox
  name: "коробка з кубиками кобольда"
  id: KoboldCubeBox
  description: "Згущені кобольди в кубі. Просто додай води!"
  components:
  - type: StorageFill
    contents:
      - id: KoboldCubeWrapped
        amount: 8
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box_kobold

- type: entity
  parent: MonkeyCubeBox
  name: "варіантивна коробка з кубиками"
  id: VariantCubeBox
  description: "І кубики кобольдів, і кубики мавп. Просто додайте води!"
  components:
  - type: StorageFill
    contents:
      - id: KoboldCubeWrapped
        amount: 4
      - id: MonkeyCubeWrapped
        amount: 4
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box_variant

- type: entity
  parent: BaseWrappedCube
  name: "запакований кобольдський кубик"
  id: KoboldCubeWrapped
  description: "Розгорніть його, щоб отримати кубик кобольда."
  components:
  - type: SpawnItemsOnUse
    items:
      - id: KoboldCube
  - type: Sprite
    state: wrapper_kobold

- type: entity
  parent: MonkeyCubeBox
  name: "коробка з кубиками мавпи"
  suffix: Syndicate
  id: SyndicateSpongeBox
  description: "Кубики-мавпочки бренду Drymate. Просто додайте води!"
  components:
  - type: StorageFill
    contents:
      - id: SyndicateSpongeWrapped
        amount: 6
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box

- type: entity
  parent: MonkeyCubeWrapped
  name: "запакований мавпʼячий кубик"
  suffix: Wrapped, Syndicate
  id: SyndicateSpongeWrapped
  components:
  - type: SpawnItemsOnUse
    items:
      - id: SyndicateSponge
