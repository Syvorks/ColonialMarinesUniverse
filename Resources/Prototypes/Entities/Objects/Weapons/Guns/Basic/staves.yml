- type: entity
  name: "посох зцілення"
  parent: WeaponStaffBase
  id: WeaponStaffHealing
  description: "Ти не передбачаєш, що доведеться часто користуватися цим у своєму кривавому поході."
  components:
  - type: Sprite
    layers:
    - state: healing
  - type: Item
    heldPrefix: healing
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_healing.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileHealingBolt
    capacity: 10
    count: 10
  - type: PacifismAllowedGun

- type: entity
  name: "посох входу"
