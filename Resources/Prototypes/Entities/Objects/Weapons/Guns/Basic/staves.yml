  id: WeaponStaffPolymorphDoor
  description: "На той випадок, коли тобі потрібен шлях для відступу."
  components:
  - type: Sprite
    layers:
    - state: door
  - type: Item
    heldPrefix: door
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_door.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltDoor
    capacity: 10
    count: 10
