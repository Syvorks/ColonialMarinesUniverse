- type: entity
  id: MagazinePistolCaselessRifle
  name: "пістолетний магазин (.25 caseless)"
  parent: BaseMagazinePistolCaselessRifle
  description: "10-зарядний магазин для пістолета Cobra. Призначений для зберігання кінетичних набоїв загального призначення."
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeCaselessRifle
    capacity: 10
  - type: Sprite
    slayers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe

- type: entity
  id: MagazinePistolCaselessRiflePractice
  name: "пістолетний магазин (.25 caseless practice)"
  parent: BaseMagazinePistolCaselessRifle
  description: "10-зарядний магазин для пістолета Cobra. Призначений для зберігання нешкідливих крейдяних набоїв."
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeCaselessRiflePractice
    capacity: 10
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#dbdbdb"
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#dbdbdb"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#dbdbdb"

