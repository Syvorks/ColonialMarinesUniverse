# Empty mags
- type: entity
  id: BaseMagazineLightRifle
  name: "магазин (.30 гвинтівковий)"
  parent: [ BaseItem, BaseSecurityContraband ]
  abstract: true
  components:
  - type: Tag
    tags:
      - MagazineLightRifle
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeLightRifle
    proto: CartridgeLightRifle
    capacity: 30
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/LightRifle/light_rifle_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

# Magazines
- type: entity
  id: MagazineLightRifleBox
  name: "коробка з магазином для L6 SAW (.30 гвинтівковий)"
  parent: BaseMagazineLightRifle
  description: "Коробка, що містить 100-зарядну стрічку з патронами калібру .30, що використовується в легких кулеметах, таких як L6. Призначена для зберігання кінетичних боєприпасів загального призначення."
  components:
  - type: Tag
    tags:
      - MagazineLightRifleBox
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifle
    capacity: 100
  - type: Item
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/LightRifle/light_rifle_box.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 8
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MagazineLightRifle
  name: "магазин (.30 гвинтівковий)"
  parent: BaseMagazineLightRifle
  description: "Вигнутий 30-зарядний дворядний магазин для бойових гвинтівок. Призначений для зберігання кінетичних боєприпасів загального призначення."
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifle
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

- type: entity
  id: MagazineLightRifleEmpty
  name: "магазин (.30 гвинтівковий будь-який)"
  suffix: empty
  parent: MagazineLightRifle
  description: "Вигнутий 30-зарядний дворядний магазин для бойових гвинтівок."
