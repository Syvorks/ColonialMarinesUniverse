- type: entity
  id: BaseCartridgeCaselessRifle
  name: "патрон (.25 caseless)"
  parent: [ BaseCartridge, BaseSecurityContraband ]
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - CartridgeCaselessRifle
  - type: CartridgeAmmo
    deleteOnSpawn: true
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 10

- type: entity
  id: CartridgeCaselessRifle
  name: "патрон (.25 caseless)"
  parent: BaseCartridgeCaselessRifle
  description: "Малий калібр, що використовує безгільзову технологію, відмовляючись від традиційної латунної гільзи на користь затверділого метального заряду. Стандартні кінетичні набої поширені й корисні в більшості ситуацій."
  components:
  - type: CartridgeAmmo
    proto: BulletCaselessRifle

- type: entity
  id: CartridgeCaselessRiflePractice
  name: "патрон (.25 caseless practice)"
  parent: BaseCartridgeCaselessRifle
  description: "Малий калібр, що використовує безгільзову технологію, відмовляючись від традиційної латунної гільзи на користь затверділого метального заряду. Крейдяні набої зазвичай нешкідливі та використовуються для тренувань."
  components:
  - type: CartridgeAmmo
    proto: BulletCaselessRiflePractice
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#dbdbdb"
