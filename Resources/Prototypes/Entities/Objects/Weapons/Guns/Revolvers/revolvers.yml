- type: entity
  name: "BaseWeaponRevolver"
  parent: BaseItem
  id: BaseWeaponRevolver
  description: "Корінцевий зубастий і пагонистий."
  abstract: true
  components:
  - type: Sprite
    state: icon
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Tag
    tags:
    - Sidearm
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/deckard.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: AmmoCounter
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 1.5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/revolver.ogg
  - type: UseDelay
    delay: 0.66
  - type: ContainerContainer
    containers:
      revolver-ammo: !type:Container
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - CartridgeMagnum
        - SpeedLoaderMagnum
    proto: CartridgeMagnum
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
    soundEject:
      path: /Audio/Weapons/Guns/MagOut/revolver_magout.ogg
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/revolver_magin.ogg
  - type: StaticPrice
    price: 500

- type: entity
  name: "Декард"
  parent: [BaseWeaponRevolver, BaseSecurityCommandContraband]
  id: WeaponRevolverDeckard
  description: "Прекрасно виготовлений, створений на замовлення револьвер. Використовується, коли немає часу на тест Войта-Кампфа. Заряджається 5 патронами .45 magnum."
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/deckard.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Gun
    fireRate: 2
  - type: RevolverAmmoProvider
    capacity: 5
    chambers: [ True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 1500

- type: entity
  name: "Інспектор"
  parent: [BaseWeaponRevolver, BaseSecurityContraband]
  id: WeaponRevolverInspector
  description: "Однозарядний револьвер, вироблений різними компаніями. Він широко доступний на цивільному ринку, що робить його популярним вибором серед приватних детективів. Ти почуваєшся щасливчиком, просто тримаючи його в руках. Заряджається 6 набоями .45 magnum."
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/inspector.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/inspector.rsi
  - type: RevolverAmmoProvider
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]

- type: entity
  name: "Матеба"
  parent: [BaseWeaponRevolver, BaseMajorContraband]
  id: WeaponRevolverMateba
  description: "Сучасний револьвер, який використовує елітний, майже міфічний оперативний загін «Ескадрон смерті» Нанотрейзен. Його унікальний спусковий механізм і розташування ствола забезпечують високу скорострільність з мінімальним підкиданням. Багато хто дивився в цей ствол, але мало хто лишився живим, щоб про це розповісти. Заряджається 6 набоями .45 magnum."
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/mateba.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/mateba.rsi
  - type: Gun
    fireRate: 3
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mateba.ogg

- type: entity
  parent: WeaponRevolverMateba
  id: WeaponRevolverMatebaAP # For deathsquad
  suffix: armor-piercing
  components:
  - type: RevolverAmmoProvider
    proto: CartridgeMagnumAP

- type: entity
  name: "Пітон"
  parent: [BaseWeaponRevolver, BaseSyndicateContraband]
  id: WeaponRevolverPython
  description: "Потужний револьвер подвійної дії, виготовлений Синдикатом. Гучний і ефектний, ідеально підходить будь-якому агенту, який хоче зробити заяву. Заряджається 6 набоями .45 magnum."
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/python.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/python.rsi
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 2
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/revolver.ogg
      params:
        volume: 2.25
  - type: StaticPrice
    price: 1500 # Botany can shit these out like candy, but let's see how it goes

- type: entity
  parent: WeaponRevolverPython
  id: WeaponRevolverPythonAP # For the uplink.
  suffix: armor-piercing
  components:
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - CartridgeMagnum
        - SpeedLoaderMagnum
    proto: CartridgeMagnumAP


- type: entity
  name: "піратський револьвер"
  parent: [BaseWeaponRevolver, BaseMajorContraband]
  id: WeaponRevolverPirate
  description: "Грубий револьвер одинарної дії, зроблений власноруч космічним піратом. Старий і вкритий іржею, він якимось дивом досі працює. Заряджається 5 патронами .45 magnum."
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/pirate_revolver.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/pirate_revolver.rsi
  - type: Gun
    fireRate: 1
  - type: ContainerContainer
    containers:
      revolver-ammo: !type:Container
  - type: RevolverAmmoProvider
    capacity: 5
    chambers: [ True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null ]

- type: entity
  parent: WeaponRevolverPirate
  id: WeaponRevolverPirateEmpty
  suffix: Empty
  components:
  - type: RevolverAmmoProvider
    proto: null
    capacity: 5
    chambers: [ null, null, null, null, null ]
    ammoSlots: [ null, null, null, null, null ]

