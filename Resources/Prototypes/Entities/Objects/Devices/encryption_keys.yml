- type: entity
  abstract: true
  parent: BaseItem
  id: EncryptionKey
  name: "ключ шифрування"
  description: "Невеликий шифрувальний чіп для гарнітури."
  components:
  - type: EncryptionKey
  - type: Item
    sprite: Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: Objects/Devices/encryption_keys.rsi

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyCommon
  name: "загальний ключ шифрування"
  description: "Ключ шифрування, яким може користуватися будь-хто."
  components:
  - type: EncryptionKey
    channels:
    - Common
    defaultChannel: Common
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label
  - type: Tag
    tags:
    - EncryptionCommon

- type: entity
  parent: [ EncryptionKey, BaseCargoContraband ]
  id: EncryptionKeyCargo
  name: "вантажний ключ шифрування"
  description: "Ключ шифрування, що використовується співробітниками відділу постачання."
  components:
  - type: EncryptionKey
    channels:
    - Supply
    defaultChannel: Supply
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: cargo_label
  - type: Tag
    tags:
    - EncryptionCargo

- type: entity
  parent: [ EncryptionKey, BaseCentcommContraband ]
  id: EncryptionKeyCentCom
  name: "ключ шифрування центральної команди"
  description: "Ключ шифрування, яким користується начальство капітана."
  components:
  - type: EncryptionKey
    channels:
    - CentCom
    defaultChannel: CentCom
  - type: Sprite
    layers:
    - state: crypt_blue
    - state: nano_label

- type: entity
  parent: [ EncryptionKey, BaseCentcommCommandContraband ]
