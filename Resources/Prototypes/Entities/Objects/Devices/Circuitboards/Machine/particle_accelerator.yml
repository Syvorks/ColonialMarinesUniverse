- type: entity
  id: MachineParticleAcceleratorEndCapCircuitboard
  parent: BaseMachineCircuitboard
  name: "плата кінцевої кришки ПЧ"
  description: "Машинна плата для кінцевої кришки прискорювача частинок."
  components:
    - type: Sprite
      state: engineering
    - type: MachineBoard
      prototype: ParticleAcceleratorEndCapUnfinished
      stackRequirements:
        Glass: 15
        Steel: 15

- type: entity
  id: MachineParticleAcceleratorFuelChamberCircuitboard
  parent: BaseMachineCircuitboard
  name: "плата паливної камери ПЧ"
  description: "Машинна плата для паливної камери прискорювача частинок."
  components:
    - type: Sprite
      state: engineering
    - type: MachineBoard
      prototype: ParticleAcceleratorFuelChamberUnfinished
      componentRequirements:
        AmeFuelContainer:
          amount: 1
          defaultPrototype: AmeJar
      stackRequirements:
        Glass: 10
        Steel: 10

