  name: "гарнітура"
  description: "Оновлений модульний інтерком, що одягається на голову. Приймає ключі шифрування."
  components:
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
  - type: Headset
  - type: EncryptionKeyHolder
    keySlots: 4
