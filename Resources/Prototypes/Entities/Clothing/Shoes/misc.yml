- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesSnakeskinBoots
  name: "чоботи зі зміїної шкіри"
  description: "Чоботи з високоякісної зміїної шкіри, усі навколо тобі заздритимуть."
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Misc/snakeskin.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Misc/snakeskin.rsi
  - type: NoSlip

- type: entity
  parent: [ClothingShoesBase, PowerCellSlotSmallItem, BaseToggleClothing]
  id: ClothingShoesBootsSpeed
  name: "чоботи швидкості"
  description: "Високотехнологічні чоботи, сплетені з квантових волокон, здатні перетворювати електрику на чисту швидкість!"
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/speedboots.rsi
    layers:
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: Clothing/Shoes/Boots/speedboots.rsi
  - type: ToggleClothing
    action: ActionToggleSpeedBoots
  - type: ClothingSpeedModifier
    walkModifier: 1.5
    sprintModifier: 1.5
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon-on}
          False: {state: icon}
  - type: StaticPrice
    price: 500
  - type: PowerCellDraw
    drawRate: 4
  - type: ToggleCellDraw
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
  - type: Tag
    tags: []

- type: entity
  parent: BaseAction
  id: ActionToggleSpeedBoots
  name: "Перемкнути чоботи швидкості"
  description: "Вмикає або вимикає чоботи швидкості."
  components:
  - type: Action
    itemIconStyle: BigItem
  - type: InstantAction
    event: !type:ToggleActionEvent

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesBootsMoon
  name: "місячні чоботи"
  description: "Спеціальні антигравітаційні чоботи, розроблені з особливою сумішшю гелю з місячної породи. Постачаються з Нідерландів."
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/moonboots.rsi
    layers:
    - state: icon
  - type: Clothing
    sprite: Clothing/Shoes/Boots/moonboots.rsi
  - type: AntiGravityClothing
  - type: StaticPrice
    price: 75
  - type: Tag
    tags: [ ]
   
- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesBootsJump
  name: "стрибкові чоботи"
  description: "Високотехнологічні чоботи, що дають тобі неймовірну здатність СТРИБАТИ! У цих чоботях можна перестрибувати лаву, провалля та дивну хімію на підлозі!"
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/jumpboots.rsi
    layers:
    - state: icon
  - type: Clothing
    sprite: Clothing/Shoes/Boots/jumpboots.rsi
  - type: JumpAbility
    jumpDistance: 4
    jumpSound: /Audio/Effects/stealthoff.ogg
  - type: ActionGrant
    actions:
    - ActionGravityJump 
  - type: ItemActionGrant
    actions:
    - ActionGravityJump
    activeIfWorn: true
  - type: StaticPrice
    price: 220
  - type: Tag
    tags: []
