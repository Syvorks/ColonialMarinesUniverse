- type: entity
  parent: Clothing
  id: ClothingNeckStethoscope
  name: "стетоскоп"
  description: "Застарілий медичний прилад для прослуховування звуків людського тіла. Також він робить тебе схожим на того, хто знає, що робить."
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: Clothing/Neck/Misc/stethoscope.rsi
    state: icon
  - type: Clothing
    sprite: Clothing/Neck/Misc/stethoscope.rsi
    quickEquip: true
    slots:
    - neck
  - type: Stethoscope

- type: entity
  parent: BaseAction
  id: ActionStethoscope
  name: "Слухати стетоскопом"
  components:
  - type: Action
    icon:
      sprite: Clothing/Neck/Misc/stethoscope.rsi
      state: icon
    priority: -1
    itemIconStyle: BigAction
    checkCanInteract: false
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:StethoscopeActionEvent

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckBling
  name: "блискіт"
  description: "Чорт забирай, як же добре бути гангстером."
  components:
  - type: Sprite
    sprite: Clothing/Neck/Misc/bling.rsi
  - type: Clothing
    sprite: Clothing/Neck/Misc/bling.rsi
  - type: Item
    sprite: Clothing/Neck/Misc/bling.rsi

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckLawyerbadge
  name: "значок адвоката"
  description: "Значок, що показує, що власник є 'законним' адвокатом, який склав іспит колегії НТ, необхідний для юридичної практики."
  components:
  - type: Sprite
    sprite: Clothing/Neck/Misc/lawyerbadge.rsi
  - type: Clothing
    sprite: Clothing/Neck/Misc/lawyerbadge.rsi
  - type: TypingIndicatorClothing
    proto: lawyer

- type: entity
  parent: ClothingNeckBase
  id: Dinkystar
  name: "наліпка-зірка"
  description: "Квола маленька зірочка лише для найпрацьовитіших офіцерів служби безпеки! Вона вже навіть не липне."
  components:
  - type: Sprite
    sprite: Clothing/Neck/Misc/dinkystar.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Trash
    - WhitelistChameleon
