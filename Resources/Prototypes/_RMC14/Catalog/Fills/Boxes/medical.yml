- type: entity
  name: "коробка для стерильних масок"
  parent: RMCBoxCardboard
  id: RMCBoxSterileMask
  description: "У цій коробці знаходяться стерильні медичні маски."
  components:
  - type: StorageFill
    contents:
      - id: CMMaskSterile
        amount: 7
  - type: Sprite
    state: sterile

- type: entity
  name: "коробка з латексними рукавичками"
  parent: RMCBoxCardboard
  id: RMCBoxLatexGloves
  description: "Містить стерильні латексні рукавички."
  components:
  - type: StorageFill
    contents:
      - id: CMHandsLatex
        amount: 7
  - type: Sprite
    state: latex

- type: entity
  name: "коробка з мішками для трупів"
  parent: RMCBoxCardboard
  id: RMCBoxBodyBag
  description: "Містить мішки для трупів."
  components:
  - type: StorageFill
    contents:
      - id: CMBodyBagFolded
        amount: 7
  - type: Sprite
    state: bodybags
    whitelist:
      tags:
        - BodyBag

- type: entity
  name: "коробка пляшечок для пігулок"
  parent: RMCBoxCardboard
  id: RMCBoxPillCanister
  description: "На передній стороні намальовані картинки пляшечок для пігулок."
  components:
  - type: StorageFill
    contents:
      - id: CMPillCanister
        amount: 7
  - type: Sprite
    state: pillbox
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,13,1
    areaInsert: true
    areaInsertRadius: 1
    whitelist:
      tags:
      - PillCanister
  - type: RMCPillBottleTransfer
  - type: IgnoreContentsSize
    items:
      tags:
      - PillCanister

- type: entity
  name: "коробка шприців"
  parent: RMCBoxCardboard
  id: RMCBoxSyringe
  description: "На коробці нанесено попередження про біонебезпеку"
  components:
  - type: StorageFill
    contents:
      - id: CMSyringe
        amount: 7
  - type: Sprite
    state: syringe

- type: entity
  name: "коробка мензурок"
  parent: RMCBoxCardboard
  id: RMCBoxBeaker
  description: "Це звичайна коробка."
  components:
  - type: StorageFill
    contents:
      - id: CMBeaker
        amount: 7
  - type: Sprite
    state: beaker
