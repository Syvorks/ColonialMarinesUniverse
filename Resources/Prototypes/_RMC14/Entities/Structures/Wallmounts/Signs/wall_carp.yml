- type: entity
  parent: BaseSign
  id: AUWallCarp
  name: "настінний карп"
  description: "Спійманий під час міграції вгору."
  components:
  - type: WallMount
    arc: 360
  - type: Sprite
    drawdepth: WallTops
    sprite: _RMC14/Structures/Wallmounts/wall_carp.rsi
    state: wall_carp
    snapCardinals: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/poster_broken.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          AUWallCarpDamaged:
            min: 1
            max: 1
        offset: 0

- type: entity
  parent: AUWallCarp
  id: AUWallCarpDamaged
  name: "порожня табличка"
  description: "І куди ж той карп подівся?"
  components:
  - type: Sprite
    drawdepth: WallTops
    state: wall_carp_damaged
    snapCardinals: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/poster_broken.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          AUWallCarpBroken:
            min: 1
            max: 1
        offset: 0

- type: entity
  parent: AUWallCarp
  id: AUWallCarpBroken
  name: "розбита табличка"
  description: ""
  components:
  - type: Sprite
    drawdepth: WallTops
    state: wall_carp_broken
    snapCardinals: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/poster_broken.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
