# Sorokyne Rock
- type: entity
  parent: CMPlatform
  id: RMCPlatformStrataRock
  name: "кам'яний край"
  description: "Цільний шмат пустельних скель. Виглядає так, ніби на нього можна вилізти з певними труднощами."
  components:
  - type: Sprite
    state: strata_rock_platform
  - type: Construction
    graph: RMCPlatformStrataRockDestructible
    node: start

- type: entity
  parent: CMPlatformBroken
  id: RMCPlatformStrataRockBroken
  name: "зруйнований кам'яний край"
  description: "Цільний шмат пустельних скель. Виглядає так, ніби на нього можна вилізти з певними труднощами. Він був зруйнований."
  components:
  - type: Sprite
    state: strata_rock_platform_broken
  - type: Construction
    graph: RMCPlatformStrataRockDestructible
    node: platformBroken

- type: entity
  parent: RMCPlatformCornerSmall
  id: RMCPlatformStrataRockCornerSmall
  name: "кам'яний кут"
  description: "Цільний шмат пустельних скель."
  components:
  - type: Sprite
    state: strata_rock_platform_deco
