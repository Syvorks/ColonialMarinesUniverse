# Sorokyne Strata

- type: entity
  parent: CMPlatform
  id: RMCPlatformStrata
  name: "піднятий металевий край"
  description: "Підвищений рівень металу, який часто використовують для піднесення ділянок над іншими. Ймовірно, на нього можна забратися."
  components:
  - type: Sprite
    state: strata_metalplatform
  - type: Construction
    graph: RMCPlatformStrataDestructible
    node: start

- type: entity
  parent: CMPlatformBroken
  id: RMCPlatformStrataBroken
  components:
