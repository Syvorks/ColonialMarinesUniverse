  description: "Це телефонна будка, застаріла, але надійна технологія. Використовуються для зв'язку в межах колонії та між під'єднаними колоніями без перешкод. Здається, вона повністю розбита, заюшена кров'ю, скло потрощене. Ховатися всередині безглуздо."
  abstract: true
  components:
  - type: Transform
