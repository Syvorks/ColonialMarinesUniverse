# Base

- type: entity
  parent: BaseStructureDynamic
  id: RMCPhoneboxBase
  name: "телефонна будка"
  description: "Це телефонна будка, застаріла, але надійна технологія. Використовуються для зв'язку в межах колонії та між під'єднаними колоніями без перешкод. Хоч і надійні, схоже, лінія не працює."
  abstract: true
  components:
  - type: Transform
    noRot: true
    anchored: true
  - type: Sprite
    noRot: true
    sprite: _RMC14/Structures/Storage/Closets/phonebox_off.rsi
    offset: 0.15,0.5
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: base
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: ItemSlots
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.48,0.25,0.48"
        density: 75
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: EntityStorage
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
      paper_label: !type:ContainerSlot
  - type: InsertBlacklist
    blacklist:
      components:
      - Xeno
  - type: Anchorable
    flags:
    - None
  - type: PlaceableSurface
    placeCentered: true
    isPlaceable: false
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6

# Broken Base

- type: entity
