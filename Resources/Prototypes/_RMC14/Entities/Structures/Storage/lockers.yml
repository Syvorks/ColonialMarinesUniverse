# Base
- type: entity
  parent: CMClosetBase
  id: CMLockerBase
  name: "захищена шафа"
  description: "Це нерухома шафа із замком на картку."
  components:
  - type: VehicleSmashable
  - type: Sprite
    sprite: _RMC14/Structures/Storage/Lockers/standard.rsi
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: paper
      visible: false
      sprite: Structures/Storage/closet_labels.rsi
      offset: "-0.065,0"
      map: [ "enum.PaperLabelVisuals.Layer" ]
  - type: Appearance
  - type: LockVisuals
  - type: EntityStorageVisuals
    stateBaseClosed: base
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: AccessReader
  - type: Lock
  - type: XenoCrusherChargable
    instantDestroy: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.48,0.25,0.48"
        density: 75
        mask:
        - MachineMask
        layer:
        - MachineLayer
        - BulletImpassable

