- type: entity
  parent: CMClosetBase
  id: CMCoffin
  name: "труна"
  description: "Це похоронна посудина для дорогих небіжчиків."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Storage/Coffins/standard.rsi
    layers:
    - state: closed
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: closed
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1: # TODO RMC14 wood material
            min: 1
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: CMCoffin
  id: CMCoffinMarine
  name: "Труна морпіха"
  description: "Похоронна посудина для дорогих загиблих морпіхів, оздоблена червоним і завершена емблемою Корпусу всередині. Semper fi."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Storage/Coffins/marine.rsi

- type: entity
  parent: CMCoffin
  id: CMCoffinPred
  name: "дивна труна"
  description: "Це похоронна посудина для дорогих небіжчиків. Здається, на боці якісь дивні позначки..?"
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Storage/Coffins/pred.rsi
