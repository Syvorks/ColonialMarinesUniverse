- type: entity
  id: XenoTunnel
  name: "Тунель"
  description: "Вхід у тунель. Схоже, його вирила якась пазуриста тварюка."
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/xeno_tunnel.rsi
    state: hole
    noRot: true
  - type: InteractionOutline
  - type: Clickable
  - type: RMCNightVisionVisible
    priority: -1
    transparency: 0.2
  - type: DestroyedByExplosionType
    explosion: RMCOBXenoTunnel
  - type: RMCMesonsNonviewable
    xenoVisible: true
  - type: XenoTunnel
  - type: XenoStructureMapTracked
  - type: TacticalMapTracked
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: xenotunnel
  - type: TacticalMapAlwaysVisible
    visibleToXenos: true
    visibleAsXenoStructure: true
    visibleToMarines: false
  - type: UserInterface
    interfaces:
      enum.SelectDestinationTunnelUI.Key:
        type: SelectDestinationTunnelBui
      enum.NameTunnelUI.Key:
        type: NameTunnelBui
  - type: DeletedByWeedKiller
  - type: XenoFriendly
  - type: RMCTrackable

- type: entity
  parent: XenoTunnel
  id: XenoTunnelMaint
  name: "Технічний люк"
  description: "Вхід у технічний тунель. Видно шматки слизу та смоли. Уламки не дають роздивитися ближче."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/xeno_tunnel.rsi
    state: maintenancehatch_alt

- type: entity
  parent: XenoTunnelMaint
  id: XenoTunnelMaintNoXenoDesc
  description: "Вхід у технічний тунель. Уламки не дають роздивитися ближче."
  suffix: No Xeno Desc

- type: entity
  parent: XenoTunnelMaint
  id: XenoTunnelMaintHybrisa
  name: "Каналізаційний люк"
  components:
  - type: Sprite
    state: wymanhole

- type: entity
  parent: XenoTunnelMaintNoXenoDesc
  id: XenoTunnelMaintHybrisaNoXenoDesc
  name: "Каналізаційний люк"
  components:
  - type: Sprite
    state: wymanhole
