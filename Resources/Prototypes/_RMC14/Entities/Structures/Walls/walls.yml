# Reinforced
- type: entity
  parent: CMBaseWall
  id: RMCBaseWallReinforced
  name: "укріплена стіна"
  description: "Велетенський шмат укріпленого металу, що використовується для розділення кімнат."
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Walls/rwall.rsi
  - type: Icon
    sprite: _RMC14/Structures/Walls/rwall.rsi
  - type: Tag
    tags:
    - Wall
  - type: ReceiverXenoClaws
    maxHealth: 9000
    minimumClawStrength: VerySharp
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 9000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: walls
    additionalKeys:
    - windows
    - doors
    base: rwall
  - type: Construction
