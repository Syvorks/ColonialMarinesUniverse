# Standard
- type: entity
  parent: CMBaseWall
  id: CMWallMetal
  name: "стіна"
  description: "Велетенський шмат металу, що використовується для розділення кімнат."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Walls/metal.rsi
  - type: Icon
    sprite: _RMC14/Structures/Walls/metal.rsi
  - type: Tag
    tags:
    - Wall
  - type: ReceiverXenoClaws
    maxHealth: 3000
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 3000
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: girder
        - !type:DoActsBehavior
          acts: ["Breakage"]
  - type: IconSmooth
    key: walls
    additionalKeys:
    - windows
    - doors
    base: metal
  - type: Construction
    graph: CMGirder
    node: wall
  - type: XenoCrusherChargable
    setDamage:
      types:
        Structural: 750

