- type: entity
  parent: RMCBarricadeSnow
  id: sandMound
  name: "піщаний насип"
  description: "Купа піску, яку можна використати як укриття. Статистично краща за тонке повітря як укриття."
  components:
  - type: Sprite
    color: "#cc7939"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/Footsteps/hardbarefoot5.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: XenoToggleChargingDamage
    sound:
      path: /Audio/Effects/Footsteps/hardbarefoot5.ogg #between hardbarefoot5 and carpet4
