- type: entity
  parent: CMBarricadeBase
  id: RMCBarricadeWood
  name: "дерев'яна барикада"
  description: "Стіна з дерев'яних дощок, збитих цвяхами. Не дуже міцна, але може забезпечити певне укриття."
  components:
  - type: VehicleSmashable
  - type: Sprite
    drawdepth: WallTops
    sprite: _RMC14/Structures/Walls/Barricades/barricade.rsi
    layers:
    - state: wooden
    - map: [ "acided" ]
  - type: Appearance
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: NailgunRepairable
    # cm13 max_health%: 1
    repairWood: 100
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          RMCPlankWood1:
            min: 3
            max: 3
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: BarricadeWoodGraph
    node: nodeWood
  - type: XenoToggleChargingDamage
    sound:
      collection: WoodDestroy
    damage:
      types:
        Blunt: 22
    destroy: true
  - type: XenoCrusherChargable
    instantDestroy: true
  - type: Climbable
  - type: BarricadeBlock
    bidirectional: true
    blocking: 45
