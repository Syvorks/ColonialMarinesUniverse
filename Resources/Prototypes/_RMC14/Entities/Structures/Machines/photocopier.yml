- type: entity
  parent: BaseMachinePowered
  abstract: true
  id: RMCBasePhotocopier
  name: "Ксерокс"
  description: "Ксерокс для копіювання... ну, фотографій! Також корисний для копіювання документів на папері. Цю конкретну модель виготовила AEGIS Armaments у дешевшій оправі, ніж більшість сучасних ксероксів. Використовує примітивнішу технологію копіювання, що призводить до більших витрат тонера й менших можливостей друку. Втім, дешева конструкція означає нижчу вартість, а для тих, кому здебільшого потрібно надрукувати один-два аркуші, це економічно вигідно."
  components:
  - type: Transform
    anchored: false
    noRot: true
  - type: Physics
    bodyType: Static
  - type: ApcPowerReceiver
    needsPower: false # TODO RMC14
    powerLoad: 0
  - type: LitOnPowered
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.45,0.25,0.45"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCBasePhotocopier
  id: RMCPhotocopier
  name: "Ксерокс"
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    drawdepth: Objects
    state: bigscanner
  - type: Icon
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    state: bigscanner

- type: entity
  parent: RMCPhotocopier
  id: RMCPhotocopierSmallHitbox
  suffix: Smaller
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.05,0.4,0.05"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200

- type: entity
  parent: RMCBasePhotocopier
  id: RMCPhotocopierPro
  name: "Ксерокс «Ве-Ю»"
  description: "Ксерокс для копіювання... ну, фотографій! Також корисний для копіювання документів на папері. Цю конкретну модель виготовила «Ве-Ю» в сучаснішій і міцнішій оправі, ніж пересічні ксерокси з менших компаній. Використовує одні з найпередовіших технологій у галузі друку на папері: більшу економію тонера і набагато вищі можливості друку. Усе це робить його улюбленцем серед споживачів, яким потрібно щодня друкувати велику кількість документів."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    drawdepth: Objects
    state: bigscannerpro
  - type: Icon
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    state: bigscannerpro
