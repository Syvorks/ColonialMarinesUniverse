- type: entity
  id: RMCAICore
  name: "ARES v3.2"
  description: "Це система штучного інтелекту корабля «Алмаєр» ООН. Як і багато інших військових систем ШІ, цю виготовила «Ве-Я»."
  placement:
    mode: SnapgridCenter
  components: #has no collission in 13 they have invisible walls behind it
  - type: InteractionOutline
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: ApcPowerReceiver
    powerLoad: 250
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 5
    activeLoad: 10
    channel: Equipment
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicore.rsi
    layers:
    - state: hydra-off
    - state: hydra
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000 # Okey hear me out down there... Health is 1000 in 13 but you can go over 1000+ and it goes on...
#      behaviors:
#      - !type:DoActsBehavior Commented this part out because in 13 after 200+ damage it fucking explodes
#        acts: [ "Destruction" ] Explosion does not destroy it and just disables it till a AI techie arrives(admin)
# to fix the AI core. Leaving it here for now because of that

- type: entity
  id: RMCAICoreProcessor
  name: "Процесор ARES"
  description: "Зовнішній процесор для ARES, що використовується для обробки величезних обсягів інформації."
  placement:
    mode: SnapgridCenter
  components: #has no collission in 13 they have invisible walls behind it
  - type: InteractionOutline
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: ApcPowerReceiver
    powerLoad: 250
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 5
    activeLoad: 10
    channel: Equipment
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    layers:
    - state: processor_off
    - state: processor
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000 # Okey hear me out down there... Health is 1000 in 13 but you can go over 1000+ and it goes on...
#      behaviors:
#      - !type:DoActsBehavior
#        acts: [ "Destruction" ]

- type: entity
  id: RMCAICoreProcessorBioscan
  parent: RMCAICoreProcessor
  name: "Процесор ARES (Біоскан)"
  description: "Зовнішній компонент систем біосканування ARES. Без цього корабель «Алмаєр» ООН не зміг би проводити біосканування!"
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    layers:
    - state: bio_processor_off
    - state: bio_processor
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  id: RMCAICoreProcessorInterface
  parent: RMCAICoreProcessor
  name: "Процесор ARES (Інтерфейс)"
  description: "Зовнішній процесор для ARES; цей виконує основні процеси для взаємодії з екіпажем, включно з радіопередачами та трансляціями."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    layers:
    - state: bio_processor_off
    - state: bio_processor
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  id: RMCAICoreProcessorHERMES
  parent: RMCAICoreProcessor
  name: "Процесор ARES (HERMES)"
  description: "Зовнішній компонент процесора HERMES ARES. Передусім відповідає за координацію Average Joes і дронів обслуговування. Точно не було вкрадено в Novaris Industries."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    layers:
    - state: apollo_processor_off
    - state: apollo_processor
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  id: RMCAICoreCPU
  parent: RMCAICoreProcessor
  name: "ЦП ARES"
  description: "Це центральний процесор ARES. Виконаний у корпусі, що витримує ядерні вибухи; ЦП також містить реєстратор чорної скриньки ARES."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    layers:
    - state: cpu_off
    - state: cpu
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  id: RMCAICoreSubstrate
  parent: RMCAICoreProcessor
  name: "Субстрат ARES"
  description: "Субстрат пам'яті ARES, що містить складні протоколи й інформацію. Обмежені можливості можуть працювати лише на субстраті без функціонуючого основного блоку ARES."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    layers:
    - state: substrate_off
    - state: substrate
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCAIConsoleARES
  name: "Інтерфейс ARES"
  description: "Консоль, побудована для взаємодії з ARES, що дозволяє спілкування 1:1."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    state: console
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false # Intentional

- type: entity
  parent: RMCAIConsoleARES
  id: RMCAIConsoleInterface
  name: "консоль інтерфейсу ШІ"
  description: "Великий, громіздкий комп'ютер, призначений дати користувачу можливість взаємодіяти з ШІ корабля."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/aiconsoleinterface.rsi
    state: console
    offset: 0, -0.55

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCAIConsoleHERMES
  name: "Контролер обслуговування HERMES"
  description: "Консоль, побудована для полегшення роботи Average Joes, що дозволяє просто розподіляти ресурси."
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _RMC14/Structures/Machines/AIStuff/aicoremachinery.rsi
    state: console
    layers: [ ]
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false # Intentional
