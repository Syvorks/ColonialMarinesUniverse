- type: entity
  parent: RMCGunRackBase
  id: RMCGunRackM42A2Empty
  name: "збройний стелаж M42A2"
  suffix: M42A2, Empty
  description: "Виготовлений AEGIS збройний стелаж для зберігання довгої зброї. Хоча початкова модель мала бути дуже модифікованою, ОНМП замовили стелажі з фіксованими слотами, у які поміщаються лише дробовики M42A2. Дехто каже, вони дешевші, інші — що головна причина в тому, що морпіхи легко ламають усе складніше за вольфрамову кульку."
  components:
  - type: ContainerContainer
    containers:
      item_1: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
      item_2: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/GunRacks/m42a2_rack.rsi
  - type: ItemSlots
    slots:
      item_1:
        name: M42A2
        whitelist:
          tags:
          - RMCWeaponShotgunM42A2
      item_2:
        name: M42A2
        whitelist:
          tags:
          - RMCWeaponShotgunM42A2
  - type: ItemMapper
    mapLayers:
      fill_1:
        minCount: 1
        whitelist:
          tags:
          - RMCWeaponShotgunM42A2
      fill_2:
        minCount: 2
        whitelist:
          tags:
          - RMCWeaponShotgunM42A2

- type: entity
  parent: RMCGunRackM42A2Empty
  id: RMCGunRackM42A2Filled
  suffix: M42A2, Filled
  components:
  - type: ContainerFill
    containers:
      item_1:
      - WeaponShotgunM42A2
      item_2:
      - WeaponShotgunM42A2

- type: entity
  parent: RMCGunRackM42A2Empty
  id: RMCGunRackType23Empty
  name: "збройний стелаж Type 23"
  suffix: Type 23, Empty
  description: "Якийсь небрендовий збройний стелаж. Згідно з регламентами ССО і Армії СПН, зброю слід зберігати в надійних сейфах і видавати лише за потреби. Звісно, більшість (але не всі!) підрозділів обходять це правило, складаючи свою вогнепальну зброю в сейфи лише на час інспекції."
  components:
  - type: ItemSlots
    slots:
      item_1:
        name: Type 23
        whitelist:
          tags:
          - RMCWeaponShotgunType23
      item_2:
        name: M42A2
        whitelist:
          tags:
          - RMCWeaponShotgunType23
  - type: ItemMapper
    mapLayers:
      fill_1:
        minCount: 1
        whitelist:
          tags:
          - RMCWeaponShotgunType23
      fill_2:
        minCount: 2
        whitelist:
          tags:
          - RMCWeaponShotgunType23

- type: entity
  parent: RMCGunRackType23Empty
  id: RMCGunRackType23Filled
  suffix: Type 23, Filled
  components:
  - type: ContainerFill
    containers:
      item_1:
      - RMCWeaponShotgunType23
      item_2:
      - RMCWeaponShotgunType23
