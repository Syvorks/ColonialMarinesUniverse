# M34 Incinerator

- type: entity
  parent: RMCGunRackBase
  id: RMCGunRackM34IncineratorEmpty
  name: "стелаж спалювача M34"
  suffix: M34 Incinerator, Empty
  description: "Виготовлений AEGIS збройний стелаж для зберігання довгої зброї. Хоча початкова модель мала бути дуже модифікованою, ОНМП замовили стелажі з фіксованими слотами, у які поміщаються лише пристрої-спалювачі M34. Дехто каже, вони дешевші, інші — що головна причина в тому, що морпіхи легко ламають усе складніше за вольфрамову кульку."
  components:
  - type: ContainerContainer
    containers:
      item_1: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
      item_2: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/GunRacks/m34_rack.rsi
  - type: ItemSlots
    slots:
      item_1:
        name: M34 Incinerator
        whitelist:
          tags:
          - RMCWeaponIncineratorM34
      item_2:
        name: M34 Incinerator
        whitelist:
          tags:
          - RMCWeaponIncineratorM34
  - type: ItemMapper
    mapLayers:
      fill_1:
        minCount: 1
        whitelist:
          tags:
          - RMCWeaponIncineratorM34
      fill_2:
        minCount: 2
        whitelist:
          tags:
          - RMCWeaponIncineratorM34

- type: entity
  parent: RMCGunRackM34IncineratorEmpty
  id: RMCGunRackM34IncineratorFilled
  suffix: M34 Incinerator, Filled
  components:
  - type: ContainerFill
    containers:
      item_1:
      - RMCWeaponFlamerPVE
      item_2:
      - RMCWeaponFlamerPVE

