- type: entity
  id: RMCTelecomBusMainframe
  name: "Шинний мейнфрейм"
  description: "Потужне обладнання, що використовується для швидкої передачі великих обсягів даних."
  placement:
    mode: SnapgridCenter
  components: #has no collission in 13 they have invisible walls behind it
  - type: InteractionOutline
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: ApcPowerReceiver
    powerLoad: 250
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 5
    activeLoad: 10
    channel: Equipment
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/telecommunication.rsi
    layers:
    - state: bus_off
    - state: bus
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer

- type: entity
  id: RMCTelecomReceiver
  parent: RMCTelecomBusMainframe
  name: "Підпросторовий приймач"
  description: "Ця машина має форму тарілки із зеленими вогниками. Призначена для виявлення та обробки підпросторової радіоактивності."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/telecommunication.rsi
    layers:
    - state: broadcast_receiver_off
    - state: broadcast_receiver
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  id: RMCTelecomBroadcaster #gets put ontop of stuff
  parent: RMCTelecomBusMainframe
  name: "Підпросторовий передавач"
  description: "Тарілкоподібна машина для трансляції оброблених підпросторових сигналів."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/telecommunication.rsi
    layers:
    - state: broadcaster_off
    - state: broadcaster
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  id: RMCTelecomBroadcasterDD
  parent: RMCTelecomBroadcaster
  suffix: DrawDepth
  components:
  - type: Sprite
    drawdepth: "1"

