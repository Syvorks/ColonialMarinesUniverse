- type: entity
  id: RMCTelecomOSServerBox
  parent: RMCTelecomBusMainframe
  name: "Серверний блок We-Yu OS"
  description: "We-Yu OS — це власницька операційна система, яку Компанія використовує для запуску майже всіх своїх серверів, банківських та управлінських систем. Витік коду у 2144 році змусив деяких хакерів-аматорів повірити, що We-Yu OS приблизно базується на релізі TempleOS 2017 року. Але Компанія спростувала ці заяви."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/telecommunication.rsi
    layers:
    - state: WY_server_off
    - state: WY_server_on
      map: ["enum.PowerDeviceVisualLayers.Powered"]

- type: entity
  id: RMCTelecomBlackBox
  parent: RMCTelecomBusMainframe
  name: "Реєстратор чорної скриньки"
  description: "Реєстратор чорної скриньки — це пристрій для запису даних із систем корабля. Спроектований стійким до втручань і витримує екстремальні умови." #custom
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/AIStuff/telecommunication.rsi
    layers:
    - state: blackbox
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Corrodible
    isCorrodible: true

- type: entity
  id: RMCTelecomBlackBoxDD
  parent: RMCTelecomBlackBox
  suffix: DrawDepth
  components:
  - type: Sprite
    drawdepth: "1"

