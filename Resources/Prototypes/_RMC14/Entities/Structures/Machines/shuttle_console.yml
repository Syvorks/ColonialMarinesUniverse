- type: entity
  parent: CMBaseStructure
  abstract: true
  id: CMComputerDropship
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/shuttle_console.rsi
    drawdepth: SmallObjects
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigation
  name: "навігаційний комп'ютер десантного корабля"
  description: "Польотний комп'ютер, який можна використовувати для автопілоту або польотів на далекі відстані."
  components:
  - type: Sprite
    state: console
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [ [ "AU14AccessGovforFTL" ], [ "AU14AccessGovforPilot" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui

- type: entity
  parent: CMComputerDropshipNavigation
  id: CMComputerDropshipNavigationOpfor
  name: "навігаційний комп'ютер десантного корабля"
  suffix: Opfor
  components:
  - type: AccessReader
    access: [ ]
  - type: WhitelistedShuttle
    faction: opfor
    ShuttleType: Dropship

- type: entity
  parent: CMComputerDropshipNavigation
  id: CMComputerDropshipNavigationERT
  name: "транспортний шатл"
  description: "Польотний комп'ютер транспортного шатла."
  components:
  - type: Sprite
    state: syndishuttle
  - type: DropshipNavigationComputer
    hijackable: false

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigationPlanetside
  name: "навігаційний комп'ютер десантного корабля"
  description: "Польотний комп'ютер, який можна використовувати для керування під'єднаними десантними кораблями."
  suffix: Planetside
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/dropship_nav_computer.rsi
    state: on
  - type: ActivatableUI
    key: enum.DropshipTerminalUiKey.Key
  - type: AccessReader
    access: [["CMAccessDropship"], ["CMAccessSquadLeaderPrep"], ["CMAccessXeno"]] # Xeno have access as to not cause the "Access denied!" popup.
  - type: ActivatableUIRequiresAccess
  - type: DropshipTerminal
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalUiKey.Key:
        type: DropshipTerminalBui

- type: entity
  parent: CMBaseStructure
  id: RMCComputerDropshipNavigationSmall
  name: "навігаційний комп'ютер десантного корабля"
  description: "Польотний комп'ютер, який можна використовувати для автопілоту або польотів на далекі відстані."
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Objects
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: security_cam
    layers: [ ]
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: WallMount
    arc: 360
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [ [ "AU14AccessGovforFTL" ], [ "AU14AccessGovforPilot" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui
  - type: PointLight
    enabled: true
    radius: 1.5
    netsync: true
    energy: 1
    offset: "0,0"
    color: "#FFEFD2"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png

- type: entity
  parent: CMBaseStructure
  id: RMCComputerDropshipWeaponsSmall
  name: "комп'ютер зброї десантного корабля"
  description: "Компактний комп'ютер, що може керувати обладнанням, зброєю та симуляціями, встановленими на десантному кораблі."
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Objects
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: security_cam
    layers: [ ]
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: WallMount
    arc: 360
  - type: ActivatableUI
    key: enum.DropshipTerminalWeaponsUi.Key
  - type: AccessReader
    access: [ [ "AU14AccessGovforFTL" ], [ "AU14AccessGovforPilot" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalWeaponsUi.Key:
        type: DropshipWeaponsBui
  - type: DropshipTerminalWeapons
  - type: RequiresSkill
    skills:
      RMCSkillPilot: 1
  - type: PointLight
    enabled: true
    radius: 1.5
    netsync: true
    energy: 1
    offset: "0,0"
    color: "#FFEFD2"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png

