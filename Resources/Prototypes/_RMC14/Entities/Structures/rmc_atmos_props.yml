# Heaters
- type: entity
  id: RMCRadiator
  name: "радіатор"
  description: "Це радіатор. Він нагріває кімнату через конвекцію за допомогою гарячої води."
  components:
  - type: Transform
  - type: Physics
    bodyType: static
    canCollide: false
  - type: Clickable
  - type: ItemToggle
    soundActivate: /Audio/_RMC14/Machines/click.ogg
    soundDeactivate: /Audio/_RMC14/Machines/click.ogg
  - type: UseDelay
    delay: 2
  - type: Sprite
    sprite: _RMC14/Structures/atmos.rsi
    state: radiator
    noRot: true
  - type: InteractionOutline
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:DoActsBehavior
          acts: ["Destruction"]

- type: entity
  id: RMCRadiatorRed
  parent: RMCRadiator
  name: "радіатор"
  description: "Це радіатор. Він нагріває кімнату через конвекцію за допомогою гарячої води. У цього червона ручка."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/atmos.rsi
    state: radiator-r

- type: entity
  id: RMCSpaceHeater
  parent: BaseStructureDynamic
  name: "космічний обігрівач"
  description: "Це електричний космічний обігрівач. Він нагріває кімнату випромінюванням за допомогою електрики."
  components:
  - type: VehicleSmashable
  - type: Transform
  - type: Physics
    bodyType: Dynamic
  - type: ItemToggle
    soundActivate: /Audio/_RMC14/Machines/click.ogg
    soundDeactivate: /Audio/_RMC14/Machines/click.ogg
  - type: UseDelay
    delay: 2
  - type: Sprite
    sprite: _RMC14/Structures/atmos.rsi
    state: sheater0
    noRot: true
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: sheater1 }
          False: { state: sheater0 }
  - type: InteractionOutline
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: PointLight
    enabled: false
    castShadows: false
    radius: 1.5
    color: orange
  - type: ItemTogglePointLight
