- type: entity
  parent: CMSeatBase
  id: CMSeatPassenger
  name: "пасажирське сидіння"
  description: "Міцне крісло зі скобою, що опускається на твоє тіло. Запобігає тому, щоб тебе кидало по транспорту під час аварії, отже, від травм. Пристебніть ремені, діти! Ремонтуйте зварювачем у разі пошкодження."
  placement:
    mode: PlaceFree
  components:
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/vehicle_seats.rsi
    state: base

- type: entity
  parent: CMSeatPassenger
