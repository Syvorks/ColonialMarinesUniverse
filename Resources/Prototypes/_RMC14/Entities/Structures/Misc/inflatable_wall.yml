- type: entity
  id: RMCInflatableWall
  name: "надувна стіна"
  description: "Надута мембрана. Активуй, щоб здути. Не проколювати."
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Objects/Misc/inflatable_wall.rsi
    state: wall
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 15
        layer:
        - WallLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Inflatable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: DisassembleOnAltVerb
    prototypeToSpawn: RMCInflatableWallFolded1
    disassembleTime: 3
  - type: Airtight
  - type: Transform
    anchored: true
  placement:
    mode: SnapgridCenter

- type: entity
  parent: BaseMaterialDoor
  id: RMCInflatableDoor
  name: "надувні двері"
  description: "Надута мембрана. Активувати, щоб здути. Тепер з дверима. Не проколіть."
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Objects/Misc/inflatable_door.rsi
    state: closed
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 15
        layer:
        - WallLayer
  - type: Door
    occludes: false
    openSound:
      path: /Audio/Misc/zip.ogg
    closeSound:
      path: /Audio/Misc/zip.ogg
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Inflatable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: DisassembleOnAltVerb
    prototypeToSpawn: RMCInflatableDoorFolded1
    disassembleTime: 3
  - type: Occluder
    enabled: false

- type: entity
  parent: CMBaseStructure
  id: RMCInflatableWallBroken
  name: "луснута надувна стіна"
  description: "Колись це була надувна стіна, а тепер — просто купа пластику."
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Objects/Misc/inflatable_wall.rsi
    state: wall_popped
  - type: Fixtures # overwrite BaseStructure parent.
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Inflatable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: RMCInflatableWallBroken
  id: RMCInflatableDoorBroken
  name: "луснуті надувні двері"
  description: "Колись це були надувні двері, а тепер — просто купа пластику."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/inflatable_door.rsi
    state: door_popped
