- type: entity
  id: RMCSignRequisitions
  name: "правила Бюро Постачання ОНМП"
  description: "1. Ти не маєш права на обслуговування чи спорядження. Аксесуари — це привілей, а не право.\n2. Щоб отримати обслуговування, ти маєш бути повністю вдягненим. Кріогенна білизна не дозволена.\n3. Офіцер Логістики має останнє слово й право відмовити в обслуговуванні. Лише в.о. Командира може скасувати його рішення.\n4. Ставтеся до персоналу Постачання з повагою. Вони важко працюють."
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/decals.rsi
    state: roplaque
  - type: InteractionOutline
  - type: Clickable

- type: entity
  parent: RMCSignRequisitions
  id: RMCSignRequisitionsCreed
  name: "табличка з кредо ОЛК"
  description: "Коротка версія Кредо Офіцера Логістики, складена Корпусом Офіцерів Логістики ООН. Ця — суто декоративна та церемоніальна версія, яка значно коротша і не містить сучасніших правок."
  components:
  - type: Sprite
    state: rocreed
