  id: RMCPropTurbineStrutsRight
  name: "опори енерготурбіни"
  suffix: Right
  description: "Труби чи, можливо, опорні конструкції, що ведуть до тієї великої турбіни або підтримують її."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Props/biomass_turbine.rsi
    state: support_struts_r
  - type: Physics
    canCollide: false

- type: entity
  parent: RMCPropTurbineStrutsRight
  id: RMCPropTurbineStrutsLeft
  suffix: Left
  components:
  - type: Sprite
    state: support_struts_l

- type: entity
  parent: RMCPropBase
  id: RMCPropTurbineStrutsBorder
  name: "попереджувальні смуги енерготурбіни"
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Props/biomass_turbine.rsi
    state: biomass_turbine_border
  - type: Physics
    canCollide: false
