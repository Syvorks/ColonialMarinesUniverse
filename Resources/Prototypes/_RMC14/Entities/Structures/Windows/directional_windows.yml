- type: entity
  id: CMWindowDirectional
  parent: WindowDirectional
  name: "вікно"
  description: "Скляне вікно. Виглядає тонким і крихким. Кілька ударів чим-небудь мають його розбити."
  components:
  - type: Transform
    anchored: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.38"
        density: 1500
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: RotationDrawDepth
    southDrawDepth: OverMobs
  - type: Sprite
    drawdepth: Mobs
    sprite: _RMC14/Structures/Windows/directional.rsi
    state: window
  - type: Icon
    sprite: _RMC14/Structures/Windows/directional.rsi
    state: window
  - type: DamageMultiplierFlags
    flags: Breaching
  - type: RMCBruteStructureDamageMultiplier
    multiplier: 10
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150 #Excess damage check.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 25 #TODO RMC14: Proper damage values.
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          CMShardGlass:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: RMCWindowDirectional
    node: windowDirectional

- type: entity
  parent: CMWindowDirectional
  id: RMCWindowDirectionalAltDrawDepth
  suffix: Alt Drawdepth
  components:
  - type: Sprite
    drawdepth: WallTops

- type: entity
  id: CMWindowReinforcedDirectional
  parent: CMWindowDirectional
  name: "укріплене вікно"
  description: "Скляне вікно, посилене опорними стрижнями. Виглядає досить міцно. Може знадобитися кілька гарних ударів, щоб його розбити."
  components:
  - type: Sprite
    state: rwindow
  - type: Icon
    sprite: _RMC14/Structures/Windows/directional.rsi
    state: rwindow
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150 #Excess damage check.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 25 #TODO RMC14: Proper damage values.
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          CMShardGlass:
            min: 1
            max: 1
          CMRodMetal1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: RMCWindowDirectional
    node: windowReinforcedDirectional

- type: entity
  id: CMWindowStrongReinforcedDirectional
  parent: CMWindowDirectional
  name: "сильно укріплене вікно"
  description: "Скляне вікно, посилене опорними стрижнями. Виглядає дуже міцно. Кулаками його не розбити."
  components:
  - type: Sprite
    state: rwindow
  - type: Icon
    sprite: _RMC14/Structures/Windows/directional.rsi
    state: rwindow
  - type: ImmuneToUnarmed
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          CMShardGlass:
            min: 1
            max: 1
          CMRodMetal1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

