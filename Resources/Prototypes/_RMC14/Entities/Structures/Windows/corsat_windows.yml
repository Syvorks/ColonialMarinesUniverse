- type: entity
  parent: RMCWindowFrameColonyReinforced
  id: RMCWindowFrameCorsatReinforced
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/Frames/corsat_rframe.rsi
    state: padded_rframe0
  - type: Icon
    sprite: _RMC14/Structures/Windows/Frames/corsat_rframe.rsi
    state: padded_rframe0
  - type: IconSmooth
    key: windows
    additionalKeys:
    - doors
    base: padded_rframe
    mode: CardinalFlags
  - type: Construction
    graph: RMCWindowCorsatReinforced
    node: windowFrameCorsatReinforced

- type: entity
  parent: CMBaseWindow
  id: RMCWindowCorsatReinforced
  name: "укріплене вікно"
  description: "Скляне вікно зі спеціальною матрицею стрижнів у стінному каркасі. Виглядає досить міцно. Може знадобитися кілька гарних ударів, щоб його розбити."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/corsat_rwindow.rsi
    state: padded_rwindow0
  - type: Icon
    sprite: _RMC14/Structures/Windows/corsat_rwindow.rsi
    state: padded_rwindow0
  - type: IconSmooth
    key: windows
    additionalKeys:
    - doors
    base: padded_rwindow
    mode: CardinalFlags
  - type: Repairable
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600 # excessive damage destroys window and frame
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:DoActsBehavior
            acts: ["Destruction"]
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:SpawnEntitiesBehavior
            spawn:
              CMShardGlass:
                min: 1
                max: 1
              CMRodMetal:
                min: 1
                max: 1
          - !type:ChangeConstructionNodeBehavior
            node: windowFrameCorsatReinforced
  - type: RMCWallExplosionDeletable
  - type: DestroyedByExplosionType
  - type: Construction
    graph: RMCWindowCorsatReinforced
    node: windowCorsatReinforced
  - type: DestroyOnXenoPierceScissor
    spawnPrototype: RMCWindowFrameColonyReinforced
    sound:
      collection: WindowShatter

