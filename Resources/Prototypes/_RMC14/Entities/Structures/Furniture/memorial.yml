# TODO RMC14 make dogtag names be show at the endscreen + memorial ghosts
- type: entity
  parent: Memorial
  id: CMMemorialBase
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/memorial.rsi
    state: ship_memorial
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.50,-0.10,0.50,0.50"
        density: 85
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: Corrodible
    isCorrodible: false
  - type: RMCMesonsNonviewable

- type: entity
  parent: CMMemorialBase
  id: CMMemorial
  name: "плита перемоги"
  description: "Корабельний меморіал, присвячений тріумфам морпіхів і загиблим морпіхам цього корабля. Ліворуч на плиту викарбувані величні оповіді про перемоги. Праворуч — перелік відомих морпіхів, які загинули в бою, служачи Морпіхам."
  components:
  - type: RMCMemorial

- type: entity
  parent: CMMemorialBase
  id: CMMemorialMaintainers
  name: "плита пам'яті"
  description: "Меморіал усім членам команди супровідників, які пішли з роботи над Colonial Marines Universe."

- type: entity
  parent: CMMemorialMaintainers
  id: CMMemorialAdmins
  description: "Меморіал усім Адмінам і Модераторам, які пішли з Colonial Marines Universe."

- type: entity
  parent: CMMemorial
  id: RMCMemorialWall
  components:
  - type: Sprite
    state: ship_memorial_wall
    offset: 0.5,0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb {}
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: WallMount
    arc: 360
  - type: Physics
    bodyType: Static
    canCollide: false
