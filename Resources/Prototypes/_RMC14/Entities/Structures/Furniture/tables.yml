  description: "Квадратна металева поверхня на чотирьох ніжках. Ця має бокові панелі, що робить її зручною як письмовий стіл."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/Tables/reinforced.rsi
  - type: Icon
    sprite: _RMC14/Structures/Furniture/Tables/reinforced.rsi
  - type: Construction
    graph: RMCTable
    node: Reinforced
  - type: XenoLeapDestroyOnPass
    spawnPrototype: CMRodMetal1 # TODO 50% to spawn 2, 50% to spawn 0

