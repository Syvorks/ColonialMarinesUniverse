# Basic
- type: entity
  parent: TableBase
  id: CMTable
  name: "стіл"
  description: "Квадратна металева поверхня на чотирьох ніжках. Зручно щось на неї покласти."
  components:
  - type: VehicleSmashable
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/Tables/standard.rsi
  - type: Icon
    sprite: _RMC14/Structures/Furniture/Tables/standard.rsi
    state: full
  - type: Damageable
    damageModifierSet: null
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: RMCTable
    node: Tan
  - type: DamageMultiplierFlags
    flags: Breaching
  - type: XenoLeapDestroyOnPass
  - type: XenoToggleChargingDamage
    destroy: true
  - type: XenoCrusherChargable
    instantDestroy: true
    passOnDestroy: true
  - type: RMCMesonsNonviewable

- type: entity
  parent: CMTable
  id: RMCTableBrown
  suffix: Brown
  components:
  - type: Sprite
    color: "#8B7B5B"
  - type: Icon
    color: "#8B7B5B"

- type: entity
  parent: BaseStructure
  id: RMCLargeTable
  name: "стіл"
  description: "Квадратна металева поверхня на чотирьох ніжках. Зручно щось на неї покласти."
  abstract: true
  components:
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/Tables/standard.rsi
    state: full
    offset: 0.5, 0.5
  - type: Icon
    sprite: _RMC14/Structures/Furniture/Tables/standard.rsi
    state: full
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageMultiplierFlags
    flags: Breaching
  - type: XenoLeapDestroyOnPass
  - type: XenoToggleChargingDamage
    destroy: true
  - type: Animateable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: PlaceableSurface
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,1.45,0.45"
        density: 55
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: SpriteFade
  - type: Climbable
  - type: Bonkable
    bonkDamage:
      types:
        Blunt: 4
  - type: Clickable
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHull
  - type: Tag
    tags:
    - ForceFixRotations

# Reinforced
- type: entity
