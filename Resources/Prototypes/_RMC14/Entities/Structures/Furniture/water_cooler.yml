- type: entity
  parent: StorageTank
  id: RMCWaterCooler
  name: "кулер з водою"
  description: "Машина, що подає питну воду. Має важелі для гарячої й холодної, але насправді подає лише воду кімнатної температури."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/water_cooler.rsi
    state: water_cooler
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.3
        density: 155
        mask:
        - MachineMask
        layer:
        - MobMask
        - BulletImpassable
  - type: Appearance
  - type: SolutionContainerManager
    solutions:
      tank:
        reagents:
        - ReagentId: Water
          Quantity: 500
  - type: ContainerContainer
    containers:
      bin-container: !type:Container
  - type: Bin
    initialContents:
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    - RMCPaperCup
    whitelist:
      requireAll: true
      components:
      - FitsInDispenser
      tags:
      - Trash
  - type: ExaminableSolution
    solution: tank
  - type: StaticPrice
    price: 500
  - type: RMCMesonsNonviewable
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCWaterCooler
  id: RMCWaterCoolerStacks
  components:
  - type: Sprite
    state: water_cooler_2
