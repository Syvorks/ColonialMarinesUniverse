# Couch
- type: entity
  parent: SeatBase
  id: RMCCouchMid
  name: "диван"
  description: "Шматок шведських меблів пласкою упаковкою — лише не проси у техніків шестигранник."
  suffix: Mid
  placement:
    mode: SnapgridCenter
  components:
  - type: VehicleSmashable
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/couch.rsi
    state: couch_mid
  - type: RMCMesonsNonviewable
  - type: BlockXenoConstruction
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: MeleeReceivedMultiplier
    xenoDamage:
      types:
        Slash: 51
    otherMultiplier: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: RMCCouchMid
  id: RMCCouchEnd
  suffix: End
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/couch.rsi
    state: couch_end

- type: entity
  parent: RMCCouchMid
  id: RMCCouchMidRed
  name: "червоний диван"
  suffix: Mid
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/red_couch.rsi
    state: couch_mid

- type: entity
  parent: RMCCouchMid
  id: RMCCouchEndLowerRed
  name: "червоний диван"
  suffix: End, Lower
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/red_couch.rsi
    state: couch_end_lower

- type: entity
  parent: RMCCouchMid
  id: RMCCouchEndUpperRed
  name: "червоний диван"
  suffix: End, Upper
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/red_couch.rsi
    state: couch_end_upper

- type: entity
  parent: RMCCouchMid
  id: RMCCouchLeftBar
  suffix: Left
  name: "барна кабінка"
  description: "Стара дерев'яна кабінка з червоною набивкою. На набивці є плями."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/couch_bar.rsi
    state: couch_left

- type: entity
  parent: RMCCouchLeftBar
  id: RMCCouchRightBar
  suffix: Right
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/couch_bar.rsi
    state: couch_right
