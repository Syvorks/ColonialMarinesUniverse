# Basic chair
- type: Tag
  id: RMCSeat

- type: entity
  abstract: true
  parent: SeatBase
  id: CMSeatBase
  name: "абстрактний стілець"
  suffix: RMC
  components:
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/chairs.rsi
    state: chair
  - type: Tag
    tags:
    - RMCSeat
  - type: RMCMesonsNonviewable
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: MeleeReceivedMultiplier
    xenoDamage:
      types:
        Slash: 51
    otherMultiplier: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: [ CMSeatBase, ChairFolding ]
  id: CMChair
  name: "стілець"
  description: "Прямокутний металевий каркас на чотирьох ніжках зі спинкою. Розроблений, щоб підтримувати сидячу позицію — більш-менш зручно."
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Foldable
    anchorOnUnfold: true
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/folding_chair.rsi
    layers:
    - state: chair
      map: ["unfoldedLayer"]
    - state: chair_folded
      map: ["foldedLayer"]
      visible: false
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 1
    soundHit:
      path: /Audio/_RMC14/Items/metal_chair_clang.ogg
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 10
  - type: Construction
    graph: CMSeat
    node: chair
  - type: RMCStaminaDamageOnHit
    requiresWield: true
    damage: 17

- type: entity
  parent: CMChair
  id: CMChairFolded
  suffix: RMC|folded
  components:
  - type: Foldable
    folded: true
  - type: Strap
    enabled: false

- type: entity
  parent: CMSeatBase
  id: CMChairNonFold
  abstract: true
  name: "стілець"
  description: "Прямокутний металевий каркас на чотирьох ніжках зі спинкою. Розроблений, щоб підтримувати сидячу позицію — більш-менш зручно."
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/chairs.rsi
    state: chair
  - type: Physics
    bodyType: Static
  - type: Construction
    graph: CMSeat
    node: chair

- type: entity
  parent: CMChairNonFold
  id: CMChairAlt
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/chairs.rsi
    state: chair_alt

- type: entity
  parent: CMChairNonFold
  id: RMCStool
  name: "табурет"
  description: "Ти сидиш у цьому. Чи то з волі, чи то з примусу."
  components:
  - type: Sprite
    state: stool
  - type: Construction
    graph: CMSeat
    node: stool

# Comfy chair
- type: entity
  parent: CMSeatBase
  id: CMChairComfy
  name: "зручне крісло"
  description: "Крісло зі шкіряною набивкою та регульованим підголівником. На такому, мабуть, можна сидіти вічність."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: comfychair
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Construction
    graph: CMSeat
    node: chairComfy

- type: entity
  parent: CMChairComfy
  id: CMChairComfyARES
  description: "Функціональне крісло, призначене для зручного розміщення однієї людини з метою полегшити взаємодію з ШІ корабля."
  suffix: RMC|ARES
  components:
  - type: Sprite
    state: comfychair_ares

