- type: entity
  parent: CMChairComfy
  id: CMChairComfyAlpha
  description: "Простий стілець, що постійно прикріплений до підлоги, обертові частини зняті, щоб солдати з малою концентрацією уваги сиділи на місці під час брифінгів. Оббитий скрипучою і надто твердою штучною шкірою, нерівно пофарбованою в червоний колір загону «Альфа». Лише для найхоробріших і найсвіжіших новобранців морпіхів."
  suffix: RMC|Alpha
  components:
  - type: Sprite
    state: comfychair_alpha

- type: entity
  parent: CMChairComfy
  id: CMChairComfyBravo
  description: "Простий стілець, що постійно прикріплений до підлоги, обертові частини зняті, щоб солдати з малою концентрацією уваги сиділи на місці під час брифінгів. Оббитий скрипучою і надто твердою штучною шкірою, нерівно пофарбованою в коричневий колір загону «Браво». Сертифіковано укріплений з усіх боків від ворожих вторгнень."
  suffix: RMC|Bravo
  components:
  - type: Sprite
    state: comfychair_bravo

- type: entity
  parent: CMChairComfy
  id: CMChairComfyCharlie
  description: "Простий стілець, що постійно прикріплений до підлоги, обертові частини зняті, щоб солдати з малою концентрацією уваги сиділи на місці під час брифінгів. Оббитий скрипучою і надто твердою штучною шкірою, нерівно пофарбованою у фіолетовий колір загону «Чарлі». Здається недоречним без повноцінного сніданку поряд."
  suffix: RMC|Charlie
  components:
  - type: Sprite
    state: comfychair_charlie

- type: entity
  parent: CMChairComfy
  id: CMChairComfyDelta
  description: "Простий стілець, що постійно прикріплений до підлоги, обертові частини зняті, щоб солдати з малою концентрацією уваги сиділи на місці під час брифінгів. Оббитий скрипучою і надто твердою штучною шкірою, нерівно пофарбованою в синій колір загону «Дельта». Цей стілець, найімовірніше, першим піде в бій і першим загине."
  suffix: RMC|Delta
  components:
  - type: Sprite
    state: comfychair_delta

- type: entity
