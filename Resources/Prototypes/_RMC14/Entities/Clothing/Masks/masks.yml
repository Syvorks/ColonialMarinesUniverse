# Keffiyehs

- type: entity
  parent: CMMaskCoif
  id: RMCMaskKeffiyeh
  name: "кефія"
  description: "Традиційна головна хустка, яку носять для захисту від стихії та приховування обличчя. Зазвичай виготовляється з бавовни, дає тінь від сонця, захищає від пилу й може слугувати камуфляжем у посушливих умовах. Кефію часто носять як солдати, так і цивільні в пустельних і ворожих регіонах; вона стала символом культурної ідентичності та стійкості."
