# Balaclavas
- type: entity
  parent: CMBaseMask
  id: RMCMaskBalaclava
  name: "балаклава"
  description: "Базова балаклава з одним отвором для ока, яку можна знайти майже в кожному магазині спорттоварів, спорядження для активного відпочинку або військового надлишку; вона захищає обличчя від холоду майже так само добре, як і приховує його. Ця має стандартний чорний колір."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Mask/balaclava.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Mask/balaclava.rsi
