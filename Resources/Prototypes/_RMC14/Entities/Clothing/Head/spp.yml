- type: entity
  parent: CMHeadCapSPPBeret
  id: RMCHeadCapSPPBeretArmy
  name: "берет резервіста UPP"
  description: "Якісно зроблений берет, який носять резервісти збройних сил UPP. Він означає їхню постійну відданість справі навіть поза активною службою та служить символом єдності й служіння."
  components:
