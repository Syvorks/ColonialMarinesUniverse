# SPP helmets
- type: entity
  parent: ArmorHelmetM10
  id: ArmorHelmetSPP
  name: "шолом UPP UM4"
  description: "Завдяки висококласним виробничим технологіям цей шолом UM4 має дуже високу стійкість до балістичних ушкоджень, але його величезна вага створює надмірне навантаження на голову носія, що найімовірніше призведе до проблем із шиєю."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/helmet.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    bullet: 30
    bio: 15
    explosionArmor: 20
    # armor_energy = 20
    # armor_rad = 15
    # armor_internaldamage = 30
  - type: RMCEarProtection

- type: entity
  parent: ArmorHelmetSPP
  id: ArmorHelmetSPPEngineer
  name: "шолом UPP UM4-V"
  description: "Ця версія шолома UM4 має візор із балістичного скла, що дозволяє інженерам UPP безпечно зварювати, хоча, за деякими відгуками, це погіршує огляд."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/engi.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/engi.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    melee: 25
    explosionArmor: 30
  - type: CycleableVisor
    containers:
    - rmc_visor_one
    - rmc_visor_two
    - rmc_visor_three
  - type: IntegratedVisors
    visorsToAdd:
    - RMCVisorSquadIntegrated
    - RMCVisorWeldingIntegrated

- type: entity
  parent: ArmorHelmetSPP
  id: ArmorHelmetSPPHeavy
  name: "шолом UPP UH7"
  description: "Як і UM4, цей шолом дуже стійкий до балістичних ушкоджень, але і його недоліки, і переваги були подвоєні. Небагатьом жергентам UPP, які дожили після 30, довелося піти у відставку через тяжкі проблеми з шиєю від носіння цього шолома."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/heavy.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/heavy.rsi
  - type: CMArmor
    melee: 25
    bullet: 35
    bio: 20
    explosionArmor: 30
    # armor_internaldamage = 35

- type: entity
  parent: ArmorHelmetSPP
  id: RMCArmorHelmetSPPArmy
  name: "бойовий шолом 6B82"
  description: "Старіша версія бойового шолома армії UPP 6B92, яку досі носять деякі підрозділи на планетах, що UPP вважає менш важливими."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/army_helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/army_helmet.rsi
  - type: ItemCamouflage
    camouflageVariations: { }

- type: entity
  parent: ArmorHelmetSPP
  id: RMCArmorHelmetSPPFirefighter
  name: "пожежний шолом T-20"
  description: "Посилений жаростійкий шолом, який видають аварійним рятувальникам UPP. Міцна композитна оболонка захищає від падіння уламків та екстремальної спеки, а прикріплена вогнестійка накидка закриває шию та плечі. Спереду красується червона зірка, що позначає службу у прогресивному народі соціалістів."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/fire_helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/fire_helmet.rsi
  - type: ItemCamouflage
    camouflageVariations: { }

# SPP hats
- type: entity
  parent: CMHeadCap
  id: CMHeadCapSPP
  name: "кепка UL2"
  description: "Головний убір UPP, який видають солдатам, коли від них не очікують участі в бою; його також можуть запитувати офіцери й вище."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/cap.rsi

- type: entity
  parent: CMHeadCapSPP
  id: CMHeadCapSPPCivilian
  name: "цивільна кепка UPP UL2"
  description: "Цивільний головний убір UPP. Він невисокої якості й навряд чи прослужить довго, але поки цілий, виглядає доволі стильно."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/civ.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/civ.rsi

- type: entity
  parent: CMHeadCapSPPCivilian
  id: RMCHeadCapSPPCivilianPlantWorker
  name: "біла робоча кепка"
  description: "Проста біла тканинна кепка, яку часто носять різні працівники UPP, щоб стримувати волосся й підтримувати чистоту. Легка та практична, але не дуже міцна."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/white_cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/white_cap.rsi

- type: entity
