# Paramarines
- type: entity
  parent: RMCHeadRoyalBeret
  id: RMCHeadParaBeret
  name: "берет парамаринів"
  description: "Виразний багряний берет, який носять полки парамаринів RCM. Посилений гнучким кевларом, він дає мінімальний захист, зберігаючи традиційний і шанований вигляд."
  suffix: Paramarine, Survivor
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_beret.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_beret.rsi
    
- type: entity
  parent: RMCHeadRoyalBeret
  id: RMCHeadParaBeretLead
  name: "берет командира парамаринів"
  description: "Виразний багряний берет, який носять молодші командири полків парамаринів RCM. Посилений гнучким кевларом, він дає мінімальний захист, зберігаючи традиційний і шанований вигляд."
  suffix: Paramarine, Survivor, Team Leader
  components:
    - type: Sprite
      sprite: _RMC14/Objects/Clothing/Head/Royal/para_tl_beret.rsi
    - type: Clothing
      sprite: _RMC14/Objects/Clothing/Head/Royal/para_tl_beret.rsi

- type: entity
  parent: RMCHeadCapTSEPA
  id: RMCHeadCapPeakedPara
  name: "службовий кашкет офіцера парамаринів"
  description: "Вишуканий службовий кашкет, який носять офіцери полків парамаринів RCM. Має багряну стрічку, золоту емблему RCM-P і чорний лакований козирок, відображаючи дисципліну та владу парамаринського командування Імперії."
  suffix: Paramarine, Survivor, CO
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_peaked.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_peaked.rsi

- type: entity
  parent: RMCHeadRoyalHelmet
  id: RMCHeadRoyalL1HelmetBallistic
  name: "балістичний шолом L1"
  description: "Універсальний балістичний шолом, створений Weston-Yamada для загального використання в різних гілках війська TSE та пов'язаних організаціях. Частково натхненний шоломом зразка M10 UNMC, L1 забезпечує надійний захист від уламків і балістичних загроз."
  suffix: Paramarine, Survivor
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/l1ballistic.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/l1ballistic.rsi

- type: entity
  parent: RMCHeadRoyalHelmet
  id: RMCHeadRoyalFlightHelmet
  name: "льотний шолом PH-4 'Spitfire'"
  description: "Стандартний льотний шолом, що використовується в аерокосмічних силах Імперії Трьох Сонць - від винищувальної авіації до атмосферних екіпажів. Цей варіант PH-4 пристосований для операцій десантних кораблів у космосі, має посилену броню, HUD-оптику та зашифрований зв'язок. Незамінний для ризикованих висадок, посадок та евакуацій. Прізвисько 'Spitfire' отримав за надійність під вогнем."
  suffix: Paramarine, Survivor
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/flighthelmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/flighthelmet.rsi
  - type: CMArmor
    melee: 25
    explosionArmor: 20
    # armor_internaldamage = 30
  - type: CycleableVisor
    containers:
    - rmc_visor_one
    - rmc_visor_two
    - rmc_visor_three
  - type: IntegratedVisors
    visorsToAdd:
    - RMCVisorMedicalAdvancedIntegrated
    - RMCVisorSquadIntegrated
    - RMCVisorPilotBlack
