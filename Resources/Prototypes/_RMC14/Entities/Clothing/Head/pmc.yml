- type: entity
  parent: [ArmorHelmetPMC, RMCMarineHelmetWithLightBase]
  id: RMCArmorHelmetPMCTactical
  name: "тактичний шолом"
  description: "Претендент на службу в Королівських Морпіхаx Корони, який наразі ексклюзивно проходить польові випробування найманцями Weston-Yamada. Має балістичну маску й інтегрований дисплей, з'єднаний із візором."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/helmet.rsi
    clothingVisuals:
      head:
      - state: equipped-HELMET
      head-feroxi:
      - state: equipped-HELMET-feroxi
      head-reptilian:
      - state: equipped-HELMET-reptilian
      head-vulpkanin:
      - state: equipped-HELMET-vulpkanin
  - type: CMArmor
    bullet: 25
    bio: 15
    # armor_internaldamage = 15
  - type: HideLayerClothing
    slots:
    - Hair
    - HeadTop
    - HeadSide
    - Snout
    - FacialHair
  - type: PointLight
    color: "#73e6f5"

