# PMC headgear
- type: entity
  parent: ArmorHelmetM10
  id: ArmorHelmetPMC
  name: "тактична кепка PMC"
  description: "Захисна кепка з гнучкого кевлару. Стандартне спорядження для більшості охоронних формувань замість шолома."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/cap.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    bio: 10
    explosionArmor: 20
    # armor_energy = 15
    # armor_internaldamage = 10

