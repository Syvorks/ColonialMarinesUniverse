# CBRN
- type: entity
  parent: ArmorHelmetM10
  id: RMCArmorHelmetCBRN
  name: "маска CBRN M3 MOPP"
  description: "Маска M3 MOPP має повний каптур-покриття, який надійно кріпиться до костюма MOPP. Маска відфільтровує шкідливі частинки в повітрі, дозволяючи носієві безпечно дихати в полі. Залежно від рівня небезпеки забрудненої зони, фільтр маски служитиме в середньому 12 годин або менше."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Helmets/cbrn.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Helmets/cbrn.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    melee: 15
    bullet: 15
    bio: 100
    explosionArmor: 20
    # armor_rad = 55
  - type: ClothingGrantComponents
    components:
    - type: RMCImmuneToIgnition
    - type: RMCImmuneToFireTileDamage
