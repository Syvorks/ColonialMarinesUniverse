- type: entity
  parent: RMCHelmetBase
  id: RMCArmorHelmetFirefighter
  name: "шолом HS-SHIELD-X 500"
  description: "HS-SHIELD-X 500 (Halcyon Systems - Safety Helmet Integrated for Extreme Danger). Закритий шолом, створений для захисту носія в небезпечних середовищах; ця конкретна модель ефективна у середовищах з високою температурою та захищає від вдихання диму. Має вбудовану напівзакриту дихальну систему. Цей шолом був створений Halcyon Systems."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Helmets/firefighter.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Helmets/firefighter.rsi
  - type: HideLayerClothing
    slots:
    - Hair
    - HeadTop
    - HeadSide
    - Snout
  - type: CMArmor
    melee: 30
    bullet: 10
    bio: 10
    explosionArmor: 15
    # armor_laser = 15
    # armor_energy = 20
    # armor_rad = 10
