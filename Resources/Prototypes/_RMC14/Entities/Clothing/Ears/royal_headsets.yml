- type: entity
  parent: RMCHeadsetIconsTSE
  id: RMCHeadsetRoyalMarine
  name: "гарнітура королівського морпіха"
  description: "Витончена гарнітура, яку використовує Морська Піхота Королівської Корони. Достатньо тонка, щоб поміститися під їхніми унікальними шоломами."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: RCMTeamLead
    trackerModes:
    - RCMTeamLead
    - RCMLieutenant
  - type: Sprite
    state: vai_headset
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarine
  - type: RMCHeadset
    channels:
    - TWESOF


- type: entity
  parent: RMCHeadsetRoyalMarine
  id: RMCHeadsetRoyalMarineLeader
  name: "гарнітура лідера королівських морпіхів"
  description: "Витончена гарнітура, яку використовує Морська Піхота Королівської Корони. Достатньо тонка, щоб поміститися під їхніми унікальними шоломами."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarineCommand
  - type: RMCHeadset
    radioTextIncrease: 2


- type: entity
  parent: RMCHeadsetRoyalMarine
  id: RMCHeadsetRoyalMarineOfficer
  name: "гарнітура офіцера королівських морпіхів"
  description: "Витончена гарнітура, яку використовує Морська Піхота Королівської Корони. Достатньо тонка, щоб поміститися під їхніми унікальними шоломами. Ця важча тягарем відповідальності."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarineCommand
  - type: RMCHeadset
    radioTextIncrease: 3


- type: entity
  parent: RMCHeadsetRoyalMarine
  id: RMCHeadsetRoyalMarinePVE
  name: "гарнітура королівського морпіха"
  suffix: PVE
  description: "Витончена гарнітура, яку використовує Морська Піхота Королівської Корони. Достатньо тонка, щоб поміститися під їхніми унікальними шоломами."
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: RCMPVETroopCommander
    trackerModes:
    - RCMPVESectionLead
    - RCMPVETroopSergeant
    - RCMPVETeamLead
    - RCMPVETroopCommander
  - type: RMCHeadset
    channels:
    - TWESOF


- type: entity
  parent: RMCHeadsetRoyalMarinePVE
  id: RMCHeadsetRoyalMarineLeaderPVE
  name: "гарнітура лідера королівських морпіхів"
  suffix: PVE
  description: "Витончена гарнітура, яку використовує Морська Піхота Королівської Корони. Достатньо тонка, щоб поміститися під їхніми унікальними шоломами. Ця важча тягарем відповідальності."
  components:
  - type: ContainerFill
    containers:
