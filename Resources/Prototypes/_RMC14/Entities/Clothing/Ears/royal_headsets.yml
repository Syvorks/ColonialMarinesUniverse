- type: entity
  parent: CMEncryptionKey
  id: RMCEncryptionKeyRoyalMarine
  name: "ключ шифрування рації королівських морпіхів"
  components:
  - type: EncryptionKey
    channels:
    - MarineCommon
    - TWESOF
    defaultChannel: TWESOF
  - type: Sprite
    state: sl_key

- type: entity
  parent: RMCEncryptionKeyRoyalMarine
  id: RMCEncryptionKeyRoyalMarineCommand
  name: "командний ключ шифрування рації королівських морпіхів"
  components:
  - type: EncryptionKey
    channels:
    - MarineCommon
    - TWESOF
    - MarineCommand
