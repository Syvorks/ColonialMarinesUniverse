# For WeYa PMCs
- type: entity
  parent: RMCHeadsetIconsWeYa
  id: RMCHeadsetHvHWeYaPMC
  name: "корпоративна гарнітура «Ве-Я»"
  description: "Спеціальна гарнітура, яку використовує корпоративний персонал."
  suffix: WeYa, PMC, HvH,
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/headsets.rsi
    state: pmc_headset
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyWEYAColony

  - type: GrantSquadLeaderTracker
    defaultMode: LeaderPmc
    trackerModes:
    - SupervisorWeYaExecutive
    - SupervisorWeYaSpecialist
    - DirectorPmc
    - LeaderPmc
    - CorporateLiaison

