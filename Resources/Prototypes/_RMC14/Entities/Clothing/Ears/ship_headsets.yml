- type: Tag
  id: RMCHeadset

- type: entity
  parent: Clothing
  id: CMHeadset
  name: "радіо-гарнітура"
  description: "Оновлена модульна гарнітура, що надягається на голову. Приймає ключі шифрування."
  components:
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: Headset
  - type: EncryptionKeyHolder
    keySlots: 4 # TODO RMC14 3 when intrinsic channels are all done
  - type: Clothing
    slots:
    - ears
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/headsets.rsi
    state: generic_headset
  - type: Item
    size: Small
  - type: ClothingLimit
    id: CMHeadset
  - type: RMCRadioFilter
  - type: UserInterface
    interfaces:
      enum.RMCRadioFilterUI.Key:
        type: RMCRadioFilterBui
  - type: HeadsetMultiBroadcast
  - type: Tag
    tags:
    - RMCHeadset
  - type: RMCHeadset
  - type: GuideHelp
    guides:
    - RMCGuideMarineCommunications
    - RMCGuideCommunicationsTowers
    - RMCGuideRoleCombatTechnician
    - RMCGuideRoleMaintenanceTechnician

- type: entity
  parent: RMCHeadsetIconsUNMC
  id: RMCHeadsetShip
  name: "радіо-гарнітура морпіха"
  description: "Стандартна військова радіо-гарнітура. Громіздкіша за бойові моделі."
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon
  - type: GrantAreaInfo


- type: entity
  parent: RMCHeadsetShip
  id: CMHeadsetCE
  name: "гарнітура головного інженера"
  description: "Гарнітура того хлопця, що керує запуском двигунів, технічниками та зриває підлогу заради металобрухту. Міцної та надійної конструкції."
  components:
  - type: Sprite
    state: ce_headset
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon
      - CMEncryptionKeyCE
  - type: RMCRadioFilter
    disabledChannels:
    - MarineAlpha
    - MarineBravo
    - MarineCharlie
    - MarineDelta
    - MarineEcho
    - MarineFoxtrot
  - type: HeadsetMultiBroadcast
    cooldown: 60
  - type: RMCHeadset
    radioTextIncrease: 3
  - type: GrantSquadLeaderTracker
    defaultMode: PrimaryLandingZone
    trackerModes:
    - SquadLeader
    - PrimaryLandingZone

