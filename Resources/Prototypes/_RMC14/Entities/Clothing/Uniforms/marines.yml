# CBRN

- type: entity
  parent: RMCMarineUniformBase
  id: RMCCBRNSuit
  name: "костюм M3 MOPP"
  description: "Костюми M3 MOPP спеціально спроєктовані та розроблені для захисту носія від неекранованого впливу будь-яких Хімічних, Біологічних, Радіологічних чи Ядерних (CBRN) загроз у польових умовах. Рекомендований термін служби костюма становить двадцять чотири години після контакту з токсичним середовищем, але залежно від серйозності він може скоротитися до восьми годин або менше."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/Marine/cbrnsuit.rsi
  - type: CMArmor
    bullet: 10
    melee: 10
    bio: 100
    explosionArmor: 10
  - type: ToggleableClothing
    action: ActionToggleCBRNHelmet
    clothingPrototype: RMCArmorHelmetCBRN
    slot: head
    requiredSlot: INNERCLOTHING

