# Warrant Officer / CMP
- type: entity
  parent: RMCMarineUniformBase
  id: CMJumpsuitWO
  name: "форма головного військового поліцейського"
  description: "Форма, яку зазвичай носить головний військовий поліцейський UNMC. У ній є вкраплення легкого кевлару, що допомагають захищати від колючої зброї, куль і вибухових уламків. Ця форма містить невеликий EMF-розподілювач, який допомагає нівелювати вогонь енергетичної зброї, а також фільтр хімзахисту hazmat, вплетений по всьому матеріалу для захисту від біологічних та радіаційних загроз."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/MP/wo/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Uniforms/MP/wo/jungle.rsi
      Desert: _RMC14/Objects/Clothing/Uniforms/MP/wo/desert.rsi
      Snow: _RMC14/Objects/Clothing/Uniforms/MP/wo/snow.rsi
      Classic: _RMC14/Objects/Clothing/Uniforms/MP/wo/classic.rsi
      Urban: _RMC14/Objects/Clothing/Uniforms/MP/wo/urban.rsi
  - type: Tag
    tags:
    - RMCUniformMarine
    - RMCUniformCMP

