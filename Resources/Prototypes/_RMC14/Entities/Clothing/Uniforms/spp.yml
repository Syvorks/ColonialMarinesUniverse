# Civilians
- type: entity
  parent: RMCUniformBase
  id: CMJumpsuitSPPCiv1
  name: "помаранчевий цивільний комбінезон UPP"
  description: "Комплект помаранчевих комбінезонів цивільного стилю з темно-пісочною нижньою сорочкою. Матеріал поганої якості, але це краще, ніж нічого. Одяг такого стилю зазвичай видають тим, хто працює на важких роботах."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ1.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv2
  name: "пісочний цивільний комбінезон UPP"
  description: "Комплект пісочних комбінезонів цивільного стилю з синьою нижньою сорочкою. Матеріал поганої якості, але це краще, ніж нічого. Одяг такого стилю зазвичай видають тим, хто працює на важких роботах."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ2.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv3
  name: "цивільна сорочка та штани UPP"
  description: "Комплект сорочки цивільного стилю кольору засмаги та джинсів. Матеріал хоч і дешевий, але достатньо зручний, щоб носити його протягом усього дня."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ3.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv4
  name: "цивільний жилет і штани UPP"
  description: "Комплект коричневого жилета цивільного стилю та помаранчевих штанів. Матеріал на диво пристойний, хоча такий одяг цивільні UPP носять нечасто з двох причин. Зазвичай вони не можуть собі його дозволити, а якщо й можуть, то він робить їх легкою мішенню."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ4.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: RMCJumpsuitSPPCiv5
  name: "шахтарський комбінезон Chǎnyè Combine"
  description: "Міцний оливково-зелений комбінезон, який носять під безрукавним пухким помаранчевим робочим жилетом - стандартне спорядження для робітників Chǎnyè Combine. Вицвіла тканина жилета має посилену підкладку, що дає мінімальний захист від виробничих загроз. На спині відтиснута червона зірка, яка позначає носія як частину промислової робочої сили Комбайну. Жорсткий, незручний і масово вироблений, але кращий, ніж нічого, у нещадних умовах праці глибокого космосу."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ5.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPBear
  name: "форма Залізного Ведмедя"
  description: "Форма, яку носять найманці \"Залізні Ведмеді\". Трохи пахне справжнім ведмедем."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/bear.rsi
