- type: entity
  parent: RMCMarineUniformBase
  id: CMJumpsuitProvostAgent
  name: "форма спецагента"
  description: "Модифікована форма провоста, в якій оригінальні знаки замінені знаками Розвідувальної Служби. Спецагентів часто вербують із вищих ешелонів правоохоронних органів різних збройних сил. Такі рекрути часто забирають із собою все спорядження, включно з формою, а пізніше модифікують її, додаючи знаки розвідувальної служби."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/Provost/agent.rsi
  - type: Tag
    tags:
    - RMCUniformMarine
    - RMCUniformMP
    - RMCUniformWarden
    - RMCUniformCMP
