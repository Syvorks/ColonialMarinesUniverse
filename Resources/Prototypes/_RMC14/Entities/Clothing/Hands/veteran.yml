# CBRN
- type: entity
  parent: RMCHandsVeteran
  id: RMCHandsVeteranCBRN
  name: "рукавички M3 MOPP"
  description: "Рукавички M3 MOPP виготовлені з обробленого венлару, розробленого для захисту рук користувача від забруднення під час роботи в умовах CBRN. Особливу увагу приділено тому, щоб руки зберігали достатню спритність для повного обслуговування гвинтівки чи використання більшості ручних інструментів, а кругові клейкі візерунки на пальцях покращують хват. Стандартний протокол CBRN передбачає, що після впливу помірного рівня забруднення рукавички мають термін максимальної ефективності близько двадцяти чотирьох годин, після чого користувачам рекомендується їх викинути та замінити."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Hands/Gloves/cbrn.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Hands/Gloves/cbrn.rsi
