- type: entity
  parent: CMBeltMarine
  id: CMBeltSmartGunOperator
  name: "барабанний пояс оператора смартгана зразка M280"
  description: "Незважаючи на те, що 1. барабанні магазини жахливо неергономічні, а 2. вимагають надзвичайно точної обробки, щоб підходити універсально (спойлер — не підходять, посилюючи міф про «Особистості Смартгана»), Морпіхи вирішили видавати модифікований пояс (більш формально відомий за позначенням M280) із гачками та пиловими кришками (надто складними для пересічного бритоголового) для барабанних боєприпасів системи ML66A. Коли защіпка для перенесення на барабані не застрягає в промасленому липкому липчаку, розвантаження насправді непогано тримає чималу кількість барабанів. Але врешті-решт, у порівнянні зі стандартними розвантаженнями... воно — лайно, але хіба не в цьому суть бути морпіхом?"
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Belt/smart_gun_operator/jungle-classic.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Belt/smart_gun_operator/jungle-classic.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,11,1 # 6 slots
    whitelist:
      tags:
      - CMMagazinePistol
      - CMMagazineRifle
      - RMCMagazineShotgun
      - CMMagazineSmg
      - CMMagazineSniper
      - RMCMagazineSmartGun
      - RMCShellShotgun
      - Flare
  - type: FixedItemSizeStorage
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCMagazineSmartGun
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Belt/smart_gun_operator/jungle-classic.rsi
      Snow: _RMC14/Objects/Clothing/Belt/smart_gun_operator/snow-urban.rsi
      Desert: _RMC14/Objects/Clothing/Belt/smart_gun_operator/desert.rsi
      Urban: _RMC14/Objects/Clothing/Belt/smart_gun_operator/snow-urban.rsi
      Classic: _RMC14/Objects/Clothing/Belt/smart_gun_operator/jungle-classic.rsi

