- type: entity
  parent: CMBeltBaseStorage
  id: CMBeltSecurity
  name: "розвантаження охорони зразка M276"
  description: "M276 — стандартне вантажоносне спорядження КМП США. Складається з модульного пояса з різними кліпсами. Ця конфігурація поширена серед військової поліції морпіхів і миротворців, хоча вміщає деякі легкі боєприпаси."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Belt/security.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Belt/security.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,13,1 # 7 slots
    whitelist:
      tags:
      - SecBeltEquip
      - Taser
      - Flashlight
      - CMMagazinePistol
      - RMCShellShotgun
      - RMCMagazineRevolver
      - Donut
      - RMCGrenadeFlashBang
      - Radio
      components:
      - Handcuff
      - Flash
      - FlashOnTrigger
      - Stunbaton
      - ForensicScanner
      - MeleeWeapon
      - Gun
      - RMCLighter
  - type: FixedItemSizeStorage

- type: entity
  parent: CMBeltSecurity
  id: CMBeltSecurityMP
  name: "розвантаження військової поліції зразка M276"
  description: "M276 — стандартне вантажоносне спорядження КМП США. Складається з модульного пояса з різними кліпсами. Ця версія заповнена набором невеликих підсумків для перенесення несмертельного спорядження та засобів обмеження."
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,11,1 # 6 slots

- type: entity
  parent: CMBeltSecurity
  id: RMCBeltSecurityWeYa
  name: "розвантаження корпоративної охорони M276-C"
  description: "Адаптація вантажоносного спорядження M276 від «Вейленд-Ютані», розроблена для корпоративних сил безпеки. Це модульне чорне розвантаження має кілька підсумків для перенесення засобів обмеження, боєприпасів і суміші смертельного й несмертельного спорядження для підтримання порядку."

- type: entity
  parent: CMBeltSecurityMP
  id: CMBeltSecuritySPP
  name: "розвантаження військової поліції Type 43"
  description: "Type 43 — стандартне вантажоносне спорядження СПН. Складається з модульного пояса з різними кліпсами. Ця версія заповнена набором невеликих підсумків для перенесення несмертельного спорядження та засобів обмеження."

- type: entity
  parent: CMBeltSecurityMP
  id: CMBeltSecurityMarshal
  name: "службовий пояс правоохоронця"
  description: "Чорний службовий пояс для перенесення інструментів правоохоронця. Це важкий поліцейський пояс із кількома підсумками для різних правоохоронних речей."
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,15,1 # 8 slots
