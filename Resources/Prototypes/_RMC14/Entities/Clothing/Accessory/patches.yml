  description: "Кругла вогнестійка нашивка з білою облямівкою. Дизайн містить три білі зірки на триколірному тлі: зеленому, чорному й червоному, що символізує боротьбу Колоніального Фронту Звільнення за незалежність та єдність. Цю нашивку носять бійці КФЗ як знак непокори корпоративному й державному гніту, що уособлює їхню боротьбу за вільне та самовизначене колоніальне майбутнє. Хоча декого вона лякає й викликає зневагу, вона залишається потужним символом опору й революції."
