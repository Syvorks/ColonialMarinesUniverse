      sprite: _RMC14/Objects/Clothing/HelmetGarb/nv_goggles.rsi
      state: helmet
    toggledRsi:
      sprite: _RMC14/Objects/Clothing/HelmetGarb/nv_goggles.rsi
      state: helmet-down

- type: entity
  parent: RMCHelmetGarbToggleableBase
  id: RMCHelmetGarbNightVisionPVE
  name: "старий мультиспектральний візор M1"
  description: "Невдалий прототип оптики HUD нового покоління для Морської Піхоти, перевершений нинішньою інтегрованою ІЧ-оптикою. Цей відкидний візор пропонує повний набір функцій із мультиспектральними можливостями. Справді крута штука, аж поки не усвідомиш, що один удар головою — і ти втратиш нічне бачення."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/HelmetGarb/nv_goggles_alt.rsi
    state: icon
  - type: Item
    sprite: _RMC14/Objects/Clothing/HelmetGarb/nv_goggles_alt.rsi
  - type: HelmetAccessory
    rsi:
      sprite: _RMC14/Objects/Clothing/HelmetGarb/nv_goggles_alt.rsi
      state: helmet
    toggledRsi:
      sprite: _RMC14/Objects/Clothing/HelmetGarb/nv_goggles_alt.rsi
      state: helmet-down

