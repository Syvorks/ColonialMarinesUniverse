# NVG

- type: entity
  parent: RMCHelmetGarbToggleableBase
  id: RMCHelmetGarbNightVision
  name: "старі окуляри нічного бачення M2"
  description: "Цю пару позбавили всієї електроніки, тож вона не працює. Але ж вони змушують почуватися тактикульно — а це ж усе, що має значення, чи не так?"
