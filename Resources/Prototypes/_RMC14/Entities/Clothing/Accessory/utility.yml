  name: "утилітарний аксесуар"
  description: "Абстрактний утилітарний аксесуар."
  components:
  - type: UniformAccessory
    category: Utility
    limit: 1
    hiddenByJacketRolling: false

- type: entity
  parent: RMCUtilityBase
  id: RMCStethoscope
  name: "стетоскоп"
  description: "Застарілий, але досі корисний медичний апарат для прослуховування звуків людського тіла. А ще з ним ти маєш вигляд людини, яка знає, що робить."
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _RMC14/Objects/Medical/stethoscope.rsi
    state: icon
  - type: UniformAccessory
    playerSprite:
      sprite: _RMC14/Objects/Medical/stethoscope.rsi
      state: utility
  - type: RMCStethoscope

- type: entity
