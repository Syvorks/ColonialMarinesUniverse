# Camera Gear
- type: entity
  parent: Clothing
  id: RMCM5CameraGear
  name: "камерне спорядження M5"
  description: "Камера й супутній головний убір, що дозволяють командирам морпіхів бачити те, що бачать їхні бійці. Більш міцна версія цього обладнання інтегрована в усі стандартні бойові шоломи ОНМП. Можна носити на вусі або на голові."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/camera_gear.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: _RMC14/Objects/Clothing/Accessory/camera_gear.rsi
  - type: Clothing
    quickEquip: false
    sprite: _RMC14/Objects/Clothing/Accessory/camera_gear.rsi
    slots:
    - EARS
    - HEAD
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon-on}
          False: {state: icon}
  - type: Appearance
  - type: Tag
    tags:
    - RipOffOnInfection
  - type: OverwatchCamera

- type: entity
  parent: RMCM5CameraGear
  id: RMCCameraGearPMC
  name: "наголівна камера TOCU Mk3"
  description: "Модифіковане й посилене камерне спорядження, яким озброєний МКК. Тактичний камерний модуль спостереження TOCU застосовують сили ПВК Вестон-Ямада, що відмовляються від типового захисного головного убору, дозволяючи куратору залишатися в курсі поточного стану оперативника."
