- type: entity
  parent: ClothingShoesBase
  id: RMCShoesLaceup
  name: "взуття на шнурівці"
  description: "Пік моди, і вони попередньо відполіровані!"
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Shoes/laceup.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Shoes/laceup.rsi
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
  - type: ItemSlots
    slots:
      item:
        name: rmc-gun
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        whitelist:
          tags:
          - Holdout
  - type: Matchbox
  - type: CMHolster
  - type: CMItemSlots
  - type: UsableWhileDevoured

