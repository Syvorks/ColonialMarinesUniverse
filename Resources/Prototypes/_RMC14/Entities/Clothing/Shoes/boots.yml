# Dress Shoes
- type: entity
  parent: RMCShoesLaceupDress
  id: CMShoesLaceupCommander
  name: "парадні туфлі командувача"
  description: "Мають особливі підошви, щоб краще топтати тих, хто нижче."

- type: entity
  abstract: true
  id: RMCItemSlotM5Bayonet
  suffix: Filled
  components:
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
  - type: ItemSlots
    slots:
      item:
        name: cm-knife
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        whitelist:
          tags:
          - Knife
          - Holdout
          - Screwdriver
          - RMCScalpel
          - ThrowingKnife
        startingItem: RMCM5Bayonet
  - type: CMItemSlots
    startingItem: RMCM5Bayonet
  - type: Appearance

# Black Boots
- type: entity
  parent: ClothingShoesMilitaryBase
  id: CMBootsBlack
  name: "бойові чоботи"
  description: "Стандартні бойові чоботи для бойових сценаріїв і бойових ситуацій. Суцільний бій, постійно."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/black.rsi
    layers:
    - state: icon
    - state: filled
      map: [ "enum.CMItemSlotsLayers.Fill" ]
  - type: EmitSoundOnDrop
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: Clothing
    unequipSound:
      collection: RMCEquipArmor
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/black.rsi
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
  - type: ItemSlots
    slots:
      item:
        name: cm-knife
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        whitelist:
          tags:
          - Knife
          - Holdout
          - Screwdriver
          - RMCScalpel
  - type: Matchbox
  - type: CMHolster
  - type: CMItemSlots
  - type: UsableWhileDevoured

- type: entity
  parent: [RMCItemSlotM5Bayonet, CMBootsBlack]
  id: CMBootsBlackFilled
  suffix: Filled

- type: entity
  parent: CMBootsBlackFilled
  id: RMCScoutShoes
  name: "черевики інфільтратора" # Could probably use it's own sprite
  description: "Модифікована пара бойових чобіт із кількома зрізаними ділянками та тканиною як підкладкою поряд із якоюсь формою шкіри."
  components:
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepCatwalk #I dunno what a better sound effect would be, catwalk stands out so it's there to alert xenos if scout moves while they are close
      params:
        volume: -8
        maxDistance: 0

- type: entity
  parent: CMBootsBlack
  id: RMCShoesCombat
  name: "бойові чоботи"
  description: "Коли ви ДІЙСНО хочете підняти жар."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/swat.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/swat.rsi

