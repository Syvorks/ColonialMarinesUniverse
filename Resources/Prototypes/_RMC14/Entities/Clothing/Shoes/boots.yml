# CBRN
- type: entity
  parent: [RMCItemSlotM5Bayonet, RMCBootsPMCCommando]
  id: RMCBootsCBRN
  name: "чоботи M3 MOPP"
  description: "Чоботи M3 MOPP створені, щоб захистити носія від контакту з будь-якими можливими переносниками інфекції або небезпечними речовинами, які могли забруднити зону операцій. Це також включає додаткові покращення разом зі стандартною міцністю чобіт M3, що зменшують імовірність проколів чи порізів, а також вплив радіації."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/cbrn.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/cbrn.rsi

- type: entity
  parent: ClothingShoesBase
  id: RMCShoesTychoBoots
  name: "радіаційно-захисні чоботи Tycho 4000"
  description: "Жаростійкі чоботи для радіаційно-захисного костюма Weston-Yamada Tycho 4000. Вони підбиті свинцем і мають сталевий носок, ідеальні для тупотіння навколо підірваних ядерних реакторів і уникнення радіаційного отруєння."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/rad_boots_weya.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/rad_boots_weya.rsi


