- type: entity
  parent: RMCBaseArmor
  id: RMCBaseBioSuit
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: CMArmor
    bio: 100 # CLOTHING_ARMOR_HARDCORE

- type: entity
  parent: RMCBaseBioSuit
  id: RMCSuitBioGeneral
  name: "біозахисний костюм"
  description: "Костюм, що захищає від біологічного забруднення."
  suffix: Generic, RMC
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: CMHardArmor
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: RMCArmorSpeedTier
    speedTier: light

- type: entity
  parent: [RMCAllowSuitStorageClothingArmorVest, RMCBaseArmor]
  id: RMCArmorFirefighter
  name: "пожежний костюм PT-LT"
  description: "'PyroTex LT' - це просунутий легкий пожежний костюм, розроблений 'Fujin'. Він забезпечує захист від вогню та спеки, а також певний рівень захисту від тупих травм."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/firefighter.rsi
  - type: CMArmor
    melee: 15
    bio: 15
    bullet: 10
    explosionArmor: 10
  - type: CMHardArmor
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # slowdown = 1 (SLOWDOWN_ARMOR_HEAVY)
    walkModifier: 0.62
    sprintModifier: 0.62
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.3
  - type: RMCImmuneToIgnition
    immuneToDirectHits: false
   # TODO gas_transfer_coefficient = 0.90

- type: entity
  parent: [RMCAllowSuitStorageClothingChefApron, ClothingOuterBase]
  id: RMCSuitFirefighter
  name: "пожежний костюм"
  description: "Костюм, що захищає від вогню та спеки."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/firesuit.rsi
  - type: Item
    size: Large
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # slowdown = 1 (SLOWDOWN_ARMOR_HEAVY)
    walkModifier: 0.62
    sprintModifier: 0.62
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.3
  - type: RMCImmuneToIgnition
    immuneToDirectHits: false
  # TODO gas_transfer_coefficient = 0.90

- type: entity
  parent: RMCArmorFirefighter
  id: RMCArmorSPPFirefighter
  name: "пожежне пальто T-20"
  description: "Міцне вогнестійке пальто без надмірностей, яке видають промисловим та аварійним бригадам UPP. Створене на основі дизайну PyroTex LT, але з дешевших, вітчизняних матеріалів, воно дає базовий захист від спеки та уламків ціною ваги й комфорту."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/firefighter.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/firefighter.rsi

- type: entity
  parent: RMCBaseBioSuit
  id: RMCSuitBioWeYa
  name: "біокостюм WeYu-TSS MK I"
  description: "'Біокостюм Weyland-Yutani TerraScientia MK I'. Просунутий легкий біокостюм, розроблений Weston-Yamada власними силами. Це костюм, що захищає від біологічного забруднення."
  suffix: Generic, WeYu
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit_weya.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit_weya.rsi
