# SPP armors
- type: entity
  parent: CMArmorM3Medium
  id: RMCArmorSPP
  name: "особиста броня UM5"
  description: "Стандартна тілесна броня війська UPP, UM5 (Union Medium MK5) - це середня броня, приблизно рівноцінна тілесній броні зразка M3, що перебуває на службі UNMC, спеціалізована на захисті від балістики. На відміну від M3, однак, ця пластина має важчу шийную пластину. Саме через це багато членів ООН називають солдатів UPP 'бляшаними людьми'."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/spp.rsi
  - type: CMArmor
    bullet: 30 # CLOTHING_ARMOR_HIGH
    bio: 15 # CLOTHING_ARMOR_MEDIUMLOW
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_MEDIUM
    walkModifier: 0.666
    sprintModifier: 0.666
  - type: Storage
    grid:
    - 0,0,1,1 # 1 slot
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-spp-jumpsuit
    whitelist:
      tags:
      - RMCUniformSPP

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPRifleman
  suffix: Filled, Rifleman
  components:
  - type: StorageFill
    contents:
    - id: RMCBinoculars

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPSupport
  name: "особиста броня UL6"
  description: "Стандартна тілесна броня війська UPP, UL6 (Union Light MK6) - це легка броня, трохи слабша за броню зразка M3, що перебуває на службі UNMC, спеціалізована на захисті від балістики. Цей комплект особистої броні не має характерного шийного елемента та частини броні на користь мобільності користувача."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/support.rsi
  - type: CMArmor
    melee: 30 # CLOTHING_ARMOR_HIGH
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: RMCArmorSPPSupport
  id: RMCArmorSPPSupportSynth
  name: "синтетична особиста броня UPP UL6"
  description: "Модифікований варіант системи особистої броні UL6, придатний для використання синтетичними підрозділами. Не дає захисту, але дуже мало сковує рух."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/support.rsi
  - type: Clothing
    equipDelay: 1
    unequipDelay: 0.5
  - type: CMArmor
    melee: 0 # CLOTHING_ARMOR_NONE
    bullet: 0
    bio: 0
    explosionArmor: 0
  - type: RMCArmorSpeedTier
    speedTier: very light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_VERY_LIGHT
    walkModifier: 0.897
    sprintModifier: 0.897

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPCommando
  name: "особиста броня UPP UM5CU"
  description: "Модифікація UM5, створена для прихованих операцій."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/commando.rsi
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Tag
    tags:
      - RMCScoutArmor
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPHeavy
  name: "важкопластинчата броня UH7"
  description: "Надзвичайно важкий комплект тілесної броні, що перебуває на службі війська SPP; UH7 (Union Heavy MK7) відомий потужним балістичним захистом разом із помітним шийним захистом, укріпленим так, щоб дозволити носієві витримувати навантаження масивного шолома."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/heavy.rsi
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_HEAVY
    walkModifier: 0.62
    sprintModifier: 0.62
  - type: CMArmor
    melee: 25 # CLOTHING_ARMOR_MEDIUMHIGH (melee)
    bullet: 35 # CLOTHING_ARMOR_HIGHPLUS (bullets)
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 30 # CLOTHING_ARMOR_HIGH
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: RMCArmorSPPHeavy
  id: RMCArmorSPPHeavySpecialist
  suffix: Filled, Specialist, QYJ72
  components:
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCMagazineLMGQYJ72
  - type: StorageFill
    contents:
    - id: RMCMagazineLMGQYJ72
      amount: 3

- type: entity
  parent: CMArmorM3Medium
  id: RMCArmorSPPArmy
  name: "особиста тілесна броня 6B80"
  description: "Старіша система особистої броні UPP, яку з того часу замінили стандартною армійською тілесною бронею UPP 6B90. Її досі використовують деякі армійські підрозділи UPP, від яких UPP не очікує серйозного бою."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/army.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/army.rsi
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: CMArmor
    melee: 15 # CLOTHING_ARMOR_MEDIUMLOW
    bullet: 15 # CLOTHING_ARMOR_MEDIUM
    #energy: 15 # CLOTHING_ARMOR_MEDIUMLOW
    #rad: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 15 # CLOTHING_ARMOR_MEDIUMLOW
    #internal: 20 # CLOTHING_ARMOR_MEDIUM
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-spp-jumpsuit
    whitelist:
      tags:
      - RMCUniformSPP

# SPP coats
- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatSPP
  name: "офіцерська куртка UPP UL4"
  description: "Легка куртка, яку видають офіцерам війська UPP. Дає невеликий захист від вхідної шкоди, однак краще все ж носити справжню броню."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/officer.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/officer.rsi
  - type: CMArmor
    melee: 10
    bullet: 10
    bio: 10
    explosionArmor: 10
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots
  - type: FixedItemSizeStorage

- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatSPPSenior
  name: "куртка старшого офіцера UPP UL4"
  description: "Легка куртка, яку видають старшим офіцерам війська UPP. Виготовлена з високоякісних матеріалів, аж до того, що має ранги та знаки капітана і його роти, нанесені на плечі та перед куртки. Дає невеликий захист від вхідної шкоди, однак краще все ж носити справжню броню."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/senior.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/senior.rsi
  - type: CMArmor
    melee: 10
    bullet: 10
    bio: 10
    explosionArmor: 10
  - type: Storage
    grid:
    - 0,0,7,1 # 4 slots

- type: entity
  parent: RMCCoatSPPSenior
  id: RMCCoatSPPMP
  name: "камуфльована куртка UPP UL4"
  description: "Легка куртка, яку видають військам, коли від них не очікують участі в бою. Попри це, вона все ще щедро нашпигована кевларовими уламками, хоча синтетична нитка в конструкції знижує її ефективність."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/mp.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/mp.rsi
  - type: CMArmor
    melee: 10
    bullet: 10
    bio: 10
    explosionArmor: 10

