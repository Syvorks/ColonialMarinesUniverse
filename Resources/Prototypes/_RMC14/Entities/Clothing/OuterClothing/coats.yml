# ChiefMP
- type: entity
  parent: RMCBaseJacket
  id: CMCoatChiefMP
  name: "службовий кітель головного військового поліцейського"
  description: "Службовий морський кітель, прийнятий для використання військовою поліцією на борту морських кораблів. Іронічно, але більшість кораблів вимагають від своїх підрозділів військової поліції носити повну броню, тож у службі його майже не використовують. Дуже популярний серед тих, хто чомусь хоче пахнути пончиками."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/cmp.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/cmp.rsi
  - type: CMArmor
    melee: 10


