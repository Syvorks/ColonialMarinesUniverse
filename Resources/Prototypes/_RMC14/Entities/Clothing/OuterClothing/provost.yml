# Provost
- type: entity
  parent: CMArmorM2MP
  id: RMCArmorProvost
  name: "броня провостів зразка M3"
  description: "Стандартний нагрудник провостів зразка M3. Захищає груди від балістичних набоїв, лез та нещасних випадків. Має невелику шкіряну кишеню, прикріплену для обмеженого зберігання."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Provost/medium.rsi
  - type: Item
    size: Normal
  - type: CMArmor
    bullet: 20 # CLOTHING_ARMOR_MEDIUM
    bio: 15
    explosionArmor: 25 # CLOTHING_ARMOR_MEDIUMHIGH
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots
  - type: ItemCamouflage
    camouflageVariations: { }

- type: entity
  parent: RMCArmorProvost
  id: RMCArmorProvostSenior
  name: "броня старшого провоста зразка M3"
  description: "Більш вишуканий нагрудник провостів зразка M3 для старших офіцерів. Захищає груди від балістичних набоїв, лез та нещасних випадків. Має невелику шкіряну кишеню, прикріплену для обмеженого зберігання."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Provost/senior.rsi

- type: entity
  parent: RMCArmorProvostSenior
  id: RMCArmorProvostSeniorFilled
  components:
  - type: StorageFill
    contents:
    - id: CMFlash
    - id: RMCHandcuffs

- type: entity
  parent: RMCArmorProvost
  id: RMCArmorProvostMarshal
  name: "броня маршала-провоста зразка M5"
  description: "Розкішний комплект броні індивідуального пошиття для маршалів-провостів. Корисний, щоб ваші люди знали, хто головний, коли ви виходите в поле."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Provost/marshal.rsi
  - type: Storage
    grid:
    - 0,0,7,1 # 4 slots

- type: entity
  parent: RMCArmorProvost
  id: RMCArmorProvostLight
  name: "легка броня провостів зразка M3"
  description: "Легший нагрудник провостів зразка M3. Захищає груди від балістичних набоїв, лез та нещасних випадків. Має невелику шкіряну кишеню, прикріплену для обмеженого зберігання."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Provost/light.rsi
  - type: RMCArmorSpeedTier
    speedTier: very light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_VERY_LIGHT
    walkModifier: 0.897
    sprintModifier: 0.897

- type: entity
  parent: RMCArmorProvost
  id: RMCArmorProvostFlexi
  name: "гнучка броня провостів зразка M3"
  description: "Більш вишуканий нагрудник провостів зразка M3 для старших офіцерів. Захищає груди від балістичних набоїв, лез та нещасних випадків. Має невелику шкіряну кишеню, прикріплену для обмеженого зберігання."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Provost/flexi.rsi
  - type: Item
    size: Normal
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots

# Special agent
- type: entity
  parent: [CMArmorM3Medium, RMCAllowSuitStorageClothingArmorMP]
  id: RMCArmorProvostAgent
  name: "броня спецагента зразка M3"
  description: "Модифікована розкішна броня, спочатку створена для маршала-провоста, але перероблена під кольори та знаки розвідувальної служби."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Provost/special.rsi
  - type: CMArmor
    melee: 25
    bullet: 25 # CLOTHING_ARMOR_MEDIUMHIGH
    bio: 20
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots
  - type: ItemCamouflage
    camouflageVariations: { }
