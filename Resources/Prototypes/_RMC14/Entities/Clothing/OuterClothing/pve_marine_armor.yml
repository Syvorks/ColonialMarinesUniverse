- type: entity
  parent: RMCArmorM3PVE
  id: RMCArmorM3PVESGO
  suffix: PVE, Smart Gun harness
  name: "комплект бойової упряжі ML66A"
  description: "Легкий жилет із балістичної мікросітки та керамічного композитного нагрудника для практичного захисту, а також із комп'ютерами, ременями й каркасом, необхідними для роботи самого розумного кулемета ML66A."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PVE/Marines/sg/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/OuterClothing/PVE/Marines/sg/jungle.rsi
      Desert: _RMC14/Objects/Clothing/OuterClothing/PVE/Marines/sg/desert.rsi
      Snow: _RMC14/Objects/Clothing/OuterClothing/PVE/Marines/sg/snow.rsi
