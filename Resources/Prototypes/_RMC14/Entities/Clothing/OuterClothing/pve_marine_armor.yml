      Urban: _RMC14/Objects/Clothing/OuterClothing/PVE/Marines/sg/urban.rsi
  - type: ClothingBlockBackpack
  - type: SmartGunArmor

# Armour Cases

- type: entity
  parent: RMCBasePVEEquipmentCase
  id: RMCPVEArmorCaseBase
  name: "базовий кейс для броні"
  description: "Кейс для комплекту броні."
  components:
  - type: Icon
    sprite: _RMC14/Objects/Storage/PVE_Cases/Armor/marine.rsi
    state: icon
  - type: Sprite
    sprite: _RMC14/Objects/Storage/PVE_Cases/Armor/marine.rsi
    layers:
    - state: base
    - state: armor
      map: [ armor ]
      visible: false
    - state: lid_closed
      map: [ lid ]
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        lid:
          True: { state: lid_open }
          False: { state: lid_closed }
  - type: Storage
    maxItemSize: Ginormous
    grid:
    - 0,0,15,1
    whitelist:
      tags:
      - RMCHelmet
      - RMCPVEArmor
      - RMCPVEArmorAccessory
  - type: ItemMapper
    mapLayers:
      armor:
        whitelist:
          tags:
          - RMCPVEArmor
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-generic
      whitelist:
        tags:
        - RMCPVEArmor
    - popup: rmc-storage-limit-generic
      whitelist:
        tags:
        - RMCHelmet
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/wirecutter_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/wirecutter_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/wirecutter_drop.ogg
      params:
        volume: -4

- type: entity
  parent: RMCPVEArmorCaseBase
  id: RMCPVEArmorCaseM3
  name: "стандартний комплект морської броні зразка M3"
  description: "Кейс, що містить стандартну морську броню зразка M3, шолом M10 та навісні елементи броні."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/PVE_Cases/Armor/marine.rsi
    layers:
    - state: base
    - state: armor
      map: [ armor ]
      visible: false
    - state: lid_closed_standard
      map: [ lid ]
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        lid:
          True: { state: lid_open }
          False: { state: lid_closed_standard }
  - type: StorageFill
    contents:
    - id: ArmorHelmetM10
    - id: RMCArmorM3PVE
    - id: RMCPVEArmorPads
    - id: RMCPVEArmorBracers
    - id: RMCPVEArmorNeckGuard
    - id: RMCPVEArmorGroinPlate
    - id: RMCPVEArmorShinGuard
    - id: RMCPVEArmorKneeGuard

