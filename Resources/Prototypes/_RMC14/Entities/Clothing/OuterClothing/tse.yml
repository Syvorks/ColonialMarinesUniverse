- type: entity
  parent: [RMCJacketWindbreaker, RMCAllowSuitStorageClothingJacketMB]
  id: RMCJacketParaCombatJacket
  name: "бойова куртка парамаринів"
  description: "Міцна бойова куртка на будь-яку погоду, яку видають полкам парамаринів RCM. Розроблена для універсальності, вона слугує і польовим одягом, і легким захисним шаром. Посилена балістичними волокнами та оброблена для стійкості до погоди, вона забезпечує обмежений захист від уламків і стрілецького вогню, водночас підтримуючи комфорт парамаринів у суворих умовах. Глибокий зелений колір і міцна тканина роблять її основою як для активного розгортання, так і для носіння поза службою."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/TSE/para.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
      visible: true
    - state: jacket-icon
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/TSE/para.rsi
  - type: CMArmor
    melee: 15
    bullet: 15
    bio: 10
    explosionArmor: 10
    
- type: entity 
  parent: [RMCAllowSuitStorageClothingJacketMB, RMCBaseJacket]
  id: RMCJacketParaCOJacket
  name: "службова куртка командувача парамаринів"
  description: "Службова куртка, яку зазвичай носять командувачі полків парамаринів RCM. Посилена легкими кевларовими уламками, вона забезпечує обмежений захист від колючої зброї та стрілецького вогню, зберігаючи водночас формальний, але практичний дизайн для лідерства в полі."
  suffix: Survivor, Paramarine, CO
  components:
    - type: Sprite
      sprite: _RMC14/Objects/Clothing/OuterClothing/TSE/para_co.rsi
    - type: Clothing
      sprite: _RMC14/Objects/Clothing/OuterClothing/TSE/para_co.rsi
    - type: CMArmor
      melee: 10
      bullet: 10
      
