# Bases
- type: entity
  parent: RMCBaseArmor
  id: RMCSuitEVABase
  name: "скафандр"
  description: "Важкий і громіздкий космічний костюм."
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
    equipDelay: 2
    unequipDelay: 2
  - type: ToggleableClothing
    clothingPrototype: RMCHelmetEVAUNMC
  - type: Tag
    tags:
    - Hardsuit
  - type: CMArmor
    bio: 30 # RMC14 TODO: 30 rads aswell
    melee: 15
    bullet: 20
    explosionArmor: 10
  - type: ClothingSpeedModifier
    walkModifier: .5
    sprintModifier: .5
  - type: CMHardArmor
  - type: RMCBulkyArmor
  - type: RMCMagneticArmor
  - type: RMCArmorSpeedTier
    speedTier: heavy

- type: entity
  parent: RMCHardHat
  id: RMCHelmetEVABase
  categories: [ HideSpawnMenu ]
  name: "шолом скафандра"
  description: "Важкий космічний шолом, створений для поєднання зі скафандром."
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide
  - type: CMArmor
    bio: 30
    melee: 15
    bullet: 20
    explosionArmor: 10
  - type: BreathMask
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PointLight
    enabled: false
    radius: 5
    offset: 0,-0.85
    rotation: 90
    softness: 5
    autoRot: true
    netsync: false
    color: "#FFFFFF"
    mask: /Textures/_RMC14/Effects/LightMasks/wide_ellipsis.png
  - type: RemoveComponents
    components:
    - type: Storage
    - type: LimitedStorage

- type: entity
  parent: RMCSuitEVABase
  id: RMCSuitEVASGO
  name: "скафандр, сумісний із розумним кулеметом"
  suffix: Smart Gun harness
  description: "Важкий і громіздкий космічний костюм. Чомусь здається, що цей костюм має кріплення для системи розумної зброї."
  abstract: true
  components:
  - type: ClothingBlockBackpack
  - type: SmartGunArmor

# UNMC
- type: entity
  parent: RMCSuitEVABase
  id: RMCSuitEVAUNMC
  name: "скафандр UNMC MK.35"
  description: "Важкий і громіздкий військовий скафандр, який використовують Корпус морської піхоти Організації Об'єднаних Націй та ще кілька організацій ООН."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
    equipDelay: 2
    unequipDelay: 2
  - type: ToggleableClothing
    clothingPrototype: RMCHelmetEVAUNMC
  - type: ClothingRequireEquipped
    denyReason: rmc-armor-not-marine-jumpsuit
    whitelist:
      tags:
      - RMCUniformMarine

- type: entity
  parent: RMCSuitEVASGO
  id: RMCSuitEVAUNMCSGO
  name: "скафандр UNMC MK.35, сумісний із ML66A"
  description: "Важкий і громіздкий військовий скафандр, який використовують Корпус морської піхоти Організації Об'єднаних Націй та ще кілька організацій ООН. Схоже, цей костюм має необхідні кріплення, щоб бути сумісним із розумним кулеметом ML66A."
  components:
  - type: ClothingRequireEquipped
    denyReason: rmc-armor-not-marine-jumpsuit
    whitelist:
      tags:
      - RMCUniformMarine

- type: entity
  parent: RMCHelmetEVABase
  id: RMCHelmetEVAUNMC
  categories: [ HideSpawnMenu ]
  name: "шолом скафандра UNMC MK.35"
  description: "Важкий космічний шолом, створений для поєднання зі скафандром MK.35, який використовують Корпус морської піхоти Організації Об'єднаних Націй та ще кілька організацій ООН."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
  - type: ClothingRequireEquipped
    denyReason: rmc-armor-not-marine-jumpsuit
    whitelist:
      tags:
      - RMCUniformMarine

