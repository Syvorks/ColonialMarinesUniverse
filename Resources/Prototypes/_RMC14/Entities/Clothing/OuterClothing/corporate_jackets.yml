  id: RMCWeYaFurCoat
  name: "хутряне пальто WeYa"
  description: "Старе немарковане хутряне пальто, яке колись видавали корпоративним зв'язковим у суворому кліматі. Воно явно багато разів переходило з рук у руки - тканина зношена, має виразний запах, а всі бірки виробника давно вицвіли. Лишився лише ледь помітний корпоративний знак, пришитий над пожовклою етикеткою з простим написом: \"Лише хімчистка\""
