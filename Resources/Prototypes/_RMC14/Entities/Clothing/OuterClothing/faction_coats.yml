# Bureau Deputy
- type: entity
  parent: RMCOuterClothingExternalWebbing
  id: RMCCoatBureauDeputy
  name: "куртка заступника CMB"
  description: "Товста й стильна чорна шкіряна куртка зі значком заступника маршала. На спині нанесено могутній напис 'DEPUTY', що уособлює правосуддя, владу та захист на околицях."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/Bureau/deputy.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/Bureau/deputy.rsi
  - type: CMArmor
    melee: 15
    bullet: 15
    bio: 10
    explosionArmor: 10

- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatBureauMarshal
  name: "куртка маршала CMB"
  description: "Товста й стильна чорна шкіряна куртка зі значком маршала. На спині нанесено могутній напис 'MARSHAL', що уособлює правосуддя, владу та захист на околицях."
