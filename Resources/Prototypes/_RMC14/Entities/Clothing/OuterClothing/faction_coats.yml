# Fur coats
- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatExpensiveFur
  name: "дорогий тренчкот із хутряною підкладкою"
  description: "Розкішний антикварний тренчкот із хутряною підкладкою, що випромінює класичну нуарну елегантність. Цей вишуканий одяг далеко поза бюджетом пересічної людини, доступний лише високопоставленим керівникам та елітному військовому персоналу."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/FurCoat/fur_coat.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/FurCoat/fur_coat.rsi

