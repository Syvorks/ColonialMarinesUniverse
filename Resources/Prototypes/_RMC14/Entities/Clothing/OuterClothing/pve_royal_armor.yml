# standard
- type: entity
  parent: [RMCBaseArmorPVE, RMCBaseUniformAccessoryItemArmorPVE]
  id: RMCArmorRoyalPVE
  suffix: PVE, RCM
  name: "модульний жилет L3A Kestrel"
  description: "Усюдисущий штурмовий варіант модульного жилета L3 Kestrel, стандартна тілесна броня Королівських Морпіхаx Корони."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PVE/Royal/kestrelmedium.rsi
  - type: CMArmor
    melee: 25
    bullet: 25
    bio: 20
    explosionArmor: 20
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier
    walkModifier: .725
    sprintModifier: .725
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Corrodible
    isCorrodible: false
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-tse-jumpsuit
    whitelist:
      tags:
      - RMCUniformTSE
  - type: WebbingClothing
    whitelist:
      tags:
      - ArmorWebbing

- type: entity
  parent: RMCArmorRoyalPVE
  id: RMCArmorRoyalLightPVE
  suffix: PVE, RCM
  name: "модульний жилет L3S Kestrel"
  description: "Легкий варіант підтримки модульного жилета L3 Kestrel, стандартна тілесна броня для офіцерів і персоналу підтримки Королівських Морпіхаx Корони."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PVE/Royal/kestrellight.rsi

- type: entity
  parent: RMCArmorRoyalPVE
  id: RMCArmorRoyalPointmanPVE
  suffix: PVE, RCM
  name: "модульний жилет L3T Kestrel"
  description: "Міцний технічний варіант модульного жилета L3 Kestrel, стандартна тілесна броня для саперів і проломників Королівських Морпіхаx Корони."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PVE/Royal/kestrelheavy.rsi
  - type: CMArmor
    melee: 30
    bullet: 35
    explosionArmor: 35
    bio: 20
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier
    walkModifier: 0.666
    sprintModifier: 0.666

- type: entity
  parent: RMCArmorRoyalPVE
  id: RMCArmorRoyalHarnessPVE
  suffix: PVE, RCM
  name: "модульна упряж L3H Kestrel"
  description: "Влучно названа варіація Harness модульного жилета L3 Kestrel, стандартна тілесна броня для кулеметників Королівських Морпіхаx Корони."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PVE/Royal/kestrelharness.rsi
  - type: ClothingBlockBackpack
  - type: SmartGunArmor

# Armour Cases

- type: entity
  parent: RMCPVEArmorCaseBase
  id: RMCPVEArmorCaseRoyal
  name: "комплект модульної броні L3A Kestrel"
  description: "Кейс, що містить модульний жилет L3A Kestrel, шолом L5A2 та відповідне спорядження."
  components:
  - type: Icon
    sprite: _RMC14/Objects/Storage/PVE_Cases/Armor/royal.rsi
    state: icon
  - type: Sprite
    sprite: _RMC14/Objects/Storage/PVE_Cases/Armor/royal.rsi
    layers:
    - state: base
    - state: armor
      map: [ armor ]
      visible: false
    - state: lid_closed_a
      map: [ lid ]
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        lid:
          True: { state: lid_open }
          False: { state: lid_closed_a }
  - type: StorageFill
    contents:
    - id: RMCHeadRoyalHelmet
    - id: RMCArmorRoyalPVE
    - id: RMCPVEArmorPadsKestrel
    - id: RMCPVEArmorBracersKestrel
    - id: RMCPVEArmorNeckGuardKestrel
    - id: RMCPVEArmorGroinPlateKestrel
    - id: RMCPVEArmorShinGuardKestrel
    - id: RMCPVEArmorKneeGuardKestrel

