    sprintModifier: 0.897

- type: entity
  parent: CMArmorM4PMCLight
  id: RMCArmorM4PMCBulletProof
  name: "куленепробивна броня PMC зразка M4"
  description: "Модифікація стандартної броні M3. Створена з урахуванням потреб статусних операторів безпеки та корпоративних найманців. Цей комплект призначений для захисту від балістики і має мінімальний захист від лез та біозагроз."
