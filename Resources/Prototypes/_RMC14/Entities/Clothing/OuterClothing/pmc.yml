- type: entity
  parent: RMCArmorM4PMCNoLight
  id: CMArmorM4PMHeavy
  name: "важка броня PMC"
  description: "Модифікація стандартної броні M3. Має додаткові пластини та ремені для кращого захисту."

- type: entity
  parent: CMArmorM4PMHeavy
  id: CMArmorM4PMCSmartGunHarness
  name: "броня оператора гармати PMC"
  description: "Модифікація стандартної броні M3. Оснащена упряжжю та ременями, що дозволяють користувачу переносити розумний кулемет ML66A."
  components:
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1 # 2 slots
  - type: Corrodible
    isCorrodible: false
  - type: ClothingBlockBackpack
  - type: SmartGunArmor

- type: entity
  parent: CMArmorM4PMCSmartGunHarness
  id: CMArmorM4PMCSmartGunHarnessCommando
  name: "броня оператора гармати екзоскелета M5Xg"
  description: "Складна система перекривних пластин, покликана зробити носія майже невразливим до стрілецького вогню. Пасивний екзоскелет підтримує вагу броні, дозволяючи людині носити її масивний об'єм. Цей варіант створений для підтримки розумного кулемета ML66A."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/commando.rsi
  - type: CMArmor
    melee: 30 # CLOTHING_ARMOR_HIGH (melee)
    bullet: 50 # CLOTHING_ARMOR_ULTRAHIGH (bullets)
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 40 # CLOTHING_ARMOR_VERYHIGH
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_MEDIUM
    walkModifier: 0.666
    sprintModifier: 0.666
  - type: Corrodible
    isCorrodible: false
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCMagazineSmartGunirradiated
      - RMCMagazineSmartGun

