# PMC armors
- type: entity
  parent: [RMCBaseMarineArmor, RMCAllowSuitStorageClothingArmorPMC]
  id: RMCArmorM4PMCNoLight
  name: "броня PMC зразка M4"
  description: "Модифікація стандартної броні M3. Створена з урахуванням потреб статусних операторів безпеки та корпоративних найманців."
  suffix: No Suitlamp
  components:
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/pmc.rsi
  - type: CMArmor
    melee: 20
    bullet: 25 # CLOTHING_ARMOR_MEDIUMHIGH
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots
  - type: ItemCamouflage
    camouflageVariations: { }

