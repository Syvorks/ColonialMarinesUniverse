# Paramarines

- type: entity
  parent: RMCArmorRoyal
  id: RMCArmorParaVest
  name: "десантний жилет Goshawk"
  description: "Легкий осколковий жилет із високою мобільністю, створений для парамаринів RCM. Розроблений Weston-Yamada, Goshawk забезпечує важливий захист, водночас дозволяючи десантникам зберігати повну свободу руху під час ризикованих висадок. Просунуті композитні пластини та посилена розвантажувальна система роблять його ефективним проти уламків і стрілецького вогню, зберігаючи ідеальний баланс між захистом та спритністю для тих, хто б'є швидко й б'є сильно."
  suffix: Survivor, Paramarine
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Royal/para_vest.rsi
  - type: CMArmor
    melee: 15
    bullet: 20 # CLOTHING_ARMOR_MEDIUMHIGH
    explosionArmor: 15 # CLOTHING_ARMOR_MEDIUM
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_SUPER_LIGHT
    walkModifier: 0.949
    sprintModifier: 0.949
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: RMCArmorParaVest
  id: RMCArmorParaSynthVest
  name: "синтетичний десантний жилет Goshawk"
  description: "Легкий осколковий жилет із високою мобільністю, створений для синтетичних підрозділів, прикріплених до полків парамаринів RCM. Розроблений Weston-Yamada, Goshawk забезпечує важливий захист, водночас дозволяючи десантникам зберігати повну свободу руху під час ризикованих висадок. Просунуті композитні пластини та посилена розвантажувальна система роблять його ефективним проти уламків і стрілецького вогню, зберігаючи ідеальний баланс між захистом та спритністю для тих, хто б'є швидко й б'є сильно."
  suffix: Survivor, Paramarine. Synth
  components:
    - type: CMArmor
      melee: 0 # CLOTHING_ARMOR_NONE
      bullet: 0 # CLOTHING_ARMOR_NONE
      bio: 0 # CLOTHING_ARMOR_NONE
      explosionArmor: 0 # CLOTHING_ARMOR_NONE
    - type: Storage
      grid:
        - 0,0,7,1 # 4 slots

- type: entity
  parent: RMCArmorParaSynthVest
  id: RMCArmorParaSynthVestFill
  suffix: Survivor, Paramarine, Filled, Synth
  components:
    - type: StorageFill
      contents:
        - id: RMCFlashlight
        - id: CMScrewdriver
