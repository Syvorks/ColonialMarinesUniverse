- type: entity
  parent: [RMCPouchOpenClosed, RMCPouchStorage]
  id: RMCPouchFirstAid
  name: "аптечний підсумок"
  description: "За замовчуванням містить автоін'єктори. Але також у ньому можна носити мазі, бинти й блістери з пігулками."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Pouches/firstaid.rsi
  - type: Storage
    grid:
    - 0,0,7,1 #4 slots
    whitelist:
      tags:
      - CMOintment
      - CMAutoInjector
      - Brutepack
      # TODO RMC14 splint
      - PillPacket
  - type: FixedItemSizeStorage
  - type: IgnoreContentsSize
    items:
      tags:
      - PillPacket

- type: entity
  parent: RMCPouchFirstAid
  id: RMCPouchFirstAidInjectors
  suffix: Injectors
  description: "Містить різноманітні автоін'єктори для швидкого лікування поранень."
  components:
  - type: StorageFill
    contents:
    - id: CMBicaridineAutoInjector
    - id: CMKelotaneAutoInjector
    #- id: CMTramadolAutoInjector # TODO RMC14
    - id: CMEmergencyAutoInjector

- type: entity
  parent: RMCPouchFirstAid
  id: RMCPouchFirstAidSplintsGauzeOintment
  suffix: Splints, Gauze, Ointment
  components:
  - type: StorageFill
    contents:
    - id: CMTricordrazineAutoInjector
    #    - id: CMSplints5
    - id: CMOintment10
    - id: CMGauze10

- type: entity
  parent: RMCPouchFirstAid
  id: RMCPouchFirstAidPills
  suffix: Pills
  components:
  - type: StorageFill
    contents:
    - id: CMPacketPillsBicaridine
    - id: CMPacketPillsKelotane
#    - id: CMPacketPillsTramadol # TODO RMC14
#    - id: CMPacketPillsTramadol # TODO RMC14


# First Aid ERT
