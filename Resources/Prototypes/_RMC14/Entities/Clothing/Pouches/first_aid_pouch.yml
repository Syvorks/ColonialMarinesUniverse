  description: "У ньому можна носити автоін'єктори, мазі та бинти. У цьому є трохи додаткового спорядження."
  suffix: ERT
  components:
  - type: Storage
    grid:
    - 0,0,9,1 #5 slots
  - type: FixedItemSizeStorage

- type: entity
  parent: RMCPouchFirstAidERT
  id: RMCPouchFirstAidERTFill
  suffix: ERT, Filled
  components:
  - type: StorageFill
    contents:
    - id: CMBicaridineAutoInjector
    - id: CMKelotaneAutoInjector
    #- id: CMTramadolAutoInjector
    - id: CMEmergencyAutoInjector
    - id: CMGauze10

