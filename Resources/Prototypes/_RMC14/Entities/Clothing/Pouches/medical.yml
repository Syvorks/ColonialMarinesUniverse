# Tactical Medical
- type: entity
  parent: RMCPouchMedical
  id: RMCPouchMedicalSoc
  name: "тактичний медичний підсумок"
  description: "Важкий підсумок, що містить усе необхідне, аби знову поставити себе на ноги. Досить добірний набір."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Pouches/socmed.rsi
  - type: Storage
    grid:
    - 0,0,25,1 #13 slots
    whitelist:
      tags:
      - CMTraumaKit
      - CMBurnKit
      - CMOintment
      - Brutepack
      - CMBloodPack
      #      - TODO RMC14 splint
      - PillCanister
      - DiscreteHealthAnalyzer
      - CMFireExtinguisherPortable
      - CMSurgicalLine
      - CMSynthGraft
      - Hypospray
      - PillPacket
      components:
      - Hypospray

- type: entity
  parent: RMCPouchMedicalSoc
  id: RMCPouchMedicalSocFill
  suffix: Filled
  components:
  - type: StorageFill # todo rmc14 autoinjectors oxycodone
    contents:
    - id: CMHealthAnalyzer
      # splint
    - id: CMTraumaKit10
    - id: CMBurnKit10
    - id: CMKelotaneAutoInjector
    - id: CMBicaridineAutoInjector
    #- id: CMOxycodoneAutoInjector
    - id: CMEmergencyAutoInjector
    - id: CMEmergencyAutoInjector


# Tactical Medical Dutch`s Butch
- type: entity
  parent: RMCPouchMedicalSoc
  id: RMCPouchMedicalSocDutch
  name: "медичний підсумок Датча"
  description: "Підсумок, куплений Датчем у торговця чорного ринку чимало років тому. Подейкують, що його вкрали з таємних активів морпіхів. За роки його вміст повільно використовували й замінювали."

- type: entity
  parent: RMCPouchMedicalSocDutch
  id: RMCPouchMedicalSocDutchFill
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMHealthAnalyzer
      # splint x2
    - id: CMTraumaKit10
      amount: 2
    - id: CMBurnKit10
      amount: 2
    # todo rmc14 autoinjectors oxycodone x2
#    - id: CMOxycodoneAutoInjector
#      amount: 2
    - id: CMEmergencyAutoInjector
      amount: 1

- type: entity
  parent: RMCPouchMedicalSoc
  id: RMCPouchMedicalSocMarineRaiderFill
  suffix: Filled
  components:
  - type: StorageFill # TODO RMC14
    contents:
    - id: CMHealthAnalyzer
    - id: CMTraumaKit10
      amount: 2
    - id: CMBurnKit10
    - id: CMBicaridineAutoInjector
    - id: CMKelotaneAutoInjector
    - id: CMEmergencyAutoInjector
      amount: 2
    - id: CMFireExtinguisherPortable
    - id: Stimpack
      amount: 3

- type: entity
  parent: RMCPouchMedicalSocDutch
  id: RMCPouchMedicalSocDutchUnmarked
  name: "тактичний медичний підсумок"
  description: "Важкий підсумок, що містить усе необхідне, аби знову поставити себе на ноги. Досить добірний набір. Якимось чином увесь підсумок виглядає засекреченим; у вас таке відчуття, ніби вас віддадуть під трибунал лише за те, що ви на нього дивитесь."


# Pouch First Responder
- type: entity
  parent: [RMCPouchOpenClosed, RMCPouchStorage]
  id: RMCPouchFirstResponder
  name: "підсумок першого реагування"
  description: "Підсумок, створений для перенесення припасів, що допомагають медичному персоналу й дають змогу швидко реагувати на поранення на полі бою без негайного лікування. У ньому можна носити складні ноші, стазис-мішки та аналізатори здоров'я."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Pouches/frt_med.rsi
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,9,1 #4 slots
    whitelist:
      tags:
      - DiscreteHealthAnalyzer
      - Pill
      - Syringe
      - PillCanister
      - CMTraumaKit
      - CMBurnKit
      - CMOintment
      - Brutepack
      - CMBloodPack
      #      - TODO RMC14 splint
      - CMAutoInjector
      - CMFireExtinguisherPortable
      - CMRollerItem
      - BodyBag
      - PillPacket
      - Hypospray
      components:
      - Hypospray
  - type: FixedItemSizeStorage

- type: entity
  parent: RMCPouchFirstResponder
  id: RMCPouchFirstResponderFill
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMHealthAnalyzer
    - id: CMRollerBedSpawnFolded
    - id: CMFireExtinguisherPortable
    - id: CMStasisBagFolded


