- type: entity
  parent: RMCScabbardBase
  id: RMCScabbardMacheteSG
  name: "піхви для мачете на розвантаженні ML66A"
  description: "Піхви, що з'єднуються з бойовим розвантаженням ML66A для перенесення мачете M2132."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_sg.rsi
    state: sheath
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_sg.rsi
    quickEquip: false
    slots:
    - back
  - type: ClothingIgnoreBlockBackpack
