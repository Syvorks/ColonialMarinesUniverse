- type: entity
  parent: CMSatchel
  id: RMCBackpackScout
  name: "термоплащ M68"
  description: "Легкі термозаглушувачі та оптичний камуфляж цього плаща слабші за ті, що в стандартних маскхалатах КМП США. Натомість плащ можна носити поверх бойової броні, він дарує власникові високу маневреність та пристосовність до багатьох середовищ."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/scout_cloak.rsi
  - type: Storage
    grid:
    - 0,0,14,1 # 15 slots
  - type: ClothingRequireEquipped
    autoUnequip: true
    whitelist:
      tags:
      - RMCScoutArmor
    denyReason: rmc-wear-scout-armor-required
  - type: ThermalCloak
    opacity: 0.03 # Put to 0.03 for testing
    restrictWeapons: true
    cloakedHideLayers:
    - Hair
    - HeadTop
    - HeadSide
    - Tail
    - Snout # I don't know if this is hugely problematic but better safe than sorry
    whitelist:
      components:
      - ScoutWhitelist
    cloakSound:
      path: /Audio/_RMC14/Effects/Cloak/cloak_scout_on.ogg
      params:
        variation: 0.09
    uncloakSound:
      path: /Audio/_RMC14/Effects/Cloak/cloak_scout_off.ogg
      params:
        variation: 0.09
  - type: Corrodible
    isCorrodible: false

