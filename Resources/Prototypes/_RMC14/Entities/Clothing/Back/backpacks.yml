# Specific
- type: entity
  parent: CMBackpack
  id: CMBackpackMortar
  name: "рюкзак для мінометних снарядів КМП США"
  description: "Рюкзак, спеціально розроблений для зберігання боєприпасів до міномета M402."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/mortar/jungle-desert-classic.rsi
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,11,3
    whitelist:
      components:
      - MortarShell
  - type: FixedItemSizeStorage
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Back/Backpacks/Marines/mortar/jungle-desert-classic.rsi
      Desert: _RMC14/Objects/Clothing/Back/Backpacks/Marines/mortar/jungle-desert-classic.rsi
      Classic: _RMC14/Objects/Clothing/Back/Backpacks/Marines/mortar/jungle-desert-classic.rsi
      Snow: _RMC14/Objects/Clothing/Back/Backpacks/Marines/mortar/snow-urban.rsi
      Urban: _RMC14/Objects/Clothing/Back/Backpacks/Marines/mortar/snow-urban.rsi

- type: entity
  parent: CMBackpack
  id: CMBackpackWelder
  name: "зварювальний рюкзак техніка"
  description: "Спеціалізований рюкзак для техніків. Несе паливний бак для швидкої заправки та використання зварювача."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/welder/jungle-desert-classic.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,17,1
  - type: ExaminableSolution
    solution: tank
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 650 # TODO RMC14 260 when welders are fixed
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 650
  - type: ReagentTank
    tankType: Fuel
  - type: DrainableSolution
    solution: tank
  - type: SolutionTransfer
    transferAmount: 50
    maxTransferAmount: 100
    minTransferAmount: 10
    canChangeTransferAmount: true
  - type: RefillableSolution
    solution: tank
  - type: DrawableSolution
    solution: tank
  - type: RMCSolutionTransferWhitelist
    popup: rmc-solution-transfer-whitelist-failed-not-welding-tank
    sourceWhitelist:
      components:
      - RMCFlamerTank
      - Welder
    targetWhitelist:
      tags:
      - RMCTankFuel
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Back/Backpacks/Marines/welder/jungle-desert-classic.rsi
      Desert: _RMC14/Objects/Clothing/Back/Backpacks/Marines/welder/jungle-desert-classic.rsi
      Classic: _RMC14/Objects/Clothing/Back/Backpacks/Marines/welder/jungle-desert-classic.rsi
      Snow: _RMC14/Objects/Clothing/Back/Backpacks/Marines/welder/snow-urban.rsi
      Urban: _RMC14/Objects/Clothing/Back/Backpacks/Marines/welder/snow-urban.rsi

- type: entity
  parent: CMBackpack
  id: RMCBackpackAmmo
  name: "патронна рама IMP"
  description: "Гола рама IMP із пряжками, спроектована для утримання кількох ящиків з боєприпасами, але вміщає будь-яку громіздку коробку завдяки винахідливості КМП США. Допомагає тягати додаткові набої або припаси."
  components:
  - type: Item
    size: Huge
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/standard.rsi
  - type: FixedItemSizeStorage
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/ammo_rack.rsi
    layers:
    - state: ammo_pack-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: ClothingSpeedModifier
    walkModifier: 0.910
    sprintModifier: 0.850
  - type: HeldSpeedModifier
  - type: StorageFillVisualizer
    fillBaseName: ammo_pack
    maxFillLevels: 4
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,5,1 #3 slots
    whitelist:
      tags:
      - RMCAmmoBox
      components:
      - EmptySandbag
      - FullSandbag
  - type: CMStorageVisualizer
    storageClosed: null
    storageOpen: null

- type: entity
  parent: RMCBackpackAmmo
  id: RMCBackpackAmmoRCM
  name: "вантажна рама МКК"
  description: "Рюкзак, спеціально розроблений для зберігання спорядження командос МКК."
  components:
  - type: Storage
    grid:
    - 0,0,13,1 # 7 slots
    whitelist:
      tags:
      - RMCAmmoBox
      - CMFirstAidKit
      - RMCPacketGrenade
      components:
      - EmptySandbag
      - FullSandbag
      - MortarShell

- type: entity
