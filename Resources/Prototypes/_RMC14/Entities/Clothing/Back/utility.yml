- type: entity
  parent: Clothing
  id: RMCParachute
  name: "парашут"
  description: "На диво малий, але громіздкий ранець із саме такою кількістю страхувальних ременів, щоб RnD пройшов перевірку з охорони праці. На етикетці написано, що ранець містить два парашути — основний і запасний, але ти сумніваєшся, що в нього взагалі поміститься бодай один."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/Parachute/parachute.rsi
    layers:
    - state: icon
  - type: Item
    size: Huge
  - type: Clothing
    slots:
    - back
  - type: ClothingIgnoreBlockBackpack
  - type: GrantParaDroppable

- type: entity
  id: RMCParachuteDeployed
  name: "розкритий парашут"
  components:
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/Parachute/parachute_deployed.rsi
    layers:
    - drawdepth: overlay
    - state: cables
      drawdepth: Overlay
      offset: 0.0, 0.3
    - state: chute_animated
      drawdepth: Overlay
      offset: 0.0, 0.9
  - type: TimedDespawn
    lifetime: 3.5
  - type: Appearance
