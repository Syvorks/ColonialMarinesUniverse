- type: entity
  parent: RMCVisorBase
  id: RMCVisorPilotBlack
  name: "чорний льотний візор MK30"
  description: "Стандартний знімний візор, який використовують пілоти десантних кораблів UNMC. Поляризований для зменшення відблисків і захисту очей під час входу в атмосферу та орбітального розгортання."
  components:
  - type: Sprite
    state: po_visor
  - type: ToggleVisor
    ignoreRedundancy: true
  - type: ComponentToggler
    components:
    - type: PointLight # this exists purely to stop the game from crying that component toggler isnt on the visor.
      enabled: true
      radius: 1
      softness: 1
      color: "#000000"
  - type: Visor
    toggledSprite:
      sprite: _RMC14/Objects/Clothing/Head/Helmets/huds.rsi
      state: po_visor_black
    onIcon:
      sprite: _RMC14/Objects/Clothing/helmet_visors.rsi
      state: po_visor_down

