- type: entity
  parent: ClothingEyesBase
  id: RMCGlassesExperimentalMeson
  name: "експериментальні мезонні окуляри"
  description: "Покращена, але експериментальна версія стандартних мезонних окулярів. Через підвищену складність їх можуть носити лише синтетики. Забезпечують повне нічне бачення та мезонно-підсилений огляд навколишнього середовища. Натисніть, щоб перемкнути."
  components:
  - type: Item
    storedRotation: 0
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Eyes/Glasses/experimental_meson_hud.rsi
    layers:
    - state: icon
      map: [ "icon" ]
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Eyes/Glasses/experimental_meson_hud.rsi
  - type: NightVisionItem
    actionId: RMCActionToggleExperimentalMesons
    mesons: true
    experimentalMesonFov: true
    defaultState: Full
    ignoreUserOnlyHalf: true
  - type: RMCSynthItemRestriction
    checkPickup: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.NightVisionItemVisuals.Active:
        icon:
          True: { state: icon-on }
          False: { state: icon }

- type: entity
  parent: [ClothingEyesHudMedical, BaseToggleClothing]
  id: RMCGlassesMedicalHUDGlasses
  name: "HUD HealthMate"
  description: "Лобовий дисплей, який сканує гуманоїдів у полі зору та надає точні дані про стан їхнього здоров'я."
  components:
  - type: Item
    storedRotation: 0
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Eyes/Glasses/medicalhud.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Eyes/Glasses/medicalhud.rsi
  - type: ItemToggle
    activated: true
    soundActivate:
      path: /Audio/_RMC14/Machines/click.ogg
      params:
        variation: 0.250
    soundDeactivate:
      path: /Audio/_RMC14/Machines/click.ogg
      params:
        variation: 0.250
  - type: ToggleClothing
    action: RMCActionToggleMedhud
  - type: ComponentToggler
    components:
    - type: ShowHealthBars
      damageContainers:
      - Biological
    - type: HolocardScanner
    - type: ShowHealthIcons
      damageContainers:
      - Biological
  - type: RMCItemToggleClothingVisuals
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon-on}
          False: {state: icon}
  - type: Appearance
  - type: ItemToggleRequiresSkill
    skills:
      RMCSkillMedical: 1
  - type: ItemToggleDeactivateUnskilled
    skills:
      RMCSkillMedical: 1
    popup: rmc-skills-hud-toggle

