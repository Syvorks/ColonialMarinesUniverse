- type: entity
  parent: BaseItem
  id: RMCMotionDetector
  name: "детектор руху"
  description: "Пристрій, що виявляє рух, але ігнорує морпіхів." # Can also be used to scan a vehicle interior from outside, but accuracy of such scanning is low and there is no way to differentiate friends from foes. TODO RMC14
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Tools/motion_detector.rsi
    layers:
    - state: detector
    - state: detector_long_switch
      map: [ "switch" ]
    - state: detector_on_0
      visible: false
      map: [ "number" ]
    state: detector
  - type: Item
    size: Normal
  - type: Clothing
    slots:
    - suitstorage
    - belt
  - type: MotionDetector
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.MotionDetectorLayer.Setting:
        switch:
          Short: { state: detector_short_switch }
          Long: { state: detector_long_switch }
      enum.MotionDetectorLayer.Number:
        number:
          -1: { visible: false }
          0: { state: detector_on_0, visible: true }
          1: { state: detector_on_1, visible: true }
          2: { state: detector_on_2, visible: true }
          3: { state: detector_on_3, visible: true }
          4: { state: detector_on_4, visible: true }
          5: { state: detector_on_5, visible: true }
          6: { state: detector_on_6, visible: true }
          7: { state: detector_on_7, visible: true }
          8: { state: detector_on_8, visible: true }
          9: { state: detector_on_9, visible: true }
  - type: Tag
    tags:
    - RMCDetector

- type: entity
  parent: RMCMotionDetector
  id: RMCMotionDetectorCompact
  name: "кишеньковий детектор руху M717"
  description: "Цей прототипний детектор руху жертвує універсальністю, маючи лише далекобійний режим, заради розміру: він настільки малий, що поміщається навіть у кишені."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Tools/compact_motion_detector.rsi
    layers:
    - state: detector
    - state: detector_long_switch
      map: [ "switch" ]
    - state: detector_on_0
      visible: false
      map: [ "number" ]
    state: detector
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - suitstorage
    - belt
    - pocket
  - type: MotionDetector
    canToggleRange: false

# RMC stuff

- type: entity
  parent: RMCMotionDetector
  id: AU14MotionDetectorRMC
  name: "детектор руху L107"
  description: "Військового класу ручний пристрій виявлення руху, що може проникати майже крізь усе й має приблизну дальність 28 метрів. Також можна використовувати для сканування інтер'єру транспорту. Цей запрограмований працювати з IFF МКК."

- type: entity
  parent: RMCMotionDetectorCompact
  id: AU14MotionDetectorCompactRMC
  name: "кишеньковий детектор руху L717"
  description: "Цей прототипний детектор руху жертвує універсальністю, маючи лише далекобійний режим, заради розміру: він настільки малий, що поміщається навіть у кишені. Цей запрограмований працювати з IFF МКК."
  

- type: Tag
  id: RMCDetector
