- type: entity
  abstract: true
  parent: BaseItem
  id: CMPackFlareBase
  name: "пачка маркувальних ракет M94"
  description: "Пачка з вісьмох маркувальних ракет M94. Носять солдати-морпіхи, щоб освітлювати темні місця, до яких не дістає звичайний наплічний ліхтар TNR."
  components:
  - type: Item
    size: Normal
  - type: Tag
    tags:
    - CMFlarePack
  - type: CMItemSlots
    count: 8
    slot:
      name: Flare
      whitelist:
        tags:
        - RMCFlare
  - type: Sprite
    sprite: _RMC14/Objects/Storage/boxes.rsi
    layers:
    - state: m94_e
      map: [ "emptyLayer" ]
    - state: m94
      map: [ "fullLayer" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        fullLayer:
          Empty: { visible: false }
          Low: { visible: true }
          Medium: { visible: true }
          High: { visible: true }
          Full: { visible: true }
        emptyLayer:
          Empty: { visible: true }
          Low: { visible: false }
          Medium: { visible: false }
          High: { visible: false }
          Full: { visible: false }

- type: entity
  parent: CMPackFlareBase
  id: CMPackFlare
  suffix: Filled
  components:
  - type: CMItemSlots
    startingItem: CMFlare

