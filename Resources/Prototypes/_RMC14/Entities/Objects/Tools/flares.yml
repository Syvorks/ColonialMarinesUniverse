- type: entity
  name: "сигнальна ракета"
  parent: BaseItem
  id: CMFlare
  description: "Червона сигнальна ракета, що видається морпіхам. На боці інструкції: «потягни шнур, отримай світло»."
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 1.0
        friction: 0.2
  - type: Tag
    tags:
    - Flare
    - RMCFlare
  - type: ExpendableLight
    spentName: expendable-light-spent-flare-name
    spentDesc: expendable-light-spent-flare-desc
    glowDuration: 600
    fadeOutDuration: 30
    iconStateSpent: flare_spent
    turnOnBehaviourID: turn_on
    fadeOutBehaviourID: fade_out
    litSound:
      path: /Audio/_RMC14/Machines/flare_activate_2.ogg
      params:
        variation: 0.08
    loopedSound: /Audio/Items/Flare/flare_burn.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Misc/flares.rsi
    layers:
      - map: [ "enum.ExpendableLightVisualLayers.Base" ]
        state: flare
      - map: [ "enum.ExpendableLightVisualLayers.Glow" ]
        state: flare_flame
        color: "#FFA7A7"
        visible: false
      - map: [ "enum.ExpendableLightVisualLayers.Overlay" ]
        state: overlay
  - type: Icon
    sprite: _RMC14/Objects/Misc/flares.rsi
    state: icon
  - type: Item
    size: Small
    heldPrefix: unlit
  - type: Appearance
  - type: PointLight
    enabled: false
    color: "#FFCCCC"
    radius: 1
    energy: 5.0
    netsync: false
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour # faster then base flares
        id: turn_on
        maxDuration: 5.0
        startValue: 2.5
        endValue: 7.0
      - !type:FadeBehaviour # burns out slower
        id: fade_out
        maxDuration: 570
        startValue: 7.0
        endValue: 1.0
  - type: RMCNightVisionVisibleOnIgnite
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: RMCFlareBullet
  - type: RMCAirProjectile
    prototype: RMCAirFlare

- type: entity
  parent: CMFlare
  id: RMCFlareCAS
  name: "сигнальна ракета CAS"
  description: "Зелена сигнальна ракета, що видається ОНМП. Телеметричний комп'ютер працює на хімічній реакції, що випускає дим і світло, і таким чином працює лише поки сигнальна ракета горить."
  components:
  - type: Tag
    tags:
    - RMCFlareCAS
  - type: Sprite
    sprite: _RMC14/Objects/Misc/cas_flares.rsi
    layers:
    - map: [ "enum.ExpendableLightVisualLayers.Base" ]
      state: flare
    - map: [ "enum.ExpendableLightVisualLayers.Glow" ]
      sprite: _RMC14/Objects/Misc/cas_flares.rsi
      state: flare_flame
      color: "#A7FFA7"
      visible: false
    - map: [ "enum.ExpendableLightVisualLayers.Overlay" ]
      sprite: _RMC14/Objects/Misc/cas_flares.rsi
      state: overlay
  - type: Icon
    sprite: _RMC14/Objects/Misc/cas_flares.rsi
    state: flare
  - type: PointLight
    color: "#AACCAA"
  - type: FlareSignal
  - type: ExpendableLight
    glowDuration: 180
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour # faster then base flares
      id: turn_on
      maxDuration: 5.0
      startValue: 2.5
      endValue: 7.0
    - !type:FadeBehaviour # burns out slower
      id: fade_out
      maxDuration: 150
      startValue: 7.0
      endValue: 1.0
  - type: CartridgeAmmo
    proto: RMCFlareCASBullet
  - type: RMCAirProjectile
    prototype: RMCAirFlareCAS
  - type: RMCCamera
    id: null
    rename: false
  - type: RMCStaticZoomLevel
  - type: Eye
    zoom: 0.5, 0.5
    drawFov: false

- type: entity
  parent: CMFlare
  id: RMCStarShellAsh
  name: "попіл палаючого зоряного снаряда"
  description: "Яскраво палаючий попіл від 40-мм зоряного снаряда. Не торкайся, інакше обпалиш."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/flares.rsi
    layers:
    - map: [ "enum.ExpendableLightVisualLayers.Glow" ]
      sprite: _RMC14/Objects/Misc/flares.rsi
      state: starshell_ash-on
      color: "#A7FFA7"
      visible: false
    - map: [ "enum.ExpendableLightVisualLayers.Overlay" ]
      sprite: _RMC14/Objects/Misc/flares.rsi
      state: starshell_ash
  - type: Icon
    sprite: _RMC14/Objects/Misc/flares.rsi
    state: starshell_ash
  - type: PointLight
    color: "#FFCCCC"
    energy: 1.5
  - type: ExpendableLight
    pickupWhileOn: false
    glowDuration: 375
    fadeOutDuration: 30
    spentName: expendable-light-starshell-ash-empty-name
    spentDesc: expendable-light-starshell-ash-empty-desc
    iconStateSpent: starshell_ash-empty
    loopedSound: null
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour
      id: turn_on
      maxDuration: 5.0
      startValue: 2.5
      endValue: 7.0
    - !type:FadeBehaviour
      id: fade_out
      maxDuration: 375
      startValue: 7.0
      endValue: 1.0

