# Standard Tents
- type: entity
  parent: BaseItem
  id: RMCTentUNMCStandardFolded
  name: "складений польовий намет"
  description: "Стандартний польовий намет. Це універсальна версія. Розгорни в придатному місці для атмосфери мікро-FOB. ВХІД ПІВДЕННИЙ."
  components:
    - type: Item
      size: Huge
    - type: Sprite
      sprite: _RMC14/Objects/Tents/folded_tents.rsi
      layers:
        - state: base_tent
    - type: RMCDeployable
      # As an example all fields are listed here even if their values match the default value
      deployTime: 10
      collapseTime: 10
      deployArea:
        !type:PhysShapeAabb
        bounds: "-0.4,0.6,1.4,4.4" # The non-perfect rectangle allows the tent to be placed close to the walls
      collapseToolPrototype: CMEntrenchingTool
      areaBlockedCheck: true
      failIfNotSurface: true
      deploySetups:
        - prototype: RMCTentUNMCStandard
          neverRedeployableSetup: false
          mode: ReactiveParental
          anchor: true
          offset: 0.2, 0
          angle: 0

- type: entity
  parent: RMCTentUNMCStandardFolded
  id: RMCTentUNMCBigFolded
  name: "складений великий намет"
  description: "Стандартний польовий намет. Це універсальна, велика версія. Розгорни в придатному місці для атмосфери мікро-FOB. ВХІД ПІВДЕННИЙ."
  components:
    - type: RMCDeployable
      deployTime: 10
      collapseTime: 10
      deployArea:
        !type:PhysShapeAabb
        bounds: "-0.4,0.6,2.1,4.4" # The non-perfect rectangle allows the tent to be placed close to the walls
      collapseToolPrototype: CMEntrenchingTool
      areaBlockedCheck: true
      failIfNotSurface: true
      deploySetups:
        - prototype: RMCTentUNMCStandard
          neverRedeployableSetup: false
          mode: ReactiveParental
          anchor: true
          offset: 0.2, 0
          angle: 0

- type: entity
  parent: RMCTentUNMCStandardFolded
  id: AU14TentBigFoldedSurgical
  name: "складений хірургічний намет"
  description: "Великий хірургічний польовий намет. Цей оснащений сучасними польовими хірургічними засобами. ВХІД ПІВДЕННИЙ."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Tents/folded_tents.rsi
    layers:
    - state: base_tent
    - state: med_base
  - type: RMCDeployable
    deployTime: 10
    collapseTime: 10
    deployArea:
      !type:PhysShapeAabb
      bounds: "-0.4,0.6,2.1,4.4" # The non-perfect rectangle allows the tent to be placed close to the walls
    collapseToolPrototype: CMEntrenchingTool
    areaBlockedCheck: true
    failIfNotSurface: true
    deploySetups:
    - prototype: AU14TentBigMedical
      neverRedeployableSetup: false
      mode: ReactiveParental
      anchor: true
      offset: 0, 0
      angle: 0
    - prototype: AU14VendorBloodFieldPowered
      mode: Reactive
      offset: -1, 0.5
    - prototype: AU14IVFoldable
      mode: Reactive
      offset: 0, 0.5
    - prototype: RMCTableBrown
      mode: Reactive
      offset: -1, -0.5
    - prototype: RMCTableBrown
      mode: Reactive
      offset: -1, -1.5
    - prototype: RMCTableBrown
      neverRedeployableSetup: true
      anchor: false
      offset: 1, 0.5
    - prototype: CMSurgicalCaseFilled
      neverRedeployableSetup: true
      offset: 1, 0.5
    - prototype: CMPortableSurgicalBed
      neverRedeployableSetup: true
      anchor: false
      offset: 1, -0.5

- type: entity
