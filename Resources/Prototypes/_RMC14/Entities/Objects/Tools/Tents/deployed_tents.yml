- type: entity
  abstract: true
  parent: BaseStructure
  id: RMCTentBase
  name: "Польовий намет"
  description: "Стандартний намет. Це універсальна версія. Розгорни в придатному місці для атмосфери мікро-FOB. Комтехнік не входить. ВХІД ПІВДЕННИЙ."
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    sprite: _RMC14/Objects/Tents/deployed_tents.rsi
    offset: 1,0
    drawdepth: Overdoors
    layers:
    - state: standard_frame
    - state: standard_canvas
      map: [ "enum.ItemCamouflageLayers.Layer" ]
    - state: standard_roof
      map: [ "enum.ItemCamouflageLayers.Layer2", "standard_roof" ]
  - type: InteractionTransparency
  - type: RMCSpriteFade
    targetAlpha: 0.0
    changeRate: 6.0
    reactToMouse: false
    fadeLayers:
    - "standard_roof"
  - type: ItemCamouflage
    colors:
      Jungle: "#9a9839"
      Desert: "#ffd2a6"
      Snow: "#ddcbc9"
      Classic: "#c7e7d9"
      Urban: "#acb8c7"
  - type: Corrodible
    isCorrodible: false
  - type: Appearance
  - type: Fixtures
    fixtures:
      fix1: # Left Wall
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-2.5,-1.4,1"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
        - InteractImpassable
      fix-2: # Right Wall
        shape:
          !type:PhysShapeAabb
          bounds: "0.4,-2.5,0.5,1"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
        - InteractImpassable
      fix-3: # Back Wall
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,0.4,0.5,1.5"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
        - InteractImpassable
  - type: CollisionWake
    enabled: false
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: RMCBlockWeather

