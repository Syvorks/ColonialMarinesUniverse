# Reagent "Gas" Canisters /obj/item/reagent_container/glass/canister
# Canisters can only transfer reagents OUT to reagent tanks, but CAN receive reagents from other containers.
- type: entity
  abstract: true
  parent: BaseItem
  id: RMCReagentGasTankBase
  components:
  - type: Sprite
    sprite: Objects/Tanks/generic.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Tanks/generic.rsi
  - type: Clothing
    quickEquip: false
    sprite: Objects/Tanks/generic.rsi
    slots:
    - suitStorage
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 400
  - type: SolutionTransfer
    transferAmount: 100
    minTransferAmount: 50
    maxTransferAmount: 400
    canChangeTransferAmount: true
    transferAmounts:
    - 50
    - 100
    - 200
    - 300
    - 400
  - type: UserInterface
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: StaticPrice
    price: 40
  - type: Tag
    tags:
    - ChemDispensable
  - type: MixableSolution
    solution: beaker
  - type: FitsInDispenser
    solution: beaker
  - type: RefillableSolution
    solution: beaker
  - type: DrainableSolution
    solution: beaker
  - type: ExaminableSolution
    solution: beaker
  - type: DrawableSolution
    solution: beaker
  - type: InjectableSolution
    solution: beaker
  - type: RMCSolutionTransferWhitelist
    popup: rmc-canister-transfer-out-whitelist
    sourceWhitelist: # Only allow transferring OUT from canister to reagent tanks.
      tags:
      - RMCTankReagent
  - type: SolutionItemStatus
    solution: beaker
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -4
      - !type:SpillBehavior
        solution: beaker
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 2
    damage: {}
  - type: DnaSubstanceTrace

