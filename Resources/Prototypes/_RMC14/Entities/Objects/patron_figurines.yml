  description: "Ця високоякісна фігурка зображує Кайзера «Смертебажаний» Валентайна, елітного медика UNMC, відомого своїм перфекціоністським ставленням до лікування та безрозсудним нехтуванням власною безпекою при евакуації загиблих. Вирізьблена з винятковою точністю, фігура показує його бездоганно та ретельно розкладені медичні інструменти, що контрастують з його побитою в боях бронею, відображаючи як його дисципліну, так і небезпеку, в яку він постійно кидається. Його зосереджений вираз обличчя дивиться через тріснутий візор, одна рука стискає компактний сканер, а друга тягнеться до підставки, всипаної уламками з розбитим бетоном і частково оголеною емблемою UNMC. Преміальне фарбування, шарувате тонування та дрібне зістарювання надають усьому виробу кінематографічного реалізму, гідного присвяти медику, який відмовляється втрачати пацієнта — навіть ціною власного життя."
