- type: entity
  parent: CMIDCardBase
  id: RMCIDCardTSEPA
  name: "срібний значок ПУ ІТС"
  description: "Срібний значок, що позначає його носія як констебля ПУ ІТС. Це знак справедливості, авторитету й захисту. Захищаючи тих, хто не може. Цей значок уособлює відданість присязі, що завжди дотримується."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/CMIDs/tsepa_silver.rsi
    state: tsepa
  - type: Clothing
    slots:
    - idcard
    sprite: _RMC14/Objects/CMIDs/tsepa_silver.rsi
  - type: ItemIFF
    factions:
    - FactionTSE

