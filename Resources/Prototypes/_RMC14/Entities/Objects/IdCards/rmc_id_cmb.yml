- type: entity
  parent: CMIDCardBase
  id: RMCIDCardCMBDeputy
  name: "срібний значок депутата БКМ"
  description: "Срібний значок, що позначає його носія як депутата БКМ. Це знак справедливості, авторитету й захисту. Захищаючи тих, хто не може. Цей значок уособлює відданість присязі, що завжди дотримується."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/CMIDs/cmb_deputy.rsi
    state: icon
  - type: Clothing
    slots:
    - idcard
    sprite: _RMC14/Objects/CMIDs/cmb_deputy.rsi
  - type: PresetIdCard
    job: CMBureauDeputy

- type: entity
  parent: RMCIDCardCMBDeputy
  id: RMCIDCardCMBRiotOfficer
  name: "срібний значок офіцера розгону заворушень БКМ"
  description: "Срібний значок, що позначає його носія як офіцера розгону заворушень БКМ. Це знак справедливості, авторитету й захисту. Захищаючи тих, хто не може. Цей значок уособлює відданість присязі, що завжди дотримується."

- type: entity
  parent: CMIDCardBase
  id: RMCIDCardCMBMarshal
  name: "золотий значок маршала БКМ"
  description: "Жаданий золотий значок, що позначає його носія як одного з небагатьох маршалів БКМ, що патрулюють зовнішні околиці. Це знак справедливості, авторитету й захисту. Захищаючи тих, хто не може. Цей значок уособлює відданість присязі, що завжди дотримується."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/CMIDs/cmb_marshal.rsi
    state: icon
  - type: Clothing
    slots:
    - idcard
    sprite: _RMC14/Objects/CMIDs/cmb_marshal.rsi

