- type: entity
  parent: RMCPlushieSharkBlue
  id: RMCShorkMedicalOfficer
  name: "плюшевий медичний офіцер «Шорк»"
  description: "Медичний офіцер «Шорк» розчарований, що знову бачить тебе на операції. Може, варто краще піклуватися про себе?"
  suffix: RMC
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Fun/smo.rsi
    state: SMO
  - type: Item
    inhandVisuals:
      left:
      - state: SMO-inhand-left
      right:
      - state: SMO-inhand-right

- type: entity
  parent: CMPlushieBase
  id: CMPlushieFarwa
  name: "плюшевий Фарва"
  description: "Плюшева лялька Фарва. М'яка та заспокійлива!"
  components:
  - type: Sprite
    state: farwa

- type: entity
  parent: CMPlushieBase
  id: CMPlushieBarricade
  name: "плюшева барикада"
  description: "Чудова, щоб стискати, коли тобі страшно. Або трохи боляче. Або в будь-якій іншій ситуації."
  components:
  - type: Sprite
    state: barricade

- type: entity
  parent: CMPlushieBase
  id: CMPlushieBee
  name: "плюшева бджола"
  description: "Мила іграшка, що пробуджує бойовий дух у найстриманіших морпіхів."
  components:
  - type: Sprite
    state: bee

- type: entity
  parent: CMPlushieBase
  id: CMPlushieRock
  name: "плюшева скеля"
  description: "Принаймні на бирці написано, що це плюшева іграшка."
  components:
  - type: Sprite
    state: rock

- type: entity
  parent: CMPlushieBase
  id: CMPlushieTherapy
  name: "терапевтична плюшева іграшка"
  description: "Терапевтична іграшка, що допомагає морпіхам відновлюватися від психічних і поведінкових розладів після травм бойів."
  components:
  - type: Sprite
    layers:
    - state: therapy
      map: [ "enum.DamageStateVisualLayers.Base" ]
  - type: RandomSprite
    available:
    - enum.DamageStateVisualLayers.Base:
        therapy: Rainbow

- type: entity
  parent: CMPlushieBase
  id: CMPlushieRunnerBeret
  name: "терапевтична плюшева іграшка XX"
  description: "Не сумуй! Радій (що ти живий)!"
  components:
  - type: Sprite
    state: runner_beret
  - type: Rotatable

- type: entity
  parent: CMPlushieBase
  id: RCMPlushieRounyLizard
  name: "дурненька плюшева Роуні"
  description: "Дурненька плюшева Роуні, виготовлена ОНМП для зменшення стресу в морпіхів; виявилася високоефективною, коли її кидати в стіни."
  components:
  - type: Sprite
    state: rouny_plushie

- type: entity
  parent: RMCPlushieBaseAdmin
  id: RMCPlushieAlec
  name: "примітна плюшева іграшка"
  description: "Ти майже відчуваєш злість, що від неї віє. На спині — невелика бирка зі списком кількох дешевих і гіпоалергенних тканин, з яких вона зроблена. У самому низу — назва виробника, Drake Industries."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Fun/alec_plushie.rsi
    state: icon
  - type: Clothing
    sprite: _RMC14/Objects/Fun/alec_plushie.rsi
  - type: EmitSoundOnUse
    sound:
      collection: bottleOpenSounds
  - type: EmitSoundOnActivate
    sound:
      collection: bottleOpenSounds

- type: entity
  parent: RMCPlushieBaseAdmin
  id: RMCPlushieNyx
  name: "проклята плюшева іграшка"
  description: "Подейкують, якщо попросити в цієї плюшевої іграшки металу — твоя душа потрапить у яму. Також подейкують, що ця плюшева іграшка зроблена з 99% бавовни."
  components:
  - type: Sprite
    state: plushie_moth
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: Food
    requiresSpecialDigestion: true
    useSound:
      path: /Audio/Voice/Moth/moth_chitter.ogg

- type: entity
  parent: RMCPlushieNyx
  id: RMCPlushieMotivationalMoth
  name: "мотиваційна морпіх-метелиха"
  description: "М'який, пухнастий маленький морпіх-компаньйон для тих, кому просто потрібна невелика мотивація, щоб дійти до фінішу. Ти впораєшся, такточно! Радісно цвірінькає, коли її стискати!"
  suffix: DO NOT MAP
  components:
  - type: Sprite
    state: plushie_wawa

- type: entity
  parent: RMCPlushieBaseAdmin
  id: RMCPlushieXippy
  name: "кіспі"
  description: "Проклятий агент хаосу й насильства."
