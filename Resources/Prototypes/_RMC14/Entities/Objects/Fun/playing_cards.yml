- type: entity
  abstract: true
  parent: BaseItem
  id: RMCPlayingCardBase
  categories: [ HideSpawnMenu ]
  name: "Гральна карта"
  description: "Стандартна гральна карта."
  components:
  - type: PlayingCard
  - type: Sprite
    sprite: _RMC14/Objects/Fun/playing_cards.rsi
    state: spades_ace
  - type: Item
    size: Tiny

# Individual card (spawned from deck)
- type: entity
  parent: RMCPlayingCardBase
  id: RMCPlayingCard
  categories: [ HideSpawnMenu ]

# Hand of cards
- type: entity
  parent: BaseItem
  id: RMCPlayingCardHand
  name: "Рука з картами"
  description: "Рука з гральними картами."
  categories: [ HideSpawnMenu ]
  components:
  - type: PlayingCardHand
  - type: Sprite
    sprite: _RMC14/Objects/Fun/playing_cards.rsi
    state: back_deck
  - type: Item
  - type: UseDelay
    delay: 0.1
  - type: UserInterface
    interfaces:
      enum.PlayingCardHandUi.Key:
        type: PlayingCardHandBui

# Deck of cards
- type: entity
  parent: BaseItem
  id: RMCPlayingCardDeck
  name: "Колода карт"
  suffix: RMC
  description: "Клянуся, гра називалася «Золота рибка»!"
  components:
  - type: PlayingCardDeck
    cardPrototype: RMCPlayingCard
  - type: Sprite
    sprite: _RMC14/Objects/Fun/playing_cards.rsi
    state: deck
  - type: Item
  - type: UseDelay
    delay: 0.1
