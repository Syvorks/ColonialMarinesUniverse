# Ketchup
- type: reagent
  id: RMCKetchup
  name: reagent-name-ketchup
  group: Foods
  desc: reagent-desc-ketchup
  physicalDesc: reagent-physical-desc-tangy
  flavor: tomato
  color: "#731008"
  recognizable: true
  metabolisms:
    Food:
      metabolismRate: 0.1
      effects:
      - !type:Nutritious
        potency: 2
        nutFactor: 5
        nutMetabolism: 0.1

- type: entity
  parent: RMCCondiment
  id: RMCCondimentKetchup
  name: "кетчуп"
  description: "Ти вже відчуваєш себе більш американцем."
