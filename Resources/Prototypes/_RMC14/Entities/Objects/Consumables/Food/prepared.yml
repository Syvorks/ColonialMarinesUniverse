# Festive

- type: entity
  parent: CMMarinePreparedMealBase
  id: RMCMarinePreparedMealCookies
  name: "Страва «X-MAS»: цукрове печиво"
  description: "Страва M25 «Цукрове печиво» була розроблена, щоб дати морпіхам відчуття різдвяної радості. Але, на подив старших офіцерів, заходи економії — простого виготовлення протеїнових батончиків у формі печива з шоколадним замінником і заміни очікуваного молока штучно забарвленою водою — не сподобалися більшості морпіхів."
  components:
  - type: Sprite
    state: cookies
  - type: Food
    transferAmount: 8
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
        reagents:
        - ReagentId: Nutriment
          Quantity: 15
        - ReagentId: RMCSugar
          Quantity: 9

- type: entity
  parent: CMMarinePreparedMealBase
  id: RMCMarinePreparedMealGingerbread
  name: "Страва «X-MAS»: імбирне печиво"
  description: "Страва M25 «Імбирне печиво» була розроблена, щоб дати морпіхам зручний і дешевий доступ до імбирного печива як заміни щорічних занять із виготовлення імбирного печива через зростання витрат і комічно низькі показники успіху Базового курсу святкових заходів. Однак через заходи економії це печиво рідко надихає на щастя чи святковий настрій."
  components:
  - type: Sprite
    state: gingerbread
  - type: Food
    transferAmount: 8
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
        reagents:
        - ReagentId: Nutriment
          Quantity: 15
        - ReagentId: RMCSugar
          Quantity: 9

- type: entity
  parent: CMMarinePreparedMealBase
  id: RMCMarinePreparedMealFruitcake
  name: "Страва «X-MAS»: фруктовий пиріг"
  description: "Страва M25 «Фруктовий пиріг» була третьою стравою, розробленою комітетом офіцерів у рамках Проєкту M25; це проявляється в жахливій твердості та терпкості хліба й родзинкових фруктів. Можна логічно дедукувати, що люди, які запропонували цей варіант, гірші за Грінча та Скнару разом узятих, як і ті, хто розробив і приготував цей фруктовий пиріг."
  components:
  - type: Sprite
    state: fruit_cake
  - type: Food
    transferAmount: 8
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
        reagents:
        - ReagentId: Nutriment
          Quantity: 15
        - ReagentId: RMCSugar
          Quantity: 9

