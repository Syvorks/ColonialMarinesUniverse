- type: entity
  abstract: true
  parent: CMFoodBase
  id: CMBarFoodBase
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Food/bar.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
        reagents:
        - ReagentId: Nutriment
          Quantity: 8
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Consumable/Food/bar.rsi
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food
  - type: DrawableSolution
    solution: food

- type: entity
  parent: CMBarFoodBase
  id: CMMarineProteinBar
  name: "черствий протеїновий батончик морпіха"
  description: "Найбільш фальшиво виглядаючий протеїновий батончик, який ви коли-небудь бачили, покритий шоколадним замінником. Порошок, що використовується для його виготовлення, є замінником замінника замінника сироватки."
  components:
  - type: Sprite
    state: protein_bar

- type: entity
  parent: CMBarFoodBase
  id: RMCMarineRCMSnackBar
  name: "батончик «Бісквіт Браун»"
  description: "Диявол у маскуванні. Швидко з'їдається, з досить приємним смаком та текстурою, але споживання більше одного за короткий проміжок часу гарантує, що ви не будете копати ями для туалетів у полі щонайменше два тижні."
  components:
  - type: Sprite # TODO RMC14 find a proper sprite for this
    sprite: _RMC14/Objects/Consumable/Food/packaged.rsi
    state: barcardine-o