# Components
- type: entity
  abstract: true
  parent: CMMREComponentBase
  id: CMMRESideComponentBase
  description: "Бічний компонент MRE. Містить гарнір, який треба їсти разом з основною стравою."
  components:
  - type: Sprite
    state: side

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentCracker
  name: "компонент MRE (крекер)"
  description: "Бічний компонент MRE. Містить гарнір, який треба їсти разом з основною стравою. Цей — крекер."
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodCracker

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentRiceOnigiri
  name: "компонент MRE (рисовий оніґірі)"
  description: "Бічний компонент MRE. Містить гарнір, який треба їсти разом з основною стравою. Цей — рисовий оніґірі."
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodRiceOnigiri

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentMashedPotatoes
  name: "компонент MRE (картопляне пюре)"
  description: "Бічний компонент MRE. Містить гарнір, який треба їсти разом з основною стравою. Цей — картопляне пюре."
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodMashedPotatoes

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentRisotto
  name: "компонент MRE (різотто)"
  description: "Бічний компонент MRE. Містить гарнір, який треба їсти разом з основною стравою. Цей — різотто."
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodRisotto

# Foods
- type: entity
  abstract: true
  parent: CMMREFoodBase
  id: CMMREFoodSide
  components:
  - type: Food
    transferAmount: 1.6
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 8
        reagents:
        - ReagentId: Nutriment
          Quantity: 6
        - ReagentId: TableSalt
          Quantity: 2
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodCracker
  name: "крекер"
  description: "Вміст стандартного MRE морпіха. Цей — крекер."
  components:
  - type: Sprite
    state: cracker
  - type: FlavorProfile
    flavors:
    - Cracker

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodRiceOnigiri
  name: "рисовий оніґірі"
  description: "Вміст стандартного MRE морпіха. Цей — рисовий оніґірі."
  components:
  - type: Sprite
    state: rice_onigiri
  - type: FlavorProfile
    flavors:
    - RiceOnigiri

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodMashedPotatoes
  name: "картопляне пюре"
  description: "Вміст стандартного MRE морпіха. Цей — картопляне пюре."
  components:
  - type: Sprite
    state: mashed_potatoes
  - type: FlavorProfile
    flavors:
    - Potato

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodRisotto
  name: "різотто"
  description: "Вміст стандартного MRE морпіха. Цей — різотто."
  components:
  - type: Sprite
    state: risotto
  - type: FlavorProfile
    flavors:
    - Risotto

# Flavors
- type: flavor
  id: Cracker
  flavorType: Complex
  description: "як крекери"

- type: flavor
  id: RiceOnigiri
  flavorType: Complex
  description: "як рис"

- type: flavor
  id: Potato
  flavorType: Complex
  description: "як картопля"

- type: flavor
  id: Risotto
  flavorType: Complex
  description: "як різотто"
