# Foods
- type: entity
  abstract: true
  parent: CMMREFoodBase
  id: CMMREFoodDessert
  components:
  - type: Food
    transferAmount: 1
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 3
        reagents:
        - ReagentId: Nutriment
          Quantity: 2
        - ReagentId: RMCSugar
          Quantity: 2
        - ReagentId: Theobromine
          Quantity: 1

- type: entity
  parent: CMMREFoodDessert
  id: CMMREFoodSpicedApples
  name: "пряні яблука"
  description: "Вміст стандартного MRE морпіха. Цей — пряні яблука."
  components:
  - type: Sprite
    state: spiced_apples
  - type: FlavorProfile
    flavors:
    - SpicedApples

