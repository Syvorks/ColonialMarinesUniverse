# CLF

- type: entity
  abstract: true
  parent: CMMREFoodMain
  id: RMCMREFoodCLF
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Food/mre_clf.rsi
  - type: Food
    transferAmount: 4
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 26
        - ReagentId: TableSalt
          Quantity: 4

- type: entity
  parent: RMCMREFoodCLF
  id: RMCMREFoodMeatSlab
  name: "загорнутий шмат м'яса"
  description: "Загорнутий, малопрожарений шмат якогось м'яса, швидко обсмаженого на грилі."
  components:
  - type: Sprite
    state: open_meat
  - type: FlavorProfile
    flavors:
    - meaty

- type: entity
  parent: RMCMREFoodCLF
  id: RMCMREFoodMeatSlabCheese
  name: "загорнутий сирний шмат м'яса"
  description: "Загорнутий, малопрожарений шмат якогось м'яса, швидко обсмаженого на грилі і вкритого розплавленим сиром. Чудово жирний."
  components:
  - type: Sprite
    state: open_meat_cheese
  - type: FlavorProfile
    flavors:
    - meaty
    - cheesy

- type: entity
  parent: RMCMREFoodCLF
  id: RMCMREFoodBread
  name: "загорнутий хліб на заквасці"
  description: "Загорнута, маленька буханка сухого хліба на заквасці."
  components:
  - type: Sprite
    state: open_bread
  - type: FlavorProfile
    flavors:
    - bread

- type: entity
  parent: RMCMREFoodMeatSlabCheese
  id: RMCMREFoodMargaritaPizza
  name: "загорнута піца маргарита"
  description: "Загорнута, маленька піца маргарита."
  components:
  - type: Sprite
    state: open_pizza

# SPP survival ration

- type: entity
  parent: CMMREFoodMain
  id: RMCMRESPPSurvivalRationTypeA
  name: "пайок виживання"
  suffix: Type A
  description: "Компактний шматок сублімованого м'яса або риби з поживними добавками у вигляді щільного порошку. Маючи мало смаку чи кольору через підготовку до тривалого зберігання, привабливість цього предмета полягає виключно в його здатності забезпечити прожиток."
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    state: spp_1

- type: entity
  parent: CMMREFoodMain
  id: RMCMRESPPSurvivalRationTypeB
  name: "пайок виживання"
  suffix: Type B
  description: "Компактна кулька з тістоподібного рису чи вівсу з поживними добавками у вигляді щільного порошку. Маючи мало смаку чи кольору через підготовку до тривалого зберігання, привабливість цього предмета полягає виключно в його здатності забезпечити прожиток."
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    state: spp_2

