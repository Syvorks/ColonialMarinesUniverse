# Foods
- type: entity
  abstract: true
  parent: CMMREFoodBase
  id: CMMREFoodMain
  components:
  - type: Food
    transferAmount: 4
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 14
        - ReagentId: TableSalt
          Quantity: 6
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food

- type: entity
  parent: CMMREFoodMain
  id: CMMREFoodBonelessPorkRibs
  name: "свинячі ребра без кістки"
  description: "Вміст стандартного MRE морпіха. Цей — свинячі ребра без кістки."
  components:
  - type: Sprite
    state: boneless_pork_ribs
  - type: FlavorProfile
    flavors:
    - BonelessPorkRibs

- type: entity
