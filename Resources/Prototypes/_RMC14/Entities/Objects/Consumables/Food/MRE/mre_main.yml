  - type: Sprite
    state: grilled_chicken
  - type: FlavorProfile
    flavors:
    - GrilledChicken

- type: entity
  parent: CMMREFoodMain
  id: CMMREFoodPizzaSquare
  name: "квадратик піци"
  description: "Вміст стандартного MRE морпіха. Цей — квадратик піци."
