- type: entity
  id: CMTarbackCigar
  parent: Cigar
  name: "сигара «Тарбек»"
  description: "Тарбеки від Рейсленд Тобакко. Головний санітарний лікар оголосив, що куріння Тарбеків може бути небезпечним для здоров'я. Рейсленд Тобакко оголосила, що Головний санітарний лікар — суча. Скручено в Колумбії."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/tarback.rsi
    state: unlit-icon
  - type: Tag
    tags:
      - Cigar
      - Trash
  - type: Clothing
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/tarback.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
    sprite: Objects/Consumable/Smokeables/Cigars/cigar.rsi
    heldPrefix: unlit
  - type: HelmetAccessory
    rsi:
      sprite: _RMC14/Objects/Clothing/HelmetGarb/Smoking/cigar.rsi
      state: helmet

- type: entity
  id: CMTarbackCigarSpent
  parent: CMTarbackCigar
  suffix: spent
  components:
  - type: Sprite
    state: burnt-icon
  - type: Smokable
    state: Burnt
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
  - type: Tag
    tags:
      - Cigar
      - Trash
      - Burnt

- type: entity
  id: RMCTarbackTube
  parent: BaseStorageItem
  name: "тубус «Тарбек»"
  description: "Одна сигара «Тарбек» у захисному металевому тубусі. Приблизно настільки дешево, наскільки можна. Скручено в Колумбії."
  components:
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - belt
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/tarback_tube.rsi
    state: tarbacktube_empty
    layers:
    - state: tarbacktube_empty
      map: ["openLayer", "emptyLayer"]
    - state:  tarbacktube
      map: ["closedLayer"]
      visible: false
  - type: Storage
    grid:
    - 0,0,0,1
    whitelist:
      tags:
      -  Cigar
      -  Trash
  - type: StorageFill
    contents:
    - id: CMTarbackCigar
  - type: CMStorageVisualizer
    storageClosed: closedLayer
    storageOpen: openLayer
    storageEmpty: emptyLayer
  - type: Appearance
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

# Shio Royals
- type: entity
  parent: CMTarbackCigar
  id: RMCShioCigar
  name: "сигара «Шіо Роялс»"
  description: "«Шіо Роялс», виробляється Вестон-Ямада. Назва якимось чином натякає на хвилі та море. Скручено в Японії."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/shio_royals.rsi
    state: unlit-icon
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/shio_royals.rsi
    heldPrefix: unlit

- type: entity
  parent: RMCShioCigar
  id: RMCShioCigarSpent
  suffix: spent
  components:
  - type: Sprite
    state: burnt-icon
  - type: Smokable
    state: Burnt
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
  - type: Tag
    tags:
    - Cigar
    - Trash
    - Burnt

- type: entity
  parent: RMCTarbackTube
  id: RMCShioRoyalsTube
  name: "тубус «Шіо Роялс»"
  description: "Одна сигара «Шіо Роялс» у срібному захисному металевому тубусі. Попри заяви як Вестон-Ямада, так і конкуруючих компаній з виробництва сигар, ці сигари абсолютно середняки. Скручено в Японії."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/shio_royals_tube.rsi
    state: shioroyalstube_empty
    layers:
    - state: shioroyalstube_empty
      map: ["openLayer", "emptyLayer"]
    - state: shioroyalstube
      map: ["closedLayer"]
      visible: false
  - type: StorageFill
    contents:
    - id: RMCShioCigar


