  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Smokeables/Matchboxes/brown_matchbook.rsi
  - type: Item
    sprite: _RMC14/Objects/Consumable/Smokeables/Matchboxes/brown_matchbook.rsi

