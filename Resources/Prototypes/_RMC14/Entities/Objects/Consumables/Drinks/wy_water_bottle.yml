- type: entity
  parent: DrinkBottlePlasticBaseFull
  id: CMDrinkWEYAWaterBottle30
  name: "пляшкова джерельна вода Ві-Ю"
  description: "Перецінена «джерельна» вода. Розлита корпорацією Ві-Ю."
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50
        reagents:
        - ReagentId: Water
          Quantity: 30
  - type: Drink
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_water_bottle.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "icon_open"}
          False: {state: "icon"}
  - type: Item
    size: Small
  - type: DamageOnLand
    damage: {}
  - type: DamageOtherOnHit
    damage: {}
  - type: Appearance
  - type: Sealable
  - type: MREItem
  - type: Destructible
    thresholds: [] # TODO RMC14 destroy on explosion unless inside a container
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 5

- type: entity
  parent: CMDrinkWEYAWaterBottle30
  id: RMCDrinkWEYABugJuice
  name: "протеїновий напій «Сік Жука» від Вестон-Ямада"
  description: "Пластикова пляшка бренду Ві-Я, повна токсичної на вигляд зеленої гущі. На смак як ківі, але ви більш ніж впевнені, що його там немає."
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: RMCJuiceBug
          Quantity: 30
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_bug_juice.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-bug-juice

- type: entity
  parent: CMDrinkWEYAWaterBottle30
  id: RMCDrinkWEYACocoMilk
  name: "пляшкове кокосове молоко Вестон-Ямада"
  description: "Багате на вітаміни та (штучний) смак, втамовує спрагу за кілька ковтків. Розлито корпорацією Вестон-Ямада."
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: RMCCocoMilk
          Quantity: 30
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_coco_milk.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]

- type: entity
  parent: CMDrinkWEYAWaterBottle30
  id: RMCDrinkWEYASoylent
  name: "преміум шоколадний соєвий напій Вестон-Ямада"
  description: "Пластикова пляшка, повна тягучої смакоти зі смаком шоколаду. В одній пляшці достатньо калорій для обіду — не випивайте її за один присіст, краще не ризикувати болем у шлунку."
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: RMCSoyMilk
          Quantity: 10
        - ReagentId: RMCChocolateDrink
          Quantity: 10
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_soylent.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-soylent
