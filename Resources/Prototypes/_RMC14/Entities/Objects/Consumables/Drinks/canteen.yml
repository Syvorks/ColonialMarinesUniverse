- type: entity
  abstract: true
  parent: DrinkBase
  id: CMCanteenBase
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/canteen.rsi
  - type: Item
    size: Small
  - type: Drink
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 60
        reagents:
        - ReagentId: Water
          Quantity: 60
  - type: Tag
    tags:
    - DrinkGlass
  - type: SolutionTransfer
    transferAmount: 60
    maxTransferAmount: 60
    canChangeTransferAmount: true
    transferAmounts:
    - 5
    - 10
    - 15
    - 25
    - 30
    - 40
    - 60
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: RMCFlask

- type: entity
  parent: CMCanteenBase
  id: CMCanteen
  name: "фляга"
  description: "Ви робите ковток зі своєї надійної фляги морпіха..."
  components:
  - type: Sprite
    state: canteen

- type: entity
  parent: CMCanteenBase
  id: CMMetalFlask
  name: "металева фляга"
  description: "Металева фляга з пристойною ємністю для рідини."
  suffix: Empty
  components:
  - type: Sprite
    state: flask
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 60

- type: entity
  parent: CMCanteenBase
  id: CMMarineFlask
  name: "фляга морпіха"
  description: "Металева фляга з тисненим логотипом Корпусу морпіхів США, ймовірно, наповнена сумішшю води, моторної оливи та медичного спирту."
  components:
  - type: Sprite
    state: flask_marine

- type: entity
  parent: CMCanteenBase
  id: CMWEYAFlask
  name: "фляга Ві-Я"
  description: "Металева фляга з тисненим фірмовим логотипом Ві-Ю, яку, ймовірно, замовив якийсь корпоративний підлабузник, щоб мати її в торгових автоматах для фляг військових кораблів UA."
  components:
  - type: Sprite
    state: flask_we_ya

- type: entity
  parent: [CMCanteenBase, DrinkFlaskVisualsOpenable]
  id: RMCWeYaThermos
  name: "термос Ві-Я"
  description: "Гладкий металевий термос, прикрашений у кольорах корпорації Вейланд-Ютані. Маркетинг стверджує, що він витримує силу, еквівалентну ядерному вибуху, але це, мабуть, лише слова піарників."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/weya_thermos.rsi
