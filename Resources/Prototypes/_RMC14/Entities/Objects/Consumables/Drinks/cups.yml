- type: entity
  parent: DrinkBaseMug
  id: RMCCoffeeCup
  name: "кухоль"
  description: "Керамічний кухоль. Практично гарантовано впаде та проллє пекучо-гарячий напій на вашу новеньку сорочку. Ой."
  suffix: RMC
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: Drink
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/coffee_cup.rsi
    layers:
      - state: icon-0
      - map: ["enum.SolutionContainerLayers.Fill"]
        state: icon-3
        visible: false
  - type: Item
    size: Small
  - type: DamageOnLand
    damage: {}
  - type: DamageOtherOnHit
    damage: {}
  - type: Appearance
  - type: Destructible
    thresholds: [] # TODO RMC14 destroy on explosion unless inside a container
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Tag
    tags:
    - DrinkGlass
  - type: PhysicalComposition
    materialComposition: {}

- type: entity
  parent: RMCCoffeeCup
  id: RMCCoffeeCupFilled
  suffix: RMC, Filled, RMCCoffee
  components:
    - type: SolutionContainerManager
      solutions:
        drink:
          maxVol: 30
          reagents:
          - ReagentId: RMCCoffee
            Quantity: 30

- type: entity
  parent: RMCCoffeeCup
  id: RMCMarineCorpsCup
  name: "кухоль UNMC"
  description: "Міцний кухоль військового зразка з емблемою UNMC, створений для витривалості у будь-якій місії — на борту корабля чи в полі."
  components:
  - type: Sprite
    layers:
      - sprite: _RMC14/Objects/Consumable/Drinks/unmccup.rsi
        state: base
      - map: ["enum.SolutionContainerLayers.Fill"]
        sprite: _RMC14/Objects/Consumable/Drinks/coffee_cup.rsi
        state: icon-3
        visible: false

