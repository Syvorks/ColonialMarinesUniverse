- type: Tag
  id: Currency

- type: entity
  parent: SpaceCash
  id: RMCSpaceCash
  name: "долари"
  description: "Десять стодоларових купюр, надрукованих Скарбницею Об'єднаних Націй. Кожна прикрашена обличчям давно забутого дипломата колись могутньої планети. Ці купюри більше, ніж просто валюта — вони здаються живими, ніби несуть тягар стародавньої історії та суджень тих, хто колись керував величезними імперіями. Обличчя на кожній купюрі, здається, тихо й напружено стежать за тобою, ніби кожне з них вірить, що саме воно повинне бути в твоєму володінні.."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/spacecash.rsi
    layers:
    - state: spacecash
      map: ["base"]
  - type: Item
    size: Tiny
    shape: null
  - type: Tag
    tags:
    - Holdout
    - RMCSpaceCash
    - Currency
  - type: Stack
    stackType: Dollar
    count: 1
    baseLayer: base
    layerStates:
    - spacecash
    - spacecash_10
    - spacecash_20
    - spacecash_50
    - spacecash_100
    - spacecash_200
    - spacecash_500
    - spacecash_1000
  - type: StackLayerThreshold
    thresholds: [10, 20, 50, 100, 200, 500, 1000]
  - type: PhysicalComposition
    materialComposition:
      Dollar: 1
  - type: Appearance

- type: entity
  parent: RMCSpaceCash
  id: RMCSpaceCash1
  name: "однодоларова купюра"
  description: "Одна однодоларова купюра, надрукована Скарбницею США. Її дизайн містить зображення давно забутого діяча минулого, лідера, чия спадщина тепер мало що означає для населення США. Хоча вона має сентиментальну цінність для людей з певних частин країни, її фактична вартість мізерна. У більшості місць вона може дати тобі половину хот-доґа чи аналогічну дешеву закуску."

- type: material
  id: Dollar
  name: "однодоларова купюра"
  unit: materials-unit-bill
  stackEntity: RMCSpaceCash1
  icon: { sprite: /Textures/_RMC14/Objects/Misc/spacecash.rsi, state: spacecash }
  price: 1

