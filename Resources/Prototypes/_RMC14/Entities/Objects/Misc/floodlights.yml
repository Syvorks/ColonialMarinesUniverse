- type: entity
  parent: BaseStructureDynamic
  id: RMCSmallFloodlight
  name: "маленький прожектор"
  description: "Невелика цятка світла в темряві."
  components:
  - type: VehicleSmashable
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Misc/Lights/floodlight.rsi
    layers:
      - state: smallfloodon # Temporary until power works.
      - state: smallflood
        visible: false
        map: [ "light" ]
  - type: InteractionOutline
  - type: Repairable
  - type: Damageable
    damageContainer: Inorganic
  - type: PointLight
    enabled: true
    radius: 6
    netsync: false
    energy: 2
    offset: "0, 0"
    color: "#ECFFFF"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 1
          CMSheetGlass1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 50
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Appearance

- type: entity
  parent: RMCSmallFloodlight
  id: RMCSmallFloodlightUnanchored
  name: "маленький прожектор"
  description: "Невелика цятка світла в темряві."
  categories: [ HideSpawnMenu ]
  components:
    - type: Transform
      anchored: False
    - type: Physics
      bodyType: Dynamic

- type: entity
  parent: BaseStructure
  id: RMCTallFloodlight
  name: "високий прожектор"
  description: "Стовп світла в темряві."
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags:
    - Anchorable
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Misc/Lights/floodlightbig.rsi
    layers:
      - state: bigflood
      - state: bigfloodon
        visible: true
        map: [ "light" ]
    offset: "0.0,0.5"
    drawdepth: Mobs
  - type: Construction
    graph: RMCFloodlightBroken
    node: completed
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
  - type: PointLight
    enabled: true
    radius: 7
    netsync: false
    offset: "0,0.5"
    color: "#ECFFFF"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
  - type: Repairable
  - type: Corrodible # Repairable, not destructible.
    isCorrodible: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 50
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: light
  - type: RMCReactorPoweredLight
  - type: PreventAttackLightOff
  - type: RequireProjectileTarget

- type: entity
  parent: BaseStructure
  id: RMCFloodlightBroken
  name: "зламаний високий прожектор"
  description: "Приклеєна записка каже: «Щоб полагодити, відкрутіть панель, виламайте ломиком пошкоджений модуль, заваріть його, додайте 2 відрізки кабелю, потім закрийте панель»"
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags:
    - Anchorable
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Misc/Lights/floodlightbig.rsi
    state: broken
    offset: "0.0,0.5"
    drawdepth: Mobs
  - type: Construction
    graph: RMCFloodlightBroken
    node: start
  - type: InteractionOutline
  - type: Corrodible # Repairable, not destructible.
    isCorrodible: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 155
        mask:
        - MachineMask
        layer:
        - MachineLayer

# LZ Floodlights

- type: entity
  parent: BaseStructure
  id: RMCLZFloodlight
  name: "посадковий прожектор"
  description: "Потужне світло, яке зазвичай встановлюють біля посадкових зон для кращої видимості. Цей, схоже, прикручений болтами й його неможливо зрушити."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Misc/Lights/floodlight.rsi
    state: magical
  - type: InteractionOutline
  - type: PointLight
    enabled: true
    radius: 6
    energy: 2
    netsync: false
    color: "#ECFFFF"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 50
        mask:
        - HighImpassable
  - type: Corrodible
    isCorrodible: false
  - type: Appearance
  - type: Eye

- type: entity
  abstract: true
  id: LandingZoneLightBase
  name: "посадковий прожектор"
  description: "Посадкове світло; якщо мерехтить — тримайся подалі!"
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Lights/landinglight.rsi
    layers:
    - map: ["enum.LandingLightVisuals.Off"]
      state: landingstripe
    - map: [ "enum.LandingLightVisuals.On" ]
      state: landingstripe0
      visible: false
  - type: Appearance
  - type: Clickable
  - type: LandingLight
  - type: PointLight
    color: "#FF1A1A"
    energy: 1
    radius: 2
    softness: 1
    offset: "0, -0.5"
    enabled: false

- type: entity
  parent: LandingZoneLightBase
  id: LandingZoneLightOne
  suffix: 1

- type: entity
  parent: LandingZoneLightBase
  id: LandingZoneLightTwo
  suffix: 2
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Lights/landinglight.rsi
    layers:
    - map: ["enum.LandingLightVisuals.Off"]
      state: landingstripe
    - map: [ "enum.LandingLightVisuals.On" ]
      state: landingstripe1
      visible: false
  - type: LandingLight
    onState: landingstripe1

- type: entity
  parent: LandingZoneLightBase
  id: LandingZoneLightThree
  suffix: 3
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Lights/landinglight.rsi
    layers:
    - map: ["enum.LandingLightVisuals.Off"]
      state: landingstripe
    - map: [ "enum.LandingLightVisuals.On" ]
      state: landingstripe2
      visible: false
  - type: LandingLight
    onState: landingstripe2

- type: entity
  parent: LandingZoneLightBase
  id: LandingZoneLightFour
  suffix: 4
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Lights/landinglight.rsi
    layers:
    - map: ["enum.LandingLightVisuals.Off"]
      state: landingstripe
    - map: [ "enum.LandingLightVisuals.On" ]
      state: landingstripe3
      visible: false
  - type: LandingLight
    onState: landingstripe3

- type: entity
  parent: LandingZoneLightBase
  id: LandingZoneLightStanding
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Lights/landinglight.rsi
    layers:
    - map: ["enum.LandingLightVisuals.Off"]
      state: lz_spoke_light
    - map: [ "enum.LandingLightVisuals.On" ]
      state: lz_spoke_light1
      visible: false
  - type: LandingLight
    onState: lz_spoke_light1
  - type: PointLight
    color: "#FF1A1A"
    energy: 1.5
    radius: 4
    softness: 1
    enabled: false

