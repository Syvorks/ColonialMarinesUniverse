# PENS

- type: entity
  parent: Pen
  id: CMPen
  name: "ручка"
  description: "Звичайна ручка з чорним чорнилом."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: pen
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Misc/paper.rsi
    heldPrefix: pen
  - type: Clothing
    equippedPrefix: pen
    sprite: _RMC14/Objects/Misc/paper.rsi
    quickEquip: false
    slots:
    - Suitstorage
    - Ears
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 10

- type: entity
  parent: CMPen
  id: CMPenClicky # TODO RMC14 make it clicky
  name: "ручка WEYU"
  description: "Особливо клацальна ручка бренду WEYU з чорним чорнилом."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: weya_pen
  - type: Item
    sprite: _RMC14/Objects/Misc/paper.rsi

- type: entity
  parent: CMPen
  id: CMPenFountain
  name: "перова ручка"
  description: "Розкішне свідчення майстерності AEGIS, ця перова ручка — взірець дизайну та функціональності. Деталізована золотими акцентами та складними механізмами, ручка дозволяє швидко змінювати безліч кольорів чорнил простим обертом. Витвір прецизійної інженерії, кожен механізм усередині ручки створено для забезпечення безпроблемного, легкого переходу від одного кольору до іншого, створюючи інструмент розкішної універсальності."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: fountain_pen
  - type: Item
    sprite: _RMC14/Objects/Misc/paper.rsi
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-fountain-pen
