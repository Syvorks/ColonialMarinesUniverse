- type: entity
  parent: BaseItem
  id: RMCDropshipMaintsComputer
  name: "комп'ютер обслуговування десантного корабля"
  description: "Відкритий комп'ютер обслуговування десантного корабля; здається, він вимкнений. Використовується техніками й пілотами для пошуку пошкоджених або зламаних систем на десантному кораблі. Має різні роз'єми для різних систем."
  suffix: Open
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
    layers:
    - state: hangar_comp
      map: [ "enum.ToggleableVisuals.Enabled" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Enabled:
          True: { state: hangar_comp }
          False: { state: hangar_comp_open }
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: Item
    size: Large
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: ItemToggle
    activated: false
  - type: Appearance

- type: entity
  parent: RMCDropshipMaintsComputer
  id: RMCDropshipMaintsComputerOpen
  name: "комп'ютер обслуговування десантного корабля"
  description: "Закритий комп'ютер обслуговування десантного корабля, який техніки й пілоти використовують для з'ясування проблем з десантним кораблем. Має різні роз'єми для різних систем."
  suffix: Closed
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
    layers:
    - state: hangar_comp
      map: [ "enum.ToggleableVisuals.Enabled" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Enabled:
          True: { state: hangar_comp }
          False: { state: hangar_comp_open }
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: Item
    size: Large
    sprite: _RMC14/Objects/Devices/dropship_maint_comp.rsi
  - type: ItemToggle
    activated: true
  - type: Appearance
