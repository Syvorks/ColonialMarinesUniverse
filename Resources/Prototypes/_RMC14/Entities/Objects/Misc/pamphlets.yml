- type: entity
  parent: BaseItem
  id: CMPamphlet
  name: "інструктивна брошура"
  description: "Брошура, що використовується для швидкої передачі важливих знань."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/pamphlets.rsi
    state: pamphlet_written
  - type: Item
    size: Tiny
  - type: SkillPamphlet
    whitelists:
    - popup: rmc-pamphlets-cant-use
      restrictions:
        components:
        - Marine
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/paper_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: Tag
    tags:
    - RMCSkillPamphlet

