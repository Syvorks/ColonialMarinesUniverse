# LAWS
- type: entity
  parent: RMCGuidebookBase
  id: RMCGuidebookLawMarine
  name: "єдиний кодекс військової юстиції"
  description: "Зазвичай улюблене читання будь-якого члена Військової Поліції; його сенс — слугувати терезами для меча правосуддя, що тримається на борту суден багатьох військових сил, аби підтримувати мир і порядок. Серед прізвиськ: Червона Книга Диявола, Біблія всіх грішників, ТА Книга, UCMJ, Червона Цеглина, Посібник з катувань, Червона Біблія Катувань Усіх Грішників."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Books/Other/marine_law.rsi
  - type: GuideHelp
    guides:
    - AU14UCMJ

