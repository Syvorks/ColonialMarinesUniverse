# these dont get spawned by patron figurine spawner since no PatronFigurineComponent
# map in "xeno figurine spawner" or spawn them midround :)

- type: entity
  abstract: true
  parent: RMCBaseFigurinePatron
  id: RMCBaseFigurineXeno
  components:
  - type: Sprite
    sprite: _RMC14/Objects/xeno_figurines.rsi

- type: entity
  parent: MarkerBase
  id: RMCSpawnerFigurineXeno
  name: "спавнер фігурки ксеноїда"
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _RMC14/Objects/xeno_figurines.rsi
      state: drone
  - type: RandomSpawner
    prototypes:
    - RMCFigurineXenoXippy
    - RMCFigurineXenoWarrior616

- type: entity
  parent: RMCBaseFigurineXeno
  id: RMCFigurineXenoXippy
  name: "фігурка Кіпсі"
  description: "Завжди має корисний кіп для сестер у потребі."
  components:
  - type: Sprite
    state: drone

- type: entity
  parent: RMCBaseFigurineXeno
  id: RMCFigurineXenoWarrior616
  name: "фігурка Воїна (XX-616)"
  description: "Найкращий боєць вулика, вона вбила понад 30 господарів самотужки."
  components:
  - type: Sprite
    state: warrior
