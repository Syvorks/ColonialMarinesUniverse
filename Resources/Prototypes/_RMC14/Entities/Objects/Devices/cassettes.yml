- type: entity
  parent: BaseItem
  id: RMCCassettePlayer
  name: "касетний плеєр"
  description: "Касетний плеєр, що з'явився на ринку понад 100 років тому. Дивовижно, як вони ніколи не виходять з моди."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/cassette_player.rsi
    state: walkman
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - ears
  - type: CassettePlayer
  - type: ClothingLimit
    slot: All
    id: RMCCassettePlayer

- type: entity
