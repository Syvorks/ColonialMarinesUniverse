- type: entity
  parent: BaseItem
  id: RMCDigitalClock
  name: "цифровий годинник"
  description: "Годинник на батарейках, здатний показувати час із точністю до 5 секунд... він ніколи не був надто точним."
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _RMC14/Objects/Devices/clocks.rsi
    state: digital_clock
  - type: RMCClock

- type: entity
  id: RMCCatClock
  name: "котячий годинник"
  description: "Неймовірно моторошний котячий годинник, що оглядає кімнату при кожному «тік» і кожному «так»."
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Objects/Devices/clocks.rsi
    state: cat_clock_motion
  - type: RMCClock
  - type: WallMount
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
    canCollide: false

- type: entity
  id: RMCWoodClock
  name: "дерев'яний годинник"
  description: "Звичайний годинник, щоб показувати час."
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Objects/Devices/clocks.rsi
    state: wood_clock
  - type: RMCClock
  - type: WallMount
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
    canCollide: false

- type: entity
  parent: RMCWoodClock
  id: RMCGoldClock
  name: "золотий годинник"
  description: "Показовий годинник, щоб розповідати людям, який ти багатий."
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Objects/Devices/clocks.rsi
    state: gold_clock
