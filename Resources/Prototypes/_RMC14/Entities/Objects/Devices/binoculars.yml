- type: entity
  parent: BaseItem
  id: RMCBinoculars
  name: "біноклі"
  description: "Військово-видана пара біноклів."
  suffix: RMC
  components:
  - type: Item
    size: Small
    heldPrefix: binoculars
  - type: Sprite
    sprite: _RMC14/Objects/Devices/binoculars.rsi
    state: binoculars
  - type: Scope
    useInHand: true
    scopedHeldSuffix: _eyes
    zoomLevels:
    - zoom: 1.6
      offset: 14
      allowMovement: true
      doAfter: 0
  - type: Tag
    tags:
    - Binoculars
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/wirecutter_pickup.ogg
      params:
        volume: -6
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/wirecutter_drop.ogg
      params:
        volume: -4
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage
  - type: Appearance
  - type: ItemCamouflage
    states:
      Jungle: binoculars
      Desert: d_binoculars
      Snow: s_binoculars
      Classic: c_binoculars
      Urban: u_binoculars

- type: entity
  parent: RMCBinoculars
  id: RMCBinocularsPVE
  suffix: PVE
  name: "тактичний монокуляр"
  description: "Військово-виданий монокуляр."
  components:
  - type: Sprite
    state: monocular
  - type: Scope
    zoomLevels:
    - zoom: 1.4
      offset: 10
      allowMovement: false
      doAfter: 0.1
  - type: ItemCamouflage
    states: {}

- type: entity
  parent: RMCBinoculars
  id: RMCBinocularsCiv
  name: "біноклі"
  description: "Пара біноклів."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/binoculars.rsi
    state: binoculars_civ
  - type: ItemCamouflage
    states: {}

- type: entity
  parent: RMCBinocularsCiv
  id: RMCBinocularsCivPVE
  suffix: PVE
  components:
  - type: Scope
    zoomLevels:
    - zoom: 1.6
      offset: 14
      allowMovement: false
      doAfter: 0.1

- type: entity
  parent: RMCBinoculars
  id: RMCRangefinder
  name: "далекомір"
  description: "Пара біноклів із функцією далекоміра. Натисни на плитку, щоб отримати її координати."
  components:
  - type: Item
    heldPrefix: rangefinder
  - type: Sprite
    sprite: _RMC14/Objects/Devices/binoculars.rsi
    layers:
    - state: rangefinder
      map: [ "enum.ItemCamouflageLayers.Layer" ]
    - map: [ "light" ]
  - type: Rangefinder
  - type: UseDelay
    delay: 0
  - type: UserInterface
    interfaces:
      enum.RangefinderUiKey.Key:
        type: RangefinderBui
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RangefinderLayers.Layer:
        light:
          Rangefinder: { state: laser_range }
          Designator: { state: laser_cas }
          Spotter: { state: laser_spotter }
  - type: ItemCamouflage
    states:
      Jungle: rangefinder
      Desert: d_rangefinder
      Snow: s_rangefinder
      Classic: c_rangefinder
      Urban: u_rangefinder

- type: entity
  parent: RMCRangefinder
  id: RMCLaserDesignator
  name: "лазерний цілевказівник"
  description: "Лазерний цілевказівник із двома режимами: позначення цілі для CAS ІЧ-лазером та далекомір. Натисни на плитку, щоб націлити щось."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/binoculars.rsi
    layers:
    - state: rangefinder
    - state: laser_cas
  - type: Rangefinder
    mode: Designator
    canDesignate: true

- type: entity
  parent: RMCLaserDesignator
  id: RMCLaserDesignatorPVE
  suffix: PVE
  name: "тактичний монокулярний цілевказівник"
  description: "Двохрежимний тактичний монокуляр, розроблений для використання разом із елементами CAS та орбітальною підтримкою. Натисни на плитку, щоб націлити щось."
  components:
  - type: Sprite
    layers:
    - state: advanced_monocular
    - state: laser_cas_mono
  - type: GenericVisualizer
    visuals:
      enum.RangefinderLayers.Layer:
        light:
          Rangefinder: { state: laser_range_mono }
          Designator: { state: laser_cas_mono }
          Spotter: { state: laser_spotter_mono }
  - type: Scope
    zoomLevels:
    - zoom: 1.4
      offset: 10
      allowMovement: false
      doAfter: 0.1
  - type: ItemCamouflage
    states: {}

- type: entity
  parent: RMCRangefinder
  id: RMCLaserDesignatorSpotter
  name: "лазерний цілевказівник спостерігача"
  description: "Спеціально розроблений лазерний цілевказівник, виданий спостерігачам ОНМП, із двома режимами: позначення цілі для CAS ІЧ-лазером та далекомір. Натисни на плитку, щоб націлити щось. Додатково, навчений спостерігач може лазерувати цілі для снайпера ОНМП, прискорюючи захоплення цілі. Промінь націлювання з'єднує біноклі з ціллю, але може успадковувати маскування користувача, якщо це можливо."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/binoculars.rsi
    layers:
    - state: rangefinder
    - state: laser_cas
    - state: spotter_overlay
  - type: Rangefinder
    mode: Designator
    canDesignate: true
  - type: Corrodible
    isCorrodible: false
  - type: Spotting
  - type: TargetingLaser
    laserState: laser_beam_spotter
    laserAlpha: 1
    gradualAlpha: false

- type: entity
  parent: RMCLaserDesignator
  id: RMCLaserDesignatorScout
  name: "розвідницький лазерний цілевказівник"
  description: "Покращений лазерний цілевказівник, виданий розвідникам ОНМП, із двома режимами: позначення цілі для CAS ІЧ-лазером та далекомір. Натисни на плитку, щоб націлити щось."
  components:
  - type: Rangefinder
    delay: 3
  - type: Corrodible
    isCorrodible: false

- type: entity
  id: RMCRangefinderTarget
  name: "лазер"
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Effects/laser.rsi
    state: laser_target_coordinate
    drawdepth: Effects
  - type: PointLight
    enabled: true
    radius: 3
  - type: RMCNightVisionVisibleInView

- type: entity
  parent: RMCRangefinderTarget
  id: RMCLaserDesignatorTarget
  description: "Це лазер для позначення артилерійських цілей, відійди від нього!"
  components:
  - type: Sprite
    sprite: _RMC14/Effects/laser.rsi
    state: laser_target2
  - type: LaserDesignatorTarget
  - type: RMCCamera
    id: null
    rename: false
  - type: RMCStaticZoomLevel
  - type: Eye
    zoom: 0.5, 0.5
    drawFov: false

- type: entity
  parent: RMCRangefinderTarget
  id: RMCLaserDropshipTarget
  name: "мерехтливий лазер"
  components:
  - type: Sprite
    state: laser_target3
  - type: TimedDespawn
    lifetime: 1

- type: Tag
  id: Binoculars
