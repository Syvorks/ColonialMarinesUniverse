- type: entity
  parent: CMGrenadeHighExplosive
  id: CMGrenadeFrag
  name: "30-мм граната HEFA"
  description: "Фугасна осколкова протипіхотна. Невелика, але оманливо потужна осколкова граната, що поступово витісняє осколкові M15 разом із 30-мм HEDP. Можна заряджати в гранатомети або метати рукою."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/m40hefa.rsi
  - type: Explosive
    maxIntensity: 8 # max 40 brute 40 burn
    intensitySlope: 4
    totalIntensity: 110
    deleteAfterExplosion: false
  - type: ProjectileGrenade
    fillPrototype: CMProjectileShrapnel
    capacity: 48
    directHit: false
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: Ammo
  - type: ClusterLimitHits
  - type: CMExplosionEffect
    maxShrapnel: 0
  - type: CMVocalizeTrigger
  - type: RMCScorchEffect
  - type: Tag
    tags:
    - Grenade
    - LauncherCompatibleGrenade
    - RMCGrenadeM40
    - RMCGrenadeHEFA

- type: entity
  parent: CMGrenadeHighExplosive
  id: CMGrenadeFragOld
  name: "осколкова граната M15"
  description: "Застаріла осколкова граната ОНМП. Маючи десятиліття служби в ОНМП, стара осколкова граната M15 повільно замінюється трохи безпечнішими гранатами 30-мм серії. Налаштована детонувати за 4 секунди."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/m15frag.rsi
  - type: Explosive
    maxIntensity: 20
    intensitySlope: 6
    totalIntensity: 240
    deleteAfterExplosion: false
  - type: ProjectileGrenade
    fillPrototype: CMProjectileShrapnel
    capacity: 65 #same as HEFA
    directHit: false
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: Tag
    tags:
    - Grenade
    - LauncherCompatibleGrenade
  - type: Ammo
  - type: ClusterLimitHits
  - type: CMExplosionEffect
    maxShrapnel: 0
  - type: CMVocalizeTrigger
  - type: RMCScorchEffect

- type: entity
