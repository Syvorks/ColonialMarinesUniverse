- type: entity
  parent: RMCGrenadeWhitePhosphorus
  id: RMCGrenadeWhitePhosphorusCompound
  name: "30-мм граната хімічної сполуки CCDP"
  description: "30-мм CCDP — невелика, але потужна граната хімічної сполуки, схожа за ефектом на WPDP. Подейкують, що CCDP насправді випускає не білий фосфор, а якусь іншу хімічну речовину, розроблену в лабораторіях «Ве-Я»."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/ied.rsi
  - type: SpawnOnTrigger
    proto: RMCSmokePhosphorus

- type: entity
  parent: CMUIEDBase
  id: RMCGrenadeMolotov
  name: "імпровізована запалювальна бомба"
  description: "Потужна, імпровізована запалювальна бомба, поєднана зі щіпкою пороху. Дешева, дуже ефективна та смертельна в замкнених приміщеннях. Часто зустрічається в руках повстанців і терористів. Може бути складно передбачити, скільки секунд є до її спрацьовування, тож будь обережним. Цілком можливо, що вона вибухне тобі в обличчя."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/molotov.rsi
    layers:
    - state: icon
  - type: CMUOnLightTimerTrigger
    examinable: false
    initialBeepDelay: 0
    beepSound: null
    min: 1
    max: 4
    instantfusechance: false
    instfusechance: 10
  - type: CMVocalizeTrigger
  - type: TileFireOnTrigger
    spawn: RMCTileFire
    sound:
      path: /Audio/_RMC14/Weapons/Guns/Flamer/gun_flamethrower2.ogg
  - type: Tag
    tags:
    - Grenade

