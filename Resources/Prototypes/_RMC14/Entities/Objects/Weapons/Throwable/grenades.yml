- type: entity
  abstract: true
  parent: GrenadeBase
  id: CMGrenadeBase
  name: "граната"
  description: "Пригнись і ховайся."
  components:
  - type: Explosive
    explosionType: RMC
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: OnUseTimerTrigger
    delay: 4
    beepSound:
      path: "/Audio/_RMC14/Explosion/armbomb.ogg"
      params:
        volume: -5
    initialBeepDelay: 0
    beepInterval: 10
    doPopup: false
  - type: IgnorePredictionHide
  - type: Clothing
    slots:
    - suitStorage
  - type: Destructible
    thresholds: []
  - type: ChangeItemSizeOnTimerTrigger
  - type: CancelUseWithCloak

- type: entity
  abstract: true
  id: RMCM40DPTags
  components:
  - type: Tag
    tags:
    - Grenade
    - LauncherCompatibleGrenade
    - RMCGrenadeM40

- type: entity
  name: "світлошумова граната"
  description: "Чудова для зупинки груп заворушень. Не сподівайся, що сонячні окуляри тебе захистять..."
  parent: CMGrenadeBase
  id: RMCGrenadeFlashBang
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/flashbang.rsi
  - type: SoundOnTrigger
    sound:
      path: "/Audio/Effects/flash_bang.ogg"
  - type: DeleteOnTrigger
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect
  - type: Appearance
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/countdown.ogg
  - type: Tag
    tags:
    - RMCGrenadeRiot
    - Grenade
    - RMCGrenadeFlashBang
  - type: RequiresSkill
    skills:
      RMCSkillPolice: 1

- type: entity
  parent:
  - CMGrenadeBase
  - RMCM40DPTags
  id: CMGrenadeHighExplosive
  name: "30-мм граната HEDP"
  description: "Фугасна двоцільова. Невелика, але оманливо потужна вибухова граната, що поступово витісняє фугасні M15 разом із 30-мм HEFA. Можна заряджати в гранатомети або метати рукою."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/m40hedp.rsi
  - type: ExplodeOnTrigger
  - type: Explosive
    maxIntensity: 20 # max 100 brute, 100 burn
    intensitySlope: 6
    totalIntensity: 200
    canCreateVacuum: false
  - type: Ammo
  - type: CMExplosionEffect
  - type: CMVocalizeTrigger
  - type: RMCScorchEffect
  - type: Tag
    tags:
    - Grenade
    - LauncherCompatibleGrenade
    - RMCGrenadeM40
    - RMCGrenadeHEDP

- type: entity
  parent:
  - CMGrenadeBase
  - RMCM40DPTags
  id: CMGrenadeSmoke
  name: "30-мм димова граната HSDP"
  description: "30-мм HSDP — невелика, але потужна димова граната. Створена на тій самій платформі, що й 30-мм HEDP. Налаштована на детонацію через 1 секунду."
  components:
  - type: OnUseTimerTrigger
    delay: 1
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/m40smoke.rsi
  - type: SpawnOnTrigger
    proto: RMCSmoke
  - type: SoundOnTrigger
    sound: /Audio/Effects/smoke.ogg
  - type: DeleteOnTrigger
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Smoke-grenade.ogg
  - type: Tag
    tags:
    - Grenade
    - LauncherCompatibleGrenade
    - RMCGrenadeM40
    - RMCGrenadeRiot
  - type: Ammo

- type: entity
