- type: entity
  parent: BaseItem
  id: RMCExplosiveBreachingCharge
  name: "штурмовий заряд" # TODO RMC14 disable with multitool?
  description: "Вибуховий пристрій, що використовується для проникнення в зони, водночас захищаючи користувача від вибуху та розгортаючи смертоносні уламки з іншого боку."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Explosives/satchel_charge.rsi
    state: icon
    layers:
    - state: icon
      map: ["base"]
  - type: Item
    size: Small
  - type: Sticky
    stickDelay: 1
    canUnstick: false
    stickPopupStart: comp-sticky-start-stick-bomb
    stickPopupSuccess: comp-sticky-success-stick-bomb
    unstickPopupStart: comp-sticky-start-unstick-bomb
    unstickPopupSuccess: comp-sticky-success-unstick-bomb
    whitelist:
      components:
      - RMCWallExplosionDeletable
  - type: Explosive
    explosionType: RMC
    totalIntensity: 1
    intensitySlope: 5
    maxIntensity: 1
    canCreateVacuum: false
  - type: ExplodeOnTrigger
  - type: StickyVisualizer
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        base:
          Primed: { state: active }
          Unprimed: { state: icon }
  - type: RMCExplosiveDelete
  - type: Tag
    tags:
    - RMCExplosiveBreachingCharge
  - type: RequiresSkill
    skills:
      RMCSkillEngineer: 1

- type: entity
  parent: RMCExplosiveBreachingCharge
  id: RMCExplosiveBreachingChargeRubber
  name: "заряд для розгону заворушень X17"
  description: "Вибуховий пристрій, що використовується для проникнення в зони, водночас захищаючи користувача від вибуху. На відміну від стандартного штурмового заряду, X17 розгортає конус гумових кульок, щоб обездвижувати, а не вбивати."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Explosives/satchel_charge_rubber.rsi
    state: icon
    layers:
    - state: icon
      map: ["base"]
  # TODO Shrapnel volume 20

# TSEPA variant
- type: entity
  parent: RMCExplosiveBreachingChargeRubber
  id: RMCExplosiveBreachingChargeRubberTSEPA
  name: "заряд для розгону заворушень ПУ ІТС X17"
  components:
  - type: RequiresSkill
    skills:
      RMCSkillPolice: 0
      RMCSkillEngineer: 1

- type: entity
  parent: RMCExplosiveBreachingCharge
  id: RMCExplosivePlastic
  name: "пластикова вибухівка"
  description: "Використовується для проробляння отворів у конкретних місцях без зайвого. отвору."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Explosives/plastic_explosives.rsi
  - type: Explosive
    totalIntensity: 350
    intensitySlope: 6
    maxIntensity: 20
  - type: Sticky
    stickDelay: 5
    whitelist:
      components:
      - RMCWallExplosionDeletable
      - XenoTunnel
  - type: RMCExplosiveDelete
    delay: 10
    beepSound:
      path: "/Audio/Effects/beep1.ogg"
      params:
        volume: 4
    initialBeepDelay: 0
    beepInterval: 0.5
    whitelist:
      components:
      - XenoTunnel

- type: Tag
  id: RMCExplosiveBreachingCharge
