- type: entity
  parent: RMCBaseTurret
  id: RMCTurretAlmayer
  name: "стаціонарна гаусс-турель UA-635C"
  description: "Повністю автоматизована оборонна турель із середньодальніми можливостями наведення. Озброєна модифікованою автогарматою M32-S та внутрішнім стрічковим живленням, модифікована для використання на бойовому кораблі ОА."
  components:
  - type: InteractionPopup
    interactDelay: 0.2
    successChance: 0.8
    interactSuccessString: petting-success-generic
    interactFailureString: petting-failure-generic
    interactSuccessSound:
      path: /Audio/Effects/double_beep.ogg
  - type: Corrodible
    isCorrodible: false
  - type: Gun
    fireRate: 2.5
  - type: BallisticAmmoProvider
    cycleable: false
    proto: RMCCartridgeSentry
    capacity: 99999
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: HTN
    rootTask:
      task: RMCTurretCompound
    blackboard:
      SoundTargetInLOS: !type:SoundPathSpecifier
        path: /Audio/Effects/double_beep.ogg
      VisionRadius: !type:Single
        5.5
      AggroVisionRadius: !type:Single
        5.5

- type: entity
  parent: BaseStructure
  id: RMCDeployerSentry
  name: "система розгортання турелі"
  description: "Коробка, що розгортає турель."
  components:
  - type: Transform
    anchored: true
  - type: Appearance
  - type: Sprite
    sprite: _RMC14/Structures/Machines/sentry_deployer.rsi
    layers:
    - state: floor_sentry_installed
      map: [ "enum.EquipmentDeployState.UnDeployed" ]
    - state: floor_sentry_deployed
      map: [ "enum.EquipmentDeployState.Deployed" ]
      visible: false
  - type: RMCEquipmentDeployer
    deployPrototype: RMCTurretAlmayer
    isDeployableByHand: true
    isDeployable: true
    alertLevelRequired: Red
    blacklist:
      components:
      - Xeno
  - type: InteractionOutline
