- type: entity
  parent: [ RMCBaseWeaponShotgun, RMCBaseAttachableHolder ]
  name: "тактичний дробовик XM38"
  id: RMCWeaponShotgunXM38
  description: "Ще у 2168-му році Wey-Yu почала тестувати MK221. КМП США підібрав ранній прототип і пізніше прийняв його обмеженим військовим контрактом. Але Сили Спеціальних Операцій КМП США не задовольнилися й допрацювали ранні прототипи, до яких мали доступ; зрештою їхні внутрішні зброярі та ремісники виготовили MK210, призначений як XM38, легкий складний дробовик, що клацає на пояс. На додачу він повністю автоматичний, виготовлений зі штампованого металу й зберігає UGL. Справді інженерне диво."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Shotguns/xm38.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Shotguns/xm38.rsi
    slots:
    - suitStorage
    - belt
  - type: Gun
    soundGunshot:
      collection: RMCXM38Shoot
  - type: ShootUseDelay
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - FullAuto
    recoilWielded: 2
    recoilUnwielded: 4
    scatterWielded: 10
    scatterUnwielded: 20
    baseFireRate: 1.666
    burstScatterMult: 5
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.20
    accuracyMultiplierUnwielded: 0.95
  - type: RMCMagneticItem
  - type: GunDamageModifier
    multiplier: 1
  - type: BallisticAmmoProvider
    cycleable: false
    whitelist:
      tags:
      - RMCShellShotgun
    capacity: 10
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentExtendedBarrel
          - RMCM5Bayonet
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentRailFlashlight
      rmc-aslot-stock:
        startingAttachable: RMCAttachmentMK221Stock
        whitelist:
          tags:
          - RMCAttachmentMK221Stock
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentAngledGrip
          - RMCAttachmentVerticalGrip
          - RMCAttachmentLaserSight
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.780, 0.06
      rmc-aslot-rail: -0.2, 0.198
      rmc-aslot-underbarrel: 0.30, -0.31
      rmc-aslot-stock: -0.55, -0.01

