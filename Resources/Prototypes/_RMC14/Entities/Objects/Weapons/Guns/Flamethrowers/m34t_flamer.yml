- type: entity
  parent: RMCWeaponFlamer
  id: RMCWeaponFlamerSpec
  name: "пристрій-спалювач M34-T"
  description: "Покращена версія пристрою-спалювача M34, модель M34-T здатна розпилювати ширше різноманіття типів палива."
  components:
  - type: Corrodible
    isCorrodible: false
  - type: GunUserWhitelist
    whitelist:
      components:
      - PyroWhitelist
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/m34t.rsi
  - type: Item
    sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/m34t.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/m34t.rsi
  - type: AttachableHolder # NOTE: The nozzle is only for the base M34.
    slots:
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
      rmc-aslot-underbarrel:
        locked: true
        startingAttachable: RMCAttachmentUnderbarrelExtinguisherSpec
        whitelist:
          tags:
          - RMCAttachmentExtinguisher
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Tank
        startingItem: null
        insertSound: /Audio/_RMC14/Weapons/Handling/flamer_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Handling/flamer_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCTankFlamer
          - RMCTankFlamerLarge
  - type: Tag
    tags:
    - RMCWeaponIncineratorM34T
  - type: RMCCanUseBroiler
  - type: RMCIgniter
    enabled: true
    locked: true

- type: entity
  parent: RMCTankFlamer
  id: RMCTankFlamerLarge
  name: "великий бак спалювача M34"
  description: "Великий паливний бак для використання в пристрої-спалювачі M34-T. Поводитися з надзвичайною обережністю."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/flamethrower.rsi
    state: flametank_large_custom
    layers:
    - state: flametank_large_custom
    - state: flametank_large_custom_strip2
    - state: flametank_large_custom_strip2
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 250
        reagents:
        - ReagentId: RMCNapalmUT
          Quantity: 250
  - type: RMCFlamerTank
    maxIntensity: 80
    maxRange: 5
    maxDuration: 24
  - type: Tag
    tags:
    - RMCTankFlamerLarge

- type: entity
  parent: RMCTankFlamerLarge
  id: RMCTankFlamerLargeB
  name: "великий бак спалювача M34 (B)"
  description: "Великий паливний бак Ультра-густого Напталь палива типу B, спеціальний варіант напалму, що легко гаситься, але повільно горить, поширюючись по широкій території."
  components:
  - type: RMCFlamerTank
    maxRange: 6
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 250
        reagents:
        - ReagentId: RMCNapalmB
          Quantity: 250

- type: entity
  parent: RMCTankFlamerLarge
  id: RMCTankFlamerLargeX
  name: "великий бак спалювача M34 (X)"
  description: "Великий паливний бак Ультра-густого Напталь палива типу X, липкої горючої рідкої хімічної речовини, що горить надзвичайно гаряче, для використання в пристрої-спалювачі M34-T. Поводитися з надзвичайною обережністю."
  components:
  - type: RMCFlamerTank
    maxRange: 6
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 250
        reagents:
        - ReagentId: RMCNapalmX
          Quantity: 250

- type: entity
  parent: RMCTankFlamerLarge
  id: RMCTankFlamerLargeEX
  name: "великий бак спалювача M34 (EX)"
  description: "Великий паливний бак Ультра-густого Напталь палива типу EX, липкої горючої рідкої хімічної речовини, що горить настільки гаряче, що плавить більшість вогнестійких матеріалів, для використання в пристрої-спалювачі M34-T. Поводитися з надзвичайною обережністю."
  components:
  - type: RMCFlamerTank
    maxRange: 7
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 250
        reagents:
        - ReagentId: RMCNapalmEX
          Quantity: 250

- type: entity
  parent: RMCTankFlamerLarge
  id: RMCTankFlamerLargeCustom
  name: "великий кастомний бак спалювача M34"
  description: "Великий паливний бак для використання в пристрої-спалювачі M34-T."
  # description: A large fuel tank for use in the M34-T incinerator unit. This one has been modified with a pressure regulator and a large internal propellant tank. Must be manually attached.
  components:
  - type: RMCFlamerTank
    maxIntensity: 60
    maxRange: 8
    maxDuration: 50
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 250
        reagents: [ ]
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 3750

- type: Tag
  id: RMCTankFlamerLarge

- type: Tag
  id: RMCWeaponIncineratorM34T
