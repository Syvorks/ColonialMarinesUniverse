- type: entity
  parent: [RMCBaseSlideMagazineVisuals, CMWeaponPistolBase]
  id: RMCMK80
  name: "пістолет VP-78"
  description: "Масивний, грізний напівавтоматичний пістолет калібру 9мм з пласкими головками. Поширене видовище в просторі ОА та ІТС, часто в руках бойових підрозділів ПВК «Ве-Ю» та корпоративних керівників. Ця зброя також проходить обмежені польові випробування в рамках програми пістолета нового покоління морпіхів. На затворі вигравірувано логотип «Ве-Ю» — нагадування, хто насправді тут головний."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/mk80.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/mk80.rsi
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
  - type: Gun
    shotsPerBurst: 3
    availableModes:
    - SemiAuto
    - Burst
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_mk80.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    recoilWielded: 1
    recoilUnwielded: 2
    scatterWielded: 7 # 5 degree, dual wield is 24
    scatterUnwielded: 12 # 8 degree, do not question the dark arts
    baseFireRate: 2
    burstScatterMult: 4
    modifiers:
      Burst:
        fireDelay: 0.08 # For some reason the intended value of 0.1665 is too slow because it has a burst cooldown
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mk80_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mk80_unload.ogg
        priority: 2
        whitelist:
          tags:
          - CMMagazinePistolMK80
        startingItem: CMMagazinePistolMK80
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
      rmc-aslot-underbarrel:
        locked: true
        startingAttachable: RMCAttachmentLaserLightModule
        whitelist:
          tags:
          - RMCAttachmentLaserLightModule
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.685, 0.125
      rmc-aslot-rail: -0.125, 0.215
      rmc-aslot-underbarrel: 0.284, -0.19
  - type: Tag
    tags:
    - Sidearm
    - RMCMK80

- type: entity
  parent: RMCMK80
  id: AU14VP78Empty
  suffix: empty
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mk80_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mk80_unload.ogg
        priority: 2
        whitelist:
          tags:
          - CMMagazinePistolMK80

- type: entity
  parent: CMBaseMagazinePistol
  id: CMMagazinePistolMK80
  name: "Магазин VP-78 (9мм Squash-Head)"
  components:
  - type: Tag
    tags:
    - CMMagazinePistol
    - CMMagazinePistolMK80
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - CMCartridgePistol9mm
      - RMCCartridgePistol9mmSquashHead #MK80 is specially chambered to take these rounds, regular pistols cannot.
    proto: RMCCartridgePistol9mmSquashHead
    capacity: 18
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/mk80.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: CMMagazinePistolMK80
  id: RMCMagazinePistolMK80Empty
  suffix: Empty
  components:
  - type: BallisticAmmoProvider
    proto: null

- type: entity
  id: RMCCartridgePistol9mmSquashHead
  name: "набій (9мм Squash-Head)"
  parent: CMCartridgePistolBase
  components:
  - type: Tag
    tags:
    - Cartridge
    - RMCCartridgePistol9mmSquashHead
  - type: CartridgeAmmo
    proto: RCMBulletPistol9mmSquashHead

- type: entity # todo rmc14 this is missing a lot of effects, shrapnel, debilitate etc
  parent: CMBulletBase
  id: RCMBulletPistol9mmSquashHead
  name: "куля (9мм Squash-Head)"
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 45
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 22
      falloff: 9999
      ignoreModifiers: true
    - range: 6
      falloff: 5
  - type: CMArmorPiercing
    amount: 30
  - type: RMCProjectileAccuracy
    accuracy: 105

- type: entity
  parent: RMCMK80
  id: AU14L165A1Filled
  name: "службовий пістолет L165A1"
  description: "Штатний пістолет Морської Піхоти Королівського Командос. Витончений, сучасний напівавтоматичний пістолет, спеціально розроблений для спеціалізованих 9x19мм вибухових набоїв з пласкими головками. На основі патентованого дизайну Beretta Arms, ця модифікація «Вейленд-Ютані» здобула своє місце в руках найкращих солдатів Імперії Трьох Світів. Може без проблем приймати звичайні магазини VP-78."

