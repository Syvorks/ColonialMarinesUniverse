- type: entity
  parent: CMWeaponPistolBase
  id: RMCWeaponPistolM77
  name: "бойовий пістолет Mod 88" # TODO RMC14 sounds
  description: "Стандартна штатна вогнепальна зброя морпіхів. Також зустрічається в командах ПВК «Ве-Ю». Стріляє броне-розриваючими набоями 9мм і здатна на 3-зарядні черги."
  components:
  - type: Tag
    tags:
    - Sidearm
    - RMCWeaponPistolM77
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/m77.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/m77.rsi
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
  - type: Gun
    shotsPerBurst: 3
    availableModes:
    - SemiAuto
    - Burst
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_88m4_v7.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    scatterWielded: 8
    scatterUnwielded: 8
    baseFireRate: 4
    burstScatterMult: 4
    modifiers:
      Burst:
        fireDelay: 0.1665
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazinePistolM77Rubber
          - CMMagazinePistolM77AP
        startingItem: CMMagazinePistolM77AP
  - type: GunDamageModifier
    multiplier: 1.2
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentBurstFireAssembly
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentLaserSight
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.625, 0.125
      rmc-aslot-rail: -0.03, 0.185
      rmc-aslot-underbarrel: 0.25, -0.125

- type: entity
  parent: RMCWeaponPistolM77
  id: RMCWeaponPistolM77Empty
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
        priority: 2
        whitelist:
          tags:
          - CMMagazinePistolM77AP


- type: entity
  parent: CMBaseMagazinePistol
  id: CMMagazinePistolM77AP
  name: "Бронебійний магазин Mod 88 (9мм)"
  description: "19-зарядний бронебійний магазин для бойового пістолета Mod 88. Часто використовується операторами ПВК «Ве-Ю» для подолання броньованих загроз, коли санкціоновано смертельний вплив."
  components:
  - type: Tag
    tags:
    - CMMagazinePistol
    - CMMagazinePistolM77AP
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - CMCartridgePistol9mmAP
    proto: CMCartridgePistolM77AP
    capacity: 19
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/m77.rsi
    layers:
    - state: base_ap
      map: ["enum.GunVisualLayers.Base"]
    - state: base_ap-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: base_ap

- type: entity
  parent: CMBulletBase
  id: CMBulletPistolM77AP
  name: "куля (9мм бронебійна)"
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 25
  - type: CMArmorPiercing
    amount: 40

- type: entity
  parent: CMCartridgePistolBase
  id: CMCartridgePistolM77AP
  name: "набій (9мм бронебійний)"
  description: "Бронебійний набій 9мм для бойового пістолета Mod 88."
  components:
  - type: Tag
    tags:
    - Cartridge
    - CMCartridgePistol9mmAP
  - type: CartridgeAmmo
    proto: CMBulletPistolM77AP

- type: entity
  parent: RMCMagazinePistolM77Rubber
  id: CMMagazinePistolM88Rubber
  name: "Гумовий магазин Mod 88 (9мм)"
  description: "19-зарядний гумовий магазин для бойового пістолета Mod 88. Синя смуга та маркування безпеки позначають несмертельний заряд, призначений деформуватися й завдавати тупої травми при ударі. Стандартно видається для забезпечення безпеки й пригнічення без зайвих жертв."
  components:
  - type: BallisticAmmoProvider
    proto: CMCartridgePistolM88Rubber

- type: entity
  parent: RMCCartridgePistol9mmRubber
  id: CMCartridgePistolM88Rubber
  description: "Гумовий снаряд 9мм для бойового пістолета Mod 88."
  # TODO: rubber sprite

- type: Tag
  id: CMMagazinePistolM77AP
