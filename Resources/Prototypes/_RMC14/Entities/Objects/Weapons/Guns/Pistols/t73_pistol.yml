- type: entity
  parent: [RMCBaseSlideMagazineVisuals, CMWeaponPistolBase]
  id: RMCWeaponPistolT73
  name: "пістолет Type 73"
  description: "Type 73 — колишній стандартний штатний пістолет СПН. Заміщений NP92 в використанні СПН, він залишається популярним серед ветеранських військ СПН через звичність і додаткову потужність. Через дуже велику кількість виробництва, ці пістолети часто опиняються в руках сил, що намагаються озброїтися з обмеженим бюджетом. Користувачі: Союз Прогресивних Народів, Колоніальний Фронт Звільнення, та практично будь-яка група найманців чи піратів."
  components:
  - type: Tag
    tags:
    - Sidearm
    - RMCWeaponPistolT73
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/t73.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/t73.rsi
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.25
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
  - type: Gun
    shotsPerBurst: 3
    availableModes:
    - SemiAuto
    - Burst
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_88m4_v7.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    scatterWielded: 5
    scatterUnwielded: 5
    baseFireRate: 2.5
    burstScatterMult: 5
    modifiers:
      Burst:
        fireDelay: 0.1665
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazinePistolT73
        startingItem: RMCMagazinePistolT73
  - type: GunDamageModifier
    multiplier: 1.30
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentLaserSight
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.71, 0.125
      rmc-aslot-rail: 0.06, 0.185

- type: entity
  parent: CMWeaponPistolBase
  id: RMCWeaponPistolT74
  name: "пістолет Type 74"
  description: "Type 74 — це позначення спеціально модифікованого Type 73 із вбудованою системою лазерного цілевказівника, кількома пилоподібними прорізами для зменшення ваги, щоб дозволити використовувати набої з вищим тиском з тією самою пружиною віддачі, та зручнішою рукояткою. Через прийняття NP92, Type 74 був вироблений в обмеженій кількості; через це його зазвичай видають лише за запитом старшим офіцерам"
  components:
  - type: Tag
    tags:
    - Sidearm
    - RMCWeaponPistolT74
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/t74.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/t74.rsi
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.25
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
  - type: Gun
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_mk80.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    scatterWielded: 4
    scatterUnwielded: 4
    baseFireRate: 2.5
    burstScatterMult: 5
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazinePistolT73
          - RMCMagazinePistolT74Impact
        startingItem: RMCMagazinePistolT73
  - type: GunDamageModifier
    multiplier: 1.30
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.71, 0.125
      rmc-aslot-rail: 0.06, 0.185

