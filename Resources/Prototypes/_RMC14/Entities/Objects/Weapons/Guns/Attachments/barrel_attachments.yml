- type: entity
  abstract: true
  parent: RMCAttachableBase
  id: RMCBarrelAttachmentBase
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Attachments/barrel.rsi
  - type: Tag
    tags:
    - RMCAttachmentBarrel

- type: entity
  parent: RMCBarrelAttachmentBase
  id: RMCAttachmentExtendedBarrel # extended_barrel
  name: "подовжений ствол"
  description: "Подовжений ствол прискорює і стабілізує кулю, збільшуючи її швидкість." # and accuracy.
  components:
  - type: Sprite
    state: ebarrel
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentExtendedBarrel
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        wieldedOnly: true
      accuracyAddMult: 0.2
    - projectileSpeedFlat: 10
  - type: AttachableWieldDelayMods
    modifiers:
    - delay: 0.4

- type: entity
  parent: RMCAttachmentExtendedBarrel
  id: RMCAttachmentExtendedCompensator
  name: "AB-RVX подовжений компенсатор"
  description: "Високоточно сконструйоване розширення вентильованого ствола, що використовується різними силами ООН. Значно покращує точність, контроль дула та швидкість снаряда, але зменшує термінальне ушкодження через випуск тиску."
  components:
  - type: Sprite
    state: ebarrel_vented
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentExtendedCompensator
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - accuracyAddMult: 0.3
      projectileSpeedFlat: 10
      damageFalloffAddMult: -0.1
      damageAddMult: -0.1
      recoilFlat: -1
    - conditions:
        unwieldedOnly: true
      recoilFlat: 1
      accuracyAddMult: -0.3
  - type: AttachableWieldDelayMods
    modifiers:
    - delay: 0.4
  - type: ItemCamouflage
    states:
      Jungle: ebarrel_vented
      Desert: d_ebarrel_vented
      Snow: s_ebarrel_vented
      Classic: c_ebarrel_vented
      Urban: u_ebarrel_vented

- type: entity
  parent: RMCBarrelAttachmentBase
  id: RMCAttachmentBarrelMar50
  name: "ствол MAR-50"
  description: "Важкий ствол."
  components:
  - type: Sprite
    state: mar50barrel
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentBarrelMar50
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - accuracyAddMult: 0.15
    - scatterFlat: -6

- type: entity
  parent: RMCBarrelAttachmentBase
  id: RMCAttachmentBarrelCharger
  name: "зарядник ствола"
  description: "Гіперрізьбленне розширення ствола, що кріпиться до дула більшості видів вогнепальної зброї. Значно збільшує ушкодження снаряда за рахунок швидкості стрільби."
  components:
  - type: Sprite
    state: hbarrel
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentBarrelCharger
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - fireDelayFlat: 0.25
    - conditions:
        wieldedOnly: true
      accuracyAddMult: -0.15
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: -0.35
    - conditions:
        whitelist:
          tags:
          - RMCWeaponShotgun
      damageAddMult: 0.05
    - conditions:
        blacklist:
          tags:
          - RMCWeaponShotgun
      damageAddMult: 0.3

- type: entity
  parent: RMCBarrelAttachmentBase
  id: RMCAttachmentRecoilCompensator # compensator
  name: "компенсатор віддачі"
  description: "Дульна насадка, що зменшує віддачу шляхом відведення випущених газів вгору. Зменшує віддачу за ціною невеликого зменшення ушкодження зброї." # increases accuracy and reduces recoil
  components:
  - type: Sprite
    state: comp
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentRecoilCompensator
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - accuracyAddMult: 0.2
      damageFalloffAddMult: 0.1
      damageAddMult: -0.1
    - conditions:
        wieldedOnly: true
      recoilFlat: -3
    - conditions:
        unwieldedOnly: true
      recoilFlat: -2

- type: entity
  parent: RMCBarrelAttachmentBase
  id: RMCAttachmentRecoilCompensatorM13
  name: "подовжений компенсатор віддачі M13"
  description: "Важкий, надмірно побудований компенсатор і ствольне розширення для автоматичного пістолета M13. Значно покращує контроль віддачі під час автоматичної стрільби, за ціною габариту й керування. Точно щось компенсує, але брутально ефективний."
  components:
  - type: Sprite
    state: m10_overcomp
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentRecoilCompensatorM13
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - accuracyAddMult: 0.15
      damageAddMult: 0.05
      recoilFlat: -2
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: -0.2
  - type: ItemCamouflage
    states:
      Jungle: m10_overcomp
      Desert: d_m10_overcomp
      Snow: s_m10_overcomp
      Classic: c_m10_overcomp
      Urban: u_m10_overcomp
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-m13-extended-recoil-compensator

- type: entity
  parent: RMCAttachmentRecoilCompensatorM13
  id: RMCAttachmentRecoilCompensatorM13Spiked
  name: "подовжений шипований компенсатор віддачі M13"
  description: "Брутально важкий, надскладно сконструйований компенсатор і ствольне розширення для автоматичного пістолета M13, наконечник якого закінчується загартованою шипованою кришкою. Значно покращує контроль віддачі під час автоматичної стрільби — і перетворює пістолет на огидну палицю в ближньому бою. Точно щось компенсує, але брутально ефективний."
  components:
  - type: Sprite
    state: m10_overcomp_spike
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentRecoilCompensatorM13Spiked
  - type: AttachableWeaponMeleeMods
    modifiers:
    - bonusDamage:
        types:
          Slash: 20
  - type: ItemCamouflage
    states:
      Jungle: m10_overcomp_spike
      Desert: d_m10_overcomp_spike
      Snow: s_m10_overcomp_spike
      Classic: c_m10_overcomp_spike
      Urban: u_m10_overcomp_spike

- type: entity
  parent: RMCBarrelAttachmentBase
  id: RMCAttachmentShotgunChoke # choke
  name: "звуження дробовика"
  description: "Різьблене звуження, що можна вставити в дробовик M42A2. Покращує точність, швидкість, ущільнює розсіювання й збільшує циклічну швидкість. Натомість зменшується ушкодження й сила снаряда. Також збільшує віддачу. Не рекомендується для слагів."
  components:
  - type: Sprite
    state: choke
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentShotgunChoke
  - type: AttachableVisuals
  - type: GrantProjectileStunAdjust
    stunDurationAdjustment: 0
    knockBackPowerMinAdjustment: 0
    knockBackPowerMaxAdjustment: 0
  - type: AttachableWeaponRangedMods
    modifiers:
    - fireDelayFlat: -1
    - scatterFlat: -5
    - accuracyAddMult: 0.25
      damageFalloffAddMult: -0.3
      damageAddMult: -0.2
      rangeFlat: 1
    - conditions:
        wieldedOnly: true
      recoilFlat: 2
    - conditions:
        unwieldedOnly: true
      recoilFlat: 2
  - type: AttachableSilencer
    sound:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_shotgun_choke.ogg
    hideMuzzleFlash: false

- type: entity
  parent: RMCBarrelAttachmentBase
  id: RMCAttachmentSuppressor # suppressor
  name: "глушник"
  description: "Невелика трубка з вихлопними отворами для випуску шуму та газу. Не повністю заглушує зброю, але робить її значно тихішою за ціною трохи зменшеного ушкодження."
  components:
  - type: Sprite
    state: suppressor
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentSuppressor
  - type: AttachableVisuals
  - type: AttachableSilencer
    sound:
      collection: CMSilencedShoot
      params:
        maxDistance: 6
  - type: AttachableWeaponRangedMods
    modifiers:
    - damageFalloffAddMult: 0.1

- type: entity
  parent: RMCAttachmentSuppressor
  id: RMCAttachmentSuppressorCompact
  name: "компактний глушник"
  description: "Легкий, тонкопрофільний глушник, спроектований спеціально для пістолетів-кулеметів і пістолетів. Заглушує звук і дульний спалах, водночас незначно покращуючи стабільність і точність, але дещо зменшує швидкість снаряда й термінальне ушкодження."
  components:
  - type: Sprite
    state: suppressor_sleek
  - type: Tag
    tags:
    - RMCAttachmentBarrel
    - RMCAttachmentSuppressorCompact
  - type: AttachableSilencer
    sound:
