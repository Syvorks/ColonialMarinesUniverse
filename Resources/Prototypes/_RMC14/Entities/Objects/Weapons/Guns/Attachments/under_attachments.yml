    attachedOnly: true
    supercedeHolder: true
    wieldedUseOnly: true
    activatePopupText: attachable-popup-switch-to-generic
    deactivatePopupText: attachable-popup-switch-from-generic
    activateSound:
      path: /Audio/_RMC14/Attachable/gun_u7_activate.ogg # TODO RMC14
      params:
        volume: -2
    actionName: Switch to the mini flamethrower.
    actionDesc: Switch to using the mini flamethrower.
    icon:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: flamethrower
    iconActive:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: flamethrower-on
  - type: AttachableVisuals
    offset: -0.125, 0.245
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/flamer_mouse.rsi
      state: all
  - type: RMCFlushableSolution
    solution: rmc_flamer_tank
    flushTime: 1.5
  - type: NoMixingReagents

- type: entity
  parent: RMCUnderAttachmentBase
  id: CMAttachmentXMVESG1FlamerNozzle
  name: "насадка XM-VESG-1"
  description: "Спеціальна насадка, призначена для зміни вогнеметів, щоб вони використовувалися більш наступально. Внутрішня поверхня насадки покрита спеціальною гелево-смоляною речовиною, що забирає паливо, яке проходить крізь неї, та твердить його. Виходячи зі ствола, замість струменя палаючої нафти запускається кластер палаючого гелю."
  components:
  - type: Sprite
    state: flamer_nozzle
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-xm-vesg-1-flamer-nozzle

