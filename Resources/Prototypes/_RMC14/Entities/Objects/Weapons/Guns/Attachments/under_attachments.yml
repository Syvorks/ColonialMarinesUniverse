- type: entity
  abstract: true
  parent: RMCAttachableBase
  id: RMCUnderAttachmentBase
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel

- type: entity
  parent: RMCUnderAttachmentBase
  id: RMCAttachmentAngledGrip # angledgrip
  name: "кутова рукоятка"
  description: "Кутова передня рукоятка, що покращує ергономіку зброї, забезпечуючи швидший час підйому. Однак вона також збільшує розмір зброї."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Attachments/rmc_under.rsi
    state: angledgrip
  - type: AttachableVisuals
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - RMCAttachmentAngledGrip
  - type: AttachableSizeMods
    modifiers:
    - size: 1
  - type: AttachableWieldDelayMods
    modifiers:
    - delay: -0.4

- type: entity
  parent: [ RMCUnderAttachmentBase, RMCAttachableToggleableBase ]
  id: RMCAttachmentBipod
  name: "сошки"
  description: "Простий набір телескопічних опор для стабілізації зброї під час стрільби. Належно встановлені, значно підвищують точність, швидкострільність і знижують віддачу, але коли не розгорнуті, також збільшують розмір зброї та сповільнюють швидкострільність."
  components:
  - type: Sprite
    state: bipod
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - RMCAttachmentBipod
  - type: AttachableToggleable
    activateOnMove: false
    heldOnlyActivate: true
    userOnly: true
    doInterrupt: true
    attachedOnly: true
    breakOnMove: true
    breakOnFullRotate: true
    breakOnDrop: true
    slowOnBreak: true
    doAfter: 1.5
    deactivateDoAfter: 0
    doAfterNeedHand: false
    instantToggle: Brace
    useDelay: 0.5
    activatePopupText: attachable-popup-activate-deploy-on-ground
    deactivatePopupText: attachable-popup-deactivate-retract
    activateSound:
      path: /Audio/_RMC14/Attachable/bipod_toggle.ogg
      params:
        volume: -3
    deactivateSound:
      path: /Audio/_RMC14/Attachable/bipod_toggle.ogg
      params:
        volume: -3
    icon:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: bipod
    iconActive:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: bipod-on
    actionName: Deploy Bipod
    actionDesc: Deploy the bipod and get into a firing position.
  - type: AttachableVisuals
    showActive: true
  - type: AttachableTemporarySpeedMods
    alteration: Interrupted
  - type: AttachableSizeMods
    modifiers:
    - size: 2
  - type: AttachableWieldDelayMods
    modifiers:
    - delay: 0.4
  - type: AttachableWeaponMeleeMods
    modifiers:
    - bonusDamage:
        types:
          Blunt: -10
  - type: AttachableWeaponRangedMods
    fireModeMods:
    - conditions:
        activeOnly: true
        whitelist:
          tags:
          - RMCGunBipodFullAuto
      extraFireModes: FullAuto
      setFireMode: FullAuto
    modifiers:
    - conditions:
        inactiveOnly: true
      fireDelayFlat: 0.03
    - conditions:
        wieldedOnly: true
        inactiveOnly: true
      accuracyAddMult: -0.25
      scatterFlat: 4
      recoilFlat: 1
    - conditions:
        wieldedOnly: true
        activeOnly: true
      accuracyAddMult: 0.25
      scatterFlat: -2
      recoilFlat: -2
    - conditions:
        activeOnly: true
      burstScatterAddMult: -3
    - conditions:
        activeOnly: true
        whitelist:
          tags:
          - CMM96SSniperRifle
      fireDelayFlat: -0.5
    - conditions:
        activeOnly: true
        whitelist:
          tags:
          - RMCWeaponLMGM60
      fireDelayFlat: -0.1

- type: entity
  parent: RMCUnderAttachmentBase
  id: RMCAttachmentBurstFireAssembly # burstfire_assembly
  name: "модуль вогню чергою"
  description: "Невеликий кутовий шматок тонкої механіки, що збільшує кількість пострілів у черзі деяких видів зброї."
  components:
  - type: Sprite
    state: rapidfire
  - type: AttachableVisuals
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - RMCAttachmentBurstFireAssembly
  - type: AttachableWeaponRangedMods
    fireModeMods:
    - extraFireModes: Burst
    modifiers:
    - conditions:
        blacklist:
          tags:
          - RMCWeaponPistolL14
      shotsPerBurstFlat: 2
    - conditions:
        wieldedOnly: true
      accuracyAddMult: -0.15
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: -0.20

- type: entity
  parent: RMCUnderAttachmentBase
  id: RMCAttachmentGyroscopicStabilizer
  name: "гіроскопічний стабілізатор"
  description: "Набір ваги та балансування для стабілізації зброї під час стрільби однією рукою. Зменшує швидкість стрільби."
  components:
  - type: Sprite
    state: gyro
  - type: AttachableVisuals
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - RMCAttachmentGyroscopicStabilizer
  - type: AttachableWeaponRangedMods
    modifiers:
    - fireDelayFlat: 0.25
    - conditions:
        wieldedOnly: true
      scatterFlat: -2
      burstScatterAddMult: -2
    - conditions:
        unwieldedOnly: true
      scatterFlat: -10
    - conditions:
        unwieldedOnly: true
        whitelist:
          tags:
          - RMCWeaponShotgun
      accuracyAddMult: 0.55
    - conditions:
        unwieldedOnly: true
        blacklist:
          tags:
          - RMCWeaponShotgun
      accuracyAddMult: 0.15

- type: entity
  parent: RMCUnderAttachmentBase
  id: RMCAttachmentLaserSight
  name: "лазерний цілевказівник"
  description: "Лазерний цілевказівник, який кріпиться знизу більшості видів зброї. Підвищує точність і зменшує розкид, особливо при стрільбі однією рукою."
  components:
  - type: Sprite
    state: lasersight
  - type: AttachableVisuals
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - RMCAttachmentLaserSight
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        wieldedOnly: true
      accuracyAddMult: 0.05
      scatterFlat: -2
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: 0.05
      scatterFlat: -4
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-laser-sight

- type: entity
  parent: RMCUnderAttachmentBase
  id: RMCAttachmentMicroLaserSight
  name: "мікро-лазерний цілевказівник"
  description: "Компактний високоточний лазерний цілевказівник, спроектований ексклюзивно для автоматичного пістолета M13. Забезпечує винятковий приріст точності завдяки прямій інтеграції з внутрішніми системами наведення зброї."
  components:
  - type: Sprite
    state: lasersight_micro
  - type: AttachableVisuals
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - RMCAttachmentMicroLaserSight
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        wieldedOnly: true
      accuracyAddMult: 0.05
      scatterFlat: -1
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: 0.05
      scatterFlat: -2

- type: entity
  parent: RMCUnderAttachmentBase
  id: RMCAttachmentMiniFlamethrower
  name: "підстовбурний вогнемет" # TODO RMC14 intensity toggle
  description: "Підставлюваний вогнемет з можливістю заправки. Має додаткове налаштування для більш інтенсивного полум'я зі значно меншою силою кидання та важким витрачанням палива."
