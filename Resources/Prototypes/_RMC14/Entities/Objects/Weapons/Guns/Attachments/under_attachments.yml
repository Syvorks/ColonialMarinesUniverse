  - type: Sprite
    state: flamethrower
  - type: Tag
    tags:
    - RMCAttachmentUnderbarrel
    - RMCAttachmentFlamer
  - type: Item
    size: Normal
  - type: Gun
    cameraRecoilScalar: 0
    fireRate: 0.333
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: RMCFlamerShoot
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 40
        reagents:
        - ReagentId: RMCNapalmUT
          Quantity: 40
  - type: RMCFlamerAmmoProvider
  - type: RMCFlamerTank
    maxIntensity: 10
