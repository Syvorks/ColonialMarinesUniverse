- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSentry
  name: "Барабан M30 (10x28мм безгільзовий)"
  description: "Барабан з 500 безгільзовими набоями 10x28мм для турелі UA 571-C. Просто подай його в порт боєприпасів турелі, коли набої вичерпаються."
  components:
  - type: Item
    size: Normal
  - type: Tag
    tags:
    - RMCMagazineSentry
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeSentry
    proto: RMCCartridgeSentry
    capacity: 500
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/un571c.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
    zeroOnlyOnEmpty: true
  - type: Appearance

- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSentryShotgun
  name: "Барабан картечі 12-го калібру"
  description: "Барабан з 50 набоями картечі 12-го калібру для дробовика-турелі UA 12-G. Просто подай його в порт боєприпасів турелі, коли набої вичерпаються."
  components:
  - type: Tag
    tags:
    - RMCMagazineSentryShotgun
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCShellShotgunBuckshot
    proto: CMShellShotgunBuckshot
    capacity: 50
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/un12g.rsi


- type: entity
  parent: BaseMagazineRifle
  id: RMCMagazineSentryFire
  name: "паливний бак турелі-спалювача"
  description: "Паливний бак Ультра-густого Напталь палива, що використовується в UN 45-FM. Містить 100 одиниць палива."
  components:
  - type: Tag
    tags:
    - RMCMagazineSentryFire
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCBulletSentryFireProjectile
    proto: RMCBulletSentryFireProjectile
    capacity: 100
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/sentry_flametank.rsi
    layers:
    - state: flametank
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: flametank_strip
      color: "#EE6515"

