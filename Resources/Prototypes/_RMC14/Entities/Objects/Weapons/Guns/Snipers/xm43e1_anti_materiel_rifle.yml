- type: entity
  parent: RMCBaseWeaponSniperRifle
  id: RMCXM43E1AntiMaterielRifle
  name: "протиматеріальна гвинтівка XM43E1"
  description: "Експериментальна протиматеріальна гвинтівка виробництва AEGIS Armaments, нещодавно повторно отримана зі складу глибокого зберігання покинутого прототипічного об'єкта. Ця конкретно зараз проходить польові випробування. Калібр 10x99мм безгільзовий. Ця зброя може пробивати тонке металеве оббиття та стіни, хоча в процесі втратить більшість смертоносності. Може використовуватися навіть для підривних робіт; досвідчені користувачі відомі тим, що в полі розбирають ділянки суцільних, укріплених стін одним стандартним магазином 10x99мм. Замість вибухівки чи інженера вони використовують кожен з 8 пострілів, щоб ламати критичні структурні опори, демонтуючи стіну в процесі."
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleSpecSniper
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Snipers/xm43e1/xm43e1_inhands.rsi
    layers:
    - state: base
      sprite: _RMC14/Objects/Weapons/Guns/Snipers/xm43e1/xm43e1_icon.rsi
    - state: bolt-open
      sprite: _RMC14/Objects/Weapons/Guns/Snipers/xm43e1/xm43e1_icon.rsi
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      sprite: _RMC14/Objects/Weapons/Guns/Snipers/xm43e1/xm43e1_icon.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
#    - sprite: _RMC14/Objects/Weapons/Guns/Attachments/barrel.rsi
#      state: pmc_sniperbarrel
#      offset: 0.500, 0.050
  - type: Item
    size: Large
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Snipers/xm43e1/xm43e1_inhands.rsi
  - type: Tag
    tags:
    - RMCXM43E1AntiMaterielRifle
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 12
  - type: Gun
    shotsPerBurst: 1
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_sniper_heavy.ogg
  - type: RMCSelectiveFire
    recoilWielded: 1
    scatterWielded: 0
    baseFireRate: 0.335
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 3
  - type: WieldDelay
    baseDelay: 1.2
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineSniperXM43E1AntiMateriel
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mar40_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mar40_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineXM43E1
  - type: GunRequiresWield
  - type: Corrodible
    isCorrodible: false
  - type: GunIFF
    enabled: true
  - type: RMCNameItemOnVend
    item: PrimaryGun
  - type: AttachableHolder
    slots:
      rmc-aslot-rail:
        locked: true
        startingAttachable: RMCXM43E1IntegratedScope
        whitelist:
          tags:
          - RMCXM43E1IntegratedScope
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentBipod
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-underbarrel: 0.21875, -0.343
  - type: AimedShot
    aimDuration: 2
    aimedShotCooldown: 4.5
  - type: TargetingLaser
  - type: RMCFocusedShooting
  - type: RMCGunChamber
    enabled: false

- type: entity
  parent: CMMagazineSniperM96S
  id: RMCMagazineSniperXM43E1AntiMateriel
  name: "снайперський магазин XM43E1 (10x99мм)"
  description: "Магазин безгільзових протиматеріальних набоїв 10x99мм, здатних пробивати більшість піхотних матеріалів. Залежно від того, у що ти влучив, в них може бути достатньо енергії, щоб поранити щось і за ціллю."
  components:
  - type: Tag
    tags:
    - RMCMagazineXM43E1
    - CMMagazineSniper
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeSniper10x99mmAntiMateriel
    proto: RMCCartridgeSniper10x99mmAntiMateriel
    capacity: 8
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/xm43e1.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

