- type: entity
  parent: Flash
  id: CMFlash
  name: "спалах"
  description: "Використовується для засліплення й засуджування. Перезаряджається один спалах кожні 60 секунд. Між використаннями треба чекати 5 секунд, щоб конденсатор перезарядився."
  components:
  - type: Flash
    slowTo: 0.55
    meleeStunDuration: 8
    range: 3
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Melee/flash.rsi
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Weapons/Melee/flash.rsi
  - type: LimitedCharges
    maxCharges: 2
    lastCharges: 2
  - type: AutoRecharge
    rechargeDuration: 60
  - type: UseDelay
    delay: 5
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.FlashVisuals.Flashing:
        enum.FlashVisualLayers.LightLayer:
          True: { visible: true }
          False: { visible: false }
  - type: MeleeRequiresSkill
    skills:
      RMCSkillPolice: 1
