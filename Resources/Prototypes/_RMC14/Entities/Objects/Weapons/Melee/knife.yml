- type: entity
  parent: [ RMCBaseMeleeWeapon, BaseKnife, RMCAttachableBase ]
  id: RMCM5Bayonet # bayonet
  name: "штик-ніж M5 «Нічний Рейдер»"
  description: "Стандартний штик-ніж морпіхів. Можна засунути в чобіт або прикріпити до кінчика гвинтівки."
  components:
  - type: Clothing
    slots:
    - mask
    - pocket
    - suitstorage
    sprite: _RMC14/Objects/Weapons/Melee/m5_bayonet.rsi
