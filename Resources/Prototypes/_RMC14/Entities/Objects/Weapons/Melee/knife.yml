- type: entity
  parent: [ RMCBaseMeleeWeapon, BaseKnife ]
  id: RMCStraightRazor
  name: "небезпечна бритва"
  description: "Улюблена зброя коменданта проти морпіхів, що насмілюються порушити стандарти зовнішнього вигляду."
  components:
  - type: Tag
    tags:
    - Knife
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Melee/straight_razor.rsi
    layers:
    - state: razor-off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: razor }
          False: { state: razor-off }
  - type: Appearance
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Weapons/Melee/straight_razor.rsi
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 3
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 3
  - type: UsableWhileDevoured
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/genhit3.ogg
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/genhit3.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        variation: 0.125
    activatedDamage:
      types:
        Slash: 15
  - type: ItemToggle
