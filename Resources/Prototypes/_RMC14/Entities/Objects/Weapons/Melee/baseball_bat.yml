- type: entity
  parent: [BaseItem, RMCBaseMeleeWeapon]
  id: RMCBaseballBat
  name: "дерев'яна бейсбольна бита"
  description: "Велика дерев'яна бейсбольна бита. Зазвичай використовується для дозвілля в колоніях, але також як засіб самозахисту. Часто носять головорізи та хулігани."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Melee/baseball_bat.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Blunt: 25
    soundHit:
      path: /Audio/_RMC14/Weapons/genhit3.ogg
  - type: Item
    size: Normal
    sprite: _RMC14/Objects/Weapons/Melee/baseball_bat.rsi

- type: entity
  parent: RMCBaseballBat
  id: RMCBaseballBatMetal
  name: "металева бейсбольна бита"
  description: "Велика металева бейсбольна бита. Порівняно зі своєю дерев'яною двоюрідною сестрою, металева бита дає трохи більше сили. Часто носять головорізи та хулігани."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Melee/metal_bat.rsi
    state: icon
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 35
  - type: Item
    sprite: _RMC14/Objects/Weapons/Melee/metal_bat.rsi
