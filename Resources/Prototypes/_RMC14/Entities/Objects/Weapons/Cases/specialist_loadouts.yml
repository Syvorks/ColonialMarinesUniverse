- type: entity
  parent: RMCBaseEquipmentCase
  id: RMCGrenadeSpecEquipmentCase
  name: "кейс зі спорядженням важкого гренадера"
  description: "A large case containing a heavy-duty multi-shot M83 grenade launcher, M3-G4 grenadier armor and helmet, significant amount of various 30mm grenades and additional pieces of equipment.\n\nNOTE: You cannot put items back inside this case."
  components:
  - type: Sprite
    layers:
    - state: closed
      map: [ base ]
    - state: grenadier
      map: [ label ]
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,21,1
  - type: StorageFill
    contents:
    - id: WeaponLauncherM83 # check IFF
    - id: RMCBeltGrenadeLargeFilled
    - id: RMCSatchelGrenadeSpec # ID lock
    - id: RMCSatchelGrenadeSpec
    - id: RMCHandsM3G4
    - id: RMCArmorM3G4
    - id: RMCArmorHelmetM3G4 # hugger protection
    - id: RMCMK80
    - id: CMMagazinePistolMK80
      amount: 2
    - id: RMCBinoculars
  - type: CMChangeUserOnVend
    addComponents:
    - type: GrenadeSpecWhitelist

