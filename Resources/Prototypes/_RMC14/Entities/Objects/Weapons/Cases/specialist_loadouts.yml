- type: entity
  parent: RMCKitBase
  id: RMCKitLoader
  name: "набір завантажувача"
  description: "Великий набір з усіма припасами, потрібними, щоб перетворити рядового на помічника-завантажувача для спеціаліста з підривних робіт.\nНевеличка серія інфографіки показує, як треба перезаряджати:\nКрок перший: Візьми ракету\nКрок другий: Стань позаду спеціаліста\nКрок третій: Переконайся, що спеціаліст тримає пускач\nКрок четвертий: Завантаж ракету в пускач\nКрок п'ятий: Відійди подалі від реактивного струменя"
  components:
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,13,3
  - type: Sprite
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: Icon
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
    layers:
    - state: closed
      map: [ base ]
    - state: loader
      map: [ label ]
  - type: StorageFill
    contents:
    - id: RMCArmorM3TDemo
    - id: RMCArmorHelmetM3TDemo
    - id: RMCSatchelDemoSpec
    - id: RMCRocket84mm
    - id: RMCRocket84mmAntiArmor
    - id: RMCRocket84mmWhitePhosphorus
    - id: RMCMK80
    - id: CMMagazinePistolMK80
      amount: 2
    - id: RMCExplosivePlastic
      amount: 2
    - id: RMCBinoculars
    - id: RMCPamphletLoader
  - type: Tag
    tags:
    - RMCKitLoader

