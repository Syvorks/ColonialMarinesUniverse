  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/PVE_Cases/shotgun.rsi
  - type: Storage
    maxItemSize: Ginormous
    grid:
    - 0,0,7,1
    whitelist:
      tags:
      - RMCWeaponShotgunM42A2
      - RMCHandful
      - RMCAttachmentM42A2CollapsibleStock
  - type: StorageFill
    contents:
    - id: RMCWeaponShotgunM42A2Filled
    - id: RMCAttachmentM42A2CollapsibleStock
    - id: CMShellShotgunBuckshot
    - id: CMShellShotgunBuckshot
    - id: CMShellShotgunBuckshot
    - id: CMShellShotgunBuckshot
  - type: ItemMapper
    mapLayers:
      gun:
        whitelist:
          tags:
          - RMCWeaponShotgunM42A2

