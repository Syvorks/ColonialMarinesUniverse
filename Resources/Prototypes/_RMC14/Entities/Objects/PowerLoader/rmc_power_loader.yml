- type: entity
  parent: RMCMechBase
  id: RMCMechPowerLoader
  name: "силовий завантажувач LU-50"
  description: "Старий дизайн Fujin, відремонтований «Вестон-Ямада», що використовується на складах, будовах і військових кораблях усюди." # TODO RMC14 BETTER DESCRIPTION
  components:
  - type: RMCAllowStrapMovement
  - type: PowerLoader
    skills:
      all:
        RMCSkillPowerLoader: 1
  - type: Hands
  - type: GiveHands
    hands:
    - name: Right Hand
      location: Right
    - name: Left Hand
      location: Left
  - type: IgnoreInteractionRange
    whitelist:
      tags:
      - RMCDropshipEnginePoint
    range: 2
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckage

- type: entity
  parent: RMCMechPowerLoader
  id: RMCMechPowerLoaderGreen
  name: "силовий завантажувач LU-43"
  description: "Дуже старий, але надійний дизайн, що використовується на складах, будовах і військових кораблях усюди. У цього фірмова зелено-жовта розфарбовка Fujin. Етикетка стверджує, що вони виробляють електроніку та машини, хоча ти про них раніше ніколи не чув." # TODO RMC14 BETTER DESCRIPTION
  components:
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: powerloader_jd
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckageGreen

- type: entity
  parent: RMCMechPowerLoader
  id: RMCMechPowerLoaderBlue
  name: "силовий завантажувач LU-52"
  description: "Модернізований дизайн, створений, щоб перевершити старіші моделі, що колись використовувалися у вишуканих портах і об'єктах. Виготовлений Ferret Heavy Industries до банкрутства, що зробило ці одиниці напрочуд доступними." # TODO RMC14 BETTER DESCRIPTION
  components:
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: powerloader_ft
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckageBlue
