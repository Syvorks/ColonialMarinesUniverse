# Base
- type: entity
  abstract: true
  id: RMCMechBase
  components:
  - type: Corrodible
    isCorrodible: true
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: powerloader_open
      map: [ "buckledLayer" ]
  - type: MobMover
  - type: DoAfter
  - type: MeleeWeapon
    hidden: true
    attackRate: 1
    damage:
      types:
        Blunt: 30
    soundHit:
      collection: MetalThud
  - type: Puller
    needsHands: false
  - type: InputMover
  - type: InteractionOutline
  - type: MovementSpeedModifier
    baseWalkSpeed: 1
    baseSprintSpeed: 1
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 1000
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: ContainerContainer
    containers:
      rmc-mech-pilot: !type:ContainerSlot
  - type: Damageable
    damageContainer: Inorganic
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: RMCAllowStrapMovement
  - type: Strap
    buckleSound:
      path: /Audio/_RMC14/Mecha/powerloader_buckle.ogg
      params:
        variation: 0.1
    unbuckleSound:
      path: /Audio/_RMC14/Mecha/powerloader_unbuckle.ogg
      params:
        variation: 0.1
    blacklist:
      components:
      - Xeno
  - type: RMCStrapDrawDepth
    unstrappedDepth: Mobs
    strappedDepth: OverMobs
  - type: GenericVisualizer
    visuals:
      enum.StrapVisuals.State:
        buckledLayer:
          True: { state: powerloader_overlay }
          False: { state: powerloader_open }
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          RMCPowerCellAPC:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]

# Wreckages
- type: entity
  id: RMCMechPowerLoaderWreckage
  name: "Уламки робочого навантажувача Катерпіллар P-5000"
  description: "Рештки якогось нещасного силового навантажувача. Повністю неремонтопридатні."
  components:
  - type: Corrodible
    isCorrodible: true
  - type: Sprite
    drawdepth: BelowMobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: wreck
  - type: Clickable
  - type: InputMover
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: Strap
    blacklist:
      components:
      - Xeno
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: RMCMechPowerLoaderWreckage
  id: RMCMechPowerLoaderWreckageGreen
  name: "Уламки робочого навантажувача Джон Дір 4300"
  components:
  - type: Sprite
    drawdepth: BelowMobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: wreck_jd

- type: entity
  parent: RMCMechPowerLoaderWreckage
  id: RMCMechPowerLoaderWreckageBlue
  name: "Уламки робочого навантажувача Катерпіллар P-5200"
  components:
  - type: Sprite
    drawdepth: BelowMobs
    noRot: true
    sprite: _RMC14/Objects/power_loader.rsi
    layers:
    - state: wreck_ft

- type: entity
  parent: RMCMechBase
  id: RMCMechPowerLoader
  name: "Робочий навантажувач Катерпіллар P-5000"
  description: "Робочий навантажувач Катерпіллар P-5000 — це комерційний механізований екзоскелет для підіймання важких матеріалів і предметів, уперше спроєктований 29 січня 2025 року корпорацією Вейланд. Старий, але надійний зразок, що використовується на складах, будівництвах і військових кораблях усюди."
  components:
  - type: PowerLoader
    skills:
      all:
        RMCSkillPowerLoader: 1
  - type: Hands
  - type: GiveHands
    hands:
    - name: Right Hand
      location: Right
    - name: Left Hand
      location: Left
  - type: IgnoreInteractionRange
    whitelist:
      tags:
      - RMCDropshipEnginePoint
    range: 2
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckage

- type: entity
  parent: RMCMechPowerLoader
  id: RMCMechPowerLoaderGreen
  name: "Робочий навантажувач Джон Дір 4300"
  description: "Робочий навантажувач Джон Дір 4300 — це комерційний механізований екзоскелет для підіймання важких матеріалів і предметів на основі Катерпіллар P-5000, уперше спроєктований 29 січня 2025 року корпорацією Вейланд. Старий, але надійний зразок, що використовується на складах, будівництвах і військових кораблях усюди. Цей має фірмову зелено-жовту ліврею."
  components:
  - type: Sprite
    layers:
    - state: powerloader_open_jd
      map: [ "buckledLayer" ]
  - type: GenericVisualizer
    visuals:
      enum.StrapVisuals.State:
        buckledLayer:
          True: { state: powerloader_overlay_jd }
          False: { state: powerloader_open_jd }
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckageGreen

- type: entity
  parent: RMCMechPowerLoader
  id: RMCMechPowerLoaderBlue
  name: "Робочий навантажувач Катерпіллар P-5200"
  description: "Модернізована конструкція, створена, щоб перевершити старіші моделі, які колись використовували в престижних портах і комплексах."
  components:
  - type: Sprite
    layers:
    - state: powerloader_open_ft
      map: [ "buckledLayer" ]
  - type: GenericVisualizer
    visuals:
      enum.StrapVisuals.State:
        buckledLayer:
          True: { state: powerloader_overlay_ft }
          False: { state: powerloader_open_ft }
  - type: SpawnOnTerminate
    spawn: RMCMechPowerLoaderWreckageBlue