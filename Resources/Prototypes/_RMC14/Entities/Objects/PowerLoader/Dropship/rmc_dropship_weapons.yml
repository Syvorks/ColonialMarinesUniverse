- type: entity
  abstract: true
  parent: RMCDropshipAttachmentBase
  id: RMCDropshipAttachmentWeapon
  components:
  - type: DropshipFabricatorPrintable
    category: Equipment
    cost: 400
  - type: PowerLoaderGrabbable
    delay: 1
  - type: DropshipWeapon
    skills:
      all:
        RMCSkillPilot: 2
  - type: PowerLoaderAttachable
    attachDelay: 7
    attachableTypes:
    - RMCDropshipWeaponPoint
  - type: PowerLoaderDetachable
    detachDelay: 7

- type: entity
  parent: RMCDropshipAttachmentWeapon
  id: RMCDropshipAttachmentGau21Cannon
  name: "30-мм гармата GAU-21"
  description: "Демонтована 30-мм роторна гармата GAU-21 «Деркач». Здається, у неї відсутні стрічки подачі та оголені з'єднувальні дроти. Здатна вести вогонь зі швидкістю 5200 пострілів на хвилину, її потужність вселяє страх у багатьох. Отримала прізвисько «Деркач» через вібрації, які вона спричиняла на десантних кораблях у початковій серії. Приймає ящики з боєприпасами PGU-100/PGU-105"
  components:
  - type: Sprite
    layers:
    - state: 30mm_cannon
      offset: 0.5, 0.5
  - type: DropshipFabricatorPrintable
    cost: 400
  - type: DropshipWeapon
    abbreviation: GAU
    fireDelay: 2
    fireInTransport: true
    skills:
      all:
        RMCSkillPilot: 1
    weaponAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: 30mm_cannon_installed
    ammoEmptyAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: 30mm_cannon_loaded0
    ammoAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: 30mm_cannon_loaded1

- type: entity
  parent: RMCDropshipAttachmentWeapon
  id: RMCDropshipAttachmentGuidedMissileLauncher
  name: "установка керованих ракет LAU-444"
  description: "Ракетна пускова система, здатна запускати одну ракету з лазерним наведенням. Для переміщення знадобиться якийсь підйомник. Приймає ракетні системи AGM, AIM, BLU та GBU."
  components:
  - type: Sprite
    layers:
    - state: rocket_pod
      offset: 0.5, 0.5
  - type: DropshipFabricatorPrintable
    cost: 600
  - type: DropshipWeapon
    abbreviation: MSL
    fireDelay: 5
    weaponAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: rocket_pod_installed
    ammoEmptyAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: rocket_pod_installed
    ammoAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: rocket_pod_loaded

- type: entity
  parent: RMCDropshipAttachmentWeapon
  id: RMCDropshipAttachmentRocketPod
  name: "ракетна установка LAU-229"
  description: "Ракетна установка, здатна запускати шість мініракет з лазерним наведенням. Для переміщення знадобиться якийсь підйомник. Приймає мініракети серії AGR-59."
  components:
  - type: Sprite
    layers:
    - state: minirocket_pod
      offset: 0.5, 0.5
  - type: DropshipFabricatorPrintable
    cost: 600
  - type: DropshipWeapon
    abbreviation: RKT
    fireDelay: 1
    weaponAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: minirocket_pod_installed
    ammoEmptyAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: minirocket_pod_installed
    ammoAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: minirocket_pod_loaded
    ammoSpriteThresholds: [5, 4, 3, 2, 1]
