- type: entity
  parent: RMCDropshipAttachmentWeapon
  id: RMCDropshipAttachmentLaserCannon
  name: "лазерна гармата LWU-6B"
  description: "Сучасна технологія, нещодавно отримана UNMC, від акумуляторного живлення стріляє пульсуючим лазерним променем майже зі швидкістю світла, підпалюючи все, чого торкається. Для переміщення знадобиться якийсь підйомник. Приймає високоємні лазерні батареї BTU-17/LW."
  components:
  - type: Sprite
    layers:
    - state: laser_beam
      offset: 0.5, 0.5
  - type: DropshipFabricatorPrintable
    cost: 500
  - type: DropshipWeapon
    abbreviation: LZR
    fireDelay: 5
    fireInTransport: true
    skills:
      all:
        RMCSkillPilot: 1
    weaponAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: laser_beam_installed
    ammoEmptyAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: laser_beam_loaded
    ammoAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: laser_beam_loaded

- type: entity
  parent: RMCDropshipAttachmentAmmo
  id: RMCDropshipAttachmentAmmoLaserCannon
  name: "високоємна лазерна батарея BTU-17/LW"
  description: "Високоємна лазерна батарея, що використовується для живлення лазерних променевих озброєнь. Може бути завантажена в лазерну гармату LWU-6B."
  components:
  - type: Sprite
    layers:
    - state: laser_battery_10
      map: [ "enum.DropshipAmmoVisuals.Fill"]
  - type: DropshipAmmo
    ammoType: laser_battery
    rounds: 100
    maxRounds: 100
    roundsPerShot: 10
    shotsPerVolley: 10
    targetSpread: 1
    bulletSpread: 0
    travelTime: 1
    weapon: RMCDropshipAttachmentLaserCannon
    soundEveryShots: 1
    soundCockpit: /Audio/Machines/phasein.ogg
    soundMarker: /Audio/_RMC14/Binoculars/nightvision.ogg
    soundImpact:
      path: /Audio/_RMC14/Effects/laser_cannon.ogg
      params:
        volume: -6
    fire:
      type: RMCTileFireLaser
      range: 3
      total: 16
    deleteOnEmpty: true
