- type: entity
  abstract: true
  parent: RMCDropshipAttachmentBase
  id: RMCDropshipAttachmentElectronicSystem
  components:
  - type: Sprite
    sprite: _RMC14/Objects/dropship_electronic_system_attachments.rsi
  - type: PowerLoaderGrabbable
    delay: 1
  - type: DropshipElectronicSystem
  - type: PowerLoaderAttachable
    attachDelay: 7
    attachableTypes:
    - RMCDropshipElectronicSystemPoint
  - type: PowerLoaderDetachable
    detachDelay: 7

- type: entity
  parent: RMCDropshipAttachmentElectronicSystem
  id: RMCDropshipTargetingSystem
  name: "система наведення зброї AN/AAQ-178"
  description: "Система наведення для десантних кораблів. Покращує точність стрільби по лазерних цілях. Поміщається у точки кріплення електроніки. Для підняття потрібен силовий навантажувач."
  components:
  - type: Sprite
    layers:
    - state: targeting_system
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_electronic_system_attachments.rsi
      state: targeting_system_installed
  - type: DropshipTargetingSystem

- type: entity
  parent: RMCDropshipAttachmentElectronicSystem
  id: RMCDropShipSpotlight
  name: "прожектор AN/LEN-15"
  description: "Набір потужних прожекторів для освітлення великих ділянок. Поміщається у точки кріплення електроніки десантних кораблів. Для переміщення знадобиться силовий навантажувач."
  components:
  - type: Sprite
    layers:
    - state: spotlights
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_electronic_system_attachments.rsi
      state: spotlights_off
  - type: DropshipSpotlight

- type: entity
  parent: RMCDropshipAttachmentElectronicSystem
  id: RMCDropShipLZDetector
  name: "детектор зони висадки AN/AVD-60"
  description: "Електронний пристрій, підключений до системи камер десантного корабля, який дозволяє спостерігати за зоною висадки під час польоту"
  components:
  - type: Sprite
    layers:
    - state: lz_detector
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_electronic_system_attachments.rsi
      state: lz_detector_installed
  - type: CameraSignalGranter
    protoIds:
    - RMCMonitorCameraLandingZone
