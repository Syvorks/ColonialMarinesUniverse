- type: entity
  parent: BaseMachinePowered
  id: RMCDropshipFabricator
  name: "фабрикатор деталей десантного корабля"
  description: "Великий автоматизований 3D-принтер для виробництва деталей десантного корабля. Ви можете переробляти у ньому деталі або боєприпаси та отримувати назад 80% своїх балів — натисніть на нього, тримаючи їх у захваті силового навантажувача."
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCAS
  - type: Corrodible
    isCorrodible: false
  - type: Sprite
    sprite: _RMC14/Structures/Machines/dropship_fabricator.rsi
    layers:
    - map: [ "base" ]
      state: drone_fab_idle
      offset: 0.5, 0
  - type: DropshipFabricator
  - type: ApcPowerReceiver
    needsPower: false # TODO RMC14 power
  - type: UserInterface
    interfaces:
      enum.DropshipFabricatorUi.Key:
        type: DropshipFabricatorBui
  - type: ActivatableUI
    key: enum.DropshipFabricatorUi.Key
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "AU14AccessGovforPilot" ], [ "AU14AccessOpforPilot" ] ]
  - type: GenericVisualizer
    visuals:
      enum.DropshipFabricatorVisuals.State:
        base:
          enum.DropshipFabricatorState.Idle: { state: drone_fab_idle }
          enum.DropshipFabricatorState.Fabricating: { state: drone_fab_active }
  - type: Anchorable
    flags:
    - None
