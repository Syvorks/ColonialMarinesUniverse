- type: entity
  abstract: true
  parent: RMCDropshipAttachmentBase
  id: RMCDropshipAttachmentEngine
  components:
  - type: Sprite
    sprite: _RMC14/Objects/dropship_attachments.rsi
    offset: 0.5, 0.5
  - type: PowerLoaderGrabbable
    delay: 1
  - type: DropshipEngine
  - type: PowerLoaderAttachable
    attachDelay: 7
    attachableTypes:
    - RMCDropshipEnginePoint
  - type: PowerLoaderDetachable
    detachDelay: 7

- type: entity
  parent: RMCDropshipAttachmentEngine
  id: RMCDropshipAttachmentFuelEnhancer
  name: "підсилювач палива"
  description: "Система підсилення палива для десантних кораблів. Покращує тягу від згоряння палива для швидших перельотів. Поміщається у точки кріплення двигунів. Для підняття потрібен силовий навантажувач."
  components:
  - type: Sprite
    layers:
    - state: fuel_enhancer
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: fuel_enhancer_installed
  - type: DropshipFlightMultiplier

- type: entity
  parent: RMCDropshipAttachmentEngine
  id: RMCDropshipAttachmentCoolingSystem
  name: "система охолодження"
  description: "Система охолодження для десантних кораблів. Виробляє додаткове охолодження, зменшуючи затримки між запусками. Поміщається у точки кріплення двигунів. Для підняття потрібен силовий навантажувач."
  components:
  - type: Sprite
    layers:
    - state: cooling_system
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: cooling_system_installed
  - type: DropshipRechargeMultiplier
