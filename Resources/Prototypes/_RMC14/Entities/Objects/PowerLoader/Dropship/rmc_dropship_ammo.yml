  id: RMCDropshipAttachmentAmmoRocketWidowmaker
  name: "AIM-224B «Удовиця»"
  description: "Ракета AIM-224B — це ремоніт найновіших технологій ракет повітря-повітря. Отримала прізвисько «Удовиця» від різних пілотів десантних кораблів після покращень її системи наведення, які запобігають заглушенню, що призводить до високого коефіцієнта влучності. Не дуже підходить для наземного бомбардування, але висока швидкість дозволяє швидко дістатися цілі. Ця модифікована як вільнопадна бомба через нестачу боєприпасів десантних кораблів. Можна заряджати в Гранатометний Пускач LAU-444."
  components:
  - type: DropshipAmmo
    travelTime: 3
    explosion:
      total: 3000
      slope: 5.5
      max: 55
