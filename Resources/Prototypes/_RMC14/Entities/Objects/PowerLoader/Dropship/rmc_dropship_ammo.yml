- type: entity
  parent: RMCDropshipAttachmentAmmo
  id: RMCDropshipAttachmentAmmoGAU
  name: "ящик 30-мм багатоцільових набоїв PGU-100"
  description: "Ящик, повний 30-мм багатоцільових набоїв PGU-100, призначених пробивати легкі (неукріплені) конструкції, а також розривати піхоту, IAV, LAV, IMV і MRAP. Працює на великих площах для використання проти класу 4 і вище інопланетних комахоподібних інвазій, а також підходить для арсеналу проти повстанства 4-го рівня та вищих. Однак йому бракує бронепробивних можливостей, для яких потрібні протитанкові 30-мм набої. Можна заряджати в 30-мм гармату GAU-21."
  components:
  - type: Sprite
    layers:
    - state: 30mm_crate_10
      map: [ "enum.DropshipAmmoVisuals.Fill"]
  - type: DropshipAmmo
    ammoType: 30mm_crate
    rounds: 400
    maxRounds: 400
    roundsPerShot: 40
    damage:
      groups:
        Brute: 105
    armorPiercing: 10
    weapon: RMCDropshipAttachmentGau21Cannon
    soundCockpit: /Audio/_RMC14/Dropship/gau_incockpit.ogg
    soundGround: /Audio/_RMC14/Dropship/gau.ogg
    soundImpact:
      path: /Audio/_RMC14/Dropship/gauimpact.ogg
      params:
        volume: -6
    impactEffects:
    - RMCEffectExplosionParticle

- type: entity
  parent: RMCDropshipAttachmentAmmoGAU
  id: RMCDropshipAttachmentAmmoGAUAP
  name: "ящик 30-мм протитанкових набоїв PGU-105"
  description: "Ящик, повний спеціалізованих 30-мм APFSDS титан-вольфрамових пробивників PGU-105, виготовлених для протидії БТР, БМП і ОБТ рівних і близьких до рівних супротивників у CAS-підтримці. Розроблені пробивати до еквіваленту 1350мм RHA при пуску з GAU-21. Однак значно менш ефективні проти м'яких цілей, у такому випадку рекомендується звичайна 30-мм. УВАГА: відкидання пелюсток від боєприпасів може бути шкідливим, якщо десантний корабель не вийде з пікіровки на потрібних швидкостях. Будь ласка, проконсультуйтеся зі сторінкою 3574 інструкції, доступної для замовлення в будь-якому магазині AEGIS. Можна заряджати в 30-мм гармату GAU-21."
  components:
  - type: Sprite
    layers:
    - state: 30mm_crate_hv_10
      map: [ "enum.DropshipAmmoVisuals.Fill" ]
  - type: DropshipAmmo
    ammoType: 30mm_crate_hv
    bulletSpread: 4
    damage:
      groups:
        Brute: 80
    armorPiercing: 40
    travelTime: 6

