- type: entity
  abstract: true
  parent: RMCDropshipAttachmentBase
  id: RMCDropshipAttachmentUtility
  components:
  - type: Sprite
    sprite: _RMC14/Objects/dropship_utility_attachments.rsi
  - type: DropshipFabricatorPrintable
    category: Equipment
    cost: 400
  - type: PowerLoaderGrabbable
    delay: 1
  - type: DropshipUtility
    skills:
      all:
        RMCSkillPilot: 2
  - type: PowerLoaderAttachable
    attachDelay: 7
    attachableTypes:
    - RMCDropshipUtilityPoint
  - type: PowerLoaderDetachable
    detachDelay: 7

- type: entity
  parent: RMCDropshipAttachmentUtility
  id: RMCDropshipAttachmentMedevac
  name: "система медевакуації RMU-4M"
  description: "Лебідкова система для підняття поранених морпіхів на медичних ношах до десантного корабля. Кріпиться до точки кріплення для екіпажного обладнання у задній частині десантного корабля."
  components:
  - type: Sprite
    layers:
    - state: medevac_system
  - type: DropshipFabricatorPrintable
    cost: 300
  - type: DropshipUtility
    activateDelay: 20
    activateInTransport: true
    skills:
      all:
        RMCSkillMedical: 2
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: medevac_system_deployed
  - type: Medevac
  - type: AnimationPlayer

- type: entity
  parent: RMCDropshipAttachmentUtility
  id: RMCDropshipAttachmentFulton
  name: "система евакуації Фултон RMU-19"
  description: "Лебідкова система для збору евакуаційних балонів Фултон на великій висоті. Не забудьте її увімкнути!"
  components:
  - type: Sprite
    layers:
    - state: fulton_system
  - type: DropshipFabricatorPrintable
    cost: 200
  - type: DropshipUtility
    activateDelay: 5
    activateInTransport: true
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: fulton_system_deployed
  - type: RMCFulton
  - type: AnimationPlayer

- type: entity
  parent: RMCDropshipAttachmentUtility
  id: RMCDropshipAttachmentParaDrop
  name: "система парашутного десантування HPU-1"
  components:
  - type: Sprite
    layers:
    - state: paradrop_system
  - type: DropshipFabricatorPrintable
    cost: 50
  - type: DropshipUtility
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: paradrop_system_deployed
  - type: RMCParaDrop

- type: entity
  parent: RMCDropshipAttachmentUtility
  id: RMCDropshipAttachmentDoorGun
  name: "система точки кріплення дверного стрільця MTU-4B"
  description: "Ящик, що розгортає важкий кулемет M56D з оптичним прицілом, обслуговуваний екіпажем. Підходить як до точок кріплення зовнішнього озброєння, так і до точок кріплення екіпажного відсіку десантних кораблів."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/dropship_utility_attachments.rsi
    layers:
    - state: mg_system
  - type: DropshipFabricatorPrintable
    cost: 50
  - type: DropshipUtility
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: mg_system_installed
    weaponSlotSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: mg_system_installed
  - type: PowerLoaderAttachable
    attachableTypes:
    - RMCDropshipUtilityPoint
    - RMCDropshipWeaponPoint
  - type: RMCEquipmentDeployer
    isDeployableByHand: true
    utilityDeployedSprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: mg_system_deployed
    weaponDeployedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: mg_system_deployed
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCDropshipAttachmentUtility
  id: RMCDropshipAttachmentSentryDefenseSystem
  name: "система оборонних турелей A/A-32-P"
  description: "Ящик, що розгортає турель. Підходить як до точок кріплення зовнішнього озброєння, так і до точок кріплення екіпажного відсіку десантних кораблів."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/dropship_utility_attachments.rsi
    layers:
    - state: sentry_system
  - type: DropshipFabricatorPrintable
    cost: 1200
  - type: DropshipUtility
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: sentry_system_installed
    weaponSlotSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: sentry_system_installed
  - type: PowerLoaderAttachable
    attachableTypes:
    - RMCDropshipUtilityPoint
    - RMCDropshipWeaponPoint
  - type: RMCEquipmentDeployer
    deployPrototype: RMCSentryDropship
    dropShipWindowButtonText: Sentry
    starboardForeDeployDirection: 0, 1
    portForeDeployDirection: 0, 1
    starboardWingDeployDirection: 1, 0
    portWingDeployDirection: -1, 0
    utilityDeployedSprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: sentry_system_deployed
    weaponDeployedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: sentry_system_deployed
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCDropshipAttachmentUtility
  id: RMCDropshipAttachmentLaunchBay
  name: "внутрішня пускова установка турелей LAG-14"
  description: "Пусковий відсік для скидання спецбоєприпасів. Поміщається всередину точки кріплення екіпажного озброєння десантного корабля. Для переміщення знадобиться якийсь підйомник. Приймає десантовану турель A/C-49-P як боєприпаси."
  components:
  - type: Sprite
    layers:
    - state: launch_bay
  - type: DropshipFabricatorPrintable
    cost: 200
  - type: DropshipUtility
  - type: DropshipAttachedSprite
    sprite:
      sprite: _RMC14/Objects/dropship_utility_attachments.rsi
      state: launch_bay_deployed
  - type: RMCOrbitalDeployer
