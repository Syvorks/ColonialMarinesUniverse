- type: entity
  parent: CMFirstAidKitSurgery
  id: CMFirstAidKitSurgeryFilled
  description: "Містить хірургічну нитку, каутер, скальпель, затискач, ретрактор, серветки та ін'єктор оксикодону для хірургічного догляду за ранами. З медичною підготовкою її можна помістити в рюкзак."
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMSurgicalLine
    - id: CMCautery
    - id: CMScalpel
    - id: CMHemostat
    - id: CMRetractor
#    - id: CMOxycodoneAutoinjector # TODO RMC14
#    - id: CMOxycodoneAutoinjector # TODO RMC14

- type: entity
  parent: CMFirstAidKit
  id: CMBurnAidKit
  name: "аптечка від опіків"
  description: "Це аптечка для випадків, коли сховище боєприпасів десантного корабля спонтанно згорає. З медичною підготовкою її можна помістити в рюкзак."
  components:
  - type: Sprite
    layers:
    - state: firefirstaid
    - state: kit_empty
      map: [ "openLayer" ]
      visible: false
  - type: Item
    heldPrefix: firefirstaid

- type: entity
  parent: CMBurnAidKit
  id: CMBurnAidKitFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMHealthAnalyzer
    - id: CMOintment10
      amount: 2
    - id: CMKelotaneAutoInjector
      amount: 3
#    - id: CMPainStopAutoInjectorNoSkill

