- type: entity
  parent: CMFirstAidKit
  id: CMFirstAidKitFilled
  description: "Це аптечка з базовими ліками та обладнанням. Не потребує підготовки для використання. З медичною підготовкою її можна помістити в рюкзак."
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMHealthAnalyzer
    - id: CMTricordrazineAutoInjectorNoSkill
#    - id: CMPainStopAutoInjectorNoSkill
    - id: CMInaprovalineAutoInjector
    - id: CMGauze10
    - id: CMOintment10
#    - id: CMMedicalSplint5

- type: entity
  parent: CMFirstAidKit
