- type: entity
  parent: BaseStorageItem
  id: CMSurgicalCase
  name: "хірургічний кейс"
  description: "Це медичний кейс для зберігання базових хірургічних інструментів." # TODO RMC14 extended description with instructions for treating internal bleeds once those are added
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/surgical_case.rsi
    layers:
    - state: surgical_case_base
    - state: surgical_case_open
      map: [ "openLayer" ]
      visible: false
    - state: surgical_case_closed
      map: [ "closedLayer" ]
      visible: false
  - type: Item
    size: Small
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,11,1
    whitelist:
      components:
      - CMScalpel
      - CMHemostat
      - CMRetractor
      - CMCautery
      tags:
      - CMSurgicalLine
      - CMSynthGraft
      #TODO FixoVein
  - type: FixedItemSizeStorage
  - type: Tag
    tags:
      - CMSurgicalCase
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState:
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }
        closedLayer:
          Open: { visible: false }
          Closed: { visible: true }
  - type: Appearance
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 1000

- type: entity
  parent: CMSurgicalCase
  id: CMSurgicalCaseFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMScalpel
    - id: CMHemostat
    - id: CMRetractor
    - id: CMCautery
    - id: CMSurgicalLine
    - id: CMSynthGraft

- type: entity
  parent: CMSurgicalCase
  id: RMCSurgicalCaseRCM
  name: "хірургічний кейс RCM"
  description: "Покращений хірургічний кейс, що використовується Морпіхами Королівської Корони, здатний вмістити більше інструментів."
  suffix: RCM
  components:
  - type: Storage
    grid:
    - 0,0,9,1 # 5 slots

- type: entity
  parent: RMCSurgicalCaseRCM
  id: RMCSurgicalCaseRCMFilled # TODO RMC14 unique sprite
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMScalpel
    - id: CMHemostat
    - id: CMRetractor
    - id: CMSurgicalLine
    - id: CMSynthGraft
