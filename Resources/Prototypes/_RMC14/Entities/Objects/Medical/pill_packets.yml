- type: entity
  abstract: true
  parent: BaseStorageItem
  id: CMPacketPills
  name: "пакет таблеток"
  description: "Містить таблетки. Коли ти їх вийняв — назад вони не потраплять."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/pill_packets.rsi
  - type: Item
    size: Small
  - type: Storage # TODO RMC14 quick-eject
    maxItemSize: Small
    grid:
    - 0,0,7,1 # 4 slots
    whitelist:
      components:
      - Pill
  - type: FixedItemSizeStorage
  - type: Tag
    tags:
    - PillPacket
  - type: IconLabel
    textColor: White
    storedOffset: -12, 12
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage

- type: Tag
  id: PillPacket

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsTricordrazine
  name: "пакет таблеток трикордазину"
  description: "Цей пакет містить таблетки трикордазину. Лікує всі типи ушкоджень повільно. Коли ти їх вийняв — назад вони не потраплять. Не приймай більше 2 таблеток за короткий період."
  components:
  - type: Sprite
    state: tricordrazine_packet
  - type: StorageFill
    contents:
    - id: CMPillTricordrazine
      amount: 4
  - type: IconLabel
    labelTextLocId: rmc-tricordazine-container-label-text

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsBicaridine
  name: "пакет таблеток бікаридину"
  description: "Цей пакет містить таблетки бікаридину. Ефективно лікує фізичні ушкодження. Коли ти їх вийняв — назад вони не потраплять. Не приймай більше 2 таблеток за короткий період."
  components:
  - type: Sprite
    state: bicaridine_packet
  - type: StorageFill
    contents:
    - id: CMPillBicaridine
      amount: 4
  - type: IconLabel
    labelTextLocId: rmc-bicaridine-container-label-text

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsKelotane
  name: "пакет таблеток келотану"
  description: "Цей пакет містить таблетки келотану. Ефективно лікує опіки. Коли ти їх вийняв — назад вони не потраплять. Не приймай більше 2 таблеток за короткий період."
  components:
  - type: Sprite
    state: kelotane_packet
  - type: StorageFill
    contents:
    - id: CMPillKelotane
      amount: 4
  - type: IconLabel
    labelTextLocId: rmc-kelotane-container-label-text

