- type: entity
  parent: BaseItem
  id: CMHealthAnalyzer
  name: "аналізатор здоров'я HF2"
  description: "Ручний сканер тіла, здатний розрізняти життєві показники суб'єкта. Передня панель здатна показати базові показники стану суб'єкта."
  suffix: RMC14
  components:
  - type: Item
    size: Small
  - type: Tag
    tags:
    - DiscreteHealthAnalyzer
  - type: Sprite
    sprite: _RMC14/Objects/Medical/health_analyzer.rsi
    state: health
  - type: ActivatableUI
    key: enum.HealthScannerUIKey.Key
    inHandsOnly: false
  - type: UserInterface
    interfaces:
      enum.HealthScannerUIKey.Key:
        type: HealthScannerBui
  - type: HealthScanner
    sound:
      path: "/Audio/_RMC14/Medical/healthanalyzer.ogg"
  - type: Appearance
  - type: GuideHelp
    guides:
    - MedicalDoctor
  - type: UseDelay
    delay: 1
  - type: MedicallyUnskilledDoAfter
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage
  - type: RMCItemKeepUIOpenOnStorageClosed
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 200
