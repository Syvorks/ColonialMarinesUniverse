- type: entity
  parent: RMCPowerCell
  id: RMCPowerCellSmartgun
  name: "батарея смартгана DV9"
  description: "Стандартна штатна 9-вольтова літієва суха батарея, яку найчастіше використовують в ОНМП для живлення смартганів. За інструкцією, однієї батареї вистачає на до 50 000 пострілів, і вона під'єднується безпосередньо до роз'єму живлення смартгана, сумісного лише з цим типом батарей. Різні допоміжні режими зазвичай значно зменшують кількість пострілів. Хоча ця батарея несумісна з більшістю стандартних електросистем, її можна заряджати звичайними зарядниками за потреби. Смартганери ОНМП часто ревниво стережуть їх."
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: smartguncell
  - type: Battery
    maxCharge: 10000
    startingCharge: 10000
  - type: SmartGunBattery
  - type: PhysicalComposition
    materialComposition: {}

- type: entity
  id: RMCPowerCellSlot
  abstract: true
  components:
    - type: ContainerContainer
      containers:
        cell_slot: !type:ContainerSlot { }
    - type: PowerCellSlot
      cellSlotId: cell_slot
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: RMCPowerCell

- type: entity
  parent: RMCPowerCellSlot
  id: RMCPowerCellSlotUnremovable
  abstract: true
  components:
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: RMCPowerCell
          locked: true

- type: entity
  parent: RMCPowerCellSlot
  id: RMCPowerCellSlotUnremovableSuper
  abstract: true
  components:
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: RMCPowerCellSuper
          locked: true
