- type: entity
  parent: BaseItem
  id: RMCPowerCell
  name: "батарея"
  description: "Перезаряджувана електрохімічна батарея."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Power/cells.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: cell
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: PowerCell
  - type: Appearance
  - type: PowerCellVisuals
  - type: Riggable
  - type: Tag
    tags:
      - PowerCell
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 700
      CMGlass: 50
  - type: StaticPrice
    price: 1.1

- type: entity
  parent: RMCPowerCell
  id: RMCPowerCellCrap
  name: "перезаряджувана міні-батарея «Ве-Ю»"
  description: "Дешеві, одноразові батареї, надані Корпорацією «Вейленд-Ютані». Функцію «перезаряджувана» додали, щоб бути привабливішими для незалежних колоністів, схиблених на «використанні до повного розпаду» — поширеному настрої на фронтирі."
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: mini-cell
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 500
    startingCharge: 500
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 700
      CMGlass: 40

- type: entity
  parent: RMCPowerCellCrap
  id: RMCPowerCellCrapEmpty
  suffix: Empty
  components:
  - type: Battery
    startingCharge: 0

