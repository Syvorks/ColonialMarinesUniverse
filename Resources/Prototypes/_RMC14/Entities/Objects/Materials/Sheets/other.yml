# Phoron
- type: material
  id: CMPhoron
  stackEntity: CMSheetPhoron
  name: "форон"
  icon: { sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi, state: phoron }
  color: "#7e009e"
  price: 0.01

- type: stack
  id: CMPhoron
  name: "форон"
  icon: { sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi, state: phoron }
  spawn: CMSheetPhoron
  maxCount: 50

- type: entity
  parent: SheetOtherBase
  id: CMSheetPhoron
  name: "твердий форон"
  description: "Форон — надзвичайно рідкісний мінерал з екзотичними властивостями, що часто використовується в передових дослідженнях. Просто отримання його у стабільній, твердій формі вже досить складно, враховуючи, що він може бути досить токсичним і легкозаймистим."
  suffix: Full
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      CMPhoron: 2000
  - type: Stack
    stackType: CMPhoron
    count: 50
  - type: Sprite
    state: phoron
    sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi
  - type: Item
    heldPrefix: phoron
    size: Normal
    sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Appearance
  - type: Extractable
    grindableSolutionName: phoron
  - type: SolutionContainerManager
    solutions:
      phoron:
        reagents:
        - ReagentId: RMCPhoron
          Quantity: 20
  - type: Tag
    tags:
    - Sheet

- type: entity
  parent: CMSheetPhoron
  id: CMSheetPhoron15
  suffix: 15
  components:
  - type: Stack
    count: 15

- type: entity
  parent: CMSheetPhoron
  id: CMSheetPhoron25
  suffix: 25
  components:
  - type: Stack
    count: 25

- type: entity
  parent: CMSheetPhoron
  id: CMSheetPhoron30
  suffix: "30"
  components:
  - type: Stack
    count: 30

- type: entity
  parent: CMSheetPhoron
  id: CMSheetPhoron1
  suffix: Single
  components:
  - type: Stack
    count: 1

# Wood
- type: material
  id: RMCWood
  stackEntity: RMCPlankWood
  name: materials-wood
  icon: { sprite: _RMC14/Objects/Materials/Sheets/wood.rsi, state: wood }
  color: "#966F33"
  price: 0.00133

- type: stack
  id: RMCWood
  name: "дерев'яна дошка"
  icon: { sprite: _RMC14/Objects/Materials/Sheets/wood.rsi, state: wood }
  spawn: RMCPlankWood
  maxCount: 50

- type: entity
  parent: SheetOtherBase
  id: RMCPlankWood
  name: "дерев'яна дошка"
  description: "Можна тільки здогадуватися, що це купа дерева."
  suffix: Full
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      RMCWood: 3750
  - type: Stack
    stackType: RMCWood
    count: 50
    baseLayer: base
    layerStates:
      - wood
      - wood_2
      - wood_3
      - wood_4
  - type: Sprite
    sprite: _RMC14/Objects/Materials/Sheets/wood.rsi
    state: wood_4
    layers:
    - state: wood_4
      map: ["base"]
  - type: Item
    sprite: _RMC14/Objects/Materials/Sheets/wood.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
    heldPrefix: wood
    size: Normal
  - type: Appearance
  - type: Tag
    tags:
    - Sheet
  - type: RMCConstructionItem
    buildable:
    - RMCFloorTileWoodBuild
    - RMCCampfireBuild
    - AU14TorchBuild
    - AU14BaseballBatBuild
    - AU14FishingRodBuild
    - AU14WoodenChairBuild
    - RMCWoodenBarricadeBuild
    - RMCWoodenCrateBuild
    - AU14WoodenCrossBuild
    - AU14WoodenSandalsBuild
    # wooden door
    # coffin
    # wooden pole
  - type: UserInterface
    interfaces:
      enum.RMCConstructionUiKey.Key:
        type: RMCConstructionBui
  - type: CampfireFuel
    fuelAmount: 1

