- type: entity
  parent: Ashtray
  id: RMCAshtray
  name: "пластикова попільничка"
  description: "Дешева пластикова попільничка."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Decoration/ashtray.rsi
    layers:
      - state: icon-0
        map: ["enum.StorageFillLayers.Fill"]
  - type: StorageFillVisualizer
    fillBaseName: icon
    maxFillLevels: 2
  - type: PhysicalComposition
    materialComposition: # "Plastic" ¯\_(ツ)_/¯
      CMSteel: 30
      CMGlass: 30

- type: entity
  parent: RMCAshtray
  id: RMCAshtrayBronze
  name: "бронзова попільничка"
  description: "Масивна бронзова попільничка."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Decoration/ashtray-br.rsi
    layers:
      - state: icon-0
        map: ["enum.StorageFillLayers.Fill"]
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 80

- type: entity
  parent: RMCAshtray
  id: RMCAshtrayGlass
  name: "скляна попільничка"
  description: "Скляна попільничка. Виглядає крихкою."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Decoration/ashtray-gl.rsi
    layers:
      - state: icon-0
        map: ["enum.StorageFillLayers.Fill"]
  - type: PhysicalComposition
    materialComposition:
      CMGlass: 60
