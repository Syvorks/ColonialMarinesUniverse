- type: entity
  abstract: true
  id: RMCHiveBoonBase
  name: "дарунок вулика"
  components:
  - type: HiveBoonDefinition
    cost: 1

- type: entity
  parent: RMCHiveBoonBase
  id: RMCHiveBoonFireResistance
  name: "Дарунок Вогнестійкості"
  description: "Робить усіх ксеноїдів несприйнятливими до вогню на 5 хвилин."
  components:
  - type: HiveBoonDefinition
    duration: 5m
    duplicateId: RMCHiveBoonFireResistance
    event: !type:HiveBoonActivateFireResistanceEvent

- type: entity
  parent: RMCHiveBoonBase
  id: RMCHiveBoonLarvaSurge
  name: "Сплеск Личинок"
  description: "Миттєво дає вулику 5 личинок."
  components:
  - type: HiveBoonDefinition
    cost: 5
    reusable: false
    duplicateId: RMCHiveBoonLarvaSurge
    event: !type:HiveBoonActivateLarvaSurgeEvent

- type: entity
  parent: RMCHiveBoonBase
  id: RMCHiveBoonKing
  name: "Його Велич"
  description: "Велетенський бегемот серед ксеноїдів, що проривається крізь оборону й плоть з однаковою легкістю. Потребує відкритого простору навколо ядра вулика для появи."
  components:
  - type: HiveBoonDefinition
    cost: 0
    pylons: 2
    cooldown: 15m
    unlockAt: 90m
    unlockAtRandomAdd: 25m
    duplicateId: RMCHiveBoonKing
    noLivingKing: true
    requiresCore: true
    event: !type:HiveBoonActivateKingEvent

- type: entity
  parent: BaseHiveStructure
  id: RMCHiveCocoonKing
  name: "кокон чужого"
  description: "Великий пульсуючий кокон."
  components:
  - type: Transform
    anchored: true
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        layer:
        - BulletImpassable
        density: 200
      xeno_hive_core:
        shape:
          !type:PhysShapeCircle
          radius: 1
        hard: false
        mask:
        - SmallMobLayer
  - type: CollisionWake
    enabled: false
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/king_cocoon.rsi
    state: growing
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4000
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: WarpPoint
    location: alien cocoon
  - type: RMCTrackable
  - type: HiveKingCocoon
  - type: MeleeReceivedMultiplier
    xenoDamage: {}
