# Trijent
- type: entity
  abstract: true
  parent: RMCMapInsertBase
  id: RMCMapInsertTrijentBase
  suffix: Insert Trijent
  components:
  - type: MapInsert
    clearEntities: true
    clearDecals: true
    replaceAreas: true

