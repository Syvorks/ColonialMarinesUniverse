
- type: entity
  name: "плюм-гриб"
  parent: FoodProduceBase
  id: FoodMushroomPlump
  description: "Плюмус Хеллмус: Та ЗАМОВКНІТЬ нарешті про ці КЛЯТІ гриби! РУХАЙТЕСЯ, морпіхи!"
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
  - type: Sprite
    sprite: _RMC14/Objects/Kitchen/Plants/plump.rsi
  - type: Item
    heldPrefix: produce
  - type: Produce
    seedId: plump
  - type: Tag
    tags:
    - Vegetable

- type: entity
  name: "арахіс"
  parent: FoodProduceBase
  id: FoodPeanut
  description: "Горіхи!"
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 2
        - ReagentId: RMCPeanutButter
          Quantity: 2
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: RMCPeanutButter
        Quantity: 5
  - type: Sprite
    sprite: _RMC14/Objects/Kitchen/Plants/peanut.rsi
  - type: Item
    heldPrefix: produce
  - type: Produce
    seedId: peanut
  - type: Tag
    tags:
    - Vegetable

