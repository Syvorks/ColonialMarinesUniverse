- type: entity
  parent: BaseItem
  id: VehicleSPPAPCHardpointBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
  - type: Item
    size: Large
  - type: PowerLoaderGrabbable

- type: entity
  parent: VehicleSPPAPCHardpointBase
  id: VehicleSPPAPCWheel
  name: "колесо БТР ССП"
  description: "Посилене колесо БТР, вироблене для техніки ССП."
  components:
  - type: Sprite
    state: spp_tires
  - type: HardpointItem
    hardpointType: Wheel
    vehicleFamily: APC
    slotType: Wheel
    compatibilityId: SPPAPC
    damageMultiplier: 0.15
    repairRate: 0.0165
  - type: HardpointIntegrity
    maxIntegrity: 500
  - type: VehicleWheelItem
  - type: RemoveComponents
    components:
    - type: PowerLoaderGrabbable

- type: entity
  parent: VehicleSPPAPCHardpointBase
  id: VehicleSPPAPCTurret
  name: "турель БТР ССП"
  description: "Обертове кріплення турелі для БТР ССП."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/sppapc.rsi
    state: apc_turret_0
  - type: HardpointItem
    hardpointType: Turret
    vehicleFamily: APC
    slotType: Turret
    compatibilityId: SPPAPC
    damageMultiplier: 0.2
    repairRate: 0.008
  - type: HardpointIntegrity
    maxIntegrity: 500
  - type: VehicleTurret
    rotateToCursor: true
    stabilizedRotation: false
    rotationSpeed: 80
    showOverlay: true
    useDirectionalOffsets: true
    overlayRsi: _RMC14/Structures/Vehicles/sppapc.rsi
    overlayState: apc_turret_0
    pixelOffsetNorth: "0,4"
    pixelOffsetEast: "-1,28"
    pixelOffsetSouth: "0,6"
    pixelOffsetWest: "-1,28"
  - type: ItemSlots
    slots:
      turret-cannon:
        startingItem: VehicleSPPAPCMinigun
        disableEject: true
        whitelist:
          components:
          - HardpointItem
  - type: HardpointSlots
    vehicleFamily: APC
    slots:
    - id: turret-cannon
      hardpointType: Cannon
      slotType: Cannon
      compatibilityId: SPPAPCTurret
      required: false
      insertDelay: 2.0
  - type: HardpointVisual
    vehicleState: apc_turret_0

- type: entity
  parent: RMCAPCDualCannon
  id: VehicleSPPAPCMinigun
  name: "мініган БТР ССП"
  description: "Мініган, встановлений на турелі БТР ССП."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: apc_minigun
  - type: HardpointItem
    hardpointType: Cannon
    vehicleFamily: APC
    slotType: Cannon
    compatibilityId: SPPAPCTurret
    damageMultiplier: 0.2
    repairRate: 0.01
  - type: VehicleTurretAttachment
  - type: VehicleTurret
    showOverlay: true
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    overlayRsi: _RMC14/Structures/Vehicles/sppapc.rsi
    overlayState: apc_minigun_0
    fireWhileRotatingGraceDegrees: 20
    useBarrelDirectionForShots: true
    maxShotCurvatureDegrees: 10
  - type: GunMuzzleOffset
    useDirectionalOffsets: true
    rotateDirectionalOffsets: true
    offsetNorth: "0,-1.2"
    offsetEast: "0,-1.2"
    offsetSouth: "0,-1.2"
    offsetWest: "0,-1.2"
    muzzleOffset: "0,0"
    useAimDirection: true
  - type: HardpointVisual
    vehicleState: apc_minigun_0

- type: entity
  parent: RMCAPCFrontCannon
  id: VehicleSPPAPCAutocannon
  name: "автогармата БТР ССП"
  description: "Лобовий хардпойнт автогармати для БТР ССП."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: apc_autocannon
  - type: HardpointItem
    compatibilityId: SPPAPC
  - type: GunMuzzleOffset
    useDirectionalOffsets: true
    rotateDirectionalOffsets: true
    offsetNorth: "0.5,-1.7"
    offsetEast: "0.5,-1.7"
    offsetSouth: "0.5,-1.7"
    offsetWest: "0.5,-1.7"
    muzzleOffset: "0,0"
    useAimDirection: true
  - type: HardpointVisual
    vehicleState: apc_autocannon_0

- type: entity
  parent: VehicleTankTowLauncher
  id: VehicleSPPAPCHJ35Launcher
  name: "пускова HJ35 для БТР"
  description: "Пускова установка ракет, встановлена на вторинному кріпленні БТР ССП."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: hj35launcher
  - type: HardpointItem
    hardpointType: Cannon
    vehicleFamily: APC
    slotType: Cannon
    compatibilityId: SPPAPC
    damageMultiplier: 0.11
  - type: HardpointIntegrity
    maxIntegrity: 350
  - type: HardpointVisual
    vehicleState: apc_hj35_0

- type: entity
  parent: RMCAPCFlareLauncher
  id: VehicleSPPAPCFlareLauncher
  name: "пускова фаєрів БТР ССП"
  description: "Хардпойнт пускової установки фаєрів для допоміжних слотів БТР ССП."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/sppapc.rsi
    state: spp_flare_launcher
  - type: HardpointItem
    compatibilityId: SPPAPC
  - type: HardpointVisual
    vehicleState: spp_flare_launcher_0

