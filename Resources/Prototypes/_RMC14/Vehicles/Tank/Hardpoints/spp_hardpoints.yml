- type: entity
  parent: BaseItem
  id: VehicleSPPTankHardpointBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/spptank.rsi
  - type: Item
    size: Large
  - type: PowerLoaderGrabbable

- type: entity
  parent: VehicleTankTurret
  id: VehicleSPPTankTurret
  name: "турель танка СПП"
  description: "Танкова турель, налаштована під бронетехніку СПП."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/spptank.rsi
    state: tank_turret_0
  - type: HardpointItem
    compatibilityId: SPPTank
    repairRate: 0.01
  - type: VehicleTurret
    rotateToCursor: true
    stabilizedRotation: false
    rotationSpeed: 60
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/spptank.rsi
    overlayState: tank_turret_0
    useDirectionalOffsets: false
    pixelOffsetNorth: "0,6"
    pixelOffsetEast: "-5,0"
    pixelOffsetSouth: "0,0"
    pixelOffsetWest: "5,0"
  - type: ItemSlots
    slots:
      turret-cannon:
        startingItem: VehicleSPPTankP17702
        disableEject: true
        whitelist:
          components:
          - HardpointItem
      turret-launcher:
        startingItem: VehicleSPPTankCupola
        disableEject: true
        whitelist:
          components:
          - HardpointItem
  - type: HardpointSlots
    vehicleFamily: Tank
    slots:
    - id: turret-cannon
      hardpointType: Cannon
      slotType: Cannon
      compatibilityId: SPPTank
      required: false
      insertDelay: 2.0
    - id: turret-launcher
      hardpointType: Launcher
      slotType: Launcher
      compatibilityId: SPPTank
      required: false
      insertDelay: 2.0

- type: entity
  parent: VehicleTankLTAAAPMinigun
  id: VehicleSPPTankP17702
  name: "роторна гармата P-17702"
  description: "Танковий вузол кріплення роторної гармати СПП."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/hardpoints/spptank.rsi
    state: p17702
  - type: VehicleTurret
    fireWhileRotatingGraceDegrees: 180
    useBarrelDirectionForShots: true
    maxShotCurvatureDegrees: 10
    offsetRotatesWithTurret: true
    useDirectionalOffsets: true
    pixelOffsetNorth: "-1,18"
    pixelOffsetEast: "17,12"
    pixelOffsetSouth: "0,-35"
    pixelOffsetWest: "-15,13"
    showOverlay: true
    overlayRsi: _RMC14/Structures/Vehicles/spptank.rsi
    overlayState: p17702_0
  - type: HardpointItem
    compatibilityId: SPPTank
  - type: HardpointVisual
    vehicleState: p17702_0
  - type: GunMuzzleOffset
    offset: "0,0"
    applyToMuzzleFlash: true
    useDirectionalOffsets: true
    rotateDirectionalOffsets: true
    offsetEast: "-0.1,-1.7"
    offsetWest: "0.1, -1.7"
    offsetSouth: "0, -1"
    offsetNorth: "0, -1.8"
    useAimDirection: true
    useContainerOwner: false

