    bodyType: Static
    canCollide: true
  - type: Occluder
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/van.rsi
    drawdepth: Overdoors
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
        - InteractImpassable

