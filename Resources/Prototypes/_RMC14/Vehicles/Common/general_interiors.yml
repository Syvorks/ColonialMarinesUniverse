- type: entity
  parent: VehicleInteriorGeneralBase
  id: VehicleInvisibleWall
  name: "невидима стіна (блокує огляд)"
  description: "Невидима блокувальна стіна для інтер'єрів техніки."
  placement:
    mode: PlaceFree
  components:
  - type: Marker
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Occluder
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
  - type: Sprite
    sprite: _RMC14/Markers/landmarks.rsi
    state: invisible_wall
    drawdepth: Overdoors

- type: entity
  parent: VehicleInteriorGeneralBase
  id: VehicleInvisibleWallNoVision
  name: "невидима стіна (не блокує огляд)"
  description: "Невидима блокувальна стіна для інтер'єрів техніки, яка не блокує огляд або світло."
  placement:
    mode: PlaceFree
  components:
  - type: Marker
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
  - type: Sprite
    sprite: _RMC14/Markers/landmarks.rsi
    state: invisible_wall
    drawdepth: Overdoors


