- type: entity
  abstract: true
  id: VehicleInteriorGeneralBase
  name: "елемент інтер'єру техніки"
  description: "Декоративний елемент інтер'єру техніки."
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    drawdepth: Overdoors
  - type: InteractionOutline
  - type: Clickable
  - type: InteractionTransparency

- type: entity
  abstract: true
  parent: VehicleInteriorGeneralBase
  id: VehicleInteriorWallMountedBase
  name: "настінне кріплення інтер'єру техніки"
  description: "Настінний елемент інтер'єру техніки."
  placement:
    mode: PlaceFree
  components:
  - type: WallMount
    arc: 360

- type: entity
  abstract: true
  parent: CMClosetBase
  id: VehicleInteriorLockerBase
  name: "шафка інтер'єру техніки"
  description: "Шафка для зберігання в інтер'єрах техніки."
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: WallMount
    arc: 360
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    drawdepth: Overdoors
    layers:
    - state: locker
      map: ["enum.StorageVisualLayers.Base"]
    - state: locker
      map: ["enum.StorageVisualLayers.Door"]
  - type: EntityStorageVisuals
    stateBaseClosed: locker
    stateBaseOpen: locker_open
    stateDoorClosed:
    stateDoorOpen:

- type: entity
  parent: VehicleInteriorWallMountedBase
  id: VehicleAmmoLoader
  name: "заряджувач боєприпасів техніки"
  description: "Заряджувач боєприпасів для вузлів кріплення техніки."
  components:
  - type: Sprite
    state: weapons_loader
  - type: Clickable
  - type: InteractionOutline
  - type: RemoveComponents
    components:
    - type: InteractionTransparency
  - type: VehicleAmmoLoader
  - type: UserInterface
    interfaces:
      enum.VehicleAmmoLoaderUiKey.Key:
        type: VehicleAmmoLoaderBoundUserInterface

