- type: entity
  abstract: true
  parent: RMCExtinguisherCabinet
  id: VehicleInteriorExtinguisherCabinetBase
  name: "шафа вогнегасника інтер'єру"
  description: "Настінна шафа для вогнегасника в інтер'єрах техніки."
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    drawdepth: Overdoors
    layers:
    - state: extinguisher
    - state: extinguisher_full
      map: ["enum.ItemCabinetVisuals.Layer"]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.ItemCabinetVisuals.ContainsItem:
        enum.ItemCabinetVisuals.Layer:
          True: { state: extinguisher_full }
          False: { state: extinguisher_empty }
      enum.OpenableVisuals.Opened:
        enum.ItemCabinetVisuals.Layer:
          True: { visible: true }
          False: { visible: false }

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisher
  name: "вогнегасник інтер'єру"
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - CMFireExtinguisher

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisherClosed
  name: "вогнегасник інтер'єру (закритий)"
