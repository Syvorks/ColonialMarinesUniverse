# # Design Node Entity Prototypes
# # These are buildable node entities that provide modifiers for nearby construction
# # Each node type comes in two mark variants (wall/door) for visual distinction
# # Nodes are placed by Designer hivelords and can be interacted with to build walls

# # OPTIMIZED NODES - 50% faster construction
# # Plasma cost: 50, Placement time: 1 second

- type: entity
  id: DesignNodeBase
  name: "Дизайн-вузол"
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
    - type: GuideHelp
      guides:
      - RMCGuideRoleDesigner
    - type: Transform
      anchored: true
    - type: Clickable
      bounds:
        all: "-0.5,-0.5,0.5,0.5"
    - type: Sprite
      sprite: _RMC14/Structures/designer_nodes.rsi
    - type: Icon
      sprite: _RMC14/Actions/designer_actions.rsi
      state: icon_constructnode
    - type: Physics
      bodyType: Static
      canCollide: false
    - type: Damageable
      damageContainer: StructuralXeno
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 5
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]
    - type: ImmuneToUnarmed
    - type: MeleeSound
      soundGroups:
        Brute:
          collection: XenoMove
    - type: RMCNightVisionVisible
      priority: -1
      transparency: 0.2
    - type: DesignNode
      nodeType: Construct
      boundXeno: null
      boundWeed: null
      hiveNumber: 0
    - type: DesignNodeOverlay
      optimizedWallProto: DesignNodeMarkOptimizedWall
      optimizedDoorProto: DesignNodeMarkOptimizedDoor
      flexibleWallProto: DesignNodeMarkFlexibleWall
      flexibleDoorProto: DesignNodeMarkFlexibleDoor
      constructWallProto: DesignNodeMarkConstructWall
      constructDoorProto: DesignNodeMarkConstructDoor

- type: entity
  id: DesignNodeRemoteDelete
  name: "Видалити дизайн-вузол"
  description: "Дистанційно видаляє розміщений дизайн-вузол на цільовій плитці."
  categories: [ HideSpawnMenu, DoNotMap ]
  save: false
  components:
    - type: DesignerDeleteDesignNode
      plasmaCost: 25
      onlyOwnNodes: true
    - type: Icon
      sprite: _RMC14/Actions/designer_actions.rsi
      state: remove_node
    - type: XenoConstructionPlasmaCost
      plasma: 25

- type: entity
  id: DesignNodeRemoteThickenResin
  name: "Дистанційне потовщення"
  description: "Дистанційно потовщує резинові стіни, двері та мембрани в їхні товсті варіанти."
  categories: [ HideSpawnMenu, DoNotMap ]
  save: false
  components:
    - type: DesignerRemoteThickenResin
      plasmaCost: 60
      doAfter: 1
      range: 10
    - type: Icon
      sprite: _RMC14/Actions/designer_actions.rsi
      state: upgrade_resin
    - type: XenoConstructionPlasmaCost
      plasma: 60



# Xeno-only overlay marks (wall/door intent). These are spawned as a child entity of the real node.
- type: entity
  id: DesignNodeMarkBase
  name: "Дизайн-вузол мітка"
  abstract: true
  categories: [ HideSpawnMenu, DoNotMap ]
  save: false
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
      sprite: _RMC14/Structures/designer_nodes.rsi
    - type: Visibility
      layer: 32768
    - type: RMCNightVisionVisible
      priority: -1
      transparency: 0.2
    - type: Tag
      tags:
        - HideContextMenu



- type: entity
  id: DesignNodeMarkOptimizedWall
  parent: DesignNodeMarkBase
  name: "Оптимізована стіна"
  description: "Ви відчуваєте, що будівництво на цьому вузлі прискорить швидкість будівництва на 50%"
  categories: [ HideSpawnMenu, DoNotMap ]
  save: false
  components:
    - type: Sprite
      state: wall_mark_optimized

