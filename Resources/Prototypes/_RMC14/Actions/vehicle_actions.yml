- type: entity
  id: ActionVehicleToggleView
  name: "Перемкнути Вид"
  description: "Перемикайтеся між видом інтер'єру та екстер'єру."
  components:
  - type: InstantAction
    event: !type:VehicleToggleViewActionEvent
  - type: Action
    icon: Interface/Actions/eyeopen.png
    iconOn: Interface/Actions/eyeclose.png
    itemIconStyle: BigAction

- type: entity
  id: ActionVehicleDeploy
  name: "Розгорнути Транспорт"
  description: "Розгорнути або згорнути транспорт."
  components:
  - type: InstantAction
    event: !type:VehicleDeployActionEvent
  - type: Action
    itemIconStyle: BigItem

- type: entity
  id: ActionVehicleLock
  name: "Перемкнути Замок Транспорту"
  description: "Замикає або відмикає вхідні двері транспорту."
  components:
  - type: InstantAction
    event: !type:VehicleLockActionEvent
  - type: Action
    icon:
      sprite: _RMC14/Actions/id_lock_actions.rsi
      state: id_lock_unlocked
    iconOn:
      sprite: _RMC14/Actions/id_lock_actions.rsi
      state: id_lock_locked
    itemIconStyle: BigItem

- type: entity
  id: ActionVehicleSelectHardpoint
  name: "Обрати Точку Кріплення"
  description: "Оберіть цю точку кріплення для стрільби."
  components:
  - type: InstantAction
    event: !type:VehicleHardpointSelectActionEvent
  - type: Action
    autoPopulate: false
    temporary: false
    raiseOnUser: true
    itemIconStyle: BigItem
