- type: entity
  parent: ActionXenoBase
  id: ActionXenoForTheHive
  name: "За Вулик!"
  description: "Підготуйтеся, щоб детонувати у масивному кислотному вибуху за 20 секунд. Потребує мінімум 200 кислоти. Чим більше у вас резервів кислоти, тим більший і шкідливіший буде вибух. Він також покриє барикади і мобів кислотою в радіусі, що дорівнює 1/2 радіусу шкоди. Шкода менша, чим далі моб від вибуху. Ви будете уповільнені, зміните вигляд і будете видавати гучний виючий звук під час зарядження. Смерть запобіжить вибуху, але якщо успішно, ви переродитесь як личинка в ядрі вашого вулика або у вашого трупа, якщо немає. Використання цієї здібності під час зарядження скасує вибух за рахунок 1/4 ваших кислотних резервів."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: screech
  - type: InstantAction
    event: !type:XenoForTheHiveActionEvent

