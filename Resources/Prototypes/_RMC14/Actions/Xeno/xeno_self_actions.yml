  description: "Дістає дитину з вашого сховища, якщо ваша рука порожня. Використання цього на дитині на землі підбере всіх сусідніх дітей. Цілячись на плитку з дитиною в руці, ви кинете її до 4 плиток, де дитина буде оглушена на 5 секунд. Використання дитини в руці додасть її у ваше сховище. [color=green]Діти не вмирають з часу, поки ви тримаєте або носите їх.[/color]"
