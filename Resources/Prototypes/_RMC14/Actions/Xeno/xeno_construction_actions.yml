- type: entity
  id: CMGuidebookActionXenoBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Actions/xeno_actions.rsi

- type: entity
  id: ActionXenoPlantWeeds
  parent: ActionXenoBase
  name: "Посадити бур'ян (75)" # TODO RMC14 proper plasma costs
  description: "Посадити вузол бур'яну, що буде поширювати більше бур'яну."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: plant_weeds
    useDelay: 1
  - type: InstantAction
    event: !type:XenoPlantWeedsActionEvent

- type: entity
  id: ActionXenoChooseStructure
  parent: ActionXenoBase
  name: "Обрати резинову структуру"
  description: "Оберіть структуру для виділення дією «Виділити резину»."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: place_resin
  - type: InstantAction
    event: !type:XenoChooseStructureActionEvent
  - type: XenoChooseConstructionAction
  - type: RMCDazeableAction

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoChooseResinStructure
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: place_resin

- type: entity
  id: ActionXenoSecreteStructure
  parent: ActionXenoBase
  name: "Виділити резину"
  description: "Будує структуру, обрану дією «Обрати резинову структуру»."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: secrete_resin
  - type: TargetAction
    deselectOnMiss: false
    range: 0
    repeat: true
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:XenoSecreteStructureActionEvent
  - type: XenoConstructionAction
    checkStructureSelected: true
    checkWeeds: true
    canUpgrade: true
  - type: RMCDazeableAction

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoSecreteResin
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: secrete_resin

- type: entity
  id: ActionXenoCoerceResin
  parent: ActionXenoBase
  name: "Принудити резину"
  description: "Будує структуру, обрану дією «Обрати резинову структуру». Ви також можете будувати у межах прямого зору, якщо знаходитесь на бур'яні."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: secrete_resin
  - type: TargetAction
    deselectOnMiss: false
    range: 0
    repeat: true
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:XenoSecreteStructureActionEvent
  - type: XenoConstructionAction
    checkStructureSelected: true
    checkWeeds: true
    canUpgrade: false
  - type: RMCDazeableAction

- type: entity
  id: ActionXenoOrderConstruction
  parent: ActionXenoBase
  name: "Замовити будівництво"
  description: "Розпочинає будівництво важливої структури вулика."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: morph_resin
  - type: InstantAction
    event: !type:XenoOrderConstructionActionEvent
  - type: RMCDazeableAction

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoOrderConstruction
  name: "Замовити будівництво"
  description: "Розпочинає будівництво важливої структури вулика."
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: morph_resin

- type: entity
  id: ActionXenoResinHole
  parent: ActionXenoBase
  name: "Посадити резинову нору (200)"
  description: "Розміщує резинову нору на бур'яні. Її можна заповнити газом боулера, кислотою або паразитами."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: place_trap
    useDelay: 1
  - type: InstantAction
    event: !type:XenoPlaceResinHoleActionEvent
  - type: RMCDazeableAction

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoPlantResinHole
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: place_trap

# For gardener drone
- type: entity
  id: ActionXenoFruitChoose
  parent: ActionXenoBase
  name: "Змінити фрукт"
  description: "Оберіть фрукт для посадки дією «Посадити резиновий фрукт»."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: gardener_plant_pick
  - type: InstantAction
    event: !type:XenoFruitChooseActionEvent
  - type: XenoFruitChooseAction

- type: entity
  id: ActionXenoFruitPlant
  parent: ActionXenoBase
  name: "Посадити резиновий фрукт (100)"
  description: "Посадити обраний резиновий фрукт на бур'яні за рахунок здоров'я та плазми. Ксени можуть зривати ці фрукти, коли вони дозріють; також ви можете зірвати рослину раніше, щоб її позбутися. Ксени можуть використовувати їх в руці або з'їсти на землі, щоб отримати їхні ефекти. Їх також можна використовувати на інших ксенах, щоб годувати їх. Одночасно можна мати лише 6 фруктів посаджених і зірваних."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: gardener_plant
    useDelay: 5
  - type: InstantAction
    event: !type:XenoFruitPlantActionEvent

- type: entity
  id: ActionXenoPlantWeedsHardy
  parent: ActionXenoBase
  name: "Посадити витривалий бур'ян (125)" # TODO RMC14 proper plasma costs
  description: "Посадити вузол бур'яну, що буде поширювати витриваліший бур'ян, який вирощує фрукти на 25% швидше, має трохи більше здоров'я і може поширюватися на деяких поверхнях, де звичайний бур'ян не зростає."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: plant_gardener_weeds
    useDelay: 120
  - type: InstantAction
    event: !type:XenoPlantWeedsActionEvent
      plasmaCost: 125
      prototype: XenoHardyWeedsSource

# For healer drone
- type: entity
  id: ActionXenoFruitPlantLesser
  parent: ActionXenoFruitPlant
  name: "Посадити резиновий фрукт (50)"
  description: "Посадити резиновий фрукт на бур'яні за рахунок здоров'я та плазми."
  components:
  - type: InstantAction
    event: !type:XenoFruitPlantActionEvent
      plasmaCost: 50

- type: entity
  id: ActionXenoDigTunnel
  parent: ActionXenoBase
  name: "Викопати тунель (200)"
  description: "Викопайте тунель для швидкого транспортування через вулик."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: build_tunnel
    useDelay: 300
  - type: InstantAction
    event: !type:XenoDigTunnelActionEvent

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoDigTunnel
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: build_tunnel

# For lesser drone
- type: entity
  parent: ActionXenoPlantWeeds
  id: ActionLesserDronePlantWeeds
  components:
  - type: InstantAction
    event: !type:XenoPlantWeedsActionEvent
      limitDistance: true

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoPlantWeeds
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: plant_weeds

- type: entity
  parent: ActionXenoBase
  id: ActionXenoExpandWeeds
  name: "Розширити бур'ян (50)" # TODO RMC14 proper plasma costs
  description: "Розширити існуючий бур'ян або перетворити плитку бур'яну на вузол."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: plant_weeds
    useDelay: 0.5
  - type: TargetAction
    checkCanAccess: false
    range: -1
    deselectOnMiss: false
  - type: WorldTargetAction
    event: !type:XenoExpandWeedsActionEvent

- type: entity
  id: ActionXenoDesignerSelectedDesign
  parent: ActionXenoBase
  name: "Обраний дизайн"
  description: "Перемикайте, чи будуть нові дизайн-вузли стіновими чи дверними вузлами."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon: { sprite: _RMC14/Actions/designer_actions.rsi, state: design_mark_wall }
    iconOn: { sprite: _RMC14/Actions/designer_actions.rsi, state: design_mark_door }
    useDelay: 0.2
  - type: InstantAction
    event: !type:Content.Shared._RMC14.Xenonids.Designer.DesignerSelectedDesignToggleActionEvent
  - type: RMCDazeableAction

# TODO: Make this greater surge weak reflective resin wall
- type: entity
  id: ActionXenoDesignerGreaterResinSurge
  parent: ActionXenoBase
  name: "Великий резиновий сплеск (250)"
  description: "Споживає сусідні дизайн-вузли для створення тимчасових товстих резинових стін."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon: { sprite: _RMC14/Actions/designer_actions.rsi, state: greater_resin_surge }
    useDelay: 30
  - type: InstantAction
    event: !type:Content.Shared._RMC14.Xenonids.Designer.DesignerGreaterResinSurgeActionEvent
  - type: RMCDazeableAction
