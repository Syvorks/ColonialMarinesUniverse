- type: entity
  parent: ActionXenoBase
  id: ActionXenoEvolve
  name: "Еволюціонувати"
  description: "Еволюціонувати в наступну касту ксеноніда або обрати штам, якщо доступний."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: evolve
  - type: InstantAction
    event: !type:XenoOpenEvolutionsActionEvent

- type: entity
  parent: ActionXenoBase
  id: ActionXenoDevolve
  name: "Деволюціонувати"
  description: "Деволюціонувати в попередню касту ксеноніда. [color=red]Очки еволюції не повертаються![/color]"
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: xeno_deevolve
  - type: InstantAction
    event: !type:XenoOpenDevolveActionEvent

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoEvolve
  name: "Еволюціонувати"
  description: "Еволюціонувати в наступну касту ксеноніда або обрати штам, якщо доступний."
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: evolve
