- type: entity
  id: ActionXenoResinSurge
  parent: ActionXenoBase
  name: "Резиновий сплеск (75)"
  description: "Миттєво вирощує фрукт при використанні (час перезарядки буде пропорційний часу росту), створює тимчасові стіни при використанні на бур'яні або використовується на існуючих стінах для їх укріплення з 6000 ХП на 15 секунд. Цілячись на щось інше, створює квадрат 3x3 слабкої липкої резини після короткої доафтер."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: gardener_resin_surge
    useDelay: 10
  - type: TargetAction
    range: 7
    checkCanAccess: false
  - type: EntityTargetAction
    whitelist:
      components:
      - XenoConstruct
      - XenoFruit
      - XenoWeeds
  - type: WorldTargetAction
    event: !type:XenoResinSurgeActionEvent
  - type: XenoResinSurgeAction

- type: entity
  parent: ActionXenoBase
  id: ActionXenoRetrieve
  name: "Притягнути (180 плазми, 100 люті)"
  description: "Притягує до вас ксеноніда, якщо вони нерухомі, з 0,6-секундною доафтер. Ви не можете притягувати дуже великих ксенонідів, якщо вони не повалені."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: retrieve
  - type: TargetAction
    range: 7
  - type: EntityTargetAction
    event: !type:XenoRetrieveActionEvent
  - type: XenoActionPlasma
    cost: 180
  - type: XenoActionEnergy
    cost: 100
  - type: ActionCooldown
    cooldown: 10
  - type: ActionBlockIfResting

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoRetrieve
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: retrieve

- type: entity
  parent: ActionXenoBase
  id: ActionXenoAidHeal
  name: "Допомога Зціленню Ксеноніда (100 плазми, 100+ резерви здоров'я)"
  description: "Зцілює сусіднього союзного Ксена. Зцілення іншого Ксена також зцілить вас, і половина ваших залишкових резервів здоров'я буде використана для додаткового зцілення. [color=red]Це не може зцілити запалених ксенонідів![/color]"
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: warden_heal
    useDelay: 10
  - type: TargetAction
    range: 1.5
  - type: EntityTargetAction
    event: !type:XenoAidActionEvent
  - type: XenoActionPlasma
    cost: 100
  - type: ActionBlockIfResting
  - type: ActionSharedCooldown
    id: ActionXenoAidHeal
    ids:
    - ActionXenoAidRejuvenate
    cooldown: 10
  - type: RMCDazeableAction

- type: entity
  parent: ActionXenoBase
  id: ActionXenoAidRejuvenate
  name: "Допомога Відновленню Ксеноніда (100 плазми, 100 резерви здоров'я)"
  description: "Зніміть недуги та оглушення з далекого союзного Ксена."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: warden_rejuvenate
    useDelay: 10
  - type: TargetAction
    range: 8
  - type: EntityTargetAction
    event: !type:XenoAidActionEvent
      aidType: Ailments
  - type: XenoActionPlasma
    cost: 100
  - type: ActionBlockIfResting
  - type: ActionSharedCooldown
    id: ActionXenoAidRejuvenate
    ids:
    - ActionXenoAidHeal
    cooldown: 10

