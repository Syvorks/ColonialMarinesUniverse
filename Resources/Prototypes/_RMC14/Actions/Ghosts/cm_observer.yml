- type: entity
  id: ActionToggleMarineHud
  name: "Перемкнути HUD Морпіхів"
  description: "Перемкнути іконки морпіхів."
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_co
    iconOn:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_co
  - type: InstantAction
    event: !type:ToggleMarineHudActionEvent

- type: entity
  id: ActionToggleXenoHud
  name: "Перемкнути HUD Ксенів"
  description: "Перемкнути смужки здоров'я та плазми ксенів."
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Interface/Alerts/xeno_health.rsi
      state: health_full
    iconOn:
      sprite: _RMC14/Interface/Alerts/xeno_health.rsi
      state: health_full
  - type: InstantAction
    event: !type:ToggleXenoHudActionEvent

- type: entity
  id: ActionFindParasite
  name: "Знайти Паразита"
  description: "Знайти паразитів з можливістю взяти роль"
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Actions/observer_actions.rsi
      state: find_parasite
  - type: InstantAction
    event: !type:FindParasiteActionEvent

- type: entity
  id: ActionJoinXeno
  name: "Приєднатися як Ксено"
  description: "Знайти закопану личинку, щоб приєднатися."
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Actions/observer_actions.rsi
      state: join_xeno
    useDelay: 0.5
  - type: InstantAction
    event: !type:JoinXenoActionEvent
