- type: entity
  parent: ActionMarineBase
  id: ActionMarineFocus
  name: "Видати Наказ — Фокус"
  description: "Збільшує точність зброї для сусідніх морпіхів."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/marine_actions.rsi
      state: focus
  - type: InstantAction
    event: !type:FocusActionEvent

- type: entity
  parent: ActionMarineBase
  id: ActionMarineHold
  name: "Видати Наказ — Утримувати"
  description: "Збільшує опірність шкоді для сусідніх морпіхів."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/marine_actions.rsi
      state: hold
  - type: InstantAction
    event: !type:HoldActionEvent

- type: entity
  id: ActionMarineMove
  parent: ActionMarineBase
  name: "Видати Наказ — Рух"
  description: "Збільшує швидкість для сусідніх морпіхів. [color=red]Це не вплине ні на кого без броні![/color]"
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/marine_actions.rsi
      state: move
  - type: InstantAction
    event: !type:MoveActionEvent
