# Lore Holidays

- type: customHoliday
  id: RMCUNMCFoundingDay # RMC14 Release
  name: "День заснування UNMC"
  beginDay: 9
  beginMonth: June
  description: "Архаїчне свято на честь заснування Корпусу морпіхів ООН."

- type: customHoliday
  id: RMCNewHorizonDay # RMC14 Initial development and founding
  name: "День Нового Горизонту"
  beginDay: 28
  beginMonth: October
  description: "День, що відзначає утворення Організації Об'єднаних Націй та мир і процвітання, які вона забезпечила для всіх."

- type: customHoliday
  id: RMCFleetDay # Lore
  name: "День Флоту"
  beginDay: 6
  beginMonth: May
  description: "День святкування, у який UNMC демонструє свій флот."

# Major Holidays

- type: customHoliday
